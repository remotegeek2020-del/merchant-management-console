<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Community | PayProTec Staff</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="css/pp-system.css">
    <script src="js/tz.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>(function(){const u=localStorage.getItem('pp_userid'),v=localStorage.getItem('pp_verified');if(!u||v!=='true')window.location.href = '/?reason=unauthorized';})();</script>
    <style>
        *,*::before,*::after{box-sizing:border-box;}
        :root{--teal:#0d9488;--teal-bg:#f0fdfa;--navy:#001e3c;--border:#e2e8f0;--surface:#f0f4f8;--white:#fff;--text:#0a1628;--muted:#94a3b8;}
        body{margin:0;font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--text);display:flex;flex-direction:column;height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased;}

        /* NAV */
        .topnav{background:var(--navy);padding:0 20px;display:flex;align-items:center;gap:12px;height:52px;flex-shrink:0;}
        .nav-logo{height:24px;filter:brightness(0) invert(1);}
        .nav-title{font-size:14px;font-weight:800;color:white;}
        .nav-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
        .nav-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;font-size:11px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;text-decoration:none;color:white;background:rgba(255,255,255,0.12);}
        .nav-btn:hover{background:rgba(255,255,255,0.22);}
        .staff-chip{background:rgba(255,255,255,0.12);color:white;font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px;}

        /* LAYOUT */
        .layout{display:grid;grid-template-columns:220px 1fr 260px;flex:1;overflow:hidden;}

        /* LEFT SIDEBAR */
        .left-col{background:white;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;}
        .col-header{padding:14px 14px 6px;font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
        .channel-btn{display:flex;align-items:center;gap:8px;padding:8px 14px;font-size:12px;font-weight:600;color:#475569;cursor:pointer;border:none;background:none;width:100%;font-family:'DM Sans',sans-serif;transition:all 0.15s;}
        .channel-btn:hover{background:#f8fafc;color:var(--teal);}
        .channel-btn.active{background:var(--teal-bg);color:var(--teal);font-weight:800;}
        .channel-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
        .col-divider{height:1px;background:var(--border);margin:8px 0;}

        /* FEED */
        .feed-col{display:flex;flex-direction:column;overflow:hidden;}
        .feed-header{background:white;border-bottom:1px solid var(--border);padding:12px 18px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
        .feed-title{font-size:14px;font-weight:800;margin:0;}
        .feed-scroll{flex:1;overflow-y:auto;padding:16px;}

        /* COMPOSER */
        .composer{background:white;border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:14px;}
        .composer-row{display:flex;gap:10px;align-items:flex-start;}
        .composer-avatar{width:38px;height:38px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:white;flex-shrink:0;overflow:hidden;}
        .composer-avatar img{width:100%;height:100%;object-fit:cover;}
        .composer-input{flex:1;min-height:65px;padding:10px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:'DM Sans',sans-serif;resize:none;outline:none;transition:all 0.2s;}
        .composer-input:focus{border-color:var(--teal);}
        .composer-footer{display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
        .media-btn{display:flex;align-items:center;gap:4px;padding:6px 10px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;}
        .media-btn.photo{background:#eff6ff;color:#2563eb;}
        .pin-btn{display:flex;align-items:center;gap:4px;padding:6px 10px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:white;color:#475569;font-family:'DM Sans',sans-serif;}
        .pin-btn.active{background:#fef3c7;border-color:#fbbf24;color:#92400e;}
        .post-btn{margin-left:auto;background:var(--teal);color:white;padding:7px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;}
        .post-btn:disabled{opacity:0.5;cursor:not-allowed;}
        .media-preview{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
        .media-thumb{position:relative;width:72px;height:72px;border-radius:8px;overflow:hidden;border:1px solid var(--border);}
        .media-thumb img{width:100%;height:100%;object-fit:cover;}
        .media-thumb .rm{position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.6);color:white;border:none;border-radius:50%;width:16px;height:16px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:900;}

        /* POST CARD */
        .post-card{background:white;border:1px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden;}
        .post-card.pinned{border-color:#fbbf24;background:#fffbeb;}
        .pin-label{font-size:10px;font-weight:800;color:#92400e;padding:6px 14px 0;display:flex;align-items:center;gap:4px;}
        .post-header{display:flex;align-items:center;gap:10px;padding:12px 14px 8px;}
        .post-avatar{width:38px;height:38px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:white;flex-shrink:0;overflow:hidden;}
        .post-avatar img{width:100%;height:100%;object-fit:cover;}
        .post-author{font-size:13px;font-weight:800;color:var(--text);}
        .post-time{font-size:11px;color:var(--muted);}
        .staff-badge{font-size:9px;background:#eff6ff;color:#2563eb;padding:1px 6px;border-radius:99px;font-weight:800;margin-left:4px;}
        .ch-badge{font-size:9px;padding:1px 7px;border-radius:99px;font-weight:700;margin-left:4px;}
        .post-body{padding:0 14px 10px;font-size:13px;line-height:1.6;color:var(--text);white-space:pre-wrap;word-break:break-word;}
        .post-image{width:100%;max-height:400px;object-fit:cover;cursor:pointer;display:block;}
        .post-actions{display:flex;gap:2px;padding:6px 10px;border-top:1px solid var(--border);}
        .action-btn{display:flex;align-items:center;gap:4px;padding:6px 10px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;border:none;background:none;color:#475569;font-family:'DM Sans',sans-serif;transition:all 0.15s;}
        .action-btn:hover{background:#f1f5f9;}
        .action-btn.reacted{color:var(--teal);background:var(--teal-bg);}
        .action-btn.delete{color:#ef4444;}
        .action-btn .material-icons{font-size:17px;}
        .comments-section{padding:0 12px 12px;display:none;}
        .comment-item{display:flex;gap:8px;margin-bottom:8px;}
        .c-avatar{width:28px;height:28px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:10px;color:#475569;flex-shrink:0;overflow:hidden;}
        .c-avatar img{width:100%;height:100%;object-fit:cover;}
        .c-bubble{background:#f1f5f9;border-radius:10px;padding:7px 11px;flex:1;}
        .c-author{font-size:11px;font-weight:800;margin-bottom:1px;}
        .c-body{font-size:12px;color:#475569;}
        .c-input-row{display:flex;gap:8px;margin-top:6px;align-items:center;}
        .c-input{flex:1;padding:6px 12px;border:1.5px solid var(--border);border-radius:20px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;}
        .c-input:focus{border-color:var(--teal);}
        .c-send{background:var(--teal);color:white;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

        /* RIGHT */
        .right-col{background:white;border-left:1px solid var(--border);overflow-y:auto;padding:14px;}
        .right-title{font-size:11px;font-weight:800;color:var(--text);margin:0 0 10px;text-transform:uppercase;letter-spacing:0.5px;}
        .member-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f8fafc;}
        .m-avatar{width:30px;height:30px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:white;flex-shrink:0;overflow:hidden;}
        .m-avatar img{width:100%;height:100%;object-fit:cover;}
        .m-name{font-size:12px;font-weight:700;}
        .m-type{font-size:10px;color:var(--muted);}
        .online-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;margin-left:auto;flex-shrink:0;}

        @keyframes spin{to{transform:rotate(360deg);}}
        .spinner{width:20px;height:20px;border:2px solid #e2e8f0;border-top-color:var(--teal);border-radius:50%;animation:spin 0.8s linear infinite;margin:24px auto;}
        .empty-state{text-align:center;padding:40px;color:var(--muted);font-size:14px;}
        .load-more{text-align:center;padding:10px;color:var(--teal);font-weight:700;cursor:pointer;font-size:13px;}

        /* EMOJI REACTION PICKER */
        .reaction-wrap{position:relative;display:inline-block;}
        .emoji-tray{position:absolute;bottom:calc(100% + 6px);left:0;background:white;border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,0.12);padding:6px 8px;display:flex;gap:2px;z-index:100;opacity:0;pointer-events:none;transition:opacity 0.15s,transform 0.15s;transform:translateY(4px);}
        .emoji-tray.open{opacity:1;pointer-events:all;transform:translateY(0);}
        .emoji-opt{font-size:20px;cursor:pointer;padding:4px 5px;border-radius:6px;border:none;background:none;line-height:1;transition:transform 0.1s,background 0.1s;}
        .emoji-opt:hover{background:#f1f5f9;transform:scale(1.25);}
        /* FEED SEARCH */
        .feed-search{position:relative;margin-bottom:12px;}
        .feed-search input{width:100%;padding:9px 38px 9px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;background:white;transition:border-color 0.2s;color:var(--text);}
        .feed-search input:focus{border-color:var(--teal);}
        .feed-search .si{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:20px;pointer-events:none;}
        /* CHAR COUNTER */
        .char-counter{font-size:10px;color:var(--muted);text-align:right;margin-top:3px;min-height:14px;}
        .char-counter.warn{color:#d97706;}
        .char-counter.limit{color:#ef4444;font-weight:700;}
        /* PINNED BANNER */
        .pin-banner{background:linear-gradient(90deg,var(--teal-bg),white);padding:5px 14px;display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--teal);border-bottom:1px solid #ccfbf1;}
        .pin-banner .material-icons{font-size:13px;}

        /* MESSAGES (DM) */
        .nav-badge{background:#ef4444;color:white;border-radius:99px;font-size:9px;font-weight:800;padding:1px 6px;margin-left:2px;display:none;}
        .dm-panel{position:fixed;bottom:20px;right:20px;width:340px;background:white;border-radius:16px;box-shadow:0 20px 40px rgba(0,0,0,0.18);border:1px solid var(--border);z-index:300;display:none;flex-direction:column;height:460px;}
        .dm-panel.open{display:flex;}
        .dm-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--navy);border-radius:16px 16px 0 0;}
        .dm-other-name{font-weight:700;font-size:13px;color:white;flex:1;}
        .dm-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;}
        .dm-msg{max-width:75%;padding:8px 12px;border-radius:12px;font-size:12px;line-height:1.5;word-break:break-word;}
        .dm-msg.sent{background:var(--teal);color:white;border-radius:12px 12px 0 12px;align-self:flex-end;}
        .dm-msg.recv{background:#f1f5f9;color:var(--text);border-radius:12px 12px 12px 0;align-self:flex-start;}
        .dm-msg-time{font-size:10px;opacity:0.6;margin-top:3px;}
        .dm-input-row{padding:10px;border-top:1px solid var(--border);display:flex;gap:8px;}
        .dm-input{flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;}
        .dm-input:focus{border-color:var(--teal);}
        .dm-send{background:var(--teal);color:white;border:none;border-radius:8px;padding:8px 12px;cursor:pointer;display:flex;align-items:center;}
        .conv-panel{position:fixed;bottom:20px;right:20px;width:320px;background:white;border-radius:16px;box-shadow:0 20px 40px rgba(0,0,0,0.18);border:1px solid var(--border);z-index:299;display:none;flex-direction:column;max-height:480px;}
        .conv-panel.open{display:flex;}
        .conv-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--navy);border-radius:16px 16px 0 0;}
        .conv-title{font-weight:800;font-size:13px;color:white;}
        .conv-list{flex:1;overflow-y:auto;}
        .conv-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid #f8fafc;cursor:pointer;transition:background 0.15s;}
        .conv-item:hover{background:#f8fafc;}
        .conv-name{font-size:12px;font-weight:700;color:var(--text);}
        .conv-preview{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px;}
        .conv-unread{background:#ef4444;color:white;border-radius:99px;font-size:9px;font-weight:800;padding:1px 6px;margin-left:auto;flex-shrink:0;}
        .msg-member-btn{margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;padding:3px;border-radius:6px;display:flex;align-items:center;}
        .msg-member-btn:hover{color:var(--teal);background:var(--teal-bg);}
    </style>
</head>
<body>

<nav class="topnav">
    <img src="https://assets.cdn.filesafe.space/dfg08aPdtlQ1RhIKkCnN/media/66cf5cf28a35e448970f1ead.png" class="nav-logo">
    <span class="nav-title">Partner Community</span>
    <div class="nav-right">
        <button class="nav-btn" onclick="toggleConvPanel()">
            <span class="material-icons" style="font-size:14px;">forum</span> Messages
            <span class="nav-badge" id="dmBadge">0</span>
        </button>
        <span class="staff-chip" id="staffChip">Staff</span>
        <a href="/" class="nav-btn"><span class="material-icons" style="font-size:14px;">arrow_back</span> Back</a>
    </div>
</nav>

<div class="layout">
    <!-- LEFT: Channels -->
    <div class="left-col">
        <div class="col-header">Channels</div>
        <button class="channel-btn active" data-channel="" id="ch-all" onclick="selectChannel(null,'ch-all','All Posts')">
            <span class="material-icons" style="font-size:16px;color:var(--muted);">dynamic_feed</span> All Posts
        </button>
        <div id="channelList"><div class="spinner" style="margin:10px auto;width:16px;height:16px;border-width:2px;"></div></div>
        <div class="col-divider"></div>
        <div class="col-header">My Posts</div>
        <button class="channel-btn" id="ch-mine" onclick="selectChannel('mine','ch-mine','My Posts')">
            <span class="material-icons" style="font-size:16px;color:var(--muted);">person</span> Posted by me
        </button>
    </div>

    <!-- CENTER: Feed -->
    <div class="feed-col">
        <div class="feed-header">
            <h2 class="feed-title" id="feedTitle">All Posts</h2>
        </div>
        <div class="feed-scroll">
            <!-- Composer -->
            <div class="composer">
                <div class="composer-row">
                    <div class="composer-avatar" id="composerAvatar">S</div>
                    <textarea class="composer-input" id="postText" placeholder="Share something with the partner network..." oninput="updateCharCount()" maxlength="1500"></textarea>
                </div>
                <div class="char-counter" id="charCounter"></div>
                <div id="mediaPreview" class="media-preview"></div>
                <div class="composer-footer">
                    <button class="media-btn photo" onclick="document.getElementById('photoInput').click()">
                        <span class="material-icons" style="font-size:15px;">photo</span> Photo
                    </button>
                    <button class="pin-btn" id="pinToggle" onclick="togglePin()" title="Pin this post">
                        <span class="material-icons" style="font-size:14px;">push_pin</span> Pin
                    </button>
                    <button class="post-btn" id="postBtn" onclick="submitPost()">Post</button>
                </div>
                <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="handlePhoto(this)">
            </div>

            <div class="feed-search">
                <input type="text" id="feedSearch" placeholder="Search posts…" oninput="filterFeed(this.value)">
                <span class="material-icons si">search</span>
            </div>
            <div id="feedContainer"><div class="spinner"></div></div>
            <div id="loadMore" class="load-more" style="display:none" onclick="loadFeed(true)">Load more</div>
        </div>
    </div>

    <!-- RIGHT: Members -->
    <div class="right-col">
        <div class="right-title">Network Members</div>
        <div id="membersList"><div class="spinner"></div></div>
    </div>
</div>

<!-- CONVERSATIONS PANEL -->
<div class="conv-panel" id="convPanel">
    <div class="conv-header">
        <span class="conv-title">Messages</span>
        <button onclick="toggleConvPanel()" style="background:none;border:none;color:rgba(255,255,255,0.6);cursor:pointer;display:flex;"><span class="material-icons" style="font-size:18px;">close</span></button>
    </div>
    <div class="conv-list" id="convList"><div class="spinner"></div></div>
</div>

<!-- DM THREAD PANEL -->
<div class="dm-panel" id="dmPanel">
    <div class="dm-header">
        <button onclick="backToConvs()" style="background:none;border:none;color:rgba(255,255,255,0.6);cursor:pointer;display:flex;padding:0;" title="Back to conversations"><span class="material-icons" style="font-size:18px;">arrow_back</span></button>
        <div class="dm-other-name" id="dmOtherName">—</div>
        <button onclick="closeDM()" style="background:none;border:none;color:rgba(255,255,255,0.6);cursor:pointer;display:flex;"><span class="material-icons" style="font-size:18px;">close</span></button>
    </div>
    <div class="dm-messages" id="dmMessages"></div>
    <div class="dm-input-row">
        <input class="dm-input" id="dmInput" placeholder="Type a message..." maxlength="2000" onkeypress="if(event.key==='Enter')sendDM()">
        <button class="dm-send" onclick="sendDM()"><span class="material-icons" style="font-size:15px;">send</span></button>
    </div>
</div>

<script>
var staffId = localStorage.getItem('pp_userid') || '';
var staffName = localStorage.getItem('pp_user_first_name') || 'Staff';
var staffAvatar = null;
var activeChannelId = null;
var mineOnly = false;
var feedPage = 0;
var pendingImage = null; // { dataUrl, file }
var pinPost = false;
var channels = [];

// ── API ──────────────────────────────────────────────────
function api(body) {
    return fetch('/api/community', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            // Staff requests are gated by validateSession() server-side — without
            // this header every call returns 401
            'Authorization': 'Bearer ' + (localStorage.getItem('pp_session_token') || '')
        },
        body: JSON.stringify(Object.assign({ staff_userid: staffId }, body))
    }).then(function(r) {
        return r.json().catch(function() {
            return { success: false, message: 'Server error (' + r.status + ')' };
        });
    });
}

// ── HELPERS ──────────────────────────────────────────────
function initials(name) {
    return (name || '?').split(' ').filter(Boolean).map(function(w){ return w[0]; }).join('').toUpperCase().slice(0,2);
}
function timeAgo(d) {
    var diff = (Date.now() - new Date(d)) / 1000;
    if (diff < 60) return 'Just now';
    if (diff < 3600) return Math.floor(diff/60) + 'm ago';
    if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
    return fmtDate(d);
}
function escHtml(s) { var d=document.createElement('div');d.textContent=s;return d.innerHTML; }
function openLightbox(url) {
    var ov = document.createElement('div');
    ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:zoom-out;';
    var img = document.createElement('img'); img.src = url;
    img.style.cssText = 'max-width:95vw;max-height:95vh;object-fit:contain;border-radius:8px;';
    var btn = document.createElement('button');
    btn.innerHTML = '&times;'; btn.style.cssText = 'position:fixed;top:16px;right:20px;background:none;border:none;color:white;font-size:40px;cursor:pointer;z-index:10000;line-height:1;';
    ov.onclick = function(){ document.body.removeChild(ov); };
    btn.onclick = function(e){ e.stopPropagation(); document.body.removeChild(ov); };
    document.addEventListener('keydown', function esc(e){ if(e.key==='Escape'&&document.body.contains(ov)){ document.body.removeChild(ov); document.removeEventListener('keydown',esc); }});
    ov.appendChild(img); ov.appendChild(btn); document.body.appendChild(ov);
}
function avatarEl(profile, size) {
    var sz = size || 38;
    var el = document.createElement('div');
    el.style.cssText = 'width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:'+(sz>30?13:10)+'px;color:white;flex-shrink:0;overflow:hidden;';
    if (profile && profile.avatar_url) {
        var img = document.createElement('img'); img.src = profile.avatar_url; img.style.cssText='width:100%;height:100%;object-fit:cover;';
        el.appendChild(img);
    } else {
        el.textContent = initials(profile ? profile.display_name : '?');
    }
    return el;
}

// ── INIT ─────────────────────────────────────────────────
async function init() {
    // Get staff name from app_users
    try {
        var d = await api({ action: 'get_profile' });
        if (d.success && d.profile) {
            staffName = d.profile.display_name || staffName;
            staffAvatar = d.profile.avatar_url || null;
        }
    } catch(e){}

    document.getElementById('staffChip').textContent = staffName;
    var ca = document.getElementById('composerAvatar');
    if (staffAvatar) { ca.innerHTML = '<img src="' + staffAvatar + '" style="width:100%;height:100%;object-fit:cover;">'; }
    else { ca.textContent = initials(staffName); }

    await loadChannels();
    loadFeed(false);
    loadMembers();

    // Presence + unread badge polling
    api({ action: 'heartbeat' });
    setInterval(function(){ api({ action: 'heartbeat' }); }, 60000);
    pollUnreadCounts();
    setInterval(pollUnreadCounts, 15000);
}

// ── CHANNELS ─────────────────────────────────────────────
async function loadChannels() {
    var result = await api({ action: 'get_channels' });
    channels = result.data || [];
    var el = document.getElementById('channelList');
    el.innerHTML = '';
    channels.forEach(function(ch) {
        var btn = document.createElement('button');
        btn.className = 'channel-btn';
        btn.id = 'ch-' + ch.id;
        btn.style.cssText = '';
        btn.innerHTML = '<div class="channel-dot" style="background:' + (ch.color||'#94a3b8') + ';"></div>' + escHtml(ch.name);
        btn.onclick = (function(c){ return function(){ selectChannel(c.id, 'ch-'+c.id, c.name); }; })(ch);
        el.appendChild(btn);
    });
}

function selectChannel(id, btnId, title) {
    activeChannelId = id;
    mineOnly = (id === 'mine');
    if (mineOnly) activeChannelId = null;
    document.querySelectorAll('.channel-btn').forEach(function(b){ b.classList.remove('active'); });
    var btn = document.getElementById(btnId);
    if (btn) btn.classList.add('active');
    document.getElementById('feedTitle').textContent = title;
    loadFeed(false);
}

// ── FEED ─────────────────────────────────────────────────
async function loadFeed(append) {
    if (!append) { feedPage = 0; document.getElementById('feedContainer').innerHTML = '<div class="spinner"></div>'; }
    
    var body = { action: 'get_feed', page: feedPage, limit: 20 };
    if (activeChannelId) body.channel_id = activeChannelId;
    
    var result = await api(body);
    
    if (!result.success) {
        document.getElementById('feedContainer').innerHTML = '<div class="empty-state">Could not load feed: ' + (result.message||'Unknown error') + '</div>';
        return;
    }

    var posts = result.data || [];
    
    // Handle "mine" filter client-side since community.js doesn't have that param
    if (mineOnly) posts = posts.filter(function(p){ return p.author_id === staffId; });

    document.getElementById('loadMore').style.display = result.has_more ? 'block' : 'none';

    if (!append) document.getElementById('feedContainer').innerHTML = '';
    if (!posts.length && !append) {
        document.getElementById('feedContainer').innerHTML = '<div class="empty-state">No posts yet. Be the first to share something!</div>';
        return;
    }

    posts.forEach(function(p) { document.getElementById('feedContainer').appendChild(buildPostCard(p)); });
    feedPage++;
}

function buildPostCard(p) {
    var card = document.createElement('div');
    card.className = 'post-card' + (p.is_pinned ? ' pinned' : '');
    card.id = 'post-' + p.id;

    var author = p.author || {};
    var isOwn = p.author_id === staffId;
    var isStaff = p.author_type === 'staff';

    // Find channel info
    var ch = channels.find(function(c){ return c.id === p.channel_id; });

    if (p.is_pinned) {
        var pinLabel = document.createElement('div');
        pinLabel.className = 'pin-banner';
        pinLabel.innerHTML = '<span class="material-icons">push_pin</span> Pinned';
        card.appendChild(pinLabel);
    }

    var header = document.createElement('div'); header.className = 'post-header';
    var av = avatarEl(author, 38); av.className = 'post-avatar';
    var meta = document.createElement('div'); meta.style.flex = '1';
    var authorLine = document.createElement('div'); authorLine.className = 'post-author';
    authorLine.textContent = author.display_name || 'Unknown';
    if (isStaff) { var sb = document.createElement('span'); sb.className='staff-badge'; sb.textContent='Staff'; authorLine.appendChild(sb); }
    if (ch) { var cb = document.createElement('span'); cb.className='ch-badge'; cb.style.cssText='background:'+ch.color+'22;color:'+ch.color+';'; cb.textContent=ch.name; authorLine.appendChild(cb); }
    var timeLine = document.createElement('div'); timeLine.className='post-time'; timeLine.textContent=timeAgo(p.created_at);
    meta.appendChild(authorLine); meta.appendChild(timeLine);

    var btnWrap = document.createElement('div'); btnWrap.style.cssText='display:flex;gap:4px;margin-left:auto;';
    if (!isOwn) {
        var msgBtn2 = document.createElement('button');
        msgBtn2.className='action-btn'; msgBtn2.title='Message ' + (author.display_name || '');
        msgBtn2.innerHTML='<span class="material-icons" style="font-size:16px;">chat_bubble_outline</span>';
        msgBtn2.onclick = (function(id, name, type){ return function(){ openDM(id, name, type); }; })(p.author_id, author.display_name || 'Unknown', p.author_type);
        btnWrap.appendChild(msgBtn2);
    }
    if (isOwn) {
        var pinBtn2 = document.createElement('button');
        pinBtn2.className='action-btn'; pinBtn2.title = p.is_pinned ? 'Unpin' : 'Pin';
        pinBtn2.innerHTML='<span class="material-icons" style="font-size:16px;">' + (p.is_pinned?'push_pin':'push_pin') + '</span>';
        pinBtn2.style.color = p.is_pinned ? '#92400e' : 'var(--muted)';
        pinBtn2.onclick = (function(id){ return function(){ togglePinPost(id); }; })(p.id);
        btnWrap.appendChild(pinBtn2);
        var delBtn = document.createElement('button'); delBtn.className='action-btn delete'; delBtn.title='Delete';
        delBtn.innerHTML='<span class="material-icons" style="font-size:16px;">delete</span>';
        delBtn.onclick = (function(id){ return function(){ deletePost(id); }; })(p.id);
        btnWrap.appendChild(delBtn);
    }

    header.appendChild(av); header.appendChild(meta); header.appendChild(btnWrap);
    card.appendChild(header);

    if (p.body) {
        var body = document.createElement('div'); body.className='post-body'; body.textContent=p.body; card.appendChild(body);
    }
    if (p.image_url) {
        var img = document.createElement('img'); img.className='post-image'; img.src=p.image_url; img.loading='lazy';
        img.onclick = function(){ openLightbox(this.src); };
        card.appendChild(img);
    }

    var actions = document.createElement('div'); actions.className='post-actions';
    var reactWrap = document.createElement('div'); reactWrap.className='reaction-wrap';
    var reactBtn = document.createElement('button');
    reactBtn.className='action-btn' + (p.user_reacted ? ' reacted' : '');
    reactBtn.id='react-btn-'+p.id;
    reactBtn.innerHTML=(p.user_reacted?'❤️':'<span class="material-icons">add_reaction</span>')+' <span id="rc-'+p.id+'">'+(p.reaction_count||0)+'</span>';
    reactBtn.onclick=(function(id){return function(e){toggleEmojiTray(id,e);};})(p.id);
    var emojiTray = document.createElement('div'); emojiTray.className='emoji-tray'; emojiTray.id='etray-'+p.id;
    ['❤️','👍','😂','🔥','👏','😮'].forEach(function(em){
        var opt=document.createElement('button'); opt.className='emoji-opt'; opt.textContent=em;
        opt.onclick=(function(pid,emoji){return function(e){sendReaction(pid,emoji,e);};})(p.id,em);
        emojiTray.appendChild(opt);
    });
    reactWrap.appendChild(reactBtn); reactWrap.appendChild(emojiTray);
    var commentBtn = document.createElement('button'); commentBtn.className='action-btn';
    commentBtn.innerHTML='<span class="material-icons">chat_bubble_outline</span><span id="cc-'+p.id+'">'+(p.comment_count||0)+'</span>';
    commentBtn.onclick=(function(id){return function(){toggleComments(id);};})(p.id);
    actions.appendChild(reactWrap); actions.appendChild(commentBtn);
    card.appendChild(actions);

    // Comments section
    var commSec = document.createElement('div'); commSec.className='comments-section'; commSec.id='comments-'+p.id;
    var commList = document.createElement('div'); commList.id='cl-'+p.id;
    var cInputRow = document.createElement('div'); cInputRow.className='c-input-row';
    var cAv = avatarEl(null, 28); cAv.className='c-avatar'; cAv.textContent=initials(staffName);
    var cInput = document.createElement('input'); cInput.className='c-input'; cInput.id='ci-'+p.id; cInput.placeholder='Write a comment...';
    cInput.onkeydown=(function(id){return function(e){if(e.key==='Enter')submitComment(id);};})(p.id);
    var cSend = document.createElement('button'); cSend.className='c-send';
    cSend.innerHTML='<span class="material-icons" style="font-size:15px;">send</span>';
    cSend.onclick=(function(id){return function(){submitComment(id);};})(p.id);
    cInputRow.appendChild(cAv); cInputRow.appendChild(cInput); cInputRow.appendChild(cSend);
    commSec.appendChild(commList); commSec.appendChild(cInputRow);
    card.appendChild(commSec);

    return card;
}

// ── ACTIONS ──────────────────────────────────────────────
function toggleEmojiTray(postId, event) {
    event.stopPropagation();
    document.querySelectorAll('.emoji-tray.open').forEach(function(t){ if(t.id!=='etray-'+postId) t.classList.remove('open'); });
    var tray = document.getElementById('etray-'+postId);
    if (tray) tray.classList.toggle('open');
}

async function sendReaction(postId, emoji, event) {
    if (event) event.stopPropagation();
    var tray = document.getElementById('etray-'+postId);
    if (tray) tray.classList.remove('open');
    var result = await api({ action: 'react', post_id: postId, emoji: emoji });
    if (result.success) {
        var btn = document.getElementById('react-btn-'+postId);
        var cnt = document.getElementById('rc-'+postId);
        var cur = parseInt((cnt ? cnt.textContent : '0') || '0');
        if (result.action === 'added') {
            btn.classList.add('reacted');
            btn.innerHTML = emoji + ' <span id="rc-'+postId+'">' + (cur+1) + '</span>';
        } else {
            btn.classList.remove('reacted');
            btn.innerHTML = '<span class="material-icons">add_reaction</span> <span id="rc-'+postId+'">' + Math.max(0,cur-1) + '</span>';
        }
    }
}

function toggleComments(postId) {
    var s = document.getElementById('comments-'+postId);
    var open = s.style.display === 'block';
    s.style.display = open ? 'none' : 'block';
    if (!open) loadComments(postId);
}

async function loadComments(postId) {
    var result = await api({ action: 'get_comments', post_id: postId });
    var el = document.getElementById('cl-'+postId); el.innerHTML='';
    var comments = result.data || [];
    if (!comments.length) { el.innerHTML='<div style="font-size:11px;color:var(--muted);padding:4px 0 8px;">No comments yet.</div>'; return; }
    comments.forEach(function(c) {
        var row = document.createElement('div'); row.className='comment-item';
        var cav = avatarEl(c.author, 28); cav.className='c-avatar';
        var bub = document.createElement('div'); bub.className='c-bubble';
        bub.innerHTML='<div class="c-author">'+escHtml((c.author&&c.author.display_name)||'Unknown')+'</div><div class="c-body">'+escHtml(c.body)+'</div>';
        row.appendChild(cav); row.appendChild(bub); el.appendChild(row);
    });
}

async function submitComment(postId) {
    var input = document.getElementById('ci-'+postId);
    var body = input ? input.value.trim() : ''; if (!body) return;
    input.value = '';
    input.disabled = true;

    // Optimistic render
    var cl = document.getElementById('cl-'+postId);
    if (cl) {
        var empty = cl.querySelector('div[style*="color:var(--muted)"]');
        if (empty) empty.remove();
        var row = document.createElement('div'); row.className = 'comment-item';
        var cav = avatarEl(null, 28); cav.className = 'c-avatar'; cav.textContent = initials(staffName);
        var bub = document.createElement('div'); bub.className = 'c-bubble';
        bub.innerHTML = '<div class="c-author">' + escHtml(staffName) + '</div><div class="c-body">' + escHtml(body) + '</div>';
        row.appendChild(cav); row.appendChild(bub); cl.appendChild(row);
    }
    var cnt = document.getElementById('cc-'+postId);
    if (cnt) cnt.textContent = parseInt(cnt.textContent||'0') + 1;

    var result = await api({ action: 'add_comment', post_id: postId, body: body });
    input.disabled = false;
    if (!result.success) { Swal.fire('Error', result.message || 'Could not post comment', 'error'); }
}

async function togglePinPost(postId) {
    var result = await api({ action: 'toggle_pin', post_id: postId });
    if (result.success) loadFeed(false);
}

async function deletePost(postId) {
    var conf = await Swal.fire({ title:'Delete post?', icon:'warning', showCancelButton:true, confirmButtonColor:'#ef4444', confirmButtonText:'Delete' });
    if (conf.isConfirmed) {
        var r = await api({ action: 'delete_post', post_id: postId });
        if (r.success) { var c = document.getElementById('post-'+postId); if(c) c.remove(); }
    }
}

// ── COMPOSER ─────────────────────────────────────────────
function togglePin() {
    pinPost = !pinPost;
    var btn = document.getElementById('pinToggle');
    btn.classList.toggle('active', pinPost);
    btn.querySelector('.material-icons').textContent = pinPost ? 'push_pin' : 'push_pin';
}

function compressImage(file, callback) {
    var reader = new FileReader();
    reader.onload = function(e) {
        var img = new Image();
        img.onload = function() {
            var w=img.width, h=img.height, max=1200;
            if(w>max){h=Math.round(h*max/w);w=max;} if(h>max){w=Math.round(w*max/h);h=max;}
            var cv=document.createElement('canvas'); cv.width=w; cv.height=h;
            cv.getContext('2d').drawImage(img,0,0,w,h);
            callback(cv.toDataURL('image/jpeg', 0.82));
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

function handlePhoto(input) {
    var file = input.files[0]; if(!file) return;
    compressImage(file, function(dataUrl) {
        pendingImage = { dataUrl: dataUrl, file: file };
        var prev = document.getElementById('mediaPreview');
        prev.innerHTML = '';
        var w = document.createElement('div'); w.className='media-thumb';
        var img = document.createElement('img'); img.src=dataUrl;
        var rm = document.createElement('button'); rm.className='rm'; rm.textContent='×';
        rm.onclick = function(){ pendingImage=null; prev.innerHTML=''; };
        w.appendChild(img); w.appendChild(rm); prev.appendChild(w);
    });
    input.value='';
}

async function submitPost() {
    var text = document.getElementById('postText').value.trim();
    if (!text && !pendingImage) return;
    var btn = document.getElementById('postBtn'); btn.disabled=true; btn.textContent='Posting...';

    try {
        var imageUrl = null;

        if (pendingImage) {
            // Post images get a unique path each time — never reuse the avatar slot
            var urlRes = await api({ action: 'get_post_image_upload_url', file_type: 'image/jpeg' });
            if (!urlRes.success) throw new Error(urlRes.message || 'Could not get upload URL');
            // Convert base64 to blob
            var b64 = pendingImage.dataUrl.split(',')[1];
            var bytes = atob(b64);
            var arr = new Uint8Array(bytes.length);
            for(var i=0;i<bytes.length;i++) arr[i]=bytes.charCodeAt(i);
            var blob = new Blob([arr], { type:'image/jpeg' });
            var upRes = await fetch(urlRes.upload_url, { method:'PUT', body:blob, headers:{'Content-Type':'image/jpeg'} });
            if (!upRes.ok) throw new Error('Photo upload failed (' + upRes.status + '). Please try again.');
            imageUrl = urlRes.public_url;
        }

        var channelId = activeChannelId && activeChannelId !== 'mine' ? activeChannelId : null;
        var result = await api({ action:'create_post', body:text, image_url:imageUrl, channel_id:channelId });

        if (result.success) {
            // Pin BEFORE resetting state — the old order cleared pinPost first, so pin never fired
            if (pinPost && result.data) await api({ action:'toggle_pin', post_id:result.data.id });
            document.getElementById('postText').value='';
            updateCharCount();
            pendingImage=null; document.getElementById('mediaPreview').innerHTML='';
            pinPost=false; document.getElementById('pinToggle').classList.remove('active');
            loadFeed(false);
        } else { Swal.fire('Error', result.message, 'error'); }
    } catch(e) { Swal.fire('Error', e.message, 'error'); }

    btn.disabled=false; btn.textContent='Post';
}

// ── MEMBERS ──────────────────────────────────────────────
async function loadMembers() {
    var result = await api({ action: 'get_all_users', search: '' });
    var el = document.getElementById('membersList'); el.innerHTML='';
    var users = result.data || [];
    users.forEach(function(u) {
        var row = document.createElement('div'); row.className='member-item';
        var av = document.createElement('div'); av.className='m-avatar';
        if (u.avatar_url) av.innerHTML='<img src="'+u.avatar_url+'" style="width:100%;height:100%;object-fit:cover;">';
        else av.textContent=initials(u.display_name);
        var info = document.createElement('div');
        info.innerHTML='<div class="m-name">'+escHtml(u.display_name||'')+'</div><div class="m-type">'+(u.user_type==='staff'?'Staff':'Partner')+'</div>';
        row.appendChild(av); row.appendChild(info);
        if (u.is_online) { var dot = document.createElement('div'); dot.className='online-dot'; dot.style.marginLeft='0'; row.appendChild(dot); }
        var msgBtn = document.createElement('button'); msgBtn.className='msg-member-btn'; msgBtn.title='Send message';
        msgBtn.innerHTML='<span class="material-icons" style="font-size:16px;">chat_bubble_outline</span>';
        msgBtn.onclick = (function(id, name, type){ return function(){ openDM(id, name, type); }; })(u.user_id, u.display_name || 'Unknown', u.user_type);
        row.appendChild(msgBtn);
        el.appendChild(row);
    });
    if (!users.length) el.innerHTML='<div style="font-size:12px;color:var(--muted);padding:8px 0;">No members yet.</div>';
}

// ── MESSAGING (DMs) ──────────────────────────────────────
var dmOtherId = null, dmOtherType = null, dmPollInterval = null;

function toggleConvPanel() {
    var panel = document.getElementById('convPanel');
    var isOpen = panel.classList.contains('open');
    closeDM();
    panel.classList.toggle('open', !isOpen);
    if (!isOpen) loadConversations();
}

async function loadConversations() {
    var el = document.getElementById('convList');
    el.innerHTML = '<div class="spinner"></div>';
    var result = await api({ action: 'get_conversations' });
    var convs = result.data || [];
    if (!convs.length) {
        el.innerHTML = '<div style="padding:24px;text-align:center;color:var(--muted);font-size:12px;">No conversations yet.<br>Click the chat icon next to any member to start one.</div>';
        return;
    }
    el.innerHTML = '';
    convs.forEach(function(c) {
        var p = c.other_profile || {};
        var row = document.createElement('div'); row.className = 'conv-item';
        var av = avatarEl(p, 32);
        var info = document.createElement('div'); info.style.cssText = 'flex:1;min-width:0;';
        info.innerHTML = '<div class="conv-name">' + escHtml(p.display_name || 'Unknown') + (p.is_online ? ' 🟢' : '') + '</div>'
            + '<div class="conv-preview">' + escHtml(c.last_message || '') + '</div>';
        row.appendChild(av); row.appendChild(info);
        if (c.unread > 0) { var b = document.createElement('span'); b.className = 'conv-unread'; b.textContent = c.unread; row.appendChild(b); }
        row.onclick = (function(id, name, type) { return function() { openDM(id, name, type); }; })(c.other_id, p.display_name || 'Unknown', c.other_type || p.user_type || 'partner');
        el.appendChild(row);
    });
}

function openDM(otherId, otherName, otherType) {
    if (otherId === staffId) return;
    dmOtherId = otherId; dmOtherType = otherType || 'partner';
    document.getElementById('convPanel').classList.remove('open');
    document.getElementById('dmOtherName').textContent = otherName;
    document.getElementById('dmMessages').innerHTML = '<div class="spinner"></div>';
    document.getElementById('dmPanel').classList.add('open');
    loadDMThread();
    if (dmPollInterval) clearInterval(dmPollInterval);
    dmPollInterval = setInterval(loadDMThread, 5000);
    setTimeout(function(){ var i = document.getElementById('dmInput'); if (i) i.focus(); }, 100);
}

function backToConvs() {
    closeDM();
    document.getElementById('convPanel').classList.add('open');
    loadConversations();
}

function closeDM() {
    document.getElementById('dmPanel').classList.remove('open');
    if (dmPollInterval) { clearInterval(dmPollInterval); dmPollInterval = null; }
    dmOtherId = null;
}

async function loadDMThread() {
    if (!dmOtherId) return;
    var result = await api({ action: 'get_dm_thread', other_id: dmOtherId });
    if (!result.success) return;
    var msgs = document.getElementById('dmMessages');
    var wasAtBottom = msgs.scrollTop + msgs.clientHeight >= msgs.scrollHeight - 10 || !msgs.children.length || msgs.querySelector('.spinner');
    msgs.innerHTML = (result.data || []).map(function(m) {
        var isSent = m.sender_id === staffId;
        return '<div class="dm-msg ' + (isSent ? 'sent' : 'recv') + '">' + escHtml(m.body)
            + '<div class="dm-msg-time">' + timeAgo(m.created_at) + '</div></div>';
    }).join('') || '<div style="text-align:center;color:var(--muted);font-size:12px;padding:20px;">No messages yet — say hi!</div>';
    if (wasAtBottom) msgs.scrollTop = msgs.scrollHeight;
    pollUnreadCounts();
}

async function sendDM() {
    var input = document.getElementById('dmInput');
    var body = input.value.trim();
    if (!body || !dmOtherId) return;
    input.value = '';
    var result = await api({ action: 'send_dm', recipient_id: dmOtherId, recipient_type: dmOtherType, body: body });
    if (!result.success) {
        input.value = body; // restore so they don't lose the message
        Swal.fire('Error', result.message || 'Message failed to send. Please try again.', 'error');
        return;
    }
    loadDMThread();
}

async function pollUnreadCounts() {
    var result = await api({ action: 'get_unread_counts' });
    if (!result.success) return;
    var badge = document.getElementById('dmBadge');
    if (badge) {
        if (result.dms > 0) { badge.textContent = result.dms; badge.style.display = 'inline'; }
        else badge.style.display = 'none';
    }
}

// ── SEARCH ────────────────────────────────────────────────
function filterFeed(query) {
    var q = (query || '').toLowerCase().trim();
    document.querySelectorAll('#feedContainer .post-card').forEach(function(card) {
        var body = (card.querySelector('.post-body') ? card.querySelector('.post-body').textContent : '').toLowerCase();
        var author = (card.querySelector('.post-author') ? card.querySelector('.post-author').textContent : '').toLowerCase();
        card.style.display = (!q || body.includes(q) || author.includes(q)) ? '' : 'none';
    });
}

// ── CHAR COUNTER ──────────────────────────────────────────
function updateCharCount() {
    var len = document.getElementById('postText').value.length;
    var max = 1500;
    var el = document.getElementById('charCounter');
    if (!el) return;
    if (!len) { el.textContent = ''; el.className = 'char-counter'; return; }
    el.textContent = len + ' / ' + max;
    el.className = 'char-counter' + (len >= max ? ' limit' : len >= max * 0.85 ? ' warn' : '');
}

// ── CLOSE EMOJI TRAY ON OUTSIDE CLICK ─────────────────────
document.addEventListener('click', function(e) {
    if (!e.target.closest('.emoji-tray') && !e.target.closest('[id^="react-btn-"]')) {
        document.querySelectorAll('.emoji-tray.open').forEach(function(t){ t.classList.remove('open'); });
    }
});

window.onload = init;
</script>
