<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Merchant Portfolio | Secure Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root { --pp-blue: #004990; --pp-accent: #00a1e0; --glass: rgba(255, 255, 255, 0.9); }
        body { background: radial-gradient(circle at top right, #f8fafc, #e2e8f0); padding: 25px; font-family: 'Inter', sans-serif; }
        .modern-header { background: var(--glass); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .summary-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        .kpi-card { background: var(--glass); padding: 20px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.4); box-shadow: 0 8px 20px rgba(0,0,0,0.03); display: flex; align-items: center; gap: 15px; }
        .kpi-icon { background: rgba(0,73,144,0.1); color: var(--pp-blue); padding: 12px; border-radius: 12px; }
        .kpi-val { font-size: 1.3rem; font-weight: 800; color: #002d5a; display: block; }
        .kpi-label { font-size: 0.65rem; font-weight: 700; color: #64748b; text-transform: uppercase; }
        .custom-modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0, 25, 50, 0.4); backdrop-filter: blur(5px); align-items: center; justify-content: center; }
        .custom-modal-content { background: white; width: 95%; max-width: 800px; border-radius: 24px; overflow: hidden; max-height: 90vh; display: flex; flex-direction: column; }
        .modal-scroll { overflow-y: auto; padding: 30px; }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 25px; }
        .detail-item { border-bottom: 1px solid #f1f5f9; padding: 8px 0; display: flex; justify-content: space-between; font-size: 11px; }
    </style>
</head>
<body>
    <div class="modern-header">
        <div>
            <div style="display:flex; align-items:center; gap:12px; margin-bottom:8px;">
                <a href="index.html" style="background:white; border:1px solid #e2e8f0; padding:6px 14px; border-radius:50px; color:var(--pp-blue); font-weight:700; font-size:0.7rem; text-decoration:none;">HOME</a>
                <div id="user-greeting" style="background:rgba(0,73,144,0.08); padding:6px 16px; border-radius:50px; font-size:0.7rem; font-weight:700; color:var(--pp-blue);">Staff Member</div>
            </div>
            <h1 style="font-size: 1.6rem; font-weight: 800; color: #002d5a;">Merchant Portfolio</h1>
        </div>
        <div class="slds-grid slds-grid_vertical-align-center">
            <select id="filterBy" class="slds-select" style="width: 180px; margin-right: 8px; border-radius:12px; height:40px;">
                <option value="">Select Search Type</option>
                <option value="dba_name">DBA Name</option>
                <option value="merchant_id">Merchant ID (MID)</option>
                <option value="agent_id">Partner ID</option>
                <option value="company_name">Company Name</option>
                <option value="partner_name">Partner Name</option>
            </select>
            <input type="text" id="searchInput" placeholder="Search..." class="slds-input" style="width:220px; border-radius:12px; height:40px; margin-right:8px;" onkeypress="if(event.key==='Enter') resetAndFetch()">
            <button class="slds-button slds-button_brand" style="border-radius:12px; height: 40px;" onclick="resetAndFetch()">Search</button>
        </div>
    </div>

    <div class="summary-bar">
        <div class="kpi-card">
            <div class="kpi-icon"><span class="material-icons">payments</span></div>
            <div><span class="kpi-label">Filtered MTD</span><span class="kpi-val" id="mtd-val">$0.00</span></div>
        </div>
        <div class="kpi-card">
            <div class="kpi-icon" style="color:#00a1e0;"><span class="material-icons">calendar_today</span></div>
            <div><span class="kpi-label">Total 30D</span><span class="kpi-val" id="30d-val">$0.00</span></div>
        </div>
        <div class="kpi-card">
            <div class="kpi-icon" style="color:#2e7d32;"><span class="material-icons">history</span></div>
            <div><span class="kpi-label">Total 90D</span><span class="kpi-val" id="90d-val">$0.00</span></div>
        </div>
        <div class="kpi-card" style="background:#004990; color:white;">
            <div class="kpi-icon" style="color:white;"><span class="material-icons">pie_chart</span></div>
            <div><span class="kpi-label" style="color:rgba(255,255,255,0.7);">Portfolio Share</span><span class="kpi-val" id="share-val" style="color:white;">0.00%</span></div>
        </div>
    </div>

    <article class="slds-card" style="border-radius: 20px; overflow: hidden;">
        <table class="slds-table slds-table_bordered slds-table_cell-buffer">
            <thead>
                <tr class="slds-line-height_reset">
                    <th scope="col">DBA Name</th>
                    <th scope="col">Merchant ID</th>
                    <th scope="col">Partner ID</th>
                    <th scope="col">Company</th>
                    <th scope="col">Partner Name</th>
                    <th scope="col">Status</th>
                </tr>
            </thead>
            <tbody id="merchantTableBody"></tbody>
        </table>
        <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.3);">
            <div style="display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 11px; font-weight: 700; color: #64748b;">Display:</span>
                <select id="pageLimit" class="slds-select" style="width: 80px; height: 32px !important; border-radius:8px;" onchange="resetAndFetch()">
                    <option value="20">20</option><option value="50">50</option><option value="100">100</option>
                </select>
            </div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="slds-button slds-button_neutral" id="prevBtn" onclick="changePage(-1)" disabled>Previous</button>
                <span id="pageInfo" style="font-weight:700;">Page 1</span>
                <button class="slds-button slds-button_neutral" id="nextBtn" onclick="changePage(1)">Next</button>
            </div>
        </div>
    </article>

    <div id="merchantModal" class="custom-modal" onclick="if(event.target == this) closeModal()">
        <div class="custom-modal-content">
            <div style="padding: 25px; background: var(--pp-blue); color: white; display: flex; justify-content: space-between;">
                <h2 style="font-weight: 800; font-size: 1.1rem;">Full Merchant Profile</h2>
                <span class="material-icons" style="cursor:pointer" onclick="closeModal()">close</span>
            </div>
            <div class="modal-scroll">
                <div id="modalVolumeSummary" style="background:#f1f5f9; padding:20px; border-radius:15px; margin-bottom:25px; display:grid; grid-template-columns:repeat(3, 1fr); gap:15px;"></div>
                <div id="modalDetailsGrid" class="detail-grid"></div>
            </div>
            <div style="padding: 20px 30px; background: #f8fafc; border-top:1px solid #e2e8f0; display: flex; justify-content: space-between;">
                <button class="slds-button slds-button_brand" id="editBtn" style="border-radius:10px;">Edit Full Profile</button>
                <button class="slds-button slds-button_neutral" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        let currentPage = 0;
        let currentRecords = [];
        const ALL_FIELDS = ['merchant_id', 'status_id', 'dba_name', 'agent_name', 'agent_id', 'account_status', 'is_edge_enabled', 'is_pci_compliant', 'isv_commission_code', 'is_mobile', 'is_device_hub_link_enabled', 'enrollment_date', 'approved_date', 'source', 'processor', 'processor_platform', 'is_activated', 'days_approved', 'shipping_status', 'gateway_account_id', 'last_batch_date', 'account_status_change_date', 'account_code', 'ndf', 'irs_tin_status', 'volume', 'volume_30_day', 'volume_90_day', 'volume_mtd', 'credit_review', 'fresno_buy_rate_tier', 'underwriting_decision_note', 'email', 'ach_properties', 'major_merchant', 'merchant_websites', 'merchant_primary_contact', 'merchant_phone'];

        async function fetchMerchants() {
            const tbody = document.getElementById('merchantTableBody');
            const limit = document.getElementById('pageLimit').value;
            tbody.innerHTML = "<tr><td colspan='6' style='text-align:center; padding:40px;'>Syncing Ledger...</td></tr>";

            try {
                const res = await fetch('/api/merchants', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'list', page: currentPage, limit: limit, query: document.getElementById('searchInput').value, filterBy: document.getElementById('filterBy').value })
                });
                const result = await res.json();
                currentRecords = result.data;
                tbody.innerHTML = "";
                
                const cur = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' });
                document.getElementById('mtd-val').innerText = cur.format(result.metrics.totalMTD);
                document.getElementById('30d-val').innerText = cur.format(result.metrics.total30D);
                document.getElementById('90d-val').innerText = cur.format(result.metrics.total90D);
                document.getElementById('share-val').innerText = result.metrics.portfolioShare + '%';

                currentRecords.forEach(m => {
                    const row = tbody.insertRow();
                    row.innerHTML = `<td><a onclick="openModal('${m.id}')" style="font-weight:700; color:var(--pp-blue); cursor:pointer;">${m.dba_name || '---'}</a></td><td><code>${m.merchant_id || '---'}</code></td><td>${m.agent_id || '---'}</td><td>${m.company_name}</td><td>${m.partner_name}</td><td><span style="font-weight:800; font-size:9px; background:#f1f5f9; padding:3px 10px; border-radius:50px;">${m.account_status || '---'}</span></td>`;
                });
                document.getElementById('pageInfo').innerHTML = `Page ${currentPage + 1} <span style="color:#94a3b8; font-weight:400; margin-left:10px;">(Total: ${result.count})</span>`;
                document.getElementById('nextBtn').disabled = ((currentPage + 1) * limit) >= result.count;
                document.getElementById('prevBtn').disabled = (currentPage === 0);
            } catch (e) { tbody.innerHTML = "<tr><td colspan='6' style='text-align:center;'>Error loading data.</td></tr>"; }
        }

        function openModal(id) {
            const m = currentRecords.find(r => r.id === id);
            const cur = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' });
            document.getElementById('modalVolumeSummary').innerHTML = `<div><span style="font-size:9px; color:#64748b; font-weight:700;">MTD</span><b style="display:block;">${cur.format(m.volume_mtd || 0)}</b></div><div><span style="font-size:9px; color:#64748b; font-weight:700;">30D</span><b style="display:block;">${cur.format(m.volume_30_day || 0)}</b></div><div><span style="font-size:9px; color:#64748b; font-weight:700;">90D</span><b style="display:block;">${cur.format(m.volume_90_day || 0)}</b></div>`;
            document.getElementById('modalDetailsGrid').innerHTML = ALL_FIELDS.map(f => `<div class="detail-item"><span style="color:#64748b; font-weight:700; text-transform:uppercase; font-size:9px;">${f.replace(/_/g, ' ')}</span><b>${m[f] || '---'}</b></div>`).join('');
            document.getElementById('editBtn').onclick = () => {
                const p = new URLSearchParams({ id: m.id });
                ALL_FIELDS.forEach(f => p.append(f, m[f] || ''));
                window.location.href = `merchants-update.html?${p.toString()}`;
            };
            document.getElementById('merchantModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('merchantModal').style.display = 'none'; }
        function changePage(dir) { currentPage += dir; fetchMerchants(); }
        function resetAndFetch() { currentPage = 0; fetchMerchants(); }
        window.onload = () => fetchMerchants();
    </script>
</body>
</html>
