<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direct Messages | PayProTec</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script>(function(){const u=localStorage.getItem('pp_userid'),v=localStorage.getItem('pp_verified');if(!u||v!=='true')window.location.href = '/?reason=unauthorized';})();</script>
    <script src="js/tz.js"></script>
    <style>
        *,*::before,*::after{box-sizing:border-box;}
        :root{--blue:#004990;--blue-dark:#002d5a;--border:#e2e8f0;--surface:#f0f4f8;--text:#0a1628;--secondary:#475569;--muted:#94a3b8;--shadow-sm:0 1px 3px rgba(0,0,0,0.06);}
        body{margin:0;height:100vh;display:flex;flex-direction:column;font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--text);-webkit-font-smoothing:antialiased;}

        /* TOP BAR */
        .topbar{background:linear-gradient(135deg,var(--blue-dark),var(--blue));padding:12px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
        .topbar-logo{height:24px;filter:brightness(0) invert(1);}
        .topbar-title{font-size:14px;font-weight:800;color:white;}
        .topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
        .nav-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:8px;font-size:11px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;text-decoration:none;background:rgba(255,255,255,0.15);color:white;border:1px solid rgba(255,255,255,0.2);}
        .nav-btn:hover{background:rgba(255,255,255,0.25);}
        .search-wrap{position:relative;flex:1;}
        .search-wrap .material-icons{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;}
        .search-input{width:100%;padding:8px 10px 8px 32px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s;}
        .search-input:focus{border-color:var(--blue);}

        /* LAYOUT */
        .chat-layout{flex:1;display:grid;grid-template-columns:300px 1fr;overflow:hidden;}

        /* SIDEBAR */
        .chat-sidebar{background:white;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
        .sidebar-search{padding:10px 12px;border-bottom:1px solid var(--border);}
        .sidebar-sections{display:flex;background:#f8fafc;padding:4px;border-bottom:1px solid var(--border);gap:3px;}
        .sec-tab{flex:1;padding:6px;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;transition:all 0.2s;}
        .sec-tab.active{background:white;color:var(--blue);box-shadow:var(--shadow-sm);}
        .user-list{flex:1;overflow-y:auto;}
        .user-item{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;border-bottom:1px solid #f8fafc;transition:background 0.15s;position:relative;}
        .user-item:hover{background:#f8fafc;}
        .user-item.active{background:#e0f2fe;}
        .user-avatar{width:38px;height:38px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:white;flex-shrink:0;position:relative;overflow:hidden;}
        .user-avatar img{width:100%;height:100%;object-fit:cover;}
        .user-avatar.partner{background:#0d9488;}
        .online-ring{position:absolute;bottom:0;right:0;width:11px;height:11px;border-radius:50%;background:#10b981;border:2px solid white;}
        .user-info{flex:1;min-width:0;}
        .user-name{font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:5px;}
        .user-role{font-size:10px;color:var(--muted);margin-top:1px;}
        .user-preview{font-size:11px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .unread-badge{background:#ef4444;color:white;border-radius:99px;font-size:10px;font-weight:800;padding:1px 6px;min-width:18px;text-align:center;flex-shrink:0;}
        .partner-tag{background:#ccfbf1;color:#0f766e;padding:1px 5px;border-radius:99px;font-size:9px;font-weight:800;}
        .staff-tag{background:#e0f2fe;color:#0369a1;padding:1px 5px;border-radius:99px;font-size:9px;font-weight:800;}

        /* CHAT AREA */
        .chat-area{display:flex;flex-direction:column;overflow:hidden;background:var(--surface);}
        .chat-header{background:white;border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;}
        .chat-header-avatar{width:36px;height:36px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:white;overflow:hidden;flex-shrink:0;}
        .chat-header-avatar img{width:100%;height:100%;object-fit:cover;}
        .chat-header-name{font-size:14px;font-weight:800;color:var(--text);}
        .chat-header-sub{font-size:11px;color:var(--muted);}
        .chat-header-actions{margin-left:auto;display:flex;gap:6px;}
        .icon-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:6px;cursor:pointer;color:var(--muted);display:flex;align-items:center;transition:all 0.2s;}
        .icon-btn:hover{border-color:var(--blue);color:var(--blue);}

        /* MESSAGES */
        .messages-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;}
        .msg-group{display:flex;flex-direction:column;}
        .msg-group.mine{align-items:flex-end;}
        .msg-group.theirs{align-items:flex-start;}
        .msg-bubble{max-width:68%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.5;position:relative;word-break:break-word;}
        .msg-bubble.mine{background:var(--blue);color:white;border-radius:14px 14px 0 14px;}
        .msg-bubble.theirs{background:white;color:var(--text);border-radius:14px 14px 14px 0;border:1px solid var(--border);}
        .msg-meta{font-size:10px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:5px;}
        .msg-meta.mine{justify-content:flex-end;}
        .msg-edited{font-size:10px;font-style:italic;opacity:0.7;}
        .msg-deleted{opacity:0.5;font-style:italic;}
        .msg-actions{display:none;position:absolute;top:-24px;background:white;border:1px solid var(--border);border-radius:6px;padding:2px 4px;gap:2px;box-shadow:var(--shadow-sm);}
        .msg-bubble:hover .msg-actions{display:flex;}
        .msg-action-btn{background:none;border:none;cursor:pointer;padding:3px;color:var(--muted);border-radius:4px;font-size:12px;}
        .msg-action-btn:hover{background:#f1f5f9;color:var(--blue);}
        .date-divider{text-align:center;font-size:11px;color:var(--muted);font-weight:600;padding:8px 0;position:relative;}
        .date-divider::before,.date-divider::after{content:'';position:absolute;top:50%;width:35%;height:1px;background:var(--border);}
        .date-divider::before{left:0;}
        .date-divider::after{right:0;}

        /* INPUT */
        .chat-input-area{background:white;border-top:1px solid var(--border);padding:12px 16px;}
        .typing-indicator{font-size:11px;color:var(--muted);height:16px;margin-bottom:6px;}
        .input-row{display:flex;gap:8px;align-items:flex-end;}
        .msg-input{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:12px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;resize:none;max-height:120px;min-height:42px;transition:border-color 0.2s;line-height:1.5;}
        .msg-input:focus{border-color:var(--blue);}
        .send-btn{width:42px;height:42px;border-radius:12px;background:var(--blue);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:white;transition:all 0.2s;flex-shrink:0;}
        .send-btn:hover{background:var(--blue-dark);transform:scale(1.05);}
        .send-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

        /* EMPTY STATE */
        .chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);text-align:center;padding:40px;}
        .chat-empty .material-icons{font-size:56px;opacity:0.2;margin-bottom:12px;}
        .chat-empty h3{font-size:16px;font-weight:700;margin:0 0 6px;}
        .chat-empty p{font-size:13px;margin:0;}

        @media(max-width:700px){.chat-layout{grid-template-columns:1fr;}.chat-sidebar{display:none;}.chat-area{display:flex;}}
        @keyframes spin{to{transform:rotate(360deg);}}
        @keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
        .msg-group{animation:fadeIn 0.2s ease;}
    </style>
</head>
<body>

<div class="topbar">
    <img src="https://assets.cdn.filesafe.space/dfg08aPdtlQ1RhIKkCnN/media/66cf5cf28a35e448970f1ead.png" class="topbar-logo">
    <span class="topbar-title">Direct Messages</span>
    <div class="topbar-right">
        <a href="/" class="nav-btn"><span class="material-icons" style="font-size:14px;">home</span> Home</a>
    </div>
</div>

<div class="chat-layout">
    <!-- SIDEBAR -->
    <div class="chat-sidebar">
        <div class="sidebar-search">
            <div class="search-wrap">
                <span class="material-icons">search</span>
                <input class="search-input" id="sidebarSearch" placeholder="Search messages..." oninput="filterUsers(this.value)">
            </div>
        </div>
        <div class="sidebar-sections">
            <button class="sec-tab active" onclick="setSection('all',this)">All</button>
            <button class="sec-tab" onclick="setSection('staff',this)">Staff</button>
            <button class="sec-tab" onclick="setSection('partners',this)">Partners</button>
        </div>
        <div class="user-list" id="userList">
            <div style="padding:20px;text-align:center;color:var(--muted);"><div style="width:18px;height:18px;border:2px solid #e2e8f0;border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 8px;"></div>Loading...</div>
        </div>
    </div>

    <!-- CHAT AREA -->
    <div class="chat-area" id="chatArea">
        <div class="chat-empty">
            <span class="material-icons">forum</span>
            <h3>Select a conversation</h3>
            <p>Choose a staff member or partner to start messaging</p>
        </div>
    </div>
</div>

<script>
const myId = localStorage.getItem('pp_userid') || localStorage.getItem('userid');
const myName = localStorage.getItem('pp_user_first_name') || 'Me';
if (!myId) window.location.href = '/';

let allUsers = [], activeId = null, activeType = null, activeName = '';
let currentSection = 'all';
let msgPollInterval = null, userPollInterval = null;
let lastMsgCount = 0;
let chatPage = 0;
let olderMsgs = [];
let olderMsgsExhausted = false;
let lastNewestId = null;

function api(body) {
    return fetch('/api/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ ...body, sender_id: myId }) }).then(r=>r.json());
}

// ── INIT ──────────────────────────────────────────────────
async function init() {
    await syncUsers();
    userPollInterval = setInterval(syncUsers, 10000);
    // Heartbeat
    api({ action:'getUserList' }); // triggers last_seen update
    setInterval(() => api({ action:'getUserList' }), 30000);
}

async function syncUsers() {
    const res = await api({ action:'getUserList' });
    if (!res.success) return;
    allUsers = res.data || [];
    renderUserList();
}

function renderUserList() {
    const search = document.getElementById('sidebarSearch').value.toLowerCase();
    let filtered = allUsers;
    if (currentSection === 'staff') filtered = filtered.filter(u => u.user_type === 'staff');
    if (currentSection === 'partners') filtered = filtered.filter(u => u.user_type === 'partner');
    if (search) filtered = filtered.filter(u => u.name.toLowerCase().includes(search));

    const list = document.getElementById('userList');
    if (!filtered.length) { list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px;">No conversations found</div>'; return; }

    const initials = n => (n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    const timeAgo = d => { if(!d) return ''; const diff=Date.now()-new Date(d).getTime(),m=Math.floor(diff/60000),h=Math.floor(m/60),dy=Math.floor(h/24); return dy>0?`${dy}d`:h>0?`${h}h`:m>0?`${m}m`:'now'; };

    list.innerHTML = filtered.map(u => `
        <div class="user-item ${u.id===activeId?'active':''}" onclick="openChat('${u.id}','${u.name.replace(/'/g,"\\'")}','${u.user_type}','${u.role||''}')">
            <div class="user-avatar ${u.user_type==='partner'?'partner':''}">
                ${initials(u.name)}
                ${u.is_online?'<div class="online-ring"></div>':''}
            </div>
            <div class="user-info">
                <div class="user-name">
                    ${u.name}
                    <span class="${u.user_type==='staff'?'staff-tag':'partner-tag'}">${u.user_type==='staff'?'STAFF':'PARTNER'}</span>
                </div>
                <div class="user-preview">${u.last_message?.preview ? u.last_message.preview.substring(0,35)+'...' : u.role||''}</div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;">
                ${u.last_message?.time?`<div style="font-size:10px;color:var(--muted);">${timeAgo(u.last_message.time)}</div>`:''}
                ${u.unread?`<span class="unread-badge">${u.unread}</span>`:''}
            </div>
        </div>`).join('');
}

function setSection(sec, el) {
    currentSection = sec;
    document.querySelectorAll('.sec-tab').forEach(t=>t.classList.remove('active'));
    el.classList.add('active');
    renderUserList();
}

function filterUsers(q) { renderUserList(); }

// ── OPEN CHAT ─────────────────────────────────────────────
async function openChat(id, name, type, role) {
    if (activeId === id) return;
    activeId = id; activeName = name; activeType = type;
    chatPage = 0; olderMsgs = []; olderMsgsExhausted = false; lastMsgCount = 0; lastNewestId = null;

    // Update sidebar active state
    renderUserList();

    // Build chat UI
    const initials = name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    const user = allUsers.find(u => u.id === id);

    document.getElementById('chatArea').innerHTML = `
        <div class="chat-header">
            <div class="chat-header-avatar ${type==='partner'?'style="background:#0d9488"':''}">${initials}</div>
            <div>
                <div class="chat-header-name">${name}</div>
                <div class="chat-header-sub">${type==='staff'?'PayProTec Staff':'Partner'}${user?.is_online?' · <span style="color:#10b981;">● Online</span>':''} · ${role||''}</div>
            </div>
            <div class="chat-header-actions">
                <button class="icon-btn" onclick="searchInChat()" title="Search"><span class="material-icons" style="font-size:18px;">search</span></button>
                <button class="icon-btn" onclick="window.location.href="/"" title="Home"><span class="material-icons" style="font-size:18px;">home</span></button>
            </div>
        </div>
        <div class="messages-area" id="messagesArea"></div>
        <div class="chat-input-area">
            <div class="typing-indicator" id="typingIndicator"></div>
            <div class="input-row">
                <textarea class="msg-input" id="msgInput" placeholder="Type a message... (Enter to send)" rows="1" onkeydown="handleKeydown(event)" oninput="autoResize(this)"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()"><span class="material-icons">send</span></button>
            </div>
        </div>`;

    if (msgPollInterval) clearInterval(msgPollInterval);
    await loadMessages();
    msgPollInterval = setInterval(loadMessages, 3000);
    document.getElementById('msgInput')?.focus();
}

function buildMsgHtml(m) {
    const isMine = m.sender_id === myId;
    const d = new Date(m.created_at);
    const timeStr = d.toLocaleTimeString(undefined, { hour:'2-digit', minute:'2-digit' });
    const isDeleted = !!m.deleted_at;
    const isEdited = !!m.edited_at;
    const actions = isMine && !isDeleted ? `
        <div class="msg-actions">
            <button class="msg-action-btn" onclick="editMessage('${m.id}','${(m.content||'').replace(/'/g,"\\'")}')"><span class="material-icons" style="font-size:13px;">edit</span></button>
            <button class="msg-action-btn" onclick="deleteMessage('${m.id}')"><span class="material-icons" style="font-size:13px;">delete</span></button>
        </div>` : '';
    return `<div class="msg-group ${isMine?'mine':'theirs'}">
        <div class="msg-bubble ${isMine?'mine':'theirs'} ${isDeleted?'msg-deleted':''}">
            ${actions}
            ${m.content || 'This message was deleted.'}
            ${isEdited&&!isDeleted?'<span class="msg-edited"> (edited)</span>':''}
        </div>
        <div class="msg-meta ${isMine?'mine':''}">
            ${timeStr}
            ${isMine?'<span class="material-icons" style="font-size:12px;">done_all</span>':''}
        </div>
    </div>`;
}

function renderAllMessages(currentMsgs, area) {
    const wasAtBottom = area.scrollTop + area.clientHeight >= area.scrollHeight - 20;
    const allMsgs = [...olderMsgs, ...currentMsgs];

    let lastDate = '';
    const msgHtml = allMsgs.map(m => {
        const d = new Date(m.created_at);
        const dateStr = d.toLocaleDateString(undefined, { weekday:'short', month:'short', day:'numeric' });
        let dateDivider = '';
        if (dateStr !== lastDate) { dateDivider = `<div class="date-divider">${dateStr}</div>`; lastDate = dateStr; }
        return dateDivider + buildMsgHtml(m);
    }).join('');

    const loadOlderHtml = (!olderMsgsExhausted && currentMsgs.length >= 50)
        ? `<div id="loadOlderBtn" style="text-align:center;padding:10px 0 6px;"><button onclick="loadOlderMessages()" style="background:none;border:1px solid var(--border);border-radius:20px;padding:6px 18px;font-size:11px;font-weight:700;cursor:pointer;color:var(--muted);font-family:'DM Sans',sans-serif;">↑ Load older messages</button></div>`
        : '';

    area.innerHTML = loadOlderHtml + (msgHtml || '<div style="text-align:center;color:var(--muted);font-size:13px;padding:30px;">No messages yet. Say hello!</div>');
    if (wasAtBottom || lastMsgCount <= 1) area.scrollTop = area.scrollHeight;
}

async function loadMessages() {
    if (!activeId) return;
    const res = await api({ action:'getHistory', recipient_id: activeId });
    if (!res.success) return;

    const msgs = res.data || [];
    const newestId = msgs.length ? msgs[msgs.length - 1].id : null;
    if (msgs.length === lastMsgCount && newestId === lastNewestId && olderMsgs.length === 0) return;
    lastMsgCount = msgs.length;
    lastNewestId = newestId;

    const area = document.getElementById('messagesArea');
    if (!area) return;
    renderAllMessages(msgs, area);

    // Clear unread in sidebar
    const user = allUsers.find(u => u.id === activeId);
    if (user) { user.unread = 0; renderUserList(); }
}

async function loadOlderMessages() {
    const btn = document.getElementById('loadOlderBtn');
    const btnEl = btn?.querySelector('button');
    if (btnEl) { btnEl.textContent = 'Loading...'; btnEl.disabled = true; }
    chatPage++;
    const res = await api({ action:'getHistory', recipient_id: activeId, page: chatPage });
    if (!res.success) { chatPage--; if (btnEl) { btnEl.textContent = '↑ Load older messages'; btnEl.disabled = false; } return; }
    const fetched = res.data || [];
    if (!fetched.length) {
        olderMsgsExhausted = true;
        const area = document.getElementById('messagesArea');
        const currentMsgs = (await api({ action:'getHistory', recipient_id: activeId })).data || [];
        if (area) renderAllMessages(currentMsgs, area);
        return;
    }
    // Prepend to olderMsgs (fetched older pages go before already-loaded older pages)
    olderMsgs = [...fetched, ...olderMsgs];
    if (fetched.length < 50) olderMsgsExhausted = true;

    const area = document.getElementById('messagesArea');
    if (!area) return;
    const prevScrollHeight = area.scrollHeight;
    const currentMsgs = (await api({ action:'getHistory', recipient_id: activeId })).data || [];
    renderAllMessages(currentMsgs, area);
    // Restore scroll so user sees same content
    area.scrollTop = area.scrollHeight - prevScrollHeight;
}

async function sendMessage() {
    const input = document.getElementById('msgInput');
    const content = input?.value.trim();
    if (!content || !activeId) return;

    const btn = document.getElementById('sendBtn');
    if (btn) btn.disabled = true;
    input.value = '';
    if (input) { input.style.height = 'auto'; }

    await api({ action:'sendMessage', recipient_id: activeId, content });
    lastMsgCount = 0; // force refresh
    await loadMessages();
    if (btn) btn.disabled = false;
    syncUsers();
}

function handleKeydown(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

window.editMessage = async function(msgId, currentContent) {
    const { value } = await Swal.fire({ title:'Edit message', input:'textarea', inputValue:currentContent, showCancelButton:true, confirmButtonColor:'#004990' });
    if (value !== undefined && value !== currentContent) {
        await api({ action:'editMessage', message_id: msgId, content: value });
        lastMsgCount = 0; loadMessages();
    }
};

window.deleteMessage = async function(msgId) {
    const { isConfirmed } = await Swal.fire({ title:'Delete message?', icon:'warning', showCancelButton:true, confirmButtonColor:'#ef4444', confirmButtonText:'Delete' });
    if (isConfirmed) { await api({ action:'deleteMessage', message_id: msgId }); lastMsgCount=0; loadMessages(); }
};

async function searchInChat() {
    const { value } = await Swal.fire({ title:'Search messages', input:'text', inputPlaceholder:'Search...', showCancelButton:true, confirmButtonColor:'#004990' });
    if (!value) return;
    const res = await api({ action:'searchMessages', query: value });
    const results = (res.data||[]).filter(m => m.sender_id===activeId || m.recipient_id===activeId);
    if (!results.length) { Swal.fire({ icon:'info', title:'No results', text:`No messages containing "${value}"`, confirmButtonColor:'#004990' }); return; }
    Swal.fire({
        title:`Search results for "${value}"`,
        html:`<div style="max-height:300px;overflow-y:auto;text-align:left;">${results.map(m=>`<div style="padding:8px 10px;border-bottom:1px solid #f1f5f9;font-size:12px;"><div style="font-weight:700;font-size:10px;color:#94a3b8;">${fmtDateTime(m.created_at)}</div><div>${m.content}</div></div>`).join('')}</div>`,
        confirmButtonColor:'#004990'
    });
}

window.onload = init;
window.onbeforeunload = () => api({ action:'logout' });
</script>
<script src="/js/site-config.js"></script>
<script src="/bug-report.js"></script>
</body>
</html>
