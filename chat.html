<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Messenger | Secure Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #f0f2f5; font-family: sans-serif; }
        .sidebar { width: 300px; border-right: 1px solid #ddd; background: #fff; display: flex; flex-direction: column; }
        .user-item { padding: 15px; cursor: pointer; border-bottom: 1px solid #eee; }
        .user-item:hover { background: #f0f2f5; }
        .user-item.active { background: #e7f3ff; color: #0084ff; font-weight: bold; }
        .chat-main { flex: 1; display: flex; flex-direction: column; background: #fff; }
        .msg-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 70%; padding: 10px; border-radius: 10px; background: #e4e6eb; }
        .bubble.me { align-self: flex-end; background: #0084ff; color: #fff; }
        .input-bar { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="padding:20px; font-weight:bold; border-bottom:1px solid #eee;">CHATS</div>
    <div id="userList" style="padding:20px;">System Starting...</div>
</div>

<div class="chat-main">
    <div id="chatHeader" style="padding:15px; border-bottom:1px solid #eee; font-weight:bold;">Select User</div>
    <div class="msg-container" id="msgHistory"></div>
    <div class="input-bar">
        <input type="text" id="msgInput" class="slds-input" placeholder="Type here..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()" class="slds-button slds-button_brand">Send</button>
    </div>
</div>

<script>
    // 1. CONFIG
    const myId = localStorage.getItem('userid') || sessionStorage.getItem('pp_userid');
    let activeId = null;

    // 2. LOAD USER LIST
    async function init() {
        console.log("Starting API call...");
        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'getUserList' })
            });
            const result = await response.json();
            
            if (result.success) {
                const listHtml = result.data
                    .filter(u => u.userid !== myId)
                    .map(u => `
                        <div class="user-item" id="u-${u.userid}" onclick="openChat('${u.userid}', '${u.first_name}')">
                            ${u.first_name} ${u.last_name || ''}
                        </div>
                    `).join('');
                document.getElementById('userList').innerHTML = listHtml;
            } else {
                document.getElementById('userList').innerText = "API Error: " + result.message;
            }
        } catch (err) {
            document.getElementById('userList').innerText = "Connection Failed. Please Refresh.";
            console.error(err);
        }
    }

    // 3. SELECT USER
    async function openChat(id, name) {
        activeId = id;
        document.getElementById('chatHeader').innerText = "Chat with " + name;
        
        // Highlight active user
        document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
        const activeEl = document.getElementById(`u-${id}`);
        if(activeEl) activeEl.classList.add('active');

        const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'getHistory', sender_id: myId, recipient_id: id })
        });
        const result = await res.json();
        const hist = document.getElementById('msgHistory');
        hist.innerHTML = (result.data || []).map(m => `
            <div class="bubble ${m.sender_id === myId ? 'me' : 'them'}">${m.content}</div>
        `).join('');
        hist.scrollTop = hist.scrollHeight;
    }

    // 4. SEND (MANUAL REFRESH FALLBACK)
    async function send() {
        const input = document.getElementById('msgInput');
        if (!input.value || !activeId) return;
        
        const content = input.value;
        input.value = "";

        await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                action: 'sendMessage', 
                sender_id: myId, 
                recipient_id: activeId, 
                content: content 
            })
        });

        // Since we removed Supabase library, we refresh the chat manually for now
        openChat(activeId, document.getElementById('chatHeader').innerText.replace("Chat with ", ""));
    }

    // 5. POLL FOR NEW MESSAGES (Temporary Realtime replacement)
    // Checks for new messages every 3 seconds
    setInterval(() => {
        if (activeId) {
            openChat(activeId, document.getElementById('chatHeader').innerText.replace("Chat with ", ""));
        }
    }, 3000);

    // Run
    init();
</script>
</body>
</html>
