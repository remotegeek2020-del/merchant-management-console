<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Reports | PayProTec</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="css/pp-system.css">
    <script src="js/tz.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>(function(){
        const u = localStorage.getItem('pp_userid');
        const v = localStorage.getItem('pp_verified');
        const r = (localStorage.getItem('pp_role') || '').toLowerCase();
        const hasReports = localStorage.getItem('pp_access_sending_reports') === 'true';
        const isSuperAdmin = r === 'super_admin';
        if (!u || v !== 'true' || (!isSuperAdmin && !hasReports)) window.location.href = '/?reason=denied';
    })();</script>
    <style>
        .sr-panel { background: white; border-radius: 14px; border: 1px solid #e2e8f0; box-shadow: 0 1px 4px rgba(0,0,0,0.05); overflow: hidden; }
        .sr-tabs { display: flex; border-bottom: 1px solid #e2e8f0; }
        .sr-tab { flex: 1; padding: 14px 12px; border: none; border-bottom: 3px solid transparent; background: none; font-size: 13px; font-weight: 700; color: #94a3b8; cursor: pointer; font-family: inherit; transition: all 0.15s; }
        .sr-tab.active { color: var(--pp-blue); border-bottom-color: var(--pp-blue); }
        .sr-tab-panel { padding: 20px; display: none; }
        .sr-tab-panel.active { display: block; }
        .sr-section { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 14px 16px; margin-bottom: 16px; }
        .sr-section-title { font-size: 12px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
        .sr-schedule-btn { padding: 6px 16px; border-radius: 20px; border: 2px solid #e2e8f0; background: white; color: #64748b; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.15s; }
        .sr-schedule-btn.active-pm  { border-color: #0369a1; background: #0369a1; color: white; }
        .sr-schedule-btn.active-ops { border-color: #0d9488; background: #0d9488; color: white; }
        .sr-hour-select { padding: 6px 12px; border: 2px solid #e2e8f0; border-radius: 20px; font-size: 12px; font-weight: 700; background: white; cursor: pointer; font-family: inherit; }
        .sr-manual-box { background: #fff7ed; border: 1px solid #fed7aa; border-radius: 10px; padding: 14px 16px; margin-bottom: 16px; }
        .sr-manual-title { font-size: 12px; font-weight: 800; color: #c2410c; margin-bottom: 6px; }
        .sr-manual-desc { font-size: 11px; color: #78350f; margin-bottom: 10px; }
        .sr-send-btn { border: none; border-radius: 7px; padding: 9px 22px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
        .sr-recip-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; }
        .sr-recip-table td { padding: 9px 12px; font-size: 13px; border-bottom: 1px solid #f1f5f9; }
        .sr-recip-table tr:last-child td { border-bottom: none; }
        .sr-log-table { width: 100%; border-collapse: collapse; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; }
        .sr-log-table th { padding: 7px 12px; font-size: 10px; font-weight: 800; color: #94a3b8; text-align: left; text-transform: uppercase; background: #f8fafc; }
        .sr-log-table td { padding: 6px 12px; font-size: 11px; border-bottom: 1px solid #f1f5f9; }
        .sr-log-table tr:last-child td { border-bottom: none; }
        .sr-add-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .sr-input { padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 7px; font-size: 12px; font-family: inherit; flex: 1; min-width: 120px; }
        .sr-add-btn { border: none; border-radius: 7px; padding: 8px 16px; font-size: 12px; font-weight: 700; cursor: pointer; color: white; font-family: inherit; }
        .sr-remove-btn { background: #fee2e2; color: #991b1b; border: none; border-radius: 6px; padding: 4px 10px; font-size: 11px; font-weight: 700; cursor: pointer; }
        .sr-empty { padding: 16px; text-align: center; color: #94a3b8; font-size: 12px; }
    </style>
</head>
<body>
<div class="pp-container">

    <div class="pp-header">
        <div class="pp-header-left">
            <a href="/" class="pp-back-btn"><span class="material-icons" style="font-size:16px;">arrow_back</span> HOME</a>
            <h1 class="pp-header-title">System Reports</h1>
        </div>
        <div style="font-size:12px; color:var(--text-muted);">Manage automated email reports</div>
    </div>

    <div style="max-width:760px; margin: 0 auto;">

        <!-- Description -->
        <div style="background:white; border-radius:14px; border:1px solid #e2e8f0; padding:16px 20px; margin-bottom:20px; display:flex; align-items:center; gap:14px;">
            <div style="background:#f0fdfa; border-radius:10px; padding:10px; flex-shrink:0;">
                <span class="material-icons" style="color:#0d9488; font-size:24px;">schedule_send</span>
            </div>
            <div>
                <div style="font-weight:700; color:var(--text-primary); margin-bottom:3px;">Automated Email Reports</div>
                <div style="font-size:12px; color:var(--text-muted);">Configure recipients, schedules, and send reports manually. Reports run automatically via cron on your chosen schedule.</div>
            </div>
        </div>

        <!-- Main panel -->
        <div class="sr-panel">
            <div class="sr-tabs" id="sr-tabs">
                <button class="sr-tab active" data-type="partners_merchants" onclick="switchTab('partners_merchants')">
                    📊 Partners &amp; Merchants
                </button>
                <button class="sr-tab" data-type="ops" onclick="switchTab('ops')">
                    📦 Inventory / Ops
                </button>
            </div>

            <div id="loading-state" style="padding:40px; text-align:center; color:var(--text-muted);">
                <span class="material-icons" style="font-size:32px; display:block; margin-bottom:8px; opacity:0.4;">hourglass_empty</span>
                Loading…
            </div>

            <div id="sr-panel-partners_merchants" class="sr-tab-panel" style="display:none;"></div>
            <div id="sr-panel-ops"                class="sr-tab-panel" style="display:none;"></div>
        </div>

    </div>
</div>

<script>
const REPORT_TYPES = {
    partners_merchants: { label: 'Partners & Merchants', color: '#0369a1', bg: '#eff6ff', icon: '📊', btnClass: 'active-pm' },
    ops:                { label: 'Inventory / Ops',       color: '#0d9488', bg: '#f0fdfa', icon: '📦', btnClass: 'active-ops' }
};

let activeTab = 'partners_merchants';

function authHeaders() {
    const token = localStorage.getItem('pp_session_token') || '';
    return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };
}

async function apiCall(body) {
    try {
        const res = await fetch('/api/scheduled-reports', {
            method: 'POST',
            headers: authHeaders(),
            body: JSON.stringify(body)
        });
        return res.json();
    } catch (e) {
        console.error('[reports api]', e);
        return { success: false, message: 'Network error. Please try again.' };
    }
}

function recipientRows(recipients, reportType) {
    if (!recipients.length) return `<tr><td colspan="2" class="sr-empty">No recipients yet</td></tr>`;
    return recipients.map(r => `
        <tr>
            <td>${r.name ? `<strong>${r.name}</strong><br><span style="font-size:11px;color:#64748b;">${r.email}</span>` : r.email}</td>
            <td style="text-align:right;"><button class="sr-remove-btn" onclick="removeRecipient('${r.id}','${reportType}')">Remove</button></td>
        </tr>`).join('');
}

function logRows(logs) {
    if (!logs || !logs.length) return `<tr><td colspan="3" class="sr-empty">No sends yet</td></tr>`;
    return logs.slice(0, 8).map(l => {
        const ts = fmtDateTime(new Date(l.sent_at));
        const sc = l.status === 'sent' ? '#16a34a' : l.status === 'partial' ? '#d97706' : '#dc2626';
        return `<tr>
            <td style="color:#64748b;">${ts}</td>
            <td style="font-weight:700;color:${sc};text-transform:capitalize;">${l.status}</td>
            <td style="color:#334155;">${l.recipient_count} sent · ${l.trigger}</td>
        </tr>`;
    }).join('');
}

function hourOptions(selected) {
    return Array.from({length: 24}, (_, h) => {
        const label = h === 0 ? '12:00 AM' : h < 12 ? `${h}:00 AM` : h === 12 ? '12:00 PM' : `${h-12}:00 PM`;
        return `<option value="${h}" ${h === selected ? 'selected' : ''}>${label} UTC</option>`;
    }).join('');
}

function renderPanel(reportType, recipients, logs, setting) {
    const rt = REPORT_TYPES[reportType];
    const schedule      = setting.schedule || 'daily';
    const preferredHour = setting.preferred_hour ?? 9;

    return `
    <div id="sr-content-${reportType}">
        <!-- Schedule -->
        <div class="sr-section" style="background:${rt.bg};">
            <div class="sr-section-title" style="color:${rt.color};">Automatic Schedule</div>
            <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
                <button id="sched-daily-${reportType}" class="sr-schedule-btn ${schedule==='daily' ? rt.btnClass : ''}"
                    onclick="setSchedule('${reportType}','daily')">Daily</button>
                <button id="sched-weekly-${reportType}" class="sr-schedule-btn ${schedule==='weekly' ? rt.btnClass : ''}"
                    onclick="setSchedule('${reportType}','weekly')">Weekly (Mon)</button>
                <span style="font-size:12px;color:#64748b;font-weight:600;">at</span>
                <select id="hour-${reportType}" class="sr-hour-select" style="border-color:${rt.color};color:${rt.color};"
                    onchange="setTime('${reportType}')">
                    ${hourOptions(preferredHour)}
                </select>
            </div>
        </div>

        <!-- Manual Send -->
        <div class="sr-manual-box">
            <div class="sr-manual-title">Manual Send</div>
            <div class="sr-manual-desc">Send immediately to all current recipients for this report type.</div>
            <button id="manual-btn-${reportType}" class="sr-send-btn" style="background:#f97316;color:white;"
                onclick="sendManual('${reportType}')">
                ${rt.icon} Send ${rt.label} Now
            </button>
        </div>

        <!-- Add Recipient -->
        <div class="sr-section">
            <div class="sr-section-title">Add Recipient</div>
            <div class="sr-add-row">
                <input id="recip-name-${reportType}" class="sr-input" placeholder="Name (optional)">
                <input id="recip-email-${reportType}" class="sr-input" placeholder="email@example.com" style="flex:2;">
                <button class="sr-add-btn" style="background:${rt.color};" onclick="addRecipient('${reportType}')">Add</button>
            </div>
        </div>

        <!-- Recipients -->
        <div style="font-size:11px;font-weight:800;color:#64748b;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">
            Recipients (<span id="recip-count-${reportType}">${recipients.length}</span>)
        </div>
        <table class="sr-recip-table">
            <tbody id="recip-tbody-${reportType}">${recipientRows(recipients, reportType)}</tbody>
        </table>

        <!-- Send Log -->
        <div style="font-size:11px;font-weight:800;color:#64748b;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">Recent Sends</div>
        <table class="sr-log-table">
            <thead><tr>
                <th>Time</th><th>Status</th><th>Details</th>
            </tr></thead>
            <tbody id="log-tbody-${reportType}">${logRows(logs)}</tbody>
        </table>
    </div>`;
}

async function loadTab(reportType, scheduleSettings) {
    const panelEl = document.getElementById(`sr-panel-${reportType}`);
    panelEl.innerHTML = `<div style="padding:30px;text-align:center;color:var(--text-muted);">Loading…</div>`;

    const [recipRes, logRes] = await Promise.all([
        apiCall({ action: 'get_recipients', report_type: reportType }),
        apiCall({ action: 'get_log',        report_type: reportType })
    ]);

    if (!recipRes.success || !logRes.success) {
        panelEl.innerHTML = `<div style="padding:20px;color:var(--red-text);">Error loading data. Please refresh.</div>`;
        return;
    }

    const setting = (scheduleSettings || []).find(s => s.report_type === reportType) || {};
    panelEl.innerHTML = renderPanel(reportType, recipRes.data || [], logRes.data || [], setting);
}

async function init() {
    const schedRes = await apiCall({ action: 'get_schedule' });
    if (!schedRes.success) {
        document.getElementById('loading-state').innerHTML = `<div style="color:var(--red-text);">Error loading settings. Please refresh.</div>`;
        return;
    }
    const scheduleSettings = schedRes.data || [];

    document.getElementById('loading-state').style.display = 'none';

    await Promise.all(Object.keys(REPORT_TYPES).map(type => loadTab(type, scheduleSettings)));

    // Show active tab
    document.getElementById(`sr-panel-${activeTab}`).style.display = 'block';
    document.getElementById(`sr-panel-${activeTab}`).classList.add('active');
}

function switchTab(type) {
    activeTab = type;
    document.querySelectorAll('.sr-tab').forEach(btn => {
        const t = btn.dataset.type;
        const rt = REPORT_TYPES[t];
        btn.classList.toggle('active', t === type);
        btn.style.color      = t === type ? rt.color : '#94a3b8';
        btn.style.borderBottomColor = t === type ? rt.color : 'transparent';
    });
    Object.keys(REPORT_TYPES).forEach(t => {
        const el = document.getElementById(`sr-panel-${t}`);
        el.style.display = t === type ? 'block' : 'none';
    });
}

async function addRecipient(reportType) {
    const email = document.getElementById(`recip-email-${reportType}`).value.trim();
    const name  = document.getElementById(`recip-name-${reportType}`).value.trim();
    if (!email) return;
    const r = await apiCall({ action: 'add_recipient', email, name, report_type: reportType });
    if (r.success) {
        document.getElementById(`recip-email-${reportType}`).value = '';
        document.getElementById(`recip-name-${reportType}`).value = '';
        await refreshRecipients(reportType);
    } else {
        Swal.fire({ icon: 'error', title: 'Error', text: r.message || 'Failed to add recipient' });
    }
}

async function removeRecipient(id, reportType) {
    const r = await apiCall({ action: 'remove_recipient', id });
    if (r.success) await refreshRecipients(reportType);
}

async function refreshRecipients(reportType) {
    const res = await apiCall({ action: 'get_recipients', report_type: reportType });
    const recipients = res.data || [];
    document.getElementById(`recip-tbody-${reportType}`).innerHTML = recipientRows(recipients, reportType);
    document.getElementById(`recip-count-${reportType}`).textContent = recipients.length;
}

async function sendManual(reportType) {
    const rt = REPORT_TYPES[reportType];
    const btn = document.getElementById(`manual-btn-${reportType}`);
    const orig = btn.textContent;
    btn.textContent = 'Sending…';
    btn.disabled = true;

    const r = await apiCall({ action: 'send_manual', report_type: reportType });
    btn.textContent = orig;
    btn.disabled = false;

    if (r.success) {
        Swal.fire({ icon: 'success', title: 'Sent!', text: `Delivered to ${r.sent} of ${r.total} recipient(s).`, confirmButtonColor: rt.color, timer: 3000, showConfirmButton: false });
        const logRes = await apiCall({ action: 'get_log', report_type: reportType });
        document.getElementById(`log-tbody-${reportType}`).innerHTML = logRows(logRes.data || []);
    } else {
        Swal.fire({ icon: 'error', title: 'Send Failed', text: r.message || 'Unknown error' });
    }
}

async function setSchedule(reportType, schedule) {
    const rt = REPORT_TYPES[reportType];
    const r = await apiCall({ action: 'set_schedule', report_type: reportType, schedule });
    if (r.success) {
        ['daily', 'weekly'].forEach(s => {
            const btn = document.getElementById(`sched-${s}-${reportType}`);
            if (!btn) return;
            btn.classList.toggle(rt.btnClass, s === schedule);
            if (s !== schedule) btn.classList.remove(rt.btnClass);
        });
    }
}

async function setTime(reportType) {
    const hour = parseInt(document.getElementById(`hour-${reportType}`).value, 10);
    await apiCall({ action: 'set_time', report_type: reportType, preferred_hour: hour });
}

init();
</script>
</body>
</html>
