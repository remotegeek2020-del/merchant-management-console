<!DOCTYPE html>
<html lang="en">
<head>
    <script src="js/access-guard.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Applications | PayProTec</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="css/pp-system.css">
    <script src="js/tz.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>(function(){const u=localStorage.getItem('pp_userid'),v=localStorage.getItem('pp_verified');if(!u||v!=='true')window.location.href='/?reason=denied';})();</script>
    <style>
        .app-card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:16px 18px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
        .app-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px 18px;margin:10px 0;}
        .app-f{font-size:12px;color:#334155;}
        .app-f b{display:block;font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:.4px;font-weight:800;margin-bottom:1px;}
    </style>
</head>
<body>
<div class="pp-container">
    <div class="pp-header">
        <div class="pp-header-left">
            <a href="/" class="pp-back-btn"><span class="material-icons" style="font-size:16px;">arrow_back</span> HOME</a>
            <h1 class="pp-header-title">Merchant Applications</h1>
        </div>
        <button class="pp-btn pp-btn-secondary" onclick="loadApps()"><span class="material-icons" style="font-size:16px;">refresh</span></button>
    </div>
    <div style="font-size:12px;color:#64748b;margin-bottom:14px;">Self-onboarding applications awaiting review. Approve to mark the merchant <b>Approved</b>, or reject to mark <b>Rejected</b>. Existing merchants are never affected.</div>
    <div id="apps"><div style="text-align:center;color:#94a3b8;padding:30px;">Loading…</div></div>
</div>

<script src="js/notif-bell.js" defer></script>
<script>
    const AUTH = () => ({ 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (localStorage.getItem('pp_session_token') || '') });
    const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

    async function api(body) {
        const res = await fetch('/api/merchants', { method: 'POST', headers: AUTH(), body: JSON.stringify(body) });
        return res.json();
    }

    async function loadApps() {
        const el = document.getElementById('apps');
        el.innerHTML = '<div style="text-align:center;color:#94a3b8;padding:30px;">Loading…</div>';
        try {
            const r = await api({ action: 'list_applications' });
            if (!r.success) throw new Error(r.message || 'Failed');
            const rows = r.data || [];
            if (!rows.length) { el.innerHTML = '<div style="text-align:center;color:#94a3b8;padding:30px;">🎉 No pending applications.</div>'; return; }
            el.innerHTML = rows.map(a => {
                const f = (l, v) => `<div class="app-f"><b>${l}</b>${esc(v || '—')}</div>`;
                const when = a.created_at ? new Date(a.created_at).toLocaleString() : '';
                return `<div class="app-card" id="app-${a.id}">
                    <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;">
                        <div style="font-size:15px;font-weight:800;color:#002d5a;">${esc(a.dba_name || '(no DBA)')}</div>
                        <span style="font-size:10px;color:#92400e;background:#fef3c7;padding:3px 10px;border-radius:99px;font-weight:800;">PENDING</span>
                    </div>
                    <div class="app-grid">
                        ${f('Legal Name', a.legal_name)}${f('Owner', a.owner_name)}${f('Email', a.email)}${f('Phone', a.phone)}
                        ${f('Location', [a.city, a.state].filter(Boolean).join(', '))}${f('Monthly Volume', a.monthly_volume)}
                        ${f('Agent ID', a.agent_id)}${f('Referral', a.referral_source)}${f('Submitted', when)}
                    </div>
                    <div style="display:flex;gap:8px;margin-top:6px;">
                        <button onclick="review('${a.id}','approve',this)" style="padding:8px 18px;background:#16a34a;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;">✓ Approve</button>
                        <button onclick="review('${a.id}','reject',this)" style="padding:8px 18px;background:#fff;color:#dc2626;border:1px solid #fecaca;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;">✕ Reject</button>
                    </div>
                </div>`;
            }).join('');
        } catch (e) {
            el.innerHTML = `<div style="text-align:center;color:#dc2626;padding:30px;">${esc(e.message)}</div>`;
        }
    }

    async function review(id, decision, btn) {
        const ok = await Swal.fire({ icon: decision === 'approve' ? 'question' : 'warning', title: decision === 'approve' ? 'Approve this application?' : 'Reject this application?', showCancelButton: true, confirmButtonText: decision === 'approve' ? 'Approve' : 'Reject', confirmButtonColor: decision === 'approve' ? '#16a34a' : '#dc2626' });
        if (!ok.isConfirmed) return;
        btn.disabled = true;
        const r = await api({ action: 'review_application', id, decision });
        if (r.success) {
            const card = document.getElementById('app-' + id); if (card) card.remove();
            Swal.fire({ icon: 'success', title: decision === 'approve' ? 'Approved' : 'Rejected', timer: 1300, showConfirmButton: false });
            if (!document.querySelectorAll('.app-card').length) loadApps();
        } else { btn.disabled = false; Swal.fire('Error', r.message || 'Failed', 'error'); }
    }

    loadApps();
</script>
</body>
</html>
