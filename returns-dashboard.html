<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Returns & RMA | Secure Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="icon" type="image/png" href="/images/favicon-32x32.png" sizes="32x32" />
    <style>
        :root { --pp-blue: #004990; --pp-accent: #00a1e0; }
        body { background: #f1f5f9; padding: 25px; font-family: 'Inter', sans-serif; }
        .dashboard-container { max-width: 1600px; margin: 0 auto; }
        .modern-header { background: white; border-radius: 16px; padding: 20px 25px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
        .kpi-card { background: white; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; }
        .kpi-label { font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
        .kpi-val { font-size: 24px; font-weight: 800; color: var(--pp-blue); margin-top: 5px; display: block; }
        .main-card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .badge { font-weight: 800; font-size: 9px; padding: 4px 10px; border-radius: 4px; text-transform: uppercase; }
        .cond-defective { background: #fee2e2; color: #991b1b; }
        .cond-working { background: #dcfce7; color: #166534; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="modern-header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <a href="index.html" class="slds-button slds-button_neutral" style="border-radius: 10px; padding: 5px 15px;">
                <span class="material-icons" style="font-size: 18px; vertical-align: middle;">arrow_back</span>
                <span style="font-weight: 700; font-size: 12px; margin-left: 5px;">HOME</span>
            </a>
            <h1 style="font-size: 1.5rem; font-weight: 800; color: #002d5a;">Returns & RMA Ledger</h1>
        </div>
        <input type="text" id="retSearch" placeholder="Search RMA or Condition..." class="slds-input" style="width:300px; border-radius:10px;" onkeyup="fetchReturns()">
    </div>

    <div class="kpi-grid">
        <div class="kpi-card">
            <span class="kpi-label">Open RMAs</span>
            <span class="kpi-val" id="kpi-open">0</span>
        </div>
        <div class="kpi-card">
            <span class="kpi-label">Defective Units</span>
            <span class="kpi-val" id="kpi-defective" style="color:#e11d48;">0</span>
        </div>
        <div class="kpi-card" style="background:var(--pp-blue);">
            <span class="kpi-label" style="color:rgba(255,255,255,0.7);">Total Lifetime Returns</span>
            <span class="kpi-val" id="kpi-total" style="color:white;">0</span>
        </div>
    </div>

    <article class="main-card">
        <table class="slds-table slds-table_bordered slds-table_cell-buffer slds-no-row-hover">
            <thead>
    <tr class="slds-line-height_reset">
        <th>RMA ID</th>
        <th>Date</th>
        <th>Merchant</th>
        <th>Equipment (S/N)</th>
        <th>Reason</th>
        <th>Condition</th>
        <th>Destination</th>
        <th>Status</th>
        <th>Actions</th> </tr>
</thead>
            <tbody id="returnsTableBody"></tbody>
        </table>
    </article>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>

    async function viewHistory(id, sn) {
    document.getElementById('historyModal').style.display = 'flex';
    const res = await fetch('/api/returns', { 
        method: 'POST', 
        headers: { 'Content-Type': 'application/json' }, 
        body: JSON.stringify({ action: 'getHistory', equipment_id: id }) // Sending the ID
    });
    const result = await res.json();
    document.getElementById('timeline').innerHTML = (result.data || []).map(log => `
        <div class="timeline-item">
            <div class="timeline-dot"></div>
            <b>${log.action.toUpperCase()}</b><br>
            <small>${new Date(log.created_at).toLocaleString()}</small><br>
            <span style="font-size:11px;">${log.from_location} → ${log.to_location}</span>
        </div>
    `).join('');
}
    async function fetchReturns() {
        const tbody = document.getElementById('returnsTableBody');
        tbody.innerHTML = `<tr><td colspan="9" style="text-align:center; padding:50px; color:#94a3b8;"><span class="material-icons" style="animation: spin 2s linear infinite;">sync</span></td></tr>`;
        
        try {
            const res = await fetch('/api/returns', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'list', query: document.getElementById('retSearch').value })
            });
            const result = await res.json();

            document.getElementById('kpi-open').innerText = result.metrics.open;
            document.getElementById('kpi-defective').innerText = result.metrics.defective;
            document.getElementById('kpi-total').innerText = result.count;

            tbody.innerHTML = "";
            result.data.forEach(r => {
                const row = tbody.insertRow();
                // Determine if button should be shown (only for 'open' status)
                const isItemOpen = r.status.toLowerCase() === 'open';

                row.innerHTML = `
                    <td style="font-weight:800; color:var(--pp-blue);">${r.return_id || 'PENDING'}</td>
                    <td style="font-size:12px; color:#64748b;">${new Date(r.created_at).toLocaleDateString()}</td>
                    <td style="font-weight:600;">${r.merchants?.dba_name || '---'}</td>
                    <td><div style="font-weight:600;">${r.equipments?.terminal_type}</div><code style="font-size:10px;">${r.equipments?.serial_number}</code></td>
                    <td style="font-size:12px;">${r.return_reason || '---'}</td>
                    <td><span class="badge ${r.condition === 'Defective' ? 'cond-defective' : 'cond-working'}">${r.condition || 'Unknown'}</span></td>
                    <td style="font-weight:600; color:#475569;">${r.destination || '---'}</td>
                    <td><span class="slds-badge">${r.status.toUpperCase()}</span></td>
                    <td>
    <button class="slds-button slds-button_icon slds-button_icon-border" 
            onclick="viewHistory('${r.equipment_id}', '${r.equipments?.serial_number}')" title="View History">
        <span class="material-icons" style="font-size:16px;">history</span>
    </button>
    </td>
                    <td>
                        ${isItemOpen ? `
                            <button class="slds-button slds-button_success" 
                                    style="background:#16a34a; color:white; border-radius:8px; padding:4px 12px; font-size:10px; font-weight:700; border:none; cursor:pointer;"
                                    onclick="finalizeRMA('${r.id}', '${r.equipment_id}', '${r.condition}', '${r.destination}')">
                                COMPLETE & RESTOCK
                            </button>
                        ` : `
                            <span style="color:#64748b; font-size:10px; font-weight:700; text-transform:uppercase;">Processed</span>
                        `}
                    </td>
                `;
            });
        } catch (err) { console.error("Fetch Error:", err); }
    }

    async function finalizeRMA(id, equipment_id, condition, destination) {
        const confirm = await Swal.fire({
            title: 'Complete Inspection?',
            text: `Physically verify unit. Move to ${destination} and set status to ${condition === 'Defective' ? 'Repairing' : 'Stocked'}?`,
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#16a34a',
            cancelButtonColor: '#64748b',
            confirmButtonText: 'Yes, Restock Unit'
        });

        if (confirm.isConfirmed) {
            Swal.fire({ title: 'Updating Inventory...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                const res = await fetch('/api/returns', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        action: 'complete_return', 
                        payload: { id, equipment_id, condition, destination } 
                    })
                });
                
                const result = await res.json();
                if (result.success) {
                    Swal.fire({
                        icon: 'success',
                        title: 'Restocked Successfully',
                        text: 'The equipment is now back in live inventory.',
                        timer: 2000,
                        showConfirmButton: false
                    }).then(() => fetchReturns());
                } else {
                    throw new Error(result.message);
                }
            } catch (err) {
                Swal.fire('Error', 'Failed to complete return: ' + err.message, 'error');
            }
        }
    }

    window.onload = fetchReturns;
</script>
</body>
</html>
