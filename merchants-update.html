<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Merchant | Portal Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --pp-blue: #004990; --glass: rgba(255, 255, 255, 0.9); }
        body { background: radial-gradient(circle at top right, #f8fafc, #e2e8f0); padding: 30px; font-family: 'Inter', sans-serif; }
        .slds-form-container { max-width: 1100px; margin: auto; background: var(--glass); backdrop-filter: blur(12px); border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.08); overflow: hidden; }
        .header-box { background: rgba(0, 73, 144, 0.03); padding: 25px 35px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .form-body { padding: 40px; }
        .slds-input, .slds-select { border-radius: 10px !important; border: 1px solid #d1d9e6 !important; height: 40px; }
        .readonly-field { background-color: #f1f5f9 !important; color: #64748b !important; cursor: not-allowed !important; }
        .footer-action { background: rgba(255,255,255,0.4); padding: 25px 40px; border-top: 1px solid #e2e8f0; display: flex; justify-content: flex-end; gap: 15px; }
    </style>
</head>
<body>
    <div class="slds-form-container">
        <div class="header-box">
            <h1 style="font-size: 1.2rem; font-weight: 800; color: var(--pp-blue);">Edit Merchant Profile</h1>
            <a href="merchants-dashboard.html" style="color:var(--pp-blue); font-weight:700;">Close</a>
        </div>

        <div class="form-body">
            <div class="slds-grid slds-wrap slds-gutters">
                <div class="slds-col slds-size_1-of-2">
                    <div class="slds-form-element slds-m-bottom_small"><label class="slds-form-element__label">DBA Name</label><input type="text" id="dba_name" class="slds-input" /></div>
                    <div class="slds-form-element slds-m-bottom_small"><label class="slds-form-element__label">Merchant ID (MID)</label><input type="text" id="merchant_id" class="slds-input readonly-field" readonly /></div>
                </div>
                <div class="slds-col slds-size_1-of-2">
                    <div class="slds-form-element slds-m-bottom_small"><label class="slds-form-element__label">Partner ID (Agent ID)</label><input type="text" id="agent_id" class="slds-input readonly-field" readonly /></div>
                    <div class="slds-form-element slds-m-bottom_small">
                        <label class="slds-form-element__label">Account Status</label>
                        <select id="account_status" class="slds-select">
                            <option value="Approved">Approved</option>
                            <option value="Approved - Collections">Approved - Collections</option>
                            <option value="Closed">Closed</option>
                            <option value="Closed - Collections">Closed - Collections</option>
                            <option value="Closed - Risk">Closed - Risk</option>
                            <option value="Collections">Collections</option>
                            <option value="Declined">Declined</option>
                            <option value="Enrollment">Enrollment</option>
                            <option value="Fraud">Fraud</option>
                            <option value="Pending">Pending</option>
                            <option value="Withdrawn">Withdrawn</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer-action">
            <button class="slds-button slds-button_neutral" onclick="window.history.back()">Cancel</button>
            <button class="slds-button slds-button_brand" onclick="updateMerchant()">Save Profile</button>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        
        window.onload = function() {
            // Populate fields from URL parameters passed from the dashboard
            document.getElementById('dba_name').value = params.get('dba') || '';
            document.getElementById('merchant_id').value = params.get('mid') || '';
            document.getElementById('agent_id').value = params.get('aid') || '';
            document.getElementById('account_status').value = params.get('status') || 'Pending';
        };

        async function updateMerchant() {
            Swal.fire({ title: 'Updating...', didOpen: () => Swal.showLoading() });
            const payload = {
                dba_name: document.getElementById('dba_name').value,
                account_status: document.getElementById('account_status').value
            };

            const res = await fetch('/api/merchants', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'update', id: params.get('id'), payload: payload })
            });

            if (res.ok) {
                Swal.fire('Updated!', '', 'success').then(() => window.location.href = 'merchants-dashboard.html');
            }
        }
    </script>
</body>
</html>
