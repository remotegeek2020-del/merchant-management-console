<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Deployment Tracking | Secure Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --pp-blue: #004990; --pp-accent: #00a1e0; }
        body { background: #f1f5f9; padding: 25px; font-family: 'Inter', sans-serif; }
        .dashboard-container { max-width: 1600px; margin: 0 auto; }
        .modern-header { background: white; border-radius: 16px; padding: 25px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .kpi-card { background: white; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; flex: 1; display: flex; align-items: center; gap: 15px; }
        .kpi-val { font-size: 1.3rem; font-weight: 800; color: #002d5a; display: block; }
        .kpi-label { font-size: 0.65rem; font-weight: 700; color: #64748b; text-transform: uppercase; }
        .main-card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .badge { font-weight: 800; font-size: 9px; padding: 4px 10px; border-radius: 4px; text-transform: uppercase; }
        .status-open { background: #e0f2fe; color: #0369a1; }
        .status-closed { background: #f1f5f9; color: #475569; }
        
        /* Modal Styles */
        .modal-backdrop { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center; }
        .modal-content { background:white; width:600px; border-radius:16px; padding:30px; position:relative; max-height:80vh; overflow-y:auto; }
        .close-btn { position:absolute; top:20px; right:20px; cursor:pointer; color:#64748b; }
        
        /* Timeline Styles */
        .timeline { border-left: 2px solid #e2e8f0; margin-left: 20px; padding-left: 30px; position: relative; }
        .timeline-item { margin-bottom: 25px; position: relative; }
        .timeline-dot { position: absolute; left: -41px; width: 20px; height: 20px; background: white; border: 4px solid var(--pp-accent); border-radius: 50%; }
        .timeline-date { font-size: 0.75rem; font-weight: 700; color: #94a3b8; }
        .timeline-action { font-weight: 800; color: #002d5a; font-size: 0.95rem; }
        .timeline-location { font-size: 0.85rem; color: #64748b; }
        
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="modern-header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <a href="index.html" class="slds-button slds-button_neutral" style="border-radius: 10px; padding: 5px 15px;">
                <span class="material-icons" style="font-size: 18px; vertical-align: middle;">arrow_back</span>
                <span style="font-weight: 700; font-size: 12px; margin-left: 5px;">HOME</span>
            </a>
            <h1 style="font-size: 1.6rem; font-weight: 800; color: #002d5a; margin: 0;">Logistics & Deployments</h1>
        </div>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="depSearch" placeholder="Search ID or Serial..." class="slds-input" style="width:250px; border-radius:10px;">
            <button class="slds-button slds-button_brand" style="border-radius:10px; background:var(--pp-blue);" onclick="fetchDeployments()">Search</button>
        </div>
    </div>

    <div style="display:flex; gap:20px; margin-bottom:20px;">
        <div class="kpi-card"><div><span class="kpi-label">Active Shipments</span><span class="kpi-val" id="kpi-active">0</span></div></div>
        <div class="kpi-card"><div><span class="kpi-label">Completed Today</span><span class="kpi-val" id="kpi-today">0</span></div></div>
        <div class="kpi-card" style="background:var(--pp-blue); color:white;"><div><span class="kpi-label" style="color:rgba(255,255,255,0.7);">Total Fleet Deployed</span><span class="kpi-val" id="kpi-total" style="color:white;">0</span></div></div>
    </div>

    <article class="main-card">
        <table class="slds-table slds-table_bordered slds-table_cell-buffer slds-no-row-hover">
            <thead>
                <tr>
                    <th>Deployment ID</th>
                    <th>Merchant (DBA)</th>
                    <th>Hardware (Serial)</th>
                    <th>TID</th>
                    <th>Tracking</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>History</th>
                </tr>
            </thead>
            <tbody id="deploymentTableBody"></tbody>
        </table>
    </article>
</div>

<!-- History Modal -->
<div id="historyModal" class="modal-backdrop" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="material-icons close-btn" onclick="document.getElementById('historyModal').style.display='none'">close</span>
        <h2 id="modalTitle" style="font-size:1.4rem; font-weight:800; color:#002d5a; margin-bottom:5px;">Equipment Lifecycle</h2>
        <p id="modalSubtitle" style="color:#64748b; font-size:0.9rem; margin-bottom:25px;">History for Serial #---</p>
        
        <div id="timelineContainer" class="timeline">
            <!-- Timeline items injected here -->
        </div>
    </div>
</div>

<script>
    async function fetchDeployments() {
        const tbody = document.getElementById('deploymentTableBody');
        tbody.innerHTML = `<tr><td colspan="8" style="text-align:center; padding:60px; color:#94a3b8;"><span class="material-icons" style="animation: spin 2s linear infinite;">sync</span><br>Syncing Logistics Ledger...</td></tr>`;

        try {
            const res = await fetch('/api/deployments', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    action: 'list', 
                    query: document.getElementById('depSearch').value 
                })
            });
            const result = await res.json();

            document.getElementById('kpi-active').innerText = result.metrics.active;
            document.getElementById('kpi-total').innerText = result.metrics.total;
            document.getElementById('kpi-today').innerText = result.metrics.today;

            tbody.innerHTML = "";
            result.data.forEach(d => {
                const row = tbody.insertRow();
                const equipId = d.equipments?.id;
                const sn = d.equipments?.serial_number || '---';
                
                row.innerHTML = `
                    <td style="font-weight:700; color:var(--pp-blue);">${d.deployment_id || '---'}</td>
                    <td style="font-weight:600;">${d.merchants?.dba_name || 'Unassigned'}</td>
                    <td><code>${sn}</code></td>
                    <td>${d.tid || '---'}</td>
                    <td><a href="#" style="color:var(--pp-accent); font-weight:700;">${d.tracking_id || '---'}</a></td>
                    <td>${d.target_deploymer ? new Date(d.target_deploymer).toLocaleDateString() : '---'}</td>
                    <td><span class="badge ${d.status === 'Open' ? 'status-open' : 'status-closed'}">${d.status}</span></td>
                    <td>
                        <button class="slds-button slds-button_icon slds-button_icon-border-filled" 
                                onclick="viewHistory('${equipId}', '${sn}')" 
                                title="View History" ${!equipId ? 'disabled' : ''}>
                            <span class="material-icons" style="font-size:18px;">history</span>
                        </button>
                    </td>
                `;
            });
        } catch (err) { console.error(err); }
    }

    async function viewHistory(id, sn) {
        const modal = document.getElementById('historyModal');
        const container = document.getElementById('timelineContainer');
        document.getElementById('modalSubtitle').innerText = `History for Serial #${sn}`;
        container.innerHTML = `<p style="color:#94a3b8; text-align:center;">Loading history...</p>`;
        modal.style.display = 'flex';

        try {
            const res = await fetch('/api/deployments', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'getHistory', equipment_id: id })
            });
            const result = await res.json();

            if (result.data && result.data.length > 0) {
                container.innerHTML = result.data.map(log => `
                    <div class="timeline-item">
                        <div class="timeline-dot"></div>
                        <div class="timeline-date">${new Date(log.created_at).toLocaleString()}</div>
                        <div class="timeline-action">${log.action.toUpperCase()}</div>
                        <div class="timeline-location">
                            ${log.from_location || 'Unknown'} <span class="material-icons" style="font-size:12px; vertical-align:middle;">arrow_forward</span> ${log.to_location || 'Unknown'}
                        </div>
                        ${log.notes ? `<div style="font-size:0.75rem; font-style:italic; margin-top:5px; color:#64748b;">"${log.notes}"</div>` : ''}
                    </div>
                `).join('');
            } else {
                container.innerHTML = `<p style="color:#94a3b8; text-align:center; padding:20px;">No historical logs found for this item.</p>`;
            }
        } catch (err) {
            container.innerHTML = `<p style="color:red; text-align:center;">Error loading history.</p>`;
        }
    }

    function closeModal(e) {
        if (e.target.id === 'historyModal') document.getElementById('historyModal').style.display = 'none';
    }

    window.onload = fetchDeployments;
</script>
</body>
</html>
