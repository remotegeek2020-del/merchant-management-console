<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | PayProTec Partner Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;}
        :root{--teal:#0d9488;--teal-dark:#0f766e;--teal-bg:#f0fdfa;--navy:#001e3c;--border:#e2e8f0;--surface:#f8fafc;--text:#0a1628;--muted:#94a3b8;}
        body{margin:0;font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--text);display:flex;height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased;}
        html{height:100%;}
        .sidebar{width:240px;background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
        .sidebar-header{padding:20px 16px;border-bottom:1px solid rgba(255,255,255,0.08);}
        .sidebar-logo{height:26px;filter:brightness(0) invert(1);display:block;margin-bottom:14px;}
        .sidebar-partner{display:flex;align-items:center;gap:10px;}
        .sidebar-avatar{width:36px;height:36px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:white;flex-shrink:0;}
        .sidebar-name{font-size:13px;font-weight:700;color:white;}
        .sidebar-tag{font-size:10px;color:rgba(255,255,255,0.4);}
        .sidebar-nav{flex:1;padding:12px;display:flex;flex-direction:column;gap:3px;}
        .nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;font-size:13px;font-weight:600;color:rgba(255,255,255,0.6);text-decoration:none;border:none;background:none;width:100%;font-family:'DM Sans',sans-serif;cursor:pointer;position:relative;}
        .nav-item:hover{background:rgba(255,255,255,0.08);color:white;}
        .nav-item.active{background:var(--teal);color:white;}
        .nav-item .material-icons{font-size:20px;flex-shrink:0;}
        .nav-badge{background:#ef4444;color:white;border-radius:99px;font-size:9px;font-weight:800;padding:1px 6px;margin-left:auto;}
        .nav-divider{height:1px;background:rgba(255,255,255,0.08);margin:6px 0;}
        .main{flex:1;display:flex;overflow:hidden;min-height:0;}
        /* CONVERSATIONS */
        .conv-col{width:290px;background:white;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
        .conv-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
        .conv-title{font-size:14px;font-weight:800;margin:0;}
        .new-btn{display:flex;align-items:center;gap:4px;padding:6px 12px;background:var(--teal);color:white;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;}
        .conv-search{padding:10px 12px;border-bottom:1px solid var(--border);}
        .conv-search input{width:100%;padding:7px 12px;border:1.5px solid var(--border);border-radius:20px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;}
        .conv-search input:focus{border-color:var(--teal);}
        .conv-list{flex:1;overflow-y:auto;}
        .conv-item{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;border-bottom:1px solid #f8fafc;transition:background 0.15s;}
        .conv-item:hover{background:#f8fafc;}
        .conv-item.active{background:var(--teal-bg);border-left:3px solid var(--teal);}
        .conv-avatar{width:40px;height:40px;border-radius:50%;background:#004990;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:white;flex-shrink:0;position:relative;}
        .conv-avatar.partner-av{background:var(--teal);}
        .online-dot{position:absolute;bottom:1px;right:1px;width:9px;height:9px;border-radius:50%;background:#22c55e;border:2px solid white;}
        .conv-name{font-size:12px;font-weight:700;flex:1;}
        .conv-preview{font-size:11px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px;}
        .conv-meta{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
        .conv-time{font-size:10px;color:var(--muted);}
        .unread-badge{background:#ef4444;color:white;border-radius:99px;font-size:9px;font-weight:800;padding:1px 6px;}
        /* CHAT */
        .chat-col{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;position:relative;}
        .chat-header{background:white;padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;}
        .chat-av{width:36px;height:36px;border-radius:50%;background:#004990;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:white;flex-shrink:0;}
        .chat-name{font-size:14px;font-weight:800;}
        .chat-status{font-size:11px;color:var(--muted);}
        .chat-messages{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;padding:14px;display:flex;flex-direction:column;gap:8px;box-sizing:border-box;}
        .msg-wrap{display:flex;gap:8px;align-items:flex-end;width:100%;}
        .msg-wrap.mine{flex-direction:row-reverse;}
        .msg-av{width:28px;height:28px;border-radius:50%;background:#004990;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:10px;color:white;flex-shrink:0;}
        .msg-av.mine-av{background:var(--teal);}
        .msg-inner{display:flex;flex-direction:column;max-width:70%;min-width:0;}
        .msg-bubble{padding:9px 13px;border-radius:16px;font-size:13px;line-height:1.5;word-wrap:break-word;overflow-wrap:break-word;white-space:pre-wrap;}
        .msg-bubble.theirs{background:white;border:1px solid var(--border);border-bottom-left-radius:4px;color:var(--text);}
        .msg-bubble.mine{background:var(--teal);color:white;border-bottom-right-radius:4px;}
        .msg-time{font-size:9px;color:var(--muted);margin-top:3px;}
        .msg-time.mine-t{color:rgba(255,255,255,0.7);text-align:right;}
        .chat-input-row{background:white;padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end;flex-shrink:0;}
        .chat-input{flex:1;padding:9px 13px;border:1.5px solid var(--border);border-radius:20px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;resize:none;max-height:100px;overflow-y:auto;line-height:1.4;}
        .chat-input:focus{border-color:var(--teal);}
        .send-btn{width:36px;height:36px;background:var(--teal);color:white;border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.2s;}
        .send-btn:hover{background:var(--teal-dark);}
        .empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);}
        .empty-state .material-icons{font-size:52px;opacity:0.2;margin-bottom:10px;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .spinner{width:18px;height:18px;border:2px solid #e2e8f0;border-top-color:var(--teal);border-radius:50%;animation:spin 0.8s linear infinite;margin:20px auto;}
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-header">
        <img src="https://assets.cdn.filesafe.space/dfg08aPdtlQ1RhIKkCnN/media/66cf5cf28a35e448970f1ead.png" class="sidebar-logo">
        <div class="sidebar-partner">
            <div class="sidebar-avatar" id="sidebarAvatar">?</div>
            <div><div class="sidebar-name" id="sidebarName">Loading...</div><div class="sidebar-tag">Partner Portal</div></div>
        </div>
    </div>
    <nav class="sidebar-nav">
        <a class="nav-item" href="/partner/dashboard"><span class="material-icons">dashboard</span> Overview</a>
        <a class="nav-item" href="/partner/merchants"><span class="material-icons">storefront</span> My Merchants</a>
        <a class="nav-item" href="/partner/community"><span class="material-icons">groups</span> Community</a>
        <a class="nav-item active" href="/partner/messages"><span class="material-icons">forum</span> Messages<span id="navDmBadge" class="nav-badge" style="display:none"></span></a>
        <a class="nav-item" href="/partner/tickets"><span class="material-icons">confirmation_number</span> My Tickets</a>
        <a class="nav-item" href="/partner/profile"><span class="material-icons">account_circle</span> My Profile</a>
        <a class="nav-item" href="/partner/settings"><span class="material-icons">settings</span> Settings</a>
        <div class="nav-divider"></div>
        <button class="nav-item" onclick="handleLogout()"><span class="material-icons">logout</span> Sign Out</button>
    </nav>
</div>

<div class="main">
    <div class="conv-col">
        <div class="conv-header">
            <h2 class="conv-title">Messages</h2>
            <button class="new-btn" onclick="startNew()"><span class="material-icons" style="font-size:14px;">edit</span> New</button>
        </div>
        <div class="conv-search"><input type="text" placeholder="Search..." id="searchInput" oninput="filterList(this.value)"></div>
        <div class="conv-list" id="convList"><div class="spinner"></div></div>
    </div>
    <div class="chat-col" id="chatCol">
        <div class="empty-state">
            <span class="material-icons">forum</span>
            <div style="font-weight:700;font-size:14px;">Select a conversation</div>
            <div style="font-size:12px;margin-top:4px;">or tap New to message your team</div>
        </div>
    </div>
</div>

<script>
var token = localStorage.getItem('pp_partner_token');
var myId = localStorage.getItem('pp_partner_id');
var myName = localStorage.getItem('pp_partner_name') || '';
if (!token) window.location.href = '/partner';

var allUsers = [];
var activeId = null;
var activeUser = null;
var refreshTimer = null;
var chatPage = 0;
var loadedMsgIds = new Set();

// ── API ── uses /api/chat with sender_id = partner's person UUID and partner_token for auth
function chatApi(body) {
    return fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(Object.assign({ sender_id: myId, partner_token: token }, body))
    }).then(function(r) { return r.json(); });
}

function partnerApi(body) {
    return fetch('/api/partner-auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    }).then(function(r) { return r.json(); });
}

function ini(name) {
    return (name||'?').split(' ').filter(Boolean).map(function(w){return w[0];}).join('').toUpperCase().slice(0,2);
}
function timeAgo(d) {
    var diff = (Date.now()-new Date(d))/1000;
    if(diff<60) return 'now';
    if(diff<3600) return Math.floor(diff/60)+'m';
    if(diff<86400) return Math.floor(diff/3600)+'h';
    return new Date(d).toLocaleDateString(undefined,{month:'short',day:'numeric'});
}
function escHtml(s){ var d=document.createElement('div');d.textContent=s||'';return d.innerHTML; }

async function init() {
    var auth = await partnerApi({ action: 'validate', token });
    if (!auth.success) { localStorage.clear(); window.location.href='/partner'; return; }
    myId = auth.partner.id;
    myName = auth.partner.name;
    localStorage.setItem('pp_partner_id', myId);
    document.getElementById('sidebarAvatar').textContent = ini(myName);
    document.getElementById('sidebarName').textContent = myName;
    loadUserList();
    setInterval(loadUserList, 15000);
    // Check URL param
    var params = new URLSearchParams(window.location.search);
    var withId = params.get('with');
    if (withId) setTimeout(function(){ openById(withId); }, 800);
}

async function loadUserList() {
    var res = await chatApi({ action: 'getUserList' });
    if (!res.success) return;
    // Show everyone except self (staff + other partners)
    allUsers = (res.data || []).filter(function(u) {
        return u.id !== myId;
    });
    renderList(allUsers);
    // Update unread badge
    var totalUnread = allUsers.reduce(function(s,u){ return s+(u.unread||0); }, 0);
    var badge = document.getElementById('navDmBadge');
    if (badge) { badge.textContent = totalUnread; badge.style.display = totalUnread > 0 ? 'inline' : 'none'; }
}

function filterList(q) {
    if (!q) { renderList(allUsers); return; }
    renderList(allUsers.filter(function(u){ return u.name.toLowerCase().includes(q.toLowerCase()); }));
}

function renderList(users) {
    var el = document.getElementById('convList');
    if (!users.length) { el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px;">No conversations yet</div>'; return; }
    el.innerHTML = '';
    users.forEach(function(u) {
        var div = document.createElement('div');
        div.className = 'conv-item' + (activeId===u.id?' active':'');
        div.onclick = (function(usr){ return function(){ openConv(usr); }; })(u);
        var isStaff = u.user_type === 'staff';
        var av = document.createElement('div');
        av.className = 'conv-avatar' + (isStaff ? '' : ' partner-av');
        // Add type label
        av.textContent = ini(u.name);
        if (u.is_online) av.innerHTML += '<div class="online-dot"></div>';
        var info = document.createElement('div'); info.style.flex='1'; info.style.minWidth='0';
        var nameEl = document.createElement('div'); nameEl.className='conv-name';
        nameEl.textContent=u.name;
        var typeTag = document.createElement('span');
        typeTag.style.cssText = 'font-size:9px;padding:1px 5px;border-radius:99px;font-weight:800;margin-left:5px;background:' + (isStaff?'#e0f2fe':'#ccfbf1') + ';color:' + (isStaff?'#0369a1':'#0f766e') + ';';
        typeTag.textContent = isStaff ? 'STAFF' : 'PARTNER';
        nameEl.appendChild(typeTag);
        var prevEl = document.createElement('div'); prevEl.className='conv-preview'; prevEl.textContent=u.last_message?u.last_message.preview:'Start a conversation';
        info.appendChild(nameEl); info.appendChild(prevEl);
        var meta = document.createElement('div'); meta.className='conv-meta';
        if (u.last_message) { var t=document.createElement('div');t.className='conv-time';t.textContent=timeAgo(u.last_message.time);meta.appendChild(t); }
        if (u.unread>0) { var b=document.createElement('span');b.className='unread-badge';b.textContent=u.unread;meta.appendChild(b); }
        div.appendChild(av); div.appendChild(info); div.appendChild(meta);
        el.appendChild(div);
    });
}

function openConv(u) {
    activeId = u.id;
    activeUser = u;
    renderList(allUsers); // re-render active state
    clearInterval(refreshTimer);
    chatPage = 0;
    loadedMsgIds = new Set();
    // Build chat UI
    var col = document.getElementById('chatCol');
    var isStaff = u.user_type === 'staff';
    col.innerHTML = '<div class="chat-header">'
        + '<div class="chat-av">' + ini(u.name) + '</div>'
        + '<div><div class="chat-name">' + escHtml(u.name) + '</div>'
        + '<div class="chat-status">' + (u.is_online ? '<span style="color:#22c55e;font-weight:700;">● Online</span>' : (isStaff?'PayProTec Staff':'Partner')) + '</div></div>'
        + '</div>'
        + '<div class="chat-messages" id="chatMessages"><div class="spinner"></div></div>'
        + '<div class="chat-input-row">'
        + '<textarea class="chat-input" id="chatInput" placeholder="Type a message..." rows="1" onkeydown="onKey(event)"></textarea>'
        + '<button class="send-btn" onclick="sendMsg()"><span class="material-icons" style="font-size:18px;">send</span></button>'
        + '</div>';
    setTimeout(function() {
        loadMessages(true);
        refreshTimer = setInterval(function(){ loadMessages(false); }, 4000);
    }, 50);
}

async function openById(userId) {
    await loadUserList();
    var u = allUsers.find(function(x){ return x.id===userId; });
    if (u) { openConv(u); return; }
    // If not in list yet (no prior messages), create a stub
    var res = await chatApi({ action: 'getUserList' });
    var user = (res.data||[]).find(function(x){ return x.id===userId; });
    if (user) openConv(user);
}

function buildMsgEl(m) {
    var isMine = m.sender_id === myId;
    var wrap = document.createElement('div'); wrap.className = 'msg-wrap' + (isMine ? ' mine' : '');
    var av = document.createElement('div'); av.className = 'msg-av' + (isMine ? ' mine-av' : ''); av.textContent = ini(isMine ? myName : (activeUser ? activeUser.name : '?'));
    var inner = document.createElement('div'); inner.className = 'msg-inner';
    var bubble = document.createElement('div'); bubble.className = 'msg-bubble ' + (isMine ? 'mine' : 'theirs'); bubble.textContent = m.content || m.body || '';
    var t = document.createElement('div'); t.className = 'msg-time' + (isMine ? ' mine-t' : ''); t.textContent = new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    inner.appendChild(bubble); inner.appendChild(t);
    if (!isMine) { wrap.appendChild(av); wrap.appendChild(inner); }
    else { wrap.appendChild(inner); wrap.appendChild(av); }
    return wrap;
}

async function loadMessages(isInitial) {
    if (!activeId) return;
    var res = await chatApi({ action: 'getHistory', recipient_id: activeId, page: 0 });
    if (!res.success) return;
    var msgs = res.data || [];
    var el = document.getElementById('chatMessages');
    if (!el) return;

    if (isInitial) {
        el.innerHTML = '';
        loadedMsgIds = new Set();
        if (!msgs.length) {
            el.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:12px;padding:20px;">No messages yet. Say hello!</div>';
            return;
        }
        if (msgs.length >= 50) {
            var btn = document.createElement('div');
            btn.id = 'loadOlderBtn';
            btn.style.cssText = 'text-align:center;padding:8px 0 6px;';
            btn.innerHTML = '<button onclick="loadOlderMessages()" style="background:none;border:1px solid var(--border);border-radius:20px;padding:5px 16px;font-size:11px;font-weight:700;cursor:pointer;color:var(--muted);font-family:\'DM Sans\',sans-serif;">↑ Load older messages</button>';
            el.appendChild(btn);
        }
        msgs.forEach(function(m) {
            loadedMsgIds.add(m.id);
            el.appendChild(buildMsgEl(m));
        });
        el.scrollTop = el.scrollHeight;
    } else {
        // Poll: only append genuinely new messages
        var newMsgs = msgs.filter(function(m) { return !loadedMsgIds.has(m.id); });
        if (!newMsgs.length) return;
        var wasAtBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 60;
        newMsgs.forEach(function(m) {
            loadedMsgIds.add(m.id);
            el.appendChild(buildMsgEl(m));
        });
        if (wasAtBottom) el.scrollTop = el.scrollHeight;
        loadUserList();
    }
}

async function loadOlderMessages() {
    var btn = document.getElementById('loadOlderBtn');
    var btnEl = btn ? btn.querySelector('button') : null;
    if (btnEl) { btnEl.textContent = 'Loading...'; btnEl.disabled = true; }
    chatPage++;
    var res = await chatApi({ action: 'getHistory', recipient_id: activeId, page: chatPage });
    if (!res.success) {
        chatPage--;
        if (btnEl) { btnEl.textContent = '↑ Load older messages'; btnEl.disabled = false; }
        return;
    }
    var olderMsgs = res.data || [];
    var el = document.getElementById('chatMessages');
    if (!el) return;
    if (!olderMsgs.length) {
        if (btn) btn.remove();
        return;
    }
    var prevScrollHeight = el.scrollHeight;
    var fragment = document.createDocumentFragment();
    olderMsgs.forEach(function(m) {
        loadedMsgIds.add(m.id);
        fragment.appendChild(buildMsgEl(m));
    });
    // Insert older messages right after the "Load older" button
    if (btn && btn.nextSibling) {
        el.insertBefore(fragment, btn.nextSibling);
    } else if (btn) {
        el.appendChild(fragment);
    } else {
        el.insertBefore(fragment, el.firstChild);
    }
    // Maintain scroll position so user stays at same visual spot
    el.scrollTop = el.scrollHeight - prevScrollHeight;
    if (olderMsgs.length < 50) {
        if (btn) btn.remove();
    } else {
        if (btnEl) { btnEl.textContent = '↑ Load older messages'; btnEl.disabled = false; }
    }
}

function onKey(e) { if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMsg(); } }

async function sendMsg() {
    var input = document.getElementById('chatInput');
    var content = input ? input.value.trim() : '';
    if (!content || !activeId) return;
    input.value = ''; input.style.height='auto';
    await chatApi({ action: 'sendMessage', recipient_id: activeId, content });
    loadMessages(false);
    loadUserList();
}

async function startNew() {
    await loadUserList();
    var others = allUsers; // all users except self
    if (!others.length) { alert('No staff members available yet.'); return; }
    var opts = others.map(function(u){
        var tag = u.user_type==='staff' ? ' (Staff)' : ' (Partner)';
        return '<option value="'+u.id+'" data-type="'+u.user_type+'">'+escHtml(u.name)+tag+'</option>';
    }).join('');
    // Simple select UI
    var sel = document.createElement('select');
    sel.style.cssText='width:100%;padding:10px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;outline:none;';
    sel.innerHTML = opts;
    // Quick Swal
    var swal = window.Swal || null;
    if (swal) {
        var res = await swal.fire({ title:'New Message', html:sel.outerHTML, showCancelButton:true, confirmButtonColor:'#0d9488', confirmButtonText:'Open Chat',
            preConfirm:function(){ var s=document.querySelector('.swal2-popup select'); return s?s.value:null; }});
        if (res.isConfirmed && res.value) {
            var u = others.find(function(x){ return x.id===res.value; });
            if (u) openConv(u);
        }
    } else {
        var u = others[0]; openConv(u);
    }
}

function handleLogout() {
    fetch('/api/partner-auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'logout',token})});
    localStorage.clear(); window.location.href='/partner';
}

window.onload = init;
</script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="/js/site-config.js"></script>
<script src="/js/partner-nav.js"></script>
</body>
</html>
