<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Merchant Portfolio | Secure Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="icon" type="image/png" href="/images/favicon-32x32.png" sizes="32x32" />
    <style>
        :root { --pp-blue: #004990; --pp-accent: #00a1e0; }
        body { background: #f1f5f9; padding: 25px; font-family: 'Inter', sans-serif; }
        .dashboard-container { max-width: 1600px; margin: 0 auto; }
        
        .modern-header { background: white; border-radius: 16px; padding: 25px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .summary-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 20px; }
        .kpi-card { background: white; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 15px; }
        .kpi-val { font-size: 1.3rem; font-weight: 800; color: #002d5a; display: block; }
        .kpi-label { font-size: 0.65rem; font-weight: 700; color: #64748b; text-transform: uppercase; }

        .main-card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .slds-table thead th { background-color: #f8fafc !important; font-weight: 700 !important; color: #475569 !important; padding: 12px !important; }
        
        .badge { font-weight: 800; font-size: 9px; padding: 4px 10px; border-radius: 4px; text-transform: uppercase; display: inline-block; }
        .status-approved { background: #dcfce7; color: #166534; }
        .status-closed { background: #fee2e2; color: #991b1b; }
        .status-fraud { background: #1e293b; color: #ffffff; }

        .modal-tab-btn { 
    padding: 10px 15px; /* Reduced padding slightly */
    border: none; 
    background: none; 
    font-weight: 700; 
    color: #94a3b8; 
    cursor: pointer; 
    border-bottom: 3px solid transparent; 
    transition: 0.3s;
    flex: 1; /* This makes all buttons take equal available space */
    white-space: nowrap; /* Prevents the text from wrapping to a second line */
    font-size: 11px; /* Uniform font size */
    text-align: center;
}
        #modalTabContainer {
    display: flex; 
    border-bottom: 1px solid #e2e8f0; 
    margin-bottom: 20px;
    width: 100%;
}
        .active-tab { color: var(--pp-blue) !important; border-bottom-color: var(--pp-blue) !important; }
        .modern-input { border-radius: 8px !important; border: 1px solid #cbd5e1 !important; padding: 8px 12px !important; width: 100%; font-size: 0.8rem; margin-bottom: 8px; }
        .edit-label { font-size: 9px; font-weight: 700; color: #64748b; margin-bottom: 3px; display: block; text-transform: uppercase; }
        .section-header { grid-column: span 3; font-size: 10px; font-weight: 800; color: var(--pp-blue); text-transform: uppercase; border-bottom: 1px solid #eee; padding: 15px 0 5px; margin-bottom: 10px; }
        
        /* SURGICAL ADD: Lifecycle Styles */
        .lifecycle-item { border-left: 2px solid #e2e8f0; margin-left: 10px; padding-left: 20px; padding-bottom: 20px; position: relative; }
        .lifecycle-dot { position: absolute; left: -6px; top: 0; width: 10px; height: 10px; background: var(--pp-blue); border-radius: 50%; }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .slds-button_neutral:hover {
            background-color: #f8fafc !important;
            border-color: var(--pp-blue) !important;
            color: var(--pp-blue) !important;
        }
        .prime-badge {
    background: #fffbeb; 
    color: #b45309; 
    border: 1px solid #fcd34d;
    font-size: 9px;
    font-weight: 900;
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: 8px;
    vertical-align: middle;
}
.prime-row {
    background-color: #fffdf5 !important; /* Very subtle gold tint for the whole row */
}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script>
    (function() {
        // 1. Check if a session exists in LocalStorage
        const sessionUser = localStorage.getItem('pp_userid');
        const isVerified = localStorage.getItem('pp_verified');

        // 2. If no session, boot them to the login page immediately
        if (!sessionUser || isVerified !== 'true') {
            window.location.href = 'index.html?reason=unauthorized';
        }
    })();
</script>
</head>
<body>

<div class="dashboard-container">
    <div class="modern-header">
       <div style="display: flex; align-items: center; gap: 15px;">
    <a href="index.html" class="slds-button slds-button_neutral" style="display: flex; align-items: center; gap: 8px; border-radius: 10px; padding: 5px 15px; border: 1px solid #cbd5e1; text-decoration: none; color: #475569;">
        <span class="material-icons" style="font-size: 18px;">arrow_back</span>
        <span style="font-weight: 700; font-size: 12px;">BACK TO HOME</span>
    </a>
    
    <div>
        <h1 style="font-size: 1.6rem; font-weight: 800; color: #002d5a; margin: 0;">Merchant Portfolio</h1>
    </div>
</div>
        <div style="display: flex; gap: 10px;">
            <select id="statusFilter" class="slds-select" style="width: 170px; border-radius:10px;" onchange="resetAndFetch()">
               <option value="">All Statuses</option>
                <option value="Approved">Approved</option>
                <option value="Approved - Collections">Approved - Collections</option>
                <option value="Closed">Closed</option>
                <option value="Closed - Collections">Closed - Collections</option>
                <option value="Closed - Risk">Closed - Risk</option>
                <option value="Collections">Collections</option>
                <option value="Declined">Declined</option>
                <option value="Enrollment">Enrollment</option>
                <option value="Fraud">Fraud</option>
                <option value="Pending">Pending</option>
                <option value="Withdrawn">Withdrawn</option>
            </select>
            <select id="filterBy" class="slds-select" style="width: 150px; border-radius:10px;">
                <option value="dba_name">DBA Name</option>
                <option value="merchant_id">MID</option>
                <option value="agent_id">Partner ID</option>
                <option value="company_name">Company Name</option>
                <option value="partner_name">Partner Name</option>
            </select>
            <input type="text" id="searchInput" placeholder="Search..." class="slds-input" style="width:200px; border-radius:10px;">
            <button class="slds-button slds-button_brand" style="border-radius:10px; background:var(--pp-blue);" onclick="resetAndFetch()">Search</button>
            <button class="slds-button slds-button_neutral" 
        style="border-radius:10px; display:flex; align-items:center; gap:5px; border: 1px solid #166534; color: #166534;" 
        onclick="document.getElementById('csvFileInput').click()">
    <span class="material-icons" style="font-size:18px;">upload_file</span>
    CSV BULK UPDATE
</button>
<input type="file" id="csvFileInput" accept=".csv" style="display:none;" onchange="handleCSVUpload(this)">
        </div>
    </div>

    <div class="summary-bar">
        <div class="kpi-card"><div><span class="kpi-label">Filtered MTD</span><span class="kpi-val" id="mtd-val">$0.00</span></div></div>
        <div class="kpi-card"><div><span class="kpi-label">Total 30D</span><span class="kpi-val" id="30d-val">$0.00</span></div></div>
        <div class="kpi-card"><div><span class="kpi-label">Total 90D</span><span class="kpi-val" id="90d-val">$0.00</span></div></div>
        <div class="kpi-card" style="background:var(--pp-blue); color:white; border:none;"><div><span class="kpi-label" style="color:rgba(255,255,255,0.7);">Share</span><span class="kpi-val" id="share-val" style="color:white;">0.00%</span></div></div>
    </div>

    <article class="main-card">
        <table class="slds-table slds-table_bordered slds-table_cell-buffer slds-no-row-hover">
            <thead>
                <tr>
                    <th>DBA Name</th>
                    <th>Merchant ID</th>
                    <th>Partner ID</th>
                    <th>Company</th>
                    <th>Partner Name</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="merchantTableBody"></tbody>
        </table>
        <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center; background: #f8fafc;">
            <select id="pageLimit" onchange="resetAndFetch()"><option value="20">20</option><option value="50">50</option></select>
            <div id="pageInfo" style="font-weight:700; font-size: 12px; color: var(--pp-blue);">Page 1</div>
            <div>
                <button class="slds-button slds-button_neutral" id="prevBtn" onclick="changePage(-1)">Prev</button>
                <button class="slds-button slds-button_neutral" id="nextBtn" onclick="changePage(1)">Next</button>
            </div>
        </div>
    </article>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    let currentPage = 0;
    let currentRecords = [];

    // --- RESTORED: Audit & Task Management ---
    async function logAuditAction(action, details) {
        const userEmail = localStorage.getItem('pp_userid');
        try {
            await fetch('/api/logs', { method: 'POST', headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify({ email: userEmail || 'Unknown Admin', action: action, status: details })});
        } catch (err) { console.error(err); }
    }

    async function fetchMerchants() {
        const tbody = document.getElementById('merchantTableBody');
        const limit = document.getElementById('pageLimit').value;
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:60px; color:#94a3b8;">Synchronizing Ledger...</td></tr>`;

        try {
            const res = await fetch('/api/merchants', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'list', page: currentPage, limit: limit, query: document.getElementById('searchInput').value, filterBy: document.getElementById('filterBy').value, statusFilter: document.getElementById('statusFilter').value })
            });
            const result = await res.json();
            currentRecords = result.data;
            renderMerchantTable(result);
        } catch (err) { console.error(err); }
    }

    function renderMerchantTable(result) {
        const tbody = document.getElementById('merchantTableBody');
        tbody.innerHTML = "";
        currentRecords.forEach(m => {
            const row = tbody.insertRow();
            if (m.is_prime49) row.classList.add('prime-row');
            const s = (m.account_status || '').toLowerCase();
            const statusClass = s.includes('approved') ? 'status-approved' : s.includes('closed') ? 'status-closed' : s.includes('fraud') ? 'status-fraud' : '';
            
            // RESTORED: DBA, MID, Partner ID, COMPANY, Partner Name, Status
            row.innerHTML = `
                <td><a onclick="openModal('${m.id}')" style="font-weight:700; color:var(--pp-blue); cursor:pointer;">${m.dba_name || '---'}</a> ${m.is_prime49 ? '<span class="prime-badge">PRIME49</span>' : ''}</td>
                <td><code>${m.merchant_id || '---'}</code></td>
                <td>${m.agent_id || '---'}</td>
                <td>${m.company_name || '---'}</td> 
                <td>${m.partner_name || '---'}</td>
                <td><span class="badge ${statusClass}">${m.account_status || '---'}</span></td>
            `;
        });
        document.getElementById('pageInfo').innerHTML = `Page ${currentPage + 1} <span>(Total: ${result.count.toLocaleString()})</span>`;
    }

    // --- NEW: CSV Manual Mapping & Smart Scan Logic ---
    async function handleCSVUpload(input) {
        const file = input.files[0];
        if (!file) return;
        Papa.parse(file, { header: true, skipEmptyLines: true, complete: function(results) { showMapperModal(results.data, results.meta.fields); }});
    }

    function showMapperModal(data, csvHeaders) {
        const dbFields = [
            {key: 'merchant_id', label: 'MID (Required)'},
            {key: 'dba_name', label: 'DBA Name'},
            {key: 'company_name', label: 'Company Name'},
            {key: 'merchant_address', label: 'Street Address'},
            {key: 'merchant_city', label: 'City'},
            {key: 'merchant_state', label: 'State'},
            {key: 'merchant_zip', label: 'Zip Code'},
            {key: 'merchant_phone', label: 'Phone'}
        ];
        let mapperHtml = `<div style="text-align:left; font-size:12px; color:#64748b; margin-bottom:15px;">Link your CSV columns to the system fields:</div>`;
        dbFields.forEach(field => {
            mapperHtml += `<div style="margin-bottom:10px; display:grid; grid-template-columns: 1fr 1fr; gap:10px; align-items:center;">
                <label style="font-weight:700; font-size:11px;">${field.label}</label>
                <select id="map-${field.key}" class="slds-select" style="height:32px; border-radius:8px;">
                    <option value="">-- Ignore --</option>
                    ${csvHeaders.map(h => `<option value="${h}" ${h.toLowerCase() === field.key.toLowerCase() ? 'selected' : ''}>${h}</option>`).join('')}
                </select>
            </div>`;
        });
        Swal.fire({ title: 'Map CSV Columns', html: mapperHtml, showCancelButton: true, preConfirm: () => {
            const mapping = {}; dbFields.forEach(f => { mapping[f.key] = document.getElementById(`map-${f.key}`).value; });
            if (!mapping.merchant_id) return Swal.showValidationMessage('MID is required');
            return mapping;
        }}).then((r) => { if (r.isConfirmed) processScanAndReview(data, r.value); });
    }

    async function processScanAndReview(csvData, mapping) {
        Swal.fire({ title: 'Scanning Database...', didOpen: () => Swal.showLoading() });
        const mappedData = csvData.map(row => {
            let item = {}; for (let key in mapping) { if (mapping[key]) item[key] = row[mapping[key]]; }
            return item;
        }).filter(i => i.merchant_id);

        const res = await fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, 
        body: JSON.stringify({ action: 'check_mids', mids: mappedData.map(m => m.merchant_id) })});
        const { existingMids } = await res.json();

        let updates = mappedData.filter(m => existingMids.includes(String(m.merchant_id)));
        let creates = mappedData.filter(m => !existingMids.includes(String(m.merchant_id)));

        Swal.fire({
            title: 'Confirm Bulk Sync',
            width: '800px',
            html: `<div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:20px;">
                <div style="background:#f0f9ff; padding:15px; border-radius:12px;"><b>${updates.length}</b> Updates</div>
                <div style="background:#f0fdf4; padding:15px; border-radius:12px;"><b>${creates.length}</b> New Records</div>
            </div>`,
            showCancelButton: true, confirmButtonText: 'Start Sync'
        }).then((r) => { if (r.isConfirmed) executeFinalUpsert(mappedData); });
    }

    async function executeFinalUpsert(payload) {
        const res = await fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, 
        body: JSON.stringify({ action: 'bulk_upsert', payload })});
        if ((await res.json()).success) { Swal.fire('Success', 'Sync complete', 'success'); fetchMerchants(); }
    }

    // --- RESTORED: Modal, Tabs, Save Logic ---
    window.saveMerchant = async (uuid) => {
        const fields = ['dba_name', 'account_status', 'email', 'merchant_phone', 'merchant_address', 'merchant_city', 'merchant_state', 'merchant_zip', 'merchant_country'];
        const payload = {}; fields.forEach(f => { const el = document.getElementById('edit-' + f); if(el) payload[f] = el.value; });
        const res = await fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'update', id: uuid, payload }) });
        if ((await res.json()).success) { Swal.fire('Saved', '', 'success'); fetchMerchants(); }
    };

    window.switchTab = (tab) => {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.modal-tab-btn').forEach(t => t.classList.remove('active-tab'));
        document.getElementById('content-' + tab).style.display = 'block';
        document.getElementById('tab-' + tab).classList.add('active-tab');
    };

    window.onload = fetchMerchants;
</script>
</body>
</html>
