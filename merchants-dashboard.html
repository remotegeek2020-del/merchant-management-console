<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Merchant Portfolio | Secure Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --pp-blue: #004990; --pp-accent: #00a1e0; }
        body { background: #f1f5f9; padding: 25px; font-family: 'Inter', sans-serif; }
        .dashboard-container { max-width: 1600px; margin: 0 auto; }
        
        .modern-header { background: white; border-radius: 16px; padding: 25px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .summary-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 20px; }
        .kpi-card { background: white; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 15px; }
        .kpi-val { font-size: 1.3rem; font-weight: 800; color: #002d5a; display: block; }
        .kpi-label { font-size: 0.65rem; font-weight: 700; color: #64748b; text-transform: uppercase; }

        .main-card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .slds-table thead th { background-color: #f8fafc !important; font-weight: 700 !important; color: #475569 !important; padding: 12px !important; }
        
        .badge { font-weight: 800; font-size: 9px; padding: 4px 10px; border-radius: 4px; text-transform: uppercase; display: inline-block; }
        .status-approved { background: #dcfce7; color: #166534; }
        .status-closed { background: #fee2e2; color: #991b1b; }
        .status-fraud { background: #1e293b; color: #ffffff; }

        .modal-tab-btn { 
    padding: 10px 15px; /* Reduced padding slightly */
    border: none; 
    background: none; 
    font-weight: 700; 
    color: #94a3b8; 
    cursor: pointer; 
    border-bottom: 3px solid transparent; 
    transition: 0.3s;
    flex: 1; /* This makes all buttons take equal available space */
    white-space: nowrap; /* Prevents the text from wrapping to a second line */
    font-size: 11px; /* Uniform font size */
    text-align: center;
}
        #modalTabContainer {
    display: flex; 
    border-bottom: 1px solid #e2e8f0; 
    margin-bottom: 20px;
    width: 100%;
}
        .active-tab { color: var(--pp-blue) !important; border-bottom-color: var(--pp-blue) !important; }
        .modern-input { border-radius: 8px !important; border: 1px solid #cbd5e1 !important; padding: 8px 12px !important; width: 100%; font-size: 0.8rem; margin-bottom: 8px; }
        .edit-label { font-size: 9px; font-weight: 700; color: #64748b; margin-bottom: 3px; display: block; text-transform: uppercase; }
        .section-header { grid-column: span 3; font-size: 10px; font-weight: 800; color: var(--pp-blue); text-transform: uppercase; border-bottom: 1px solid #eee; padding: 15px 0 5px; margin-bottom: 10px; }
        
        /* SURGICAL ADD: Lifecycle Styles */
        .lifecycle-item { border-left: 2px solid #e2e8f0; margin-left: 10px; padding-left: 20px; padding-bottom: 20px; position: relative; }
        .lifecycle-dot { position: absolute; left: -6px; top: 0; width: 10px; height: 10px; background: var(--pp-blue); border-radius: 50%; }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .slds-button_neutral:hover {
            background-color: #f8fafc !important;
            border-color: var(--pp-blue) !important;
            color: var(--pp-blue) !important;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>

<div class="dashboard-container">
    <div class="modern-header">
       <div style="display: flex; align-items: center; gap: 15px;">
    <a href="index.html" class="slds-button slds-button_neutral" style="display: flex; align-items: center; gap: 8px; border-radius: 10px; padding: 5px 15px; border: 1px solid #cbd5e1; text-decoration: none; color: #475569;">
        <span class="material-icons" style="font-size: 18px;">arrow_back</span>
        <span style="font-weight: 700; font-size: 12px;">BACK TO HOME</span>
    </a>
    
    <div>
        <h1 style="font-size: 1.6rem; font-weight: 800; color: #002d5a; margin: 0;">Merchant Portfolio</h1>
    </div>
</div>
        <div style="display: flex; gap: 10px;">
            <select id="statusFilter" class="slds-select" style="width: 170px; border-radius:10px;" onchange="resetAndFetch()">
               <option value="">All Statuses</option>
                <option value="Approved">Approved</option>

                <option value="Closed">Closed</option>
                <option value="Closed - Collections">Closed - Collections</option>

                <option value="Declined">Declined</option>

                <option value="Fraud">Fraud</option>

            <select id="filterBy" class="slds-select" style="width: 150px; border-radius:10px;">

        style="border-radius:10px; display:flex; align-items:center; gap:5px; border: 1px solid #166534; color: #166534;" 
        onclick="document.getElementById('csvFileInput').click()">

    CSV BULK UPDATE
</button>
<input type="file" id="csvFileInput" accept=".csv" style="display:none;" onchange="handleCSVUpload(this)">

    </div>

    <div class="summary-bar">
        <div class="kpi-card"><div><span class="kpi-label">Filtered MTD</span><span class="kpi-val" id="mtd-val">$0.00</span></div></div>
        <div class="kpi-card"><div><span class="kpi-label">Total 30D</span><span class="kpi-val" id="30d-val">$0.00</span></div></div>
        <div class="kpi-card"><div><span class="kpi-label">Total 90D</span><span class="kpi-val" id="90d-val">$0.00</span></div></div>
        <div class="kpi-card" style="background:var(--pp-blue); color:white; border:none;"><div><span class="kpi-label" style="color:rgba(255,255,255,0.7);">Share</span><span class="kpi-val" id="share-val" style="color:white;">0.00%</span></div></div>
    </div>

    <article class="main-card">
        <table class="slds-table slds-table_bordered slds-table_cell-buffer slds-no-row-hover">
            <thead>
                <tr>
                    <th>DBA Name</th>
                    <th>Merchant ID</th>
                    <th>Partner ID</th>
                    <th>Company</th>

            <tbody id="merchantTableBody"></tbody>
        </table>
        <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center; background: #f8fafc;">

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    let currentPage = 0;
    let currentRecords = [];

async function deleteTaskConfirm(taskId) {
    const result = await Swal.fire({
        title: 'Delete Task?',
        text: "This action cannot be undone.",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#991b1b',
        confirmButtonText: 'Yes, delete it'
    });

    if (result.isConfirmed) {
        const res = await fetch('/api/merchants', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'delete_task', task_id: taskId })
        });
        if ((await res.json()).success) {
            Swal.close(); 
            fetchMerchantTasks();
            Swal.fire('Deleted!', 'Task removed.', 'success');
        }
    }
}

async function editTaskPrompt(taskId, currentTitle, currentBody, currentDue) {
    const { value: formValues, isDismissed } = await Swal.fire({
        title: '<div style="font-weight:800; color:#002d5a;">Update Task</div>',
        width: '500px',
        html: `
            <div style="text-align:left; padding:10px;">
                <label class="edit-label">Task Title</label>
                <input id="swal-task-title" class="modern-input" value="${currentTitle}">
                
                <label class="edit-label" style="margin-top:15px;">Due Date</label>
                <input type="date" id="swal-task-due" class="modern-input" value="${currentDue || ''}">
                
                <label class="edit-label" style="margin-top:15px;">Task Details</label>
                <textarea id="swal-task-body" class="modern-input" style="height:80px; resize:none;">${currentBody}</textarea>
                
                <hr style="margin: 20px 0 10px 0;">
                <button type="button" onclick="deleteTaskConfirm('${taskId}')" 
                        style="width:100%; background:#fee2e2; color:#991b1b; border:1px solid #fecaca; padding:10px; border-radius:8px; font-weight:700; cursor:pointer; font-size:11px;">
                    <span class="material-icons" style="font-size:14px; vertical-align:middle;">delete_forever</span>
                    PERMANENTLY DELETE TASK
                </button>
            </div>
        `,
        showCancelButton: true,
        confirmButtonColor: '#004990',
        confirmButtonText: 'SAVE CHANGES',
        preConfirm: () => {
            return {
                title: document.getElementById('swal-task-title').value,
                due_date: document.getElementById('swal-task-due').value,
                body: document.getElementById('swal-task-body').value
            }
        }
    });

    if (formValues) {
        // Logic to save updates
        const res = await fetch('/api/merchants', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'update_task', task_id: taskId, payload: formValues })
        });
        if ((await res.json()).success) {
            Swal.fire({ icon: 'success', title: 'Updated', timer: 1000, showConfirmButton: false });
            fetchMerchantTasks();
        }
    }
}

    if (formValues) {
        Swal.fire({ title: 'Updating...', didOpen: () => Swal.showLoading() });
        try {
            const res = await fetch('/api/merchants', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    action: 'update_task', 
                    task_id: taskId, 
                    payload: formValues 
                })
            });
            const result = await res.json();
            if (result.success) {
                Swal.fire({ icon: 'success', title: 'Task Updated', timer: 1000, showConfirmButton: false });
                fetchMerchantTasks(); // Refresh list to show new date/title
            }
        } catch (err) { 
            Swal.fire('Error', 'Update failed', 'error');
        }
    }
}

    async function toggleTaskStatus(taskId, merchantUuid) {
    try {
        const res = await fetch('/api/merchants', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'update_task_status', task_id: taskId })
        });
        const result = await res.json();
        if (result.success) {
            fetchMerchantTasks(); // Refresh the list
        }
    } catch (err) {
        console.error("Task update failed:", err);
    }
}
async function fetchMerchantTasks() {
    const saveBtn = document.querySelector('[onclick^="saveMerchant"]');
    if (!saveBtn) return;
    const merchantUuid = saveBtn.getAttribute('onclick').match(/'([^']+)'/)[1];
    const listDiv = document.getElementById('tasks-list');
    
    try {
        const res = await fetch('/api/merchants', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'get_tasks', merchant_uuid: merchantUuid })
        });
        const result = await res.json();
        
        const html = result.data && result.data.length > 0 
            ? result.data.map(t => `
                <div style="background:white; border:1px solid #e2e8f0; border-radius:12px; padding:15px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                    <div style="flex-grow: 1;">
                        <div style="font-weight:800; color:#002d5a; font-size:13px;">${t.title}</div>
                        <div style="font-size:11px; color:#64748b; margin-bottom:5px;">${t.body || ''}</div>
                        <div style="display:flex; gap:10px; align-items:center;">
                            <span class="badge" style="background:#fee2e2; color:#991b1b; border:1px solid #fecaca;">Due: ${t.due_date || 'N/A'}</span>
                            <span style="font-size:10px; color:#94a3b8;">Assignee: <b>${t.assignee_name || 'Unassigned'}</b></span>
                        </div>
                    </div>
                    <div style="display:flex; align-items:center; gap:12px;">
                       <button onclick="editTaskPrompt('${t.id}', '${t.title.replace(/'/g, "\\'")}', '${(t.body || '').replace(/'/g, "\\'")}', '${t.due_date || ''}')" 
        style="background:none; border:none; color:var(--pp-blue); cursor:pointer;">
    <span class="material-icons" style="font-size:18px;">edit</span>
</button>
                        <input type="checkbox" style="width:20px; height:20px; cursor:pointer;" onclick="toggleTaskStatus('${t.id}', '${merchantUuid}')" ${t.status === 'Completed' ? 'checked' : ''}>
                    </div>
                </div>`).join('')
            : '<p style="text-align:center; color:#94a3b8; padding:20px;">No pending tasks.</p>';

        listDiv.innerHTML = html;
    } catch (err) { 
        console.error(err); 
        listDiv.innerHTML = '<p style="text-align:center; color:red;">Error loading tasks.</p>';
    }
}

async function addTask(merchantUuid) {
    // 1. Grab values from the Swal modal inputs
    const title = document.getElementById('task-title')?.value;
    const body = document.getElementById('task-body')?.value;
    const due = document.getElementById('task-due')?.value;
    const assigned = document.getElementById('task-assign-select')?.value;

    // 2. Client-side validation
    if (!merchantUuid || merchantUuid === 'undefined') {
        return Swal.fire('Error', 'Internal Error: Merchant ID not found.', 'error');
    }
    if (!title) {
        return Swal.fire('Required', 'Please provide a task title.', 'warning');
    }

    Swal.fire({ title: 'Saving Task...', didOpen: () => Swal.showLoading() });

    try {
        const res = await fetch('/api/merchants', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                action: 'add_task', 
                merchant_uuid: merchantUuid, 
                title, 
                body, 
                due_date: due || null, 
                assigned_to: assigned || null, 
                created_by: sessionStorage.getItem('pp_userid') || 'System'
            })
        });

        const result = await res.json();
        
       if (result.success) {
    Swal.fire({ icon: 'success', title: 'Task Created', timer: 1500, showConfirmButton: false });
    
    // SAFE RESET: The ?. prevents the "Cannot set properties of null" error
    document.getElementById('task-title')?.setAttribute('value', ''); 
    if(document.getElementById('task-title')) document.getElementById('task-title').value = '';
    
    document.getElementById('task-body')?.setAttribute('value', '');
    if(document.getElementById('task-body')) document.getElementById('task-body').value = '';
    
    document.getElementById('task-due')?.setAttribute('value', '');
    if(document.getElementById('task-due')) document.getElementById('task-due').value = '';

    // Refresh the list to show the new task
    fetchMerchantTasks(); 
}
       else {
            // This will show the actual database error (e.g., "invalid input syntax for type uuid")
            throw new Error(result.message || "Database rejected the entry");
        }
    } catch (err) {
        console.error("Task Save Error:", err);
        Swal.fire('Error', 'Failed to save task: ' + err.message, 'error');
    }
}

    
async function handleCSVUpload(input) {
    const file = input.files[0];
    if (!file) return;

    Swal.fire({
        title: 'Processing CSV...',
        html: 'Reading records and preparing upsert...',
        allowOutsideClick: false,
        didOpen: () => { Swal.showLoading(); }
    });

    Papa.parse(file, {
        header: true,
        skipEmptyLines: true,
        complete: async function(results) {
            try {
                const res = await fetch('/api/merchants', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        action: 'bulk_upsert', 
                        payload: results.data 
                    })
                });
                const result = await res.json();
                
                if (result.success) {
                    Swal.fire('Success', `Processed ${results.data.length} records successfully.`, 'success');
                    fetchMerchants();
                } else {
                    throw new Error(result.message);
                }
            } catch (err) {
                Swal.fire('Import Failed', err.message, 'error');
            } finally {
                input.value = ''; // Reset input
            }
        }
    });
}
    async function fetchMerchants() {
        const tbody = document.getElementById('merchantTableBody');
        const limit = document.getElementById('pageLimit').value;
        
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:60px; color:#94a3b8;">
            <div style="margin-bottom:10px;"><span class="material-icons" style="animation: spin 2s linear infinite;">sync</span></div>
            Synchronizing Ledger...
        </td></tr>`;

        try {
            const res = await fetch('/api/merchants', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'list', page: currentPage, limit: limit, query: document.getElementById('searchInput').value, filterBy: document.getElementById('filterBy').value, statusFilter: document.getElementById('statusFilter').value })
            });
            const result = await res.json();
            currentRecords = result.data;

        if (result.metrics) {
            document.getElementById('mtd-val').innerText = new Intl.NumberFormat('en-US', {
                style: 'currency', currency: 'USD'
            }).format(result.metrics.totalMTD || 0);

            document.getElementById('30d-val').innerText = new Intl.NumberFormat('en-US', {
                style: 'currency', currency: 'USD'
            }).format(result.metrics.total30D || 0);

            document.getElementById('90d-val').innerText = new Intl.NumberFormat('en-US', {
                style: 'currency', currency: 'USD'
            }).format(result.metrics.total90D || 0);

            document.getElementById('share-val').innerText = `${result.metrics.portfolioShare || '0.00'}%`;
        }
            tbody.innerHTML = "";
            currentRecords.forEach(m => {
                const row = tbody.insertRow();
                const s = (m.account_status || '').toLowerCase();
                const statusClass = s.includes('approved') ? 'status-approved' : s.includes('closed') ? 'status-closed' : s.includes('fraud') ? 'status-fraud' : '';
                row.innerHTML = `
                    <td><a onclick="openModal('${m.id}')" style="font-weight:700; color:var(--pp-blue); cursor:pointer;">${m.dba_name || '---'}</a></td>
                    <td><code>${m.merchant_id || '---'}</code></td>
                    <td>${m.agent_id || '---'}</td>
                    <td>${m.company_name || '---'}</td>
                    <td>${m.partner_name || '---'}</td>
                    <td><span class="badge ${statusClass}">${m.account_status || '---'}</span></td>
                `;
            });
            document.getElementById('pageInfo').innerHTML = `Page ${currentPage + 1} <span style="font-weight:400; color:#94a3b8; margin-left:10px;">(Total Found: ${result.count.toLocaleString()})</span>`;
        } catch (err) { console.error(err); }
    }

   async function openModal(id) {
    const m = currentRecords.find(r => r.id === id);
    if (!m) return;
    Swal.fire({ title: 'Loading...', didOpen: () => { Swal.showLoading(); } });

    try {
        // 1. Fetch all data including the new Staff list from app_users
        const [nRes, lRes, aRes, sRes] = await Promise.all([
            fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'get_notes', merchant_uuid: m.id, type: 'manual' }) }),
            fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'get_notes', merchant_uuid: m.id, type: 'system' }) }),
            fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'get_attachments', merchant_uuid: m.id }) }),
            fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'get_staff' }) })
        ]);
        
        const notes = (await nRes.json()).data || [];
        const logs = (await lRes.json()).data || [];
        const files = (await aRes.json()).data || [];
        const staff = (await sRes.json()).data || []; //

        Swal.fire({
            title: `<div style="text-align:left; font-weight:800; color:#002d5a;">${m.dba_name}</div>`,
            width: '1100px',
            html: `
                <div style="display:flex; border-bottom:1px solid #e2e8f0; margin-bottom:20px;">
                    <button onclick="switchTab('details')" id="tab-details" class="modal-tab-btn active-tab">DETAILS</button>
                    <button onclick="switchTab('equipment')" id="tab-equipment" class="modal-tab-btn">EQUIPMENT</button>
                    <button onclick="switchTab('lifecycle')" id="tab-lifecycle" class="modal-tab-btn">LIFECYCLE</button>
                    <button onclick="switchTab('notes')" id="tab-notes" class="modal-tab-btn">INTERNAL NOTES</button>
                    <button onclick="switchTab('tasks')" id="tab-tasks" class="modal-tab-btn">TASKS</button>
                    <button onclick="switchTab('attachments')" id="tab-attachments" class="modal-tab-btn">ATTACHMENTS</button>
                    <button onclick="switchTab('audit')" id="tab-audit" class="modal-tab-btn">AUDIT HISTORY</button>
                </div>

                <div id="content-details" class="tab-content" style="text-align:left; max-height:650px; overflow-y:auto; padding-right:15px;">
                    <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:12px;">
                        <div class="field-section-title" style="grid-column: span 3; font-weight:800; color:#004990; border-bottom:1px solid #eee; margin-top:15px; text-transform:uppercase; font-size:10px;">Core Identity & Status</div>
                        <div><label class="edit-label">DBA Name</label><input id="edit-dba_name" class="modern-input" value="${m.dba_name || ''}"></div>
                        <div><label class="edit-label">Merchant ID (Locked)</label><input class="modern-input" value="${m.merchant_id || ''}" disabled style="background:#f8fafc;"></div>
                        <div>
                            <label class="edit-label">Account Status</label>
                            <select id="edit-account_status" class="modern-input">
                                <option value="${m.account_status}" selected>${m.account_status}</option>
                                <option value="Approved">Approved</option>
                                <option value="Approved - Collections">Approved - Collections</option>

    // SURGICAL ADD: fetchMerchantLifecycle function
   async function fetchMerchantLifecycle() {
    // We grab the UUID from the Save button attribute or the hidden input
    const saveBtn = document.querySelector('[onclick^="saveMerchant"]');
    if (!saveBtn) return;
    const merchantUuid = saveBtn.getAttribute('onclick').match(/'([^']+)'/)[1];
    
    const listDiv = document.getElementById('lifecycle-list');
    listDiv.innerHTML = '<p style="text-align:center; padding:20px;">Consulting logs...</p>';

    try {
        const res = await fetch('/api/merchants', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                action: 'get_merchant_history', // Matches backend
                merchant_id: merchantUuid        // Sent directly in the body
            })
        });
        const result = await res.json();
        
        if (!result.data || result.data.length === 0) {
            listDiv.innerHTML = '<p style="text-align:center; padding:20px; color:#94a3b8;">No history found for this merchant.</p>';
            return;
        }

        listDiv.innerHTML = result.data.map(log => `
            <div class="lifecycle-item" style="border-left: 2px solid #e2e8f0; margin-left: 10px; padding-left: 20px; padding-bottom: 20px; position: relative;">
                <div class="lifecycle-dot" style="position: absolute; left: -6px; top: 0; width: 10px; height: 10px; background: #004990; border-radius: 50%;"></div>
                <div style="font-weight:800; color:#004990; font-size:11px; text-transform:uppercase;">${log.action}</div>
                <div style="font-size:10px; color:#94a3b8; margin-bottom:5px;">${new Date(log.created_at).toLocaleString()}</div>
                <div style="font-size:12px; font-weight:600;">${log.equipments?.terminal_type || 'Device'} (${log.equipments?.serial_number || 'S/N Missing'})</div>
                <div style="font-size:11px; color:#64748b; margin-top:2px;">
                    Movement: <b>${log.from_location}</b> → <b>${log.to_location}</b>
                </div>
                <div style="font-size:11px; color:#475569; font-style:italic; margin-top:4px; background:#f8fafc; padding:4px; border-radius:4px;">
                    "${log.notes || '---'}"
                </div>
            </div>
        `).join('');
    } catch (err) {
        listDiv.innerHTML = '<p style="text-align:center; color:red;">History load error.</p>';
    }
}
    async function fetchMerchantEquipment() {
        const saveBtn = document.querySelector('[onclick^="saveMerchant"]');
        if (!saveBtn) return;
        const merchantUuid = saveBtn.getAttribute('onclick').match(/'([^']+)'/)[1];
        const tbody = document.getElementById('merchant-equip-list');
        const emptyState = document.getElementById('equip-empty-state');
        
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:20px;">Loading assets...</td></tr>';
        emptyState.style.display = 'none';

        try {
            const res = await fetch('/api/merchants', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'get_merchant_equipment', merchant_uuid: merchantUuid })
            });
            const result = await res.json();
            
            tbody.innerHTML = "";
            if (!result.data || result.data.length === 0) {
                emptyState.style.display = 'block';
            } else {
                result.data.forEach(e => {
                    const row = tbody.insertRow();
                    row.innerHTML = `
                        <td style="font-weight:700; color:var(--pp-blue); font-size:12px;">${e.serial_number}</td>
                        <td style="font-size:12px;">${e.terminal_type}</td>
                        <td><span class="badge" style="background:#e0f2fe; color:#0369a1;">${e.status}</span></td>
                        <td style="font-size:11px; color:#64748b;">${e.received_date ? new Date(e.received_date).toLocaleDateString() : '---'}</td>
                    `;
                });
            }
        } catch (err) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:red;">Failed to load equipment.</td></tr>';
        }
    }

    window.saveMerchant = async (uuid) => {
        const fields = ['dba_name', 'account_status', 'status_id', 'account_code', 'major_merchant', 'email', 'merchant_phone', 'merchant_primary_contact', 'merchant_websites', 'ach_properties', 'processor', 'processor_platform', 'gateway_account_id', 'is_edge_enabled', 'is_pci_compliant', 'is_mobile', 'source', 'is_activated', 'is_device_hub_link_enabled', 'volume_mtd', 'volume_30_day', 'volume_90_day', 'volume', 'fresno_buy_rate_tier', 'isv_commission_code', 'enrollment_date', 'approved_date', 'last_batch_date', 'account_status_change_date', 'days_approved', 'shipping_status', 'irs_tin_status', 'ndf', 'credit_review', 'underwriting_decision_note'];

    window.addNote = async function(uuid) {
        try {
            const title = document.getElementById('new-note-title').value;
            const body = document.getElementById('new-note-body').value;
            const currentUserId = sessionStorage.getItem('pp_userid') || '00000000-0000-0000-0000-000000000000'; 

            if (!title || !body) return Swal.fire('Error', 'Subject and Body are required.', 'warning');

            const res = await fetch('/api/merchants', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ action: 'add_note', merchant_uuid: uuid, title: title, body: body, userId: currentUserId, created_by: currentUserId }) 
            });
            
            const result = await res.json();
            if (result.success) {
                const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 1500, timerProgressBar: true });
                await Toast.fire({ icon: 'success', title: 'New note created' });
                openModal(uuid); 
            } else { throw new Error(result.message || 'Database rejected the entry'); }
        } catch (err) { Swal.fire('Error', 'Failed to add note: ' + err.message, 'error'); }
    };

            const result = await res.json();
            if(result.success) {
                const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 2000, timerProgressBar: true });

            } else { Swal.fire('Error', 'Could not save note: ' + result.message, 'error'); }
        } catch (err) { Swal.fire('Error', 'Network error while saving note', 'error'); }
    };

    window.handleFileUpload = async function(merchantId) {

            return Swal.fire('Error', 'File is too large (Max 10MB)', 'error');

        Swal.fire({ title: 'Uploading...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

        try {
            const fileExt = file.name.split('.').pop();
            const fileName = `${Math.random().toString(36).substring(2)}-${Date.now()}.${fileExt}`;
            const filePath = `${merchantId}/${fileName}`;

            const supabaseUrl = 'https://zuzwljjrppyrzngmhdru.supabase.co';
            const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1endsampycHB5cnpuZ21oZHJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NjI3NjQsImV4cCI6MjA4ODEzODc2NH0.C7883WzNJIyqrc5vcWrOFPPDfjq7DAZhw2oQKFpwoow';
            
            const sbClient = supabase.createClient(supabaseUrl, supabaseKey);

            const { data: storageData, error: storageError } = await sbClient.storage
