<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Deployment | Tracking Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --pp-blue: #004990; --pp-accent: #00a1e0; --glass: rgba(255, 255, 255, 0.9); --glass-border: rgba(255, 255, 255, 0.4); --success: #22c55e; --danger: #ef4444; }
        body { background: radial-gradient(circle at top right, #f8fafc, #e2e8f0); padding: 30px; font-family: 'Inter', sans-serif; min-height: 100vh; color: #2b3d51; }
        #status-bar { max-width: 1000px; margin: 0 auto 15px auto; padding: 10px 20px; border-radius: 50px; font-weight: 800; font-size: 0.7rem; text-align: center; color: white; background: var(--danger); box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: all 0.3s ease; }
        .slds-form-container { max-width: 1000px; margin: auto; background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 24px; box-shadow: 0 20px 50px rgba(0, 45, 90, 0.08); overflow: hidden; }
        .header-box { background: rgba(0, 73, 144, 0.03); padding: 25px 35px; border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        .home-pill { background: white; padding: 8px 16px; border-radius: 50px; font-size: 0.7rem; font-weight: 800; color: var(--pp-blue); text-decoration: none !important; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 6px; transition: all 0.2s; }
        .slds-input, .slds-select { border-radius: 12px !important; border: 1px solid #d1d9e6 !important; height: 42px !important; }
        .readonly-display { background: #f0f7ff !important; border: 1px solid #cbd5e1 !important; color: var(--pp-blue) !important; font-weight: 800 !important; text-align: center; }
        #debug-monitor { max-width: 1000px; margin: 30px auto; background: #1a202c; color: #a0aec0; padding: 25px; border-radius: 20px; font-family: monospace; font-size: 11px; height: 180px; overflow-y: auto; border: 1px solid #2d3748; }
        .debug-timestamp { color: #4a5568; font-weight: bold; margin-right: 10px; }
    </style>
</head>
<body>

    <div id="status-bar">SYSTEM STATUS: INITIALIZING TRACKING...</div>

    <div class="slds-form-container">
        <div class="header-box">
            <div style="display: flex; align-items: center; gap: 15px;">
                <a href="deployments-dashboard.html" class="home-pill"><span class="material-icons" style="font-size: 14px;">arrow_back</span> Dashboard</a>
                <h1 style="font-size: 1.2rem; font-weight: 800; color: var(--pp-blue);">Deployment Update Console</h1>
            </div>
            <div style="background: #e2e8f0; padding: 6px 14px; border-radius: 8px; font-size: 10px; font-weight: 800; color: #475569;">LOGISTICS MANAGEMENT</div>
        </div>

        <div class="slds-p-around_xx-large">
            <div class="slds-grid slds-wrap slds-gutters">
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                    <div class="slds-form-element slds-m-bottom_large">
                        <label class="slds-form-element__label" style="font-weight: 700;">Deployment ID</label>
                        <input type="text" id="deployment_id" class="slds-input readonly-display" readonly value="Syncing..." />
                    </div>
                    <div class="slds-form-element slds-m-bottom_large">
                        <label class="slds-form-element__label" style="font-weight: 700;">TID</label>
                        <input type="text" id="tid" class="slds-input" placeholder="Enter TID" />
                    </div>
                    <div class="slds-form-element slds-m-bottom_large">
                        <label class="slds-form-element__label" style="font-weight: 700;">Tracking #</label>
                        <input type="text" id="tracking_id" class="slds-input" placeholder="Enter Tracking Number" />
                    </div>
                    <div class="slds-form-element">
                        <label class="slds-form-element__label" style="font-weight: 700;">Deployment Status</label>
                        <select id="deployment_status" class="slds-select">
                            <option value="open">Open</option>
                            <option value="close">Closed</option>
                        </select>
                    </div>
                </div>

                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                    <div class="slds-form-element slds-m-bottom_large">
                        <label class="slds-form-element__label" style="font-weight: 700; color: #94a3b8;">Linked Equipment ID</label>
                        <input type="text" id="linked_eq_id" class="slds-input readonly-display" readonly value="---" />
                    </div>
                    <div class="slds-form-element slds-m-bottom_large">
                        <label class="slds-form-element__label" style="font-weight: 700; color: #94a3b8;">Linked Serial #</label>
                        <input type="text" id="linked_serial" class="slds-input readonly-display" readonly value="---" />
                    </div>
                    <div class="slds-form-element">
                        <label class="slds-form-element__label" style="font-weight: 700; color: #94a3b8;">Linked Merchant Account</label>
                        <input type="text" id="linked_merchant" class="slds-input readonly-display" readonly value="---" />
                    </div>
                </div>
            </div>
        </div>

        <div class="slds-p-around_large slds-grid slds-grid_align-end" style="background: rgba(255,255,255,0.4); gap: 12px;">
            <button class="slds-button slds-button_neutral btn-modern" onclick="location.href='deployments-dashboard.html'">Discard Changes</button>
            <button class="slds-button slds-button_brand btn-modern" id="saveBtn" onclick="updateRecord()" disabled style="height:50px;">COMMIT LOGISTICS UPDATE</button>
        </div>
    </div>

    <div id="debug-monitor">
        <div style="padding-bottom: 5px; border-bottom: 1px solid #2d3748; margin-bottom: 10px;"><b>SECURE CHANNEL ACTIVATED</b></div>
    </div>

    <script>
        const API_URL = "/api/equipments";

        function addLog(message, type = 'normal') {
            const monitor = document.getElementById('debug-monitor');
            const entry = document.createElement('div');
            entry.style.padding = "5px 0";
            entry.style.borderBottom = "1px solid #2d3748";
            const timestamp = new Date().toLocaleTimeString();
            let color = type === 'success' ? '#48bb78' : (type === 'error' ? '#f56565' : '#a0aec0');
            entry.innerHTML = `<span class="debug-timestamp">[${timestamp}]</span> <span style="color:${color}; font-weight:bold;">${message}</span>`;
            monitor.prepend(entry);
        }

        window.onload = function() {
            const status = document.getElementById('status-bar');
            try {
                const params = new URLSearchParams(window.location.search);
                const recordId = params.get('id');
                if (!recordId) { addLog("Error: Missing ID", "error"); return; }

                document.getElementById('deployment_id').value = params.get('d_id') || '---';
                document.getElementById('tid').value = params.get('tid') || '';
                document.getElementById('tracking_id').value = params.get('track') || '';
                document.getElementById('deployment_status').value = (params.get('status') || 'open').toLowerCase();
                document.getElementById('linked_eq_id').value = params.get('eq_id') || '---';
                document.getElementById('linked_serial').value = params.get('sn') || '---';
                document.getElementById('linked_merchant').value = params.get('merch') || '---';

                document.getElementById('saveBtn').disabled = false;
                status.innerText = "READY FOR LOGISTICS UPDATE";
                status.style.background = "var(--success)";
                addLog(`Channel established for ${recordId}`, "success");
            } catch (err) { addLog(err.message, "error"); }
        };

        async function updateRecord() {
            const btn = document.getElementById('saveBtn');
            const status = document.getElementById('status-bar');
            const recordId = new URLSearchParams(window.location.search).get('id');
            const userEmail = sessionStorage.getItem('pp_userid'); // Capturing staff email

            btn.disabled = true;
            status.innerText = "WRITING TO SECURE LEDGER...";
            status.style.background = "#f59e0b";
            addLog(`>>> COMMIT INITIATED BY ${userEmail} <<<`);

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        action: 'updateDeployment', // This triggers the new action in equipments.js
                        id: recordId,
                        userEmail: userEmail,
                        payload: {
                            tid: document.getElementById('tid').value,
                            tracking_id: document.getElementById('tracking_id').value,
                            deployment_status: document.getElementById('deployment_status').value
                        }
                    })
                });

                if (res.ok) {
                    addLog("SUCCESS: Activity logged.", "success");
                    Swal.fire('Updated!', 'Deployment tracking updated.', 'success')
                        .then(() => location.href = 'deployments-dashboard.html');
                } else { throw new Error("API Write Failed"); }
            } catch (e) {
                addLog("FATAL: " + e.message, "error");
                status.innerText = "COMMIT REJECTED";
                status.style.background = "var(--danger)";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
