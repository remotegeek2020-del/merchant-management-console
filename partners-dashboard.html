<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner Portfolio | Secure Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --pp-blue: #004990; --pp-accent: #00a1e0; }
        body { background: #f1f5f9; padding: 25px; font-family: 'Inter', sans-serif; }
        .dashboard-container { max-width: 1400px; margin: 0 auto; }
        
        /* Header & Search */
        .modern-header { background: white; border-radius: 16px; padding: 25px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        
        /* Partner Grid */
        .partner-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .partner-card { background: white; border-radius: 16px; padding: 20px; border: 1px solid #e2e8f0; transition: 0.3s; cursor: pointer; position: relative; overflow: hidden; }
        .partner-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-color: var(--pp-blue); }
        
        /* Badges & Tags */
        .company-tag { background: #f1f5f9; color: #475569; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; margin-right: 5px; margin-top: 5px; display: inline-block; }
        .id-badge { background: #e0f2fe; color: #0369a1; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 800; font-family: monospace; }
        .prime-badge { background: #004990; color: white; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 800; }
        
        /* Modal Tabs */
        .modal-tab-btn { padding: 14px 20px; border: none; background: none; font-weight: 700; color: #94a3b8; cursor: pointer; border-bottom: 3px solid transparent; transition: 0.3s; font-size: 12px; }
        .active-tab { color: var(--pp-blue) !important; border-bottom-color: var(--pp-blue) !important; }
        
        .company-box { border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px; margin-bottom: 15px; background: #fafbfc; }
        .sub-agent-row { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="modern-header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <a href="index.html" class="slds-button slds-button_neutral" style="display: flex; align-items: center; gap: 8px; border-radius: 10px;">
                <span class="material-icons" style="font-size: 18px;">arrow_back</span>
                <span style="font-weight: 700; font-size: 12px;">BACK</span>
            </a>
            <h1 style="font-size: 1.6rem; font-weight: 800; color: #002d5a; margin: 0;">Partner Network</h1>
        </div>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="partnerSearch" placeholder="Search Person or Company..." class="slds-input" style="width:300px; border-radius:10px;" onkeyup="filterPartners()">
            <button class="slds-button slds-button_brand" style="border-radius:10px; background:var(--pp-blue);">ADD PARTNER</button>
        </div>
    </div>

    <div id="partnerGrid" class="partner-grid">
        <div style="grid-column: 1/-1; text-align: center; padding: 50px; color: #94a3b8;">
            <span class="material-icons" style="animation: spin 2s linear infinite; font-size: 40px;">sync</span>
            <p style="margin-top:10px; font-weight:600;">Mapping Relationships...</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    let allPartners = [];

    async function loadPartners() {
        const grid = document.getElementById('partnerGrid');
        
        try {
            const res = await fetch('/api/partners', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'get_partners_list' })
            });
            const result = await res.json();

            if (result.success) {
                allPartners = result.data;
                renderGrid(allPartners);
            } else {
                throw new Error(result.message);
            }
        } catch (err) {
            grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: red; padding: 50px;">
                <span class="material-icons">error_outline</span>
                <p>Failed to load partner network: ${err.message}</p>
            </div>`;
        }
    }

    function renderGrid(data) {
        const grid = document.getElementById('partnerGrid');
        if (data.length === 0) {
            grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #94a3b8;">No partners found.</p>';
            return;
        }

        grid.innerHTML = data.map(p => {
            // Flatten all IDs from all companies for the "Unlimited IDs" count
            const allIds = p.companies.flatMap(c => c.ids || []);
            const displayIds = allIds.slice(0, 3);
            const extraCount = allIds.length - 3;

            return `
                <div class="partner-card" onclick="openPartnerDetails('${p.id}')">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                        <div>
                            <h2 style="font-weight:800; font-size:1.1rem; color:#002d5a;">${p.name}</h2>
                            <p style="font-size:11px; color:#64748b; font-weight:600;">${p.companies.length} Mapped Entities</p>
                        </div>
                        <span class="material-icons" style="color:#cbd5e1;">account_tree</span>
                    </div>
                    
                    <div style="margin-top:15px; border-top:1px solid #f1f5f9; padding-top:15px;">
                        <div style="margin-bottom:10px;">
                            ${p.companies.map(c => `<span class="company-tag">${c.name}</span>`).join('')}
                        </div>
                        <div style="display:flex; gap:5px; align-items:center; flex-wrap:wrap;">
                            ${displayIds.map(id => `
                                <span class="${id.toLowerCase().includes('prime49') ? 'prime-badge' : 'id-badge'}">${id}</span>
                            `).join('')}
                            ${extraCount > 0 ? `<span style="font-size:10px; color:#94a3b8; font-weight:800; margin-left:5px;">+${extraCount} MORE</span>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    async function openPartnerDetails(personId) {
        const p = allPartners.find(ptr => ptr.id === personId);
        if (!p) return;

        Swal.fire({
            title: `<div style="text-align:left; font-weight:800; color:#002d5a;">${p.name}</div>`,
            width: '1000px',
            html: `
                <div style="display:flex; border-bottom:1px solid #e2e8f0; margin-bottom:20px;">
                    <button onclick="switchPartnerTab('portfolio')" id="tab-portfolio" class="modal-tab-btn active-tab">PORTFOLIO & IDS</button>
                    <button onclick="switchPartnerTab('subagents', '${p.id}')" id="tab-subagents" class="modal-tab-btn">SUB-AGENTS (DOWNLINE)</button>
                </div>

                <div id="p-content-portfolio" class="p-tab-content" style="text-align:left; max-height:500px; overflow-y:auto;">
                    ${p.companies.map(co => `
                        <div class="company-box">
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                                <b style="color:var(--pp-blue); text-transform:uppercase; font-size:13px;">${co.name}</b>
                                ${co.ids.some(id => id.toLowerCase().includes('prime49')) ? '<span class="prime-badge">PRIME49 ELIGIBLE</span>' : ''}
                            </div>
                            <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap:10px;">
                                ${co.ids.map(id => `
                                    <div style="background:white; border:1px solid #e2e8f0; padding:10px; border-radius:8px;">
                                        <div style="font-size:9px; color:#94a3b8; font-weight:800; margin-bottom:2px;">AGENT ID</div>
                                        <div style="font-family:monospace; font-weight:700; color:#334155;">${id}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>

                <div id="p-content-subagents" class="p-tab-content" style="display:none; text-align:left;">
                    <div id="subagent-list-container" style="padding:10px;">
                        <p style="text-align:center; color:#94a3b8;">Loading hierarchy...</p>
                    </div>
                </div>
            `,
            showConfirmButton: false,
            showCloseButton: true
        });
    }

    window.switchPartnerTab = async (tab, personId) => {
        document.querySelectorAll('.p-tab-content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.modal-tab-btn').forEach(t => t.classList.remove('active-tab'));
        document.getElementById('p-content-' + tab).style.display = 'block';
        document.getElementById('tab-' + tab).classList.add('active-tab');

        if (tab === 'subagents') {
            const container = document.getElementById('subagent-list-container');
            try {
                const res = await fetch('/api/partners', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'get_hierarchy', person_id: personId })
                });
                const result = await res.json();
                
                if (!result.data || result.data.length === 0) {
                    container.innerHTML = '<p style="text-align:center; padding:20px; color:#94a3b8;">No sub-agents found in this hierarchy.</p>';
                } else {
                    container.innerHTML = result.data.map(sub => `
                        <div class="sub-agent-row">
                            <span><b>${sub.agent_name}</b></span>
                            <div style="display:flex; gap:5px;">
                                ${sub.agent_identifiers.map(ai => `<span class="id-badge">${ai.id_string}</span>`).join('')}
                            </div>
                        </div>
                    `).join('');
                }
            } catch (err) {
                container.innerHTML = '<p style="color:red; text-align:center;">Failed to load downline.</p>';
            }
        }
    };

    function filterPartners() {
        const query = document.getElementById('partnerSearch').value.toLowerCase();
        const filtered = allPartners.filter(p => 
            p.name.toLowerCase().includes(query) || 
            p.companies.some(c => c.name.toLowerCase().includes(query))
        );
        renderGrid(filtered);
    }

    window.onload = loadPartners;
</script>
</body>
</html>
