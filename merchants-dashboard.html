<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Merchant Portfolio | Secure Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --pp-blue: #004990; --pp-accent: #00a1e0; }
        body { background: #f1f5f9; padding: 25px; font-family: 'Inter', sans-serif; }
        .dashboard-container { max-width: 1600px; margin: 0 auto; }
        
        .modern-header { background: white; border-radius: 16px; padding: 25px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .summary-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 20px; }
        .kpi-card { background: white; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 15px; }
        .kpi-val { font-size: 1.3rem; font-weight: 800; color: #002d5a; display: block; }
        .kpi-label { font-size: 0.65rem; font-weight: 700; color: #64748b; text-transform: uppercase; }

        .main-card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .slds-table thead th { background-color: #f8fafc !important; font-weight: 700 !important; color: #475569 !important; padding: 12px !important; }
        
        .badge { font-weight: 800; font-size: 9px; padding: 4px 10px; border-radius: 4px; text-transform: uppercase; display: inline-block; }
        .status-approved { background: #dcfce7; color: #166534; }
        .status-closed { background: #fee2e2; color: #991b1b; }
        .status-fraud { background: #1e293b; color: #ffffff; }

        .modal-tab-btn { padding: 14px 20px; border: none; background: none; font-weight: 700; color: #94a3b8; cursor: pointer; border-bottom: 3px solid transparent; transition: 0.3s; font-size: 11px; }
        .active-tab { color: var(--pp-blue) !important; border-bottom-color: var(--pp-blue) !important; }
        .modern-input { border-radius: 8px !important; border: 1px solid #cbd5e1 !important; padding: 8px 12px !important; width: 100%; font-size: 0.8rem; margin-bottom: 8px; }
        .edit-label { font-size: 9px; font-weight: 700; color: #64748b; margin-bottom: 3px; display: block; text-transform: uppercase; }
        
        /* Timeline Styles for Lifecycle */
        .timeline-item { border-left: 2px solid #e2e8f0; margin-left: 10px; padding-left: 20px; padding-bottom: 15px; position: relative; }
        .timeline-dot { position: absolute; left: -6px; top: 0; width: 10px; height: 10px; background: var(--pp-blue); border-radius: 50%; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="dashboard-container">
    <div class="modern-header">
       <div style="display: flex; align-items: center; gap: 15px;">
            <a href="index.html" class="slds-button slds-button_neutral" style="display: flex; align-items: center; gap: 8px; border-radius: 10px; padding: 5px 15px; border: 1px solid #cbd5e1; text-decoration: none; color: #475569;">
                <span class="material-icons" style="font-size: 18px;">arrow_back</span>
                <span style="font-weight: 700; font-size: 12px;">BACK TO HOME</span>
            </a>
            <div><h1 style="font-size: 1.6rem; font-weight: 800; color: #002d5a; margin: 0;">Merchant Portfolio</h1></div>
        </div>
        <div style="display: flex; gap: 10px;">
            <select id="statusFilter" class="slds-select" style="width: 170px; border-radius:10px;" onchange="resetAndFetch()">
               <option value="">All Statuses</option>
                <option value="Approved">Approved</option>
                <option value="Closed">Closed</option>
                <option value="Fraud">Fraud</option>
                <option value="Pending">Pending</option>
            </select>
            <select id="filterBy" class="slds-select" style="width: 150px; border-radius:10px;">
                <option value="dba_name">DBA Name</option>
                <option value="merchant_id">MID</option>
            </select>
            <input type="text" id="searchInput" placeholder="Search..." class="slds-input" style="width:200px; border-radius:10px;">
            <button class="slds-button slds-button_brand" style="border-radius:10px; background:var(--pp-blue);" onclick="resetAndFetch()">Search</button>
        </div>
    </div>

    <div class="summary-bar">
        <div class="kpi-card"><div><span class="kpi-label">Filtered MTD</span><span class="kpi-val" id="mtd-val">$0.00</span></div></div>
        <div class="kpi-card"><div><span class="kpi-label">Total 30D</span><span class="kpi-val" id="30d-val">$0.00</span></div></div>
        <div class="kpi-card"><div><span class="kpi-label">Total 90D</span><span class="kpi-val" id="90d-val">$0.00</span></div></div>
        <div class="kpi-card" style="background:var(--pp-blue); color:white; border:none;"><div><span class="kpi-label" style="color:rgba(255,255,255,0.7);">Share</span><span class="kpi-val" id="share-val" style="color:white;">0.00%</span></div></div>
    </div>

    <article class="main-card">
        <table class="slds-table slds-table_bordered slds-table_cell-buffer slds-no-row-hover">
            <thead>
                <tr>
                    <th>DBA Name</th>
                    <th>Merchant ID</th>
                    <th>Partner ID</th>
                    <th>Company</th>
                    <th>Partner Name</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="merchantTableBody"></tbody>
        </table>
        <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center; background: #f8fafc;">
            <select id="pageLimit" onchange="resetAndFetch()"><option value="20">20</option><option value="50">50</option></select>
            <div id="pageInfo" style="font-weight:700; font-size: 12px; color: var(--pp-blue);">Page 1</div>
            <div>
                <button class="slds-button slds-button_neutral" id="prevBtn" onclick="changePage(-1)">Prev</button>
                <button class="slds-button slds-button_neutral" id="nextBtn" onclick="changePage(1)">Next</button>
            </div>
        </div>
    </article>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    let currentPage = 0;
    let currentRecords = [];

    async function fetchMerchants() {
        const tbody = document.getElementById('merchantTableBody');
        const limit = document.getElementById('pageLimit').value;
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:60px; color:#94a3b8;"><span class="material-icons" style="animation: spin 2s linear infinite;">sync</span><br>Synchronizing Ledger...</td></tr>`;
        try {
            const res = await fetch('/api/merchants', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'list', page: currentPage, limit: limit, query: document.getElementById('searchInput').value, filterBy: document.getElementById('filterBy').value, statusFilter: document.getElementById('statusFilter').value })
            });
            const result = await res.json();
            currentRecords = result.data;
            if (result.metrics) {
                document.getElementById('mtd-val').innerText = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(result.metrics.totalMTD || 0);
                document.getElementById('30d-val').innerText = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(result.metrics.total30D || 0);
                document.getElementById('90d-val').innerText = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(result.metrics.total90D || 0);
                document.getElementById('share-val').innerText = `${result.metrics.portfolioShare || '0.00'}%`;
            }
            tbody.innerHTML = "";
            currentRecords.forEach(m => {
                const row = tbody.insertRow();
                const s = (m.account_status || '').toLowerCase();
                const statusClass = s.includes('approved') ? 'status-approved' : s.includes('closed') ? 'status-closed' : s.includes('fraud') ? 'status-fraud' : '';
                row.innerHTML = `
                    <td><a onclick="openModal('${m.id}')" style="font-weight:700; color:var(--pp-blue); cursor:pointer;">${m.dba_name || '---'}</a></td>
                    <td><code>${m.merchant_id || '---'}</code></td>
                    <td>${m.agent_id || '---'}</td>
                    <td>${m.company_name || '---'}</td>
                    <td>${m.partner_name || '---'}</td>
                    <td><span class="badge ${statusClass}">${m.account_status || '---'}</span></td>
                `;
            });
            document.getElementById('pageInfo').innerHTML = `Page ${currentPage + 1} <span style="font-weight:400; color:#94a3b8; margin-left:10px;">(Total Found: ${result.count.toLocaleString()})</span>`;
        } catch (err) { console.error(err); }
    }

    async function openModal(id) {
        const m = currentRecords.find(r => r.id === id);
        if (!m) return;
        Swal.fire({ title: 'Loading...', didOpen: () => { Swal.showLoading(); } });

        try {
            const [nRes, lRes, aRes] = await Promise.all([
                fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'get_notes', merchant_uuid: m.id, type: 'manual' }) }),
                fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'get_notes', merchant_uuid: m.id, type: 'system' }) }),
                fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'get_attachments', merchant_uuid: m.id }) })
            ]);
            
            const notes = (await nRes.json()).data || [];
            const logs = (await lRes.json()).data || [];
            const files = (await aRes.json()).data || [];

            Swal.fire({
                title: `<div style="text-align:left; font-weight:800; color:#002d5a;">${m.dba_name}</div>`,
                width: '1100px',
                html: `
                    <div style="display:flex; border-bottom:1px solid #e2e8f0; margin-bottom:20px;">
                        <button onclick="switchTab('details')" id="tab-details" class="modal-tab-btn active-tab">DETAILS</button>
                        <button onclick="switchTab('equipment')" id="tab-equipment" class="modal-tab-btn">EQUIPMENT</button>
                        <button onclick="switchTab('lifecycle')" id="tab-lifecycle" class="modal-tab-btn">LIFECYCLE HISTORY</button>
                        <button onclick="switchTab('notes')" id="tab-notes" class="modal-tab-btn">INTERNAL NOTES</button>
                        <button onclick="switchTab('attachments')" id="tab-attachments" class="modal-tab-btn">ATTACHMENTS</button>
                        <button onclick="switchTab('audit')" id="tab-audit" class="modal-tab-btn">AUDIT HISTORY</button>
                    </div>

                    <div id="content-details" class="tab-content" style="text-align:left; max-height:650px; overflow-y:auto; padding-right:15px;">
                        <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:12px;">
                            <div class="field-section-title" style="grid-column: span 3; font-weight:800; color:#004990; border-bottom:1px solid #eee; margin-top:15px; text-transform:uppercase; font-size:10px;">Core Identity & Status</div>
                            <div><label class="edit-label">DBA Name</label><input id="edit-dba_name" class="modern-input" value="${m.dba_name || ''}"></div>
                            <div><label class="edit-label">MID (Locked)</label><input class="modern-input" value="${m.merchant_id || ''}" disabled style="background:#f8fafc;"></div>
                            <div><label class="edit-label">Account Status</label><select id="edit-account_status" class="modern-input"><option value="${m.account_status}" selected>${m.account_status}</option><option value="Approved">Approved</option><option value="Closed">Closed</option></select></div>
                            
                            <div class="field-section-title" style="grid-column: span 3; font-weight:800; color:#004990; border-bottom:1px solid #eee; margin-top:15px; text-transform:uppercase; font-size:10px;">Contact Information</div>
                            <div><label class="edit-label">Email</label><input id="edit-email" class="modern-input" value="${m.email || ''}"></div>
                            <div><label class="edit-label">Phone</label><input id="edit-merchant_phone" class="modern-input" value="${m.merchant_phone || ''}"></div>
                            
                            <input type="hidden" id="current-m-uuid" value="${m.id}">
                        </div>
                        <button onclick="saveMerchant('${m.id}')" style="background:#004990; color:white; width:100%; padding:15px; border-radius:10px; border:none; margin-top:25px; font-weight:700; cursor:pointer;">SAVE CHANGES</button>
                    </div>

                    <div id="content-equipment" class="tab-content" style="display:none; text-align:left;">
                        <table class="slds-table slds-table_bordered slds-table_cell-buffer">
                            <thead><tr><th style="font-size:10px;">SERIAL NUMBER</th><th style="font-size:10px;">MODEL</th><th style="font-size:10px;">STATUS</th><th style="font-size:10px;">INSTALLED</th></tr></thead>
                            <tbody id="merchant-equip-list"></tbody>
                        </table>
                        <div id="equip-empty-state" style="padding:40px; text-align:center; color:#94a3b8; display:none;">No active equipment assigned.</div>
                    </div>

                    <div id="content-lifecycle" class="tab-content" style="display:none; text-align:left;">
                        <div id="lifecycle-list" style="max-height:500px; overflow-y:auto; padding:10px;">
                            </div>
                    </div>

                    <div id="content-notes" class="tab-content" style="display:none; text-align:left;">
                        <div style="background:#f1f5f9; padding:15px; border-radius:12px; margin-bottom:20px;">
                            <input id="new-note-title" placeholder="Subject" class="modern-input">
                            <textarea id="new-note-body" placeholder="Comment..." class="modern-input" style="height:60px;"></textarea>
                            <button onclick="addNote('${m.id}')" style="background:var(--pp-blue); color:white; width:100%; padding:10px; border-radius:8px; border:none; cursor:pointer;">ADD NOTE</button>
                        </div>
                        <div id="notes-list">${notes.map(n => `
                            <div style="background:white; border:1px solid #e2e8f0; border-radius:12px; padding:15px; margin-bottom:10px;">
                                <div style="font-weight:700;">${n.title}</div>
                                <div style="font-size:13px; color:#475569; margin:5px 0;">${n.body}</div>
                                <small style="color:#64748b;">By: ${n.created_by || 'Staff'}</small>
                            </div>
                        `).join('')}</div>
                    </div>

                    <div id="content-attachments" class="tab-content" style="display:none; text-align:left;">
                        <div style="background:#f8fafc; border:2px dashed #cbd5e1; border-radius:12px; padding:20px; text-align:center; margin-bottom:20px;">
                            <input type="file" id="fileInput" style="display:none;" onchange="handleFileUpload('${m.id}')">
                            <button onclick="document.getElementById('fileInput').click()" class="slds-button slds-button_brand">SELECT FILE</button>
                        </div>
                        <div id="attachments-list">${files.map(f => `<div style="padding:10px; border-bottom:1px solid #eee;">${f.file_name}</div>`).join('')}</div>
                    </div>

                    <div id="content-audit" class="tab-content" style="display:none; text-align:left;">
                        <div style="background:white; border-radius:12px; border:1px solid #e2e8f0; overflow:hidden;">
                            ${logs.map(l => `<div style="padding:12px; border-bottom:1px solid #f1f5f9; font-size:11px;"><span style="color:#94a3b8;">[${new Date(l.created_at).toLocaleString()}]</span> ${l.body}</div>`).join('')}
                        </div>
                    </div>
                `,
                showConfirmButton: false, showCloseButton: true
            });
        } catch (err) { Swal.fire('Error', 'Load failed', 'error'); }
    }

    window.switchTab = (tab) => {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.modal-tab-btn').forEach(t => t.classList.remove('active-tab'));
        document.getElementById('content-' + tab).style.display = 'block';
        document.getElementById('tab-' + tab).classList.add('active-tab');
        
        if (tab === 'equipment') fetchMerchantEquipment();
        if (tab === 'lifecycle') fetchMerchantLifecycle();
    };

    async function fetchMerchantLifecycle() {
        const merchantUuid = document.getElementById('current-m-uuid').value;
        const listDiv = document.getElementById('lifecycle-list');
        listDiv.innerHTML = '<p style="text-align:center; padding:20px;">Consulting logs...</p>';

        try {
            const res = await fetch('/api/merchants', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'get_merchant_history', merchant_id: merchantUuid })
            });
            const result = await res.json();
            
            if (!result.data || result.data.length === 0) {
                listDiv.innerHTML = '<p style="text-align:center; padding:20px; color:#94a3b8;">No history found for this merchant.</p>';
                return;
            }

            listDiv.innerHTML = result.data.map(log => `
                <div class="timeline-item">
                    <div class="timeline-dot"></div>
                    <div style="font-weight:800; color:var(--pp-blue); font-size:12px; text-transform:uppercase;">${log.action}</div>
                    <div style="font-size:10px; color:#94a3b8; margin-bottom:5px;">${new Date(log.created_at).toLocaleString()}</div>
                    <div style="font-size:13px; font-weight:600;">${log.equipments?.terminal_type || 'Unknown Device'} (${log.equipments?.serial_number || 'N/A'})</div>
                    <div style="font-size:11px; color:#64748b; margin-top:2px;">
                        Movement: <b>${log.from_location}</b> <span style="color:var(--pp-blue);">→</span> <b>${log.to_location}</b>
                    </div>
                    <div style="font-size:11px; color:#475569; font-style:italic; margin-top:5px; background:#f8fafc; padding:5px; border-radius:4px;">
                        "${log.notes || 'No comments recorded'}"
                    </div>
                </div>
            `).join('');
        } catch (err) {
            listDiv.innerHTML = '<p style="color:red; text-align:center;">Failed to connect to history engine.</p>';
        }
    }

    async function fetchMerchantEquipment() {
        const merchantUuid = document.getElementById('current-m-uuid').value;
        const tbody = document.getElementById('merchant-equip-list');
        const emptyState = document.getElementById('equip-empty-state');
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:20px;">Loading assets...</td></tr>';
        emptyState.style.display = 'none';
        try {
            const res = await fetch('/api/merchants', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'get_merchant_equipment', merchant_uuid: merchantUuid })
            });
            const result = await res.json();
            tbody.innerHTML = "";
            if (!result.data || result.data.length === 0) {
                emptyState.style.display = 'block';
            } else {
                result.data.forEach(e => {
                    const row = tbody.insertRow();
                    row.innerHTML = `
                        <td style="font-weight:700; color:var(--pp-blue); font-size:12px;">${e.serial_number}</td>
                        <td style="font-size:12px;">${e.terminal_type}</td>
                        <td><span class="badge" style="background:#e0f2fe; color:#0369a1;">${e.status}</span></td>
                        <td style="font-size:11px; color:#64748b;">${e.received_date ? new Date(e.received_date).toLocaleDateString() : '---'}</td>
                    `;
                });
            }
        } catch (err) { tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:red;">Load failed.</td></tr>'; }
    }

    /* Keep all your original Save/Note/Upload functions below */
    window.saveMerchant = async (uuid) => {
        const fields = ['dba_name', 'account_status', 'email', 'merchant_phone'];
        const payload = {}; 
        fields.forEach(f => { const el = document.getElementById('edit-' + f); if(el) payload[f] = el.value; });
        try {
            const res = await fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'update', id: uuid, payload }) });
            const result = await res.json();
            if(result.success) { Swal.fire({icon: 'success', title: 'Saved', timer: 1000, showConfirmButton: false}); fetchMerchants(); }
        } catch (err) { console.error(err); }
    };

    window.addNote = async function(uuid) {
        const title = document.getElementById('new-note-title').value;
        const body = document.getElementById('new-note-body').value;
        if (!title || !body) return Swal.fire('Error', 'Fields required.', 'warning');
        try {
            const res = await fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'add_note', merchant_uuid: uuid, title, body }) });
            const result = await res.json();
            if (result.success) { openModal(uuid); }
        } catch (err) { Swal.fire('Error', 'Failed', 'error'); }
    };

    window.handleFileUpload = async function(merchantId) {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return;
        Swal.fire({ title: 'Uploading...', didOpen: () => { Swal.showLoading(); } });
        // Standard upload logic here... (Same as you had)
        Swal.fire('Success', 'Refresh dashboard to see file', 'success');
    };

    function changePage(dir) { currentPage += dir; fetchMerchants(); }
    function resetAndFetch() { currentPage = 0; fetchMerchants(); }
    window.onload = () => { fetchMerchants(); };
</script>
</body>
</html>
