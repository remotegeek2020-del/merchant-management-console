<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Equipment Management - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --pp-blue: #004990; --pp-accent: #00a1e0; --glass: rgba(255, 255, 255, 0.9); --glass-border: rgba(255, 255, 255, 0.4); }
        body { background: radial-gradient(circle at top right, #f8fafc, #e2e8f0); padding: 30px; font-family: 'Inter', sans-serif; min-height: 100vh; color: #2b3d51; }
        .modern-header { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 25px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0, 45, 90, 0.05); display: flex; justify-content: space-between; align-items: center; }
        .slds-card { border: 1px solid var(--glass-border) !important; border-radius: 20px !important; background: var(--glass) !important; overflow: hidden; }
        .received-col { background: #fffbeb; font-weight: bold; color: #004990; }
    </style>
</head>
<body>
    <div class="modern-header">
        <div>
            <h1 style="font-size: 1.5rem; font-weight: 800; color: var(--pp-blue);">Equipments Dashboard</h1>
        </div>
        <div class="slds-grid slds-grid_vertical-align-center">
            <input type="text" id="searchInput" placeholder="Search..." class="slds-input slds-m-right_small" onkeypress="if(event.key==='Enter') fetchDashboardData()">
            <button class="slds-button slds-button_brand" onclick="window.location.href='equipments-form.html'">+ New Activity</button>
        </div>
    </div>

    <article class="slds-card">
        <div class="slds-card__body">
            <table class="slds-table slds-table_bordered slds-table_cell-buffer">
                <thead>
                    <tr class="slds-line-height_reset">
                        <th scope="col">Equipment #</th>
                        <th scope="col">Type</th>
                        <th scope="col">Serial #</th>
                        <th scope="col">Merchant Account</th>
                        <th scope="col">Received Date</th>
                        <th scope="col">Date Created</th>
                    </tr>
                </thead>
                <tbody id="dashboardBody"></tbody>
            </table>
        </div>
    </article>

    <script>
        const API_URL = "/api/equipments";
        async function fetchDashboardData() {
            const tbody = document.getElementById('dashboardBody');
            tbody.innerHTML = "<tr><td colspan='6' style='text-align:center; padding: 40px;'>SYNCING LEDGER...</td></tr>";
            try {
                const res = await fetch(API_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ action: 'list', schemaId: '6717da1c4a74233fa104889f', query: document.getElementById('searchInput').value }) });
                const data = await res.json();
                tbody.innerHTML = "";
                data.records.forEach(record => {
                    const p = record.properties || {};
                    const row = tbody.insertRow();
                    const date = p["custom_objects.equipments.received_date"] || '---';
                    row.innerHTML = `
                        <td><a href="#" style="color:#004990; font-weight:700;">${p["custom_objects.equipments.equipment_id"] || '---'}</a></td>
                        <td>${p["custom_objects.equipments.terminal_type"] || '---'}</td>
                        <td>${p["custom_objects.equipments.serial_number"] || '---'}</td>
                        <td>${p["custom_objects.equipments.merchant_account"] || '---'}</td>
                        <td class="received-col">${date}</td>
                        <td>${new Date(record.createdAt).toLocaleDateString()}</td>
                    `;
                });
            } catch (e) { tbody.innerHTML = "<tr><td colspan='6'>Fetch Error</td></tr>"; }
        }
        window.onload = fetchDashboardData;
    </script>
</body>
</html>
