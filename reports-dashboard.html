<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reports Center | Secure Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --pp-blue: #004990; --pp-accent: #00a1e0; }
        body { background: #f1f5f9; padding: 25px; font-family: 'Inter', sans-serif; }
        .report-container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 16px; padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .filter-section { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; padding: 20px; background: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0; align-items: end; }
        .report-label { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 8px; display: block; }
        
        /* Preview Table Styles */
        .results-card { margin-top: 30px; display: none; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; }
        .scroll-table { max-height: 500px; overflow-y: auto; background: white; }
        .slds-table thead th { background: #f8fafc !important; position: sticky; top: 0; z-index: 10; font-weight: 800 !important; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<div class="report-container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
        <div>
            <h1 style="font-size: 1.8rem; font-weight: 800; color: #002d5a;">Reports Center</h1>
            <p style="color: #64748b;">Select criteria to generate system-wide exports</p>
        </div>
        <a href="index.html" class="slds-button slds-button_neutral" style="border-radius: 10px;">HOME</a>
    </div>

    <div class="filter-section">
        <div>
            <label class="report-label">Report Type</label>
            <select id="reportType" class="slds-select" style="border-radius: 8px;" onchange="toggleInventoryFilters()">
                <option value="inventory">Inventory (Stock/Repairs)</option>
                <option value="deployments">Deployments (Merchant Installs)</option>
                <option value="returns">Returns (RMAs)</option>
            </select>
        </div>
        
        <div id="inventoryFilterContainer">
            <label class="report-label">Category</label>
            <select id="subFilter" class="slds-select" style="border-radius: 8px;">
                <option value="Warsaw Office">All Equipments in Warsaw Office</option>
                <option value="Warsaw Repairs">All Equipments in Repairs</option>
            </select>
        </div>

        <div>
            <label class="report-label">Start Date</label>
            <input type="date" id="startDate" class="slds-input" style="border-radius: 8px;">
        </div>
        <div>
            <label class="report-label">End Date</label>
            <input type="date" id="endDate" class="slds-input" style="border-radius: 8px;">
        </div>
    </div>

    <div style="text-align: center; display: flex; justify-content: center; gap: 15px;">
        <button class="slds-button slds-button_brand" style="width: 250px; height: 45px; font-weight: 700; border-radius: 10px;" onclick="runReport()">
            GENERATE PREVIEW
        </button>
    </div>

    <div id="resultsCard" class="results-card">
        <div style="padding: 15px 20px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center;">
            <h3 style="font-weight: 800; color: #002d5a;" id="previewTitle">Report Preview</h3>
            <div style="display: flex; gap: 10px;">
                <button class="slds-button slds-button_neutral" onclick="printReportPDF()">
                    <span class="material-icons" style="font-size:18px; vertical-align:middle; margin-right:5px;">picture_as_pdf</span>
                    PRINT PDF
                </button>
                <button class="slds-button slds-button_success" style="background: #166534; color: white;" onclick="handleCSVExport()">
                    <span class="material-icons" style="font-size:18px; vertical-align:middle; margin-right:5px;">download</span>
                    EXPORT CSV
                </button>
            </div>
        </div>
        <div class="scroll-table">
            <table class="slds-table slds-table_bordered slds-table_cell-buffer slds-no-row-hover">
                <thead id="reportHead"></thead>
                <tbody id="reportBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let currentRawData = [];

    function toggleInventoryFilters() {
        const type = document.getElementById('reportType').value;
        const container = document.getElementById('inventoryFilterContainer');
        container.style.visibility = (type === 'inventory') ? 'visible' : 'hidden';
    }

    async function runReport() {
        const type = document.getElementById('reportType').value;
        const start = document.getElementById('startDate').value;
        const end = document.getElementById('endDate').value;
        const subFilter = document.getElementById('subFilter').value;

        if (!start || !end) {
            Swal.fire('Missing Dates', 'Please select a date range to continue.', 'warning');
            return;
        }

        Swal.fire({ title: 'Preparing Preview...', didOpen: () => { Swal.showLoading(); } });

        try {
            const apiPath = type === 'inventory' ? '/api/equipments' : `/api/${type}`;
            const res = await fetch(apiPath, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    action: 'getMonthlyReport',
                    startDate: start,
                    endDate: end,
                    subFilter: type === 'inventory' ? subFilter : null,
                    exportMode: true 
                })
            });
            const result = await res.json();

            if (result.success && result.rawData && result.rawData.length > 0) {
                currentRawData = result.rawData;
                renderPreviewTable(result.rawData);
                document.getElementById('resultsCard').style.display = 'block';
                Swal.close();
            } else {
                document.getElementById('resultsCard').style.display = 'none';
                Swal.fire('No Data', 'No records found for the selected criteria.', 'info');
            }
        } catch (err) {
            Swal.fire('Error', 'Report generation failed.', 'error');
        }
    }

    function renderPreviewTable(data) {
        const head = document.getElementById('reportHead');
        const body = document.getElementById('reportBody');
        const keys = Object.keys(data[0]);

        head.innerHTML = `<tr>${keys.map(k => `<th>${k.toUpperCase().replace(/_/g, ' ')}</th>`).join('')}</tr>`;
        body.innerHTML = data.map(row => `
            <tr>${keys.map(k => `<td>${row[k] || '---'}</td>`).join('')}</tr>
        `).join('');
    }

   async function handleCSVExport() {
    const type = document.getElementById('reportType').value;
    const start = document.getElementById('startDate').value;
    const end = document.getElementById('endDate').value;
    const subFilter = document.getElementById('subFilter').value;

    let allData = [];
    let offset = 0;
    const limit = 1000;
    let totalRecords = 0;

    Swal.fire({
        title: 'Downloading Inventory...',
        html: `<div id="exportProgress">Preparing stream...</div>`,
        allowOutsideClick: false,
        didOpen: () => { Swal.showLoading(); }
    });

    try {
        const apiPath = type === 'inventory' ? '/api/equipments' : `/api/${type}`;
        
        while (true) {
            const res = await fetch(apiPath, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    action: 'getMonthlyReport',
                    startDate: start,
                    endDate: end,
                    subFilter: subFilter,
                    offset: offset,
                    limit: limit
                })
            });
            const result = await res.json();

            if (!result.success) throw new Error(result.message);
            
            allData = allData.concat(result.rawData);
            totalRecords = result.totalCount;
            
            // Update progress in the Swal modal
            document.getElementById('exportProgress').innerText = 
                `Fetched ${allData.length} of ${totalRecords} records...`;

            if (allData.length >= totalRecords || result.rawData.length < limit) break;
            offset += limit;
        }

        if (allData.length > 0) {
            downloadCSV(allData, `${type}_full_export.csv`);
            Swal.fire('Export Complete', `${allData.length} records exported successfully.`, 'success');
        } else {
            Swal.fire('No Data', 'No records found for this range.', 'info');
        }
    } catch (err) {
        console.error(err);
        Swal.fire('Error', 'Export failed: ' + err.message, 'error');
    }
}

    function downloadCSV(data, filename) {
        const headers = Object.keys(data[0]).join(',');
        const rows = data.map(row => Object.values(row).map(v => `"${v}"`).join(','));
        const csvContent = "data:text/csv;charset=utf-8," + headers + "\n" + rows.join("\n");
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", filename);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function printReportPDF() {
        window.print();
    }
</script>

<style type="text/css" media="print">
    body * { visibility: hidden; }
    #resultsCard, #resultsCard * { visibility: visible; }
    #resultsCard { position: absolute; left: 0; top: 0; width: 100%; border: none; }
    .slds-button { display: none !important; }
    .scroll-table { max-height: none !important; overflow: visible !important; }
</style>

</body>
</html>
