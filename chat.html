<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Messenger | Secure Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #f0f2f5; font-family: sans-serif; }
        .sidebar { width: 300px; border-right: 1px solid #ddd; background: #fff; display: flex; flex-direction: column; }
        .user-item { padding: 15px; cursor: pointer; border-bottom: 1px solid #eee; }
        .user-item:hover { background: #f0f2f5; }
        .chat-main { flex: 1; display: flex; flex-direction: column; background: #fff; }
        .msg-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 70%; padding: 10px; border-radius: 10px; background: #e4e6eb; }
        .bubble.me { align-self: flex-end; background: #0084ff; color: #fff; }
        .input-bar { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="padding:20px; font-weight:bold; border-bottom:1px solid #eee;">CHATS</div>
    <div id="userList" style="padding:20px;">Checking API...</div>
</div>

<div class="chat-main">
    <div id="chatHeader" style="padding:15px; border-bottom:1px solid #eee; font-weight:bold;">Select User</div>
    <div class="msg-container" id="msgHistory"></div>
    <div class="input-bar">
        <input type="text" id="msgInput" class="slds-input" placeholder="Type here...">
        <button onclick="send()" class="slds-button slds-button_brand">Send</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // 1. Identity Check
    const myId = localStorage.getItem('userid') || sessionStorage.getItem('pp_userid');
    let activeId = null;

    // 2. Load Users Function
    async function start() {
        const listDiv = document.getElementById('userList');
        try {
            console.log("Fetching from /api/chat...");
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'getUserList' })
            });

            const result = await response.json();
            
            if (result.success) {
                listDiv.innerHTML = result.data
                    .filter(u => u.userid !== myId)
                    .map(u => `
                        <div class="user-item" onclick="openChat('${u.userid}', '${u.first_name}')">
                            ${u.first_name} ${u.last_name || ''}
                        </div>
                    `).join('');
            } else {
                listDiv.innerText = "API Error: " + result.message;
            }
        } catch (err) {
            listDiv.innerText = "Connection Failed. Check Console.";
            console.error(err);
        }
    }

    // 3. Open Chat / Get History
    async function openChat(id, name) {
        activeId = id;
        document.getElementById('chatHeader').innerText = "Chat with " + name;
        const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'getHistory', sender_id: myId, recipient_id: id })
        });
        const result = await res.json();
        const hist = document.getElementById('msgHistory');
        hist.innerHTML = (result.data || []).map(m => `
            <div class="bubble ${m.sender_id === myId ? 'me' : 'them'}">${m.content}</div>
        `).join('');
    }

    // 4. Send Message
    async function send() {
        const input = document.getElementById('msgInput');
        if (!input.value || !activeId) return;
        
        const content = input.value;
        input.value = "";

        await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                action: 'sendMessage', 
                sender_id: myId, 
                recipient_id: activeId, 
                content: content 
            })
        });
        // Refresh view
        openChat(activeId, document.getElementById('chatHeader').innerText.replace("Chat with ", ""));
    }

    // Run the start function immediately
    start();

    // 5. Initialize Realtime AFTER start
    setTimeout(() => {
        try {
            const client = window.supabase.createClient('https://zuzwljjrppyrzngmhdru.supabase.co', 'sb_publishable_DgzVF5uoTSV1A_c0V7jvpQ_v96Ov0bO');
            client.channel('realtime-chat').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                const msg = payload.new;
                if ((msg.sender_id === activeId && msg.recipient_id === myId) || (msg.sender_id === myId && msg.recipient_id === activeId)) {
                    const div = document.createElement('div');
                    div.className = `bubble ${msg.sender_id === myId ? 'me' : 'them'}`;
                    div.innerText = msg.content;
                    document.getElementById('msgHistory').appendChild(div);
                }
            }).subscribe();
        } catch(e) { console.log("Realtime failed, falling back to manual refresh."); }
    }, 2000);
</script>
</body>
</html>
