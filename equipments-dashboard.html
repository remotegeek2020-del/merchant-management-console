<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Equipment Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background: #f8fafc; padding: 30px; font-family: 'Inter', sans-serif; }
        .slds-card { border-radius: 15px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .btn-new { background: #004990; color: white; padding: 10px 20px; border-radius: 8px; font-weight: 700; text-decoration: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1 style="font-size: 1.5rem; font-weight: 800; color: #004990;">Recent Hardware Activity</h1>
        <a href="equipments-form.html" class="btn-new">+ New Activity</a>
    </div>

    <article class="slds-card">
        <table class="slds-table slds-table_bordered slds-table_cell-buffer">
            <thead>
                <tr class="slds-line-height_reset">
                    <th scope="col">Equipment #</th>
                    <th scope="col">Type</th>
                    <th scope="col">Serial #</th>
                    <th scope="col">Merchant Account</th>
                    <th scope="col">Received Date</th>
                    <th scope="col">Date Created</th>
                </tr>
            </thead>
            <tbody id="dashboardBody"></tbody>
        </table>
    </article>

    <script>
        const API_URL = "/api/equipments";

        async function fetchDashboardData() {
            const tbody = document.getElementById('dashboardBody');
            tbody.innerHTML = "<tr><td colspan='6' style='text-align:center;'>Syncing...</td></tr>";

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ action: 'list', schemaId: '6717da1c4a74233fa104889f' })
                });

                const data = await res.json();
                tbody.innerHTML = "";
                
                (data.records || []).forEach(record => {
                    const p = record.properties || {};
                    const row = tbody.insertRow();
                    
                    // FIXED: Pulling from the specific HighLevel key
                    const eqID = p["custom_objects.equipments.equipment_id"] || p.equipment_id || '---';
                    const type = p["custom_objects.equipments.terminal_type"] || p.terminal_type || '---';
                    const serial = p["custom_objects.equipments.serial_number"] || p.serial_number || '---';
                    const merchant = p["custom_objects.equipments.merchant_account"] || p.merchant_account || '---';
                    const receivedDate = p["custom_objects.equipments.received_date"] || '---';

                    row.innerHTML = `
                        <td style="font-weight:700; color:#004990;">${eqID}</td>
                        <td>${type}</td>
                        <td>${serial}</td>
                        <td>${merchant}</td>
                        <td>${receivedDate}</td>
                        <td>${new Date(record.createdAt).toLocaleDateString()}</td>
                    `;
                });
            } catch (err) {
                tbody.innerHTML = "<tr><td colspan='6'>Fetch Error</td></tr>";
            }
        }

        window.onload = fetchDashboardData;
    </script>
</body>
</html>
