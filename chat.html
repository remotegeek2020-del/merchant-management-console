<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Staff Messenger</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #f0f2f5; font-family: sans-serif; }
        .sidebar { width: 300px; border-right: 1px solid #ddd; background: #fff; overflow-y: auto; }
        .user-item { padding: 15px; cursor: pointer; border-bottom: 1px solid #eee; }
        .user-item:hover { background: #f0f2f5; }
        .user-item.active { background: #e7f3ff; color: #0084ff; font-weight: bold; }
        .chat-main { flex: 1; display: flex; flex-direction: column; background: #fff; }
        .msg-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 70%; padding: 10px; border-radius: 10px; background: #e4e6eb; }
        .bubble.me { align-self: flex-end; background: #0084ff; color: #fff; }
        .input-bar { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="padding:20px; font-weight:bold; border-bottom:1px solid #eee;">CHATS</div>
    <div id="userList">System Booting...</div>
</div>

<div class="chat-main">
    <div id="chatHeader" style="padding:15px; border-bottom:1px solid #eee; font-weight:bold;">Select User</div>
    <div class="msg-container" id="msgHistory"></div>
    <div class="input-bar">
        <input type="text" id="msgInput" class="slds-input" placeholder="Type here..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()" class="slds-button slds-button_brand">Send</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // 1. Basic Setup
    const myUserId = localStorage.getItem('userid') || sessionStorage.getItem('pp_userid');
    let activeRecipientId = null;
    let supabase;

    // 2. Load Users First (The most important part)
    async function loadUsers() {
        console.log("Fetching users...");
        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'getUserList' })
            });
            const result = await res.json();
            
            if (result.success) {
                const list = document.getElementById('userList');
                list.innerHTML = result.data
                    .filter(u => u.userid !== myUserId)
                    .map(u => `
                        <div class="user-item" id="u-${u.userid}" onclick="selectUser('${u.userid}', '${u.first_name}')">
                            ${u.first_name} ${u.last_name || ''}
                        </div>
                    `).join('');
            }
        } catch (e) {
            document.getElementById('userList').innerText = "API Error: " + e.message;
        }
    }

    // 3. Connect Realtime Second (So it doesn't block loading)
    function initRealtime() {
        try {
            const SUPA_URL = 'https://zuzwljjrppyrzngmhdru.supabase.co';
            const SUPA_KEY = 'sb_publishable_DgzVF5uoTSV1A_c0V7jvpQ_v96Ov0bO';
            supabase = window.supabase.createClient(SUPA_URL, SUPA_KEY);

            supabase
                .channel('chat-room')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                    const newMsg = payload.new;
                    const isRelevant = 
                        (newMsg.sender_id === activeRecipientId && newMsg.recipient_id === myUserId) ||
                        (newMsg.sender_id === myUserId && newMsg.recipient_id === activeRecipientId);
                    
                    if (isRelevant) {
                        appendBubble(newMsg);
                    }
                })
                .subscribe();
            console.log("Realtime Connected.");
        } catch (e) {
            console.error("Realtime failed to start:", e);
        }
    }

    // 4. Chat Functions
    async function selectUser(id, name) {
        activeRecipientId = id;
        document.getElementById('chatHeader').innerText = "Chat with " + name;
        document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
        const el = document.getElementById(`u-${id}`);
        if(el) el.classList.add('active');

        const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'getHistory', sender_id: myUserId, recipient_id: id })
        });
        const result = await res.json();
        const hist = document.getElementById('msgHistory');
        hist.innerHTML = (result.data || []).map(m => `
            <div class="bubble ${m.sender_id === myUserId ? 'me' : 'them'}">${m.content}</div>
        `).join('');
        hist.scrollTop = hist.scrollHeight;
    }

    async function send() {
        const input = document.getElementById('msgInput');
        if (!input.value || !activeRecipientId) return;
        const val = input.value;
        input.value = "";

        await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'sendMessage', sender_id: myUserId, recipient_id: activeRecipientId, content: val })
        });
        // If realtime fails, we fallback to a manual refresh here
        if(!supabase) selectUser(activeRecipientId, "");
    }

    function appendBubble(msg) {
        const hist = document.getElementById('msgHistory');
        const div = document.createElement('div');
        div.className = `bubble ${msg.sender_id === myUserId ? 'me' : 'them'}`;
        div.innerText = msg.content;
        hist.appendChild(div);
        hist.scrollTop = hist.scrollHeight;
    }

    // Run
    loadUsers();
    initRealtime();
</script>
</body>
</html>
