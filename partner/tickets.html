<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tickets | PayProTec Partner Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        :root {
            --teal:#0d9488; --teal-dark:#0f766e; --teal-light:#ccfbf1; --teal-bg:#f0fdfa;
            --navy:#001e3c; --border:#e2e8f0; --surface:#f8fafc; --white:#ffffff;
            --text:#0a1628; --secondary:#475569; --muted:#94a3b8;
            --green:#10b981; --green-bg:#dcfce7; --green-text:#166534;
            --red:#ef4444; --red-bg:#fee2e2; --red-text:#991b1b;
            --amber:#f59e0b; --amber-bg:#fef3c7; --amber-text:#92400e;
            --blue-bg:#e0f2fe; --blue-text:#0369a1;
            --shadow-sm:0 1px 3px rgba(0,0,0,0.06);
        }
        body { margin:0; padding:0; font-family:'DM Sans',sans-serif; background:var(--surface); color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased; }
        .sidebar { position:fixed; top:0; left:0; width:240px; height:100vh; background:var(--navy); display:flex; flex-direction:column; z-index:100; box-shadow:4px 0 20px rgba(0,0,0,0.15); }
        .sidebar-header { padding:24px 20px 20px; border-bottom:1px solid rgba(255,255,255,0.08); }
        .sidebar-logo { height:28px; filter:brightness(0) invert(1); display:block; margin-bottom:16px; }
        .sidebar-partner { display:flex; align-items:center; gap:10px; }
        .sidebar-avatar { width:36px; height:36px; border-radius:50%; background:var(--teal); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14px; color:white; flex-shrink:0; }
        .sidebar-name { font-size:13px; font-weight:700; color:white; line-height:1.3; }
        .sidebar-tag { font-size:10px; color:rgba(255,255,255,0.4); font-weight:500; }
        .sidebar-nav { flex:1; padding:16px 12px; display:flex; flex-direction:column; gap:4px; }
        .nav-item { display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:10px; font-size:13px; font-weight:600; color:rgba(255,255,255,0.6); text-decoration:none; cursor:pointer; transition:all 0.2s; border:none; background:none; width:100%; font-family:'DM Sans',sans-serif; }
        .nav-item:hover { background:rgba(255,255,255,0.08); color:white; }
        .nav-item.active { background:var(--teal); color:white; }
        .nav-item .material-icons { font-size:20px; flex-shrink:0; }
        .nav-divider { height:1px; background:rgba(255,255,255,0.08); margin:8px 0; }
        .main { margin-left:240px; min-height:100vh; }
        .topbar { background:white; padding:16px 28px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:50; gap:12px; flex-wrap:wrap; }
        .topbar-title { font-size:1.2rem; font-weight:800; color:var(--text); margin:0; }
        .content { padding:24px 28px; max-width:1000px; }
        .btn { display:inline-flex; align-items:center; gap:6px; padding:9px 16px; border-radius:8px; font-size:12px; font-weight:700; font-family:'DM Sans',sans-serif; cursor:pointer; border:none; transition:all 0.2s; }
        .btn-teal { background:var(--teal); color:white; }
        .btn-teal:hover { background:var(--teal-dark); }
        .btn-outline { background:white; color:var(--secondary); border:1px solid var(--border); }
        .btn-outline:hover { border-color:var(--teal); color:var(--teal); }
        .filter-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
        .filter-btn { padding:6px 14px; border-radius:99px; font-size:12px; font-weight:700; border:1px solid var(--border); background:white; color:var(--secondary); cursor:pointer; transition:all 0.15s; }
        .filter-btn.active { background:var(--navy); color:white; border-color:var(--navy); }
        .ticket-card { background:white; border:1px solid var(--border); border-radius:12px; padding:16px 20px; margin-bottom:10px; cursor:pointer; transition:all 0.15s; display:flex; align-items:flex-start; gap:14px; }
        .ticket-card:hover { box-shadow:0 4px 16px rgba(0,0,0,0.08); border-color:var(--teal); }
        .ticket-icon { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0; position:relative; }
        .unread-dot { position:absolute; top:-5px; right:-5px; background:#ef4444; color:white; font-size:9px; font-weight:800; min-width:16px; height:16px; border-radius:99px; display:flex; align-items:center; justify-content:center; padding:0 3px; border:2px solid white; }
        .ticket-icon.deployment { background:var(--blue-bg); color:var(--blue-text); }
        .ticket-icon.rma { background:var(--amber-bg); color:var(--amber-text); }
        .ticket-icon.general { background:#f3e8ff; color:#7c3aed; }
        .ticket-body { flex:1; min-width:0; }
        .ticket-num { font-size:10px; font-weight:700; color:var(--muted); font-family:'DM Mono',monospace; margin-bottom:2px; }
        .ticket-subject { font-weight:700; color:var(--text); font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .ticket-meta { font-size:11px; color:var(--muted); margin-top:4px; }
        .ticket-right { display:flex; flex-direction:column; align-items:flex-end; gap:5px; flex-shrink:0; }
        .badge { display:inline-flex; align-items:center; padding:3px 10px; border-radius:99px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.4px; white-space:nowrap; }
        .badge-open { background:var(--blue-bg); color:var(--blue-text); }
        .badge-in_progress { background:var(--amber-bg); color:var(--amber-text); }
        .badge-resolved { background:var(--green-bg); color:var(--green-text); }
        .badge-closed { background:#f1f5f9; color:#475569; }
        .badge-urgent { background:var(--red-bg); color:var(--red-text); }
        .badge-high { background:var(--amber-bg); color:var(--amber-text); }
        .badge-normal { background:#f1f5f9; color:#64748b; }
        .badge-low { background:#f0fdf4; color:#166534; }
        .empty { padding:60px 20px; text-align:center; color:var(--muted); }
        .empty .material-icons { font-size:48px; opacity:0.3; display:block; margin-bottom:12px; }
        @media (max-width:640px) { .sidebar{transform:translateX(-100%);} .main{margin-left:0;} .content{padding:16px;} }

        /* Pagination */
        .pagination-bar { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-top:16px; }
        .page-btn { min-width:32px; height:32px; border-radius:8px; border:1px solid var(--border); background:white; color:var(--text); font-size:12px; font-weight:700; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; transition:all 0.15s; padding:0 6px; font-family:'DM Sans',sans-serif; }
        .page-btn:hover:not(:disabled) { border-color:var(--teal); color:var(--teal); }
        .page-btn.active { background:var(--teal); color:white; border-color:var(--teal); }
        .page-btn:disabled { opacity:0.4; cursor:default; }
        .page-size-btn { padding:4px 11px; border-radius:6px; border:1px solid var(--border); background:white; color:var(--secondary); font-size:11px; font-weight:700; cursor:pointer; transition:all 0.15s; font-family:'DM Sans',sans-serif; }
        .page-size-btn.active { background:var(--navy); color:white; border-color:var(--navy); }
        @keyframes spin { to { transform:rotate(360deg); } }
        .swal-above-modal.swal2-container { z-index: 99999 !important; }

        /* Ticket detail modal */
        .t-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:9999; align-items:center; justify-content:center; }
        .t-modal.open { display:flex; }
        .t-modal-box { background:white; border-radius:16px; width:95%; max-width:640px; box-shadow:0 30px 60px rgba(0,0,0,0.2); overflow:hidden; max-height:92vh; display:flex; flex-direction:column; }
        .t-header { padding:16px 20px; background:var(--navy); display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
        .t-body { overflow-y:auto; flex:1; }
        .t-section { padding:16px 20px; border-bottom:1px solid var(--border); }
        .t-section:last-child { border-bottom:none; }
        .t-label { font-size:9px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.6px; margin-bottom:10px; }
        .t-row { display:flex; justify-content:space-between; margin-bottom:6px; font-size:13px; }
        .t-key { color:var(--muted); }
        .t-val { font-weight:600; text-align:right; max-width:65%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

        /* Comment thread */
        .comment-thread { display:flex; flex-direction:column; gap:10px; }
        .c-entry { display:flex; gap:9px; }
        .c-entry.staff { flex-direction:row; }
        .c-entry.partner { flex-direction:row-reverse; }
        .c-avatar { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; flex-shrink:0; margin-top:2px; }
        .c-entry.staff .c-avatar { background:var(--navy); color:white; }
        .c-entry.partner .c-avatar { background:var(--teal); color:white; }
        .c-bubble { max-width:78%; padding:9px 13px; border-radius:12px; font-size:12px; line-height:1.55; }
        .c-entry.staff .c-bubble { background:#f0fdfa; color:#134e4a; border:1px solid #99f6e4; border-radius:2px 12px 12px 12px; }
        .c-entry.partner .c-bubble { background:var(--navy); color:white; border-radius:12px 2px 12px 12px; }
        .c-meta { font-size:10px; color:var(--muted); margin-top:3px; }
        .c-entry.partner .c-meta { text-align:right; }
        .system-event { text-align:center; font-size:11px; color:var(--muted); padding:2px 0; display:flex; align-items:center; gap:8px; }
        .system-event::before, .system-event::after { content:''; flex:1; height:1px; background:var(--border); }

        /* Reply box */
        .reply-box { display:flex; gap:10px; align-items:flex-end; }
        .reply-input { flex:1; padding:10px 13px; border:1.5px solid var(--border); border-radius:10px; font-size:13px; font-family:'DM Sans',sans-serif; color:var(--text); background:#f8fafc; outline:none; resize:none; min-height:72px; transition:border-color 0.2s; }
        .reply-input:focus { border-color:var(--teal); background:white; }
        .reply-send-btn { background:var(--teal); color:white; border:none; border-radius:10px; padding:10px 14px; cursor:pointer; font-family:'DM Sans',sans-serif; font-weight:700; font-size:12px; display:flex; align-items:center; gap:5px; white-space:nowrap; transition:background 0.2s; }
        .reply-send-btn:hover { background:var(--teal-dark); }
        .reply-send-btn:disabled { opacity:0.6; cursor:default; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-header">
        <img src="https://assets.cdn.filesafe.space/dfg08aPdtlQ1RhIKkCnN/media/66cf5cf28a35e448970f1ead.png" class="sidebar-logo" alt="PayProTec">
        <div class="sidebar-partner">
            <div class="sidebar-avatar" id="avatarInitial">?</div>
            <div>
                <div class="sidebar-name" id="partnerName">Loading...</div>
                <div class="sidebar-tag">Partner Portal</div>
            </div>
        </div>
    </div>
    <nav class="sidebar-nav">
        <a class="nav-item" href="/partner/dashboard"><span class="material-icons">dashboard</span> Overview</a>
        <a class="nav-item" href="/partner/merchants"><span class="material-icons">storefront</span> My Merchants</a>
        <a class="nav-item" href="/partner/community"><span class="material-icons">groups</span> Community</a>
        <a class="nav-item" href="/partner/messages"><span class="material-icons">forum</span> Messages</a>
        <a class="nav-item active" href="/partner/tickets"><span class="material-icons">confirmation_number</span> My Tickets</a>
        <a class="nav-item" href="/partner/profile"><span class="material-icons">account_circle</span> My Profile</a>
        <a class="nav-item" href="/partner/settings"><span class="material-icons">settings</span> Settings</a>
        <div class="nav-divider"></div>
        <button class="nav-item" onclick="handleLogout()"><span class="material-icons">logout</span> Sign Out</button>
    </nav>
</aside>

<div class="main">
    <div class="topbar">
        <h1 class="topbar-title">My Tickets</h1>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
            <button class="btn btn-outline" onclick="openGeneralTicket()">
                <span class="material-icons" style="font-size:16px;">help_outline</span>
                General Support
            </button>
            <button class="btn btn-teal" onclick="window.location.href='/partner/merchants'">
                <span class="material-icons" style="font-size:16px;">local_shipping</span>
                New Merchant Ticket
            </button>
        </div>
    </div>

    <div class="content">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:20px;">
            <div class="filter-bar" style="margin-bottom:0;">
                <button class="filter-btn active" data-filter="all" onclick="setFilter(this,'all')">All</button>
                <button class="filter-btn" data-filter="open" onclick="setFilter(this,'open')">Open</button>
                <button class="filter-btn" data-filter="in_progress" onclick="setFilter(this,'in_progress')">In Progress</button>
                <button class="filter-btn" data-filter="resolved" onclick="setFilter(this,'resolved')">Resolved</button>
                <button class="filter-btn" data-filter="closed" onclick="setFilter(this,'closed')">Closed</button>
            </div>
            <div style="display:flex;align-items:center;gap:6px;">
                <span style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;">Show:</span>
                <button class="page-size-btn active" onclick="setPageSize(20)">20</button>
                <button class="page-size-btn" onclick="setPageSize(50)">50</button>
                <button class="page-size-btn" onclick="setPageSize(100)">100</button>
            </div>
        </div>

        <div id="ticket-list">
            <div style="text-align:center; padding:40px; color:var(--muted);">
                <span class="material-icons" style="font-size:32px; animation:spin 0.8s linear infinite; display:block; margin-bottom:8px;">sync</span>
                Loading tickets...
            </div>
        </div>
        <div id="ticket-pagination"></div>
    </div>
</div>

<!-- Ticket Detail Modal -->
<div class="t-modal" id="t-modal">
    <div class="t-modal-box">
        <div class="t-header">
            <div>
                <div style="font-weight:800; font-size:14px; color:white;" id="t-modal-num">Ticket</div>
                <div style="font-size:11px; color:rgba(255,255,255,0.6); margin-top:1px;" id="t-modal-sub"></div>
            </div>
            <button onclick="closeTicketModal()" style="background:none;border:none;color:white;cursor:pointer;padding:4px;"><span class="material-icons">close</span></button>
        </div>
        <div class="t-body" id="t-modal-body">
            <div style="padding:40px;text-align:center;color:var(--muted);">Loading...</div>
        </div>
    </div>
</div>

<script>
const token = localStorage.getItem('pp_partner_token');
if (!token) window.location.href = '/partner';

let allTickets = [];
let currentFilter = 'all';
let currentViewTicketId = null;
let currentPage = 0;
let pageSize = 20;

const name = localStorage.getItem('pp_partner_name') || '';
if (name) {
    document.getElementById('partnerName').textContent = name;
    document.getElementById('avatarInitial').textContent = name.charAt(0).toUpperCase();
}

const escapeHtml = s => s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;') : '';
const typeIcon = t => t === 'deployment_request' ? 'local_shipping' : t === 'rma_request' ? 'assignment_return' : 'help_outline';
const typeClass = t => t === 'deployment_request' ? 'deployment' : t === 'rma_request' ? 'rma' : 'general';
const typeLabel = t => t === 'deployment_request' ? 'Deployment' : t === 'rma_request' ? 'Returns / RMA' : 'General Support';
const timeAgo = d => {
    const s = Math.floor((Date.now() - new Date(d)) / 1000);
    if (s < 60) return s + 's ago';
    if (s < 3600) return Math.floor(s/60) + 'm ago';
    if (s < 86400) return Math.floor(s/3600) + 'h ago';
    return Math.floor(s/86400) + 'd ago';
};

async function loadTickets() {
    const r = await fetch('/api/tickets', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'list_for_partner', token })
    });
    const result = await r.json();
    if (!result.success) {
        if (r.status === 401) { localStorage.clear(); window.location.href = '/partner'; return; }
        document.getElementById('ticket-list').innerHTML = `<div class="empty"><span class="material-icons">error_outline</span>Failed to load tickets.</div>`;
        return;
    }
    allTickets = result.data || [];
    renderTickets();
}

function renderTickets() {
    const filtered = currentFilter === 'all' ? allTickets : allTickets.filter(t => t.status === currentFilter);
    const container = document.getElementById('ticket-list');
    const pagEl = document.getElementById('ticket-pagination');

    if (!filtered.length) {
        container.innerHTML = `<div class="empty"><span class="material-icons">confirmation_number</span>${currentFilter === 'all' ? 'No tickets yet. Open a ticket from your merchant page or use General Support above.' : 'No ' + currentFilter.replace('_', ' ') + ' tickets.'}</div>`;
        if (pagEl) pagEl.innerHTML = '';
        return;
    }

    const total = filtered.length;
    const totalPages = Math.max(1, Math.ceil(total / pageSize));
    if (currentPage >= totalPages) currentPage = totalPages - 1;
    if (currentPage < 0) currentPage = 0;

    const start = currentPage * pageSize;
    const pageItems = filtered.slice(start, start + pageSize);

    container.innerHTML = pageItems.map(t => `
        <div class="ticket-card" data-id="${t.id}" onclick="viewTicket(${t.id})">
            <div class="ticket-icon ${typeClass(t.type)}">
                <span class="material-icons" style="font-size:20px;">${typeIcon(t.type)}</span>
                ${t.partner_unread_count > 0 ? `<div class="unread-dot">${t.partner_unread_count > 9 ? '9+' : t.partner_unread_count}</div>` : ''}
            </div>
            <div class="ticket-body">
                <div class="ticket-num">${t.ticket_number} · ${typeLabel(t.type)}</div>
                <div class="ticket-subject">${escapeHtml(t.subject)}</div>
                <div class="ticket-meta">
                    ${t.merchants?.dba_name ? `<span>${t.merchants.dba_name}</span> · ` : ''}
                    Opened ${timeAgo(t.created_at)} · Updated ${timeAgo(t.updated_at)}
                </div>
                ${(t.linked_deployment_id || t.linked_return_id) ? `<div style="margin-top:5px; display:flex; gap:4px; flex-wrap:wrap;">
                    ${t.linked_deployment_id ? `<span style="font-size:10px; font-family:'DM Mono',monospace; background:#1e3a5f; color:#60a5fa; border-radius:4px; padding:2px 7px; white-space:nowrap;">DPL ${t.linked_deployment_id}</span>` : ''}
                    ${t.linked_return_id ? `<span style="font-size:10px; font-family:'DM Mono',monospace; background:#3b1f1f; color:#f87171; border-radius:4px; padding:2px 7px; white-space:nowrap;">RMA ${t.linked_return_id}</span>` : ''}
                </div>` : ''}
            </div>
            <div class="ticket-right">
                <span class="badge badge-${t.status}">${t.status.replace('_',' ')}</span>
                <span class="badge badge-${t.priority}" style="font-size:9px;">${t.priority}</span>
            </div>
        </div>`).join('');

    if (pagEl) renderPagination(total, totalPages);
}

function renderPagination(total, totalPages) {
    const pag = document.getElementById('ticket-pagination');
    if (!pag) return;
    if (totalPages <= 1) { pag.innerHTML = ''; return; }

    const start = currentPage * pageSize + 1;
    const end = Math.min((currentPage + 1) * pageSize, total);

    const visibleSet = new Set(
        [0, totalPages - 1, currentPage - 1, currentPage, currentPage + 1].filter(p => p >= 0 && p < totalPages)
    );
    const sorted = [...visibleSet].sort((a, b) => a - b);

    let pageButtons = '';
    let prev = -1;
    for (const p of sorted) {
        if (prev !== -1 && p - prev > 1) pageButtons += `<span style="padding:0 2px;color:var(--muted);font-size:13px;">…</span>`;
        pageButtons += `<button class="page-btn ${p === currentPage ? 'active' : ''}" onclick="goToPage(${p})">${p + 1}</button>`;
        prev = p;
    }

    pag.innerHTML = `<div class="pagination-bar">
        <span style="font-size:12px;color:var(--muted);">Showing ${start}–${end} of ${total}</span>
        <div style="display:flex;gap:4px;align-items:center;">
            <button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 0 ? 'disabled' : ''}>
                <span class="material-icons" style="font-size:16px;">chevron_left</span>
            </button>
            ${pageButtons}
            <button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage >= totalPages - 1 ? 'disabled' : ''}>
                <span class="material-icons" style="font-size:16px;">chevron_right</span>
            </button>
        </div>
    </div>`;
}

function setPageSize(n) {
    pageSize = n;
    currentPage = 0;
    document.querySelectorAll('.page-size-btn').forEach(b => b.classList.toggle('active', parseInt(b.textContent) === n));
    renderTickets();
}

function goToPage(p) {
    currentPage = p;
    renderTickets();
    document.querySelector('.content')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function setFilter(btn, filter) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = filter;
    currentPage = 0;
    renderTickets();
}

async function viewTicket(ticketId) {
    currentViewTicketId = ticketId;
    document.getElementById('t-modal-num').textContent = 'Loading...';
    document.getElementById('t-modal-sub').textContent = '';
    document.getElementById('t-modal-body').innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted);">Loading...</div>';
    document.getElementById('t-modal').classList.add('open');
    // Clear badge immediately in DOM and local state
    const existing = allTickets.find(a => a.id === ticketId);
    if (existing) { existing.partner_unread_count = 0; }
    updatePartnerBadgeInDOM(ticketId, 0);

    const [ticketRes, commentsRes] = await Promise.all([
        fetch('/api/tickets', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'get_detail', ticket_id: ticketId, token }) }),
        fetch('/api/tickets', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'get_comments', ticket_id: ticketId, token }) })
    ]);
    const tr = await ticketRes.json();
    const cr = await commentsRes.json();

    if (!tr.success) {
        document.getElementById('t-modal-body').innerHTML = `<div style="padding:20px;color:#ef4444;">Error: ${tr.message}</div>`;
        return;
    }

    const t = tr.ticket;
    const comments = cr.comments || [];
    document.getElementById('t-modal-num').textContent = t.ticket_number;
    document.getElementById('t-modal-sub').textContent = t.subject;

    const statusColors = { open:'#0369a1', in_progress:'#92400e', resolved:'#166534', closed:'#475569' };
    const statusBgs = { open:'#e0f2fe', in_progress:'#fef3c7', resolved:'#dcfce7', closed:'#f1f5f9' };

    // Linked records banners (visible to partner)
    let linkedBanners = '';
    if (t.linked_deployment_id) {
        linkedBanners += `<div onclick="showDeploymentDetail('${t.linked_deployment_id}', ${t.id})" style="background:#e0f2fe;border:1px solid #bae6fd;border-radius:8px;padding:11px 14px;margin-bottom:10px;font-size:12px;color:#0369a1;display:flex;align-items:center;gap:8px;cursor:pointer;transition:box-shadow 0.15s;" onmouseover="this.style.boxShadow='0 4px 12px rgba(3,105,161,0.15)'" onmouseout="this.style.boxShadow='none'">
            <span class="material-icons" style="font-size:18px;">local_shipping</span>
            <div style="flex:1;"><strong>Deployment Processed</strong><br>Your hardware deployment is underway. Reference: <span style="font-family:'DM Mono',monospace;font-weight:700;">${t.linked_deployment_id}</span></div>
            <span class="material-icons" style="font-size:16px;opacity:0.6;">open_in_new</span>
        </div>`;
    }
    if (t.linked_return_id) {
        linkedBanners += `<div style="background:#fef3c7;border:1px solid #fde68a;border-radius:8px;padding:11px 14px;margin-bottom:10px;font-size:12px;color:#92400e;">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:${t.status !== 'closed' && t.status !== 'resolved' ? '8' : '0'}px;">
                <span class="material-icons" style="font-size:18px;">assignment_return</span>
                <div><strong>Return / RMA Initiated</strong><br>Your equipment return is in transit for inspection. Reference: <span style="font-family:'DM Mono',monospace;font-weight:700;">${t.linked_return_id}</span></div>
            </div>
            ${t.status !== 'closed' && t.status !== 'resolved' ? `
            <button onclick="addEquipToRMA('${t.linked_return_id}', ${t.id})" style="background:#92400e;color:white;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:6px;">
                <span class="material-icons" style="font-size:14px;">add_circle_outline</span> Add Equipment to This RMA
            </button>` : ''}
        </div>`;
    }

    const commentsHtml = comments.length === 0
        ? `<div style="text-align:center;font-size:12px;color:var(--muted);padding:16px 0;">No messages yet.</div>`
        : comments.map(c => {
            if (c.author_type === 'system') {
                return `<div class="system-event">${escapeHtml(c.change_summary)} <span style="opacity:0.65;"> · ${timeAgo(c.created_at)}</span></div>`;
            }
            const isPartner = c.author_type === 'partner';
            const initials = (c.author_name || '?').split(' ').map(w => w[0]).slice(0,2).join('').toUpperCase();
            return `<div class="c-entry ${isPartner ? 'partner' : 'staff'}">
                <div class="c-avatar">${initials}</div>
                <div>
                    <div class="c-bubble">${escapeHtml(c.body)}</div>
                    <div class="c-meta">${escapeHtml(c.author_name)} · ${timeAgo(c.created_at)}</div>
                </div>
            </div>`;
        }).join('');

    const isClosed = t.status === 'closed' || t.status === 'resolved';

    document.getElementById('t-modal-body').innerHTML = `
        <div class="t-section">
            <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:12px;">
                <span style="background:${statusBgs[t.status]};color:${statusColors[t.status]};padding:4px 12px;border-radius:99px;font-size:11px;font-weight:700;text-transform:capitalize;">${t.status.replace('_',' ')}</span>
                <span style="background:#f1f5f9;color:#64748b;padding:4px 12px;border-radius:99px;font-size:11px;font-weight:700;">${typeLabel(t.type)}</span>
                <span style="background:#f1f5f9;color:#64748b;padding:4px 12px;border-radius:99px;font-size:11px;font-weight:700;text-transform:capitalize;">${t.priority} priority</span>
            </div>
            ${t.merchants?.dba_name ? `<div style="font-size:12px;color:var(--muted);margin-bottom:8px;"><span class="material-icons" style="font-size:14px;vertical-align:middle;">storefront</span> ${t.merchants.dba_name} · <span style="font-family:'DM Mono',monospace;">${t.merchants.merchant_id}</span></div>` : ''}
            ${t.description ? `<div style="background:#f8fafc;border-radius:8px;padding:12px 14px;font-size:13px;color:#475569;line-height:1.6;">${escapeHtml(t.description)}</div>` : ''}
            <div style="font-size:11px;color:var(--muted);margin-top:10px;">
                Opened ${timeAgo(t.created_at)}
                ${t.assigned_to ? ` · Assigned to <strong>${t.assigned_to}</strong>` : ''}
            </div>
        </div>
        ${linkedBanners ? `<div class="t-section">${linkedBanners}</div>` : ''}
        <div class="t-section">
            <div class="t-label">Conversation</div>
            <div class="comment-thread" style="margin-bottom:16px;">${commentsHtml}</div>
            ${!isClosed ? `
            <div class="reply-box">
                <textarea id="partner-reply" class="reply-input" placeholder="Type your reply or question..."></textarea>
                <button class="reply-send-btn" id="partner-send-btn" onclick="submitPartnerComment()">
                    <span class="material-icons" style="font-size:16px;">send</span>
                    Send
                </button>
            </div>` : `<div style="font-size:12px;color:var(--muted);text-align:center;padding:8px;">This ticket is ${t.status}. Open a new ticket if you need further assistance.</div>`}
        </div>`;
}

async function submitPartnerComment() {
    const body = document.getElementById('partner-reply')?.value?.trim();
    if (!body) return;

    const btn = document.getElementById('partner-send-btn');
    if (btn) { btn.disabled = true; btn.innerHTML = '<span class="material-icons" style="font-size:14px;animation:spin 0.7s linear infinite;">sync</span>'; }

    const r = await fetch('/api/tickets', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ action:'add_comment', ticket_id: currentViewTicketId, body, token })
    });
    const result = await r.json();
    if (result.success) {
        viewTicket(currentViewTicketId);
    } else {
        if (btn) { btn.disabled = false; btn.innerHTML = '<span class="material-icons" style="font-size:16px;">send</span> Send'; }
        Swal.fire('Error', result.message || 'Could not send reply.', 'error');
    }
}

async function addEquipToRMA(returnDisplayId, ticketId) {
    Swal.fire({ title: 'Loading available units...', didOpen: () => Swal.showLoading() });
    const r = await fetch('/api/tickets', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'get_rma_addable_items', token, return_display_id: returnDisplayId })
    });
    const result = await r.json();
    Swal.close();

    if (!result.success) { Swal.fire('Error', result.message || 'Could not load units.', 'error'); return; }
    if (!result.items?.length) {
        Swal.fire('No Units Available', 'All units from this deployment are already included in the RMA.', 'info');
        return;
    }

    const { value: selected } = await Swal.fire({
        title: 'Add Equipment to RMA',
        showCancelButton: true,
        confirmButtonColor: '#0d9488',
        confirmButtonText: 'Add Equipment',
        html: `
        <div style="text-align:left;font-size:13px;">
            <div style="background:#fef3c7;border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:11px;color:#92400e;">
                Select additional equipment to add to <strong>${returnDisplayId}</strong>.
            </div>
            ${result.items.map(item => `
                <label style="display:flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid #e2e8f0;border-radius:6px;margin-bottom:4px;cursor:pointer;background:white;font-size:12px;">
                    <input type="checkbox" class="add-equip-cb" value="${item.equipment_id}" style="width:14px;height:14px;flex-shrink:0;">
                    <span>${item.equip?.terminal_type || '—'} — <span style="font-family:'DM Mono',monospace;">${item.equip?.serial_number || '—'}</span></span>
                </label>
            `).join('')}
        </div>`,
        preConfirm: () => {
            const ids = [...document.querySelectorAll('.add-equip-cb:checked')].map(cb => cb.value);
            if (!ids.length) { Swal.showValidationMessage('Please select at least one unit'); return false; }
            return ids;
        }
    });

    if (!selected) return;
    Swal.fire({ title: 'Adding equipment...', didOpen: () => Swal.showLoading() });
    const r2 = await fetch('/api/tickets', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'add_items_to_rma', token, return_uuid: result.rma_uuid, equipment_ids: selected })
    });
    const res2 = await r2.json();
    if (res2.success) {
        await Swal.fire({ icon: 'success', title: 'Equipment Added!', html: `${res2.added} unit(s) added to <strong>${returnDisplayId}</strong>. Our team will include them in the return.`, confirmButtonColor: '#0d9488' });
        loadTickets();
    } else {
        Swal.fire('Error', res2.message || 'Could not add equipment.', 'error');
    }
}

async function showDeploymentDetail(deploymentId, ticketId) {
    Swal.fire({ title: 'Loading deployment...', didOpen: () => { Swal.showLoading(); Swal.getContainer().style.zIndex = '99999'; } });
    const r = await fetch('/api/tickets', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'get_linked_deployment', token, deployment_id: deploymentId })
    });
    const result = await r.json();
    if (!result.success) {
        Swal.fire('Error', result.message || 'Could not load deployment.', 'error');
        return;
    }
    const dep = result.deployment;
    const eq = dep.equipments || {};
    const isClosed = dep.status === 'Closed';
    const isBulk = dep.is_bulk;
    const bulkItems = isBulk ? (dep.deployment_items || []).map(i => ({ serial_number: i.equip?.serial_number, terminal_type: i.equip?.terminal_type, tid: i.tid })) : null;
    const zFix = { didOpen: (p) => { Swal.getContainer().style.zIndex = '99999'; } };

    const statusColors = { Open: '#0369a1', 'In Transit': '#92400e', Closed: '#166534' };
    const statusBgs = { Open: '#e0f2fe', 'In Transit': '#fef3c7', Closed: '#dcfce7' };
    const statusColor = statusColors[dep.status] || '#475569';
    const statusBg = statusBgs[dep.status] || '#f1f5f9';

    const trackingHtml = dep.tracking_id
        ? `<a href="https://parcelsapp.com/en/tracking/${dep.tracking_id}" target="_blank" rel="noopener" style="color:#0369a1;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;gap:4px;">${dep.tracking_id} <span class="material-icons" style="font-size:12px;">open_in_new</span></a>`
        : '<span style="color:#94a3b8;">Not assigned</span>';

    const deliverBtn = !isClosed
        ? `<button id="swal-deliver-btn" style="background:#10b981;color:white;border:none;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:6px;margin-top:4px;width:100%;justify-content:center;">
                <span class="material-icons" style="font-size:16px;">check_circle</span> Mark as Delivered
           </button>`
        : `<div style="background:#dcfce7;color:#166534;border-radius:8px;padding:10px;text-align:center;font-size:12px;font-weight:700;margin-top:4px;">
                <span class="material-icons" style="font-size:14px;vertical-align:middle;">verified</span> Equipment Delivered
           </div>`;

    await Swal.fire({
        title: dep.deployment_id,
        customClass: { container: 'swal-above-modal' },
        html: `
            <div style="text-align:left;font-size:13px;">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
                    <span style="background:${statusBg};color:${statusColor};padding:4px 12px;border-radius:99px;font-size:11px;font-weight:700;">${dep.status}</span>
                    ${dep.purchase_type ? `<span style="background:#f1f5f9;color:#64748b;padding:4px 12px;border-radius:99px;font-size:11px;font-weight:700;">${dep.purchase_type}</span>` : ''}
                </div>
                <div style="background:#f8fafc;border-radius:8px;padding:12px 14px;margin-bottom:12px;">
                    <div style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;margin-bottom:6px;">Equipment</div>
                    ${isBulk && bulkItems?.length ? `
                        <div style="font-size:10px;font-weight:700;color:#1d4ed8;margin-bottom:6px;">${bulkItems.length} unit${bulkItems.length !== 1 ? 's' : ''} (bulk deployment)</div>
                        ${bulkItems.map(item => `
                            <div style="display:flex;gap:8px;align-items:center;padding:6px 8px;background:white;border:1px solid #e2e8f0;border-radius:6px;margin-bottom:3px;">
                                <span style="font-weight:700;color:#0a1628;font-size:12px;">${item.terminal_type || '---'}</span>
                                <span style="font-family:'DM Mono',monospace;font-size:11px;color:#0d9488;">${item.serial_number || '---'}</span>
                                ${item.tid ? `<span style="font-size:10px;color:#64748b;margin-left:auto;">TID: ${item.tid}</span>` : ''}
                            </div>
                        `).join('')}
                    ` : `
                        <div style="font-weight:700;color:#0a1628;">${eq.terminal_type || '---'}</div>
                        <div style="font-family:'DM Mono',monospace;font-size:12px;color:#0d9488;margin-top:2px;">${eq.serial_number || '---'}</div>
                    `}
                </div>
                <div style="background:#f8fafc;border-radius:8px;padding:12px 14px;margin-bottom:12px;">
                    <div style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;margin-bottom:6px;">Tracking</div>
                    ${trackingHtml}
                </div>
                ${dep.target_deployment_date ? `<div style="font-size:11px;color:#64748b;margin-bottom:12px;">Deployment date: <strong>${new Date(dep.target_deployment_date.includes('T') ? dep.target_deployment_date : dep.target_deployment_date + 'T12:00:00Z').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</strong></div>` : ''}
                ${dep.merchant_received_date ? `<div style="font-size:11px;color:#166534;margin-bottom:12px;font-weight:600;"><span style="vertical-align:middle;">✓</span> Received: <strong>${new Date(dep.merchant_received_date + 'T12:00:00Z').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</strong></div>` : ''}
                ${deliverBtn}
            </div>`,
        showConfirmButton: false,
        showCloseButton: true,
        didOpen: (popup) => {
            Swal.getContainer().style.zIndex = '99999';
            const btn = document.getElementById('swal-deliver-btn');
            if (btn) {
                btn.addEventListener('click', async () => {
                    btn.disabled = true;
                    btn.innerHTML = '<span class="material-icons" style="font-size:14px;animation:spin 0.7s linear infinite;vertical-align:middle;">sync</span> Processing...';
                    const res = await fetch('/api/tickets', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'mark_delivered', token, deployment_id: dep.deployment_id, ticket_id: ticketId })
                    });
                    const out = await res.json();
                    if (out.success) {
                        Swal.fire({ icon: 'success', title: 'Delivered!', text: 'Equipment marked as received. Your ticket has been closed.', confirmButtonColor: '#0d9488' })
                            .then(() => viewTicket(ticketId));
                    } else {
                        Swal.fire('Error', out.message || 'Could not update.', 'error');
                    }
                });
            }
        }
    });
}

function closeTicketModal() {
    document.getElementById('t-modal').classList.remove('open');
    currentViewTicketId = null;
}

document.getElementById('t-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('t-modal')) closeTicketModal();
});

async function openGeneralTicket() {
    const { value: form } = await Swal.fire({
        title: 'General Support Ticket',
        showCancelButton: true,
        confirmButtonColor: '#0d9488',
        confirmButtonText: 'Submit Ticket',
        html: `
            <div style="text-align:left;font-size:13px;">
                <label style="display:block;font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;margin-bottom:4px;">Category *</label>
                <select id="gCat" class="swal2-input" style="margin:0 0 12px;">
                    <option value="">Select category...</option>
                    <option value="Technical Support">Technical Support</option>
                    <option value="Account Questions">Account Questions</option>
                    <option value="Billing Issues">Billing Issues</option>
                    <option value="Portal Help">Portal Help</option>
                    <option value="Other">Other</option>
                </select>
                <label style="display:block;font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;margin-bottom:4px;">Subject *</label>
                <input id="gSubject" class="swal2-input" style="margin:0 0 12px;" placeholder="Brief description of your issue">
                <label style="display:block;font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;margin-bottom:4px;">Priority</label>
                <select id="gPriority" class="swal2-input" style="margin:0 0 12px;">
                    <option value="normal">Normal</option>
                    <option value="high">High</option>
                    <option value="urgent">Urgent</option>
                    <option value="low">Low</option>
                </select>
                <label style="display:block;font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;margin-bottom:4px;">Description</label>
                <textarea id="gDesc" class="swal2-textarea" placeholder="Please describe your issue in detail..." style="margin:0;height:100px;"></textarea>
            </div>`,
        preConfirm: () => {
            const category = document.getElementById('gCat').value;
            const subject = document.getElementById('gSubject').value.trim();
            if (!category) { Swal.showValidationMessage('Please select a category'); return false; }
            if (!subject) { Swal.showValidationMessage('Subject is required'); return false; }
            return {
                category, subject,
                priority: document.getElementById('gPriority').value,
                description: document.getElementById('gDesc').value || null
            };
        }
    });

    if (form) {
        Swal.fire({ title: 'Submitting...', didOpen: () => Swal.showLoading() });
        const r = await fetch('/api/tickets', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'create', token, type: 'general', ...form })
        });
        const result = await r.json();
        if (result.success) {
            await Swal.fire({ icon: 'success', title: 'Ticket Submitted!', html: `Ticket <b>${result.ticket.ticket_number}</b> has been created. We'll be in touch shortly.`, confirmButtonColor: '#0d9488' });
            loadTickets();
        } else {
            Swal.fire('Error', result.message || 'Could not submit.', 'error');
        }
    }
}

async function handleLogout() {
    await fetch('/api/partner-auth', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ action:'logout', token }) });
    localStorage.clear(); window.location.href = '/partner';
}

function updatePartnerBadgeInDOM(id, count) {
    const card = document.querySelector(`.ticket-card[data-id="${id}"]`);
    if (!card) return;
    const icon = card.querySelector('.ticket-icon');
    if (!icon) return;
    let dot = icon.querySelector('.unread-dot');
    if (count > 0) {
        const label = count > 9 ? '9+' : count;
        if (dot) { dot.textContent = label; }
        else { icon.insertAdjacentHTML('beforeend', `<div class="unread-dot">${label}</div>`); }
    } else {
        if (dot) dot.remove();
    }
}

async function pollPartnerUnread() {
    if (document.hidden) return;
    try {
        const r = await fetch('/api/tickets', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'get_partner_unread_counts', token })
        });
        const result = await r.json();
        if (!result.success) return;
        (result.counts || []).forEach(t => {
            const existing = allTickets.find(a => a.id === t.id);
            if (existing && existing.partner_unread_count !== t.partner_unread_count) {
                existing.partner_unread_count = t.partner_unread_count;
                updatePartnerBadgeInDOM(t.id, t.partner_unread_count);
            }
        });
    } catch (e) {}
}

window.addEventListener('load', function() {
    loadTickets().then(() => {
        const openId = new URLSearchParams(window.location.search).get('open');
        if (openId) viewTicket(parseInt(openId));
    });
    setInterval(pollPartnerUnread, 20000);
});
