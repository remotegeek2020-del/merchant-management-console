<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Tasks | Secure Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --pp-blue: #004990; --pp-accent: #00a1e0; }
        body { background: #f1f5f9; padding: 25px; font-family: 'Inter', sans-serif; }
        .dashboard-container { max-width: 1400px; margin: 0 auto; }
        
        .modern-header { background: white; border-radius: 16px; padding: 25px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .main-card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        
        .slds-table thead th { background-color: #f8fafc !important; font-weight: 700 !important; color: #475569 !important; padding: 15px !important; }
        .task-row:hover { background-color: #f8fafc !important; cursor: pointer; }
        
        .badge-due { font-weight: 800; font-size: 10px; padding: 4px 10px; border-radius: 4px; background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        
        /* Modal Styles matching merchants-dashboard.html */
        .modal-tab-btn { padding: 10px 15px; border: none; background: none; font-weight: 700; color: #94a3b8; cursor: pointer; border-bottom: 3px solid transparent; transition: 0.3s; flex: 1; font-size: 11px; text-align: center; }

        .modern-input { border-radius: 8px !important; border: 1px solid #cbd5e1 !important; padding: 8px 12px !important; width: 100%; font-size: 0.8rem; margin-bottom: 8px; }
        .edit-label { font-size: 9px; font-weight: 700; color: #64748b; margin-bottom: 3px; display: block; text-transform: uppercase; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<div class="dashboard-container">
 <div class="modern-header">
    <div style="display: flex; align-items: center; gap: 15px;">
        <a href="index.html" class="slds-button slds-button_neutral" style="border-radius: 10px;">HOME</a>
        <h1 style="font-size: 1.6rem; font-weight: 800; color: #002d5a; margin: 0;">Task Center</h1>
    </div>
    <div style="display: flex; gap: 10px;">
        <select id="userFilter" class="slds-select" style="width: 180px; border-radius:10px;" onchange="resetAndFetchTasks()">
            <option value="">All Assignees</option>
            </select>
        <select id="taskStatusFilter" class="slds-select" style="width: 150px; border-radius:10px;" onchange="resetAndFetchTasks()">
            <option value="Pending">Pending</option>
            <option value="Completed">Completed</option>
            <option value="">All Statuses</option>
        </select>
    </div>
</div>

<div style="padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #f8fafc; border-top: 1px solid #e2e8f0;">
    <div id="taskPageInfo" style="font-weight:700; font-size: 12px; color: var(--pp-blue);">Page 1</div>
    <div>
        <button class="slds-button slds-button_neutral" onclick="changeTaskPage(-1)">Prev</button>
        <button class="slds-button slds-button_neutral" onclick="changeTaskPage(1)">Next</button>
    </div>
</div>

    <article class="main-card">
        <table class="slds-table slds-table_bordered slds-table_cell-buffer slds-no-row-hover">
            <thead>
                <tr>
                    <th style="width: 30%;">Task Description</th>
                    <th style="width: 25%;">Merchant (DBA)</th>
                    <th style="width: 15%;">Due Date</th>
                    <th style="width: 15%;">Status</th>
                    <th style="width: 15%; text-align: right;">Action</th>
                </tr>
            </thead>
            <tbody id="global-task-list">
                <tr><td colspan="5" style="text-align:center; padding:50px; color:#94a3b8;">Loading your assignments...</td></tr>
            </tbody>
        </table>
    </article>
</div>

<div id="tasks-list" style="display:none;"></div> 

<script>
    let currentRecords = []; // Required for openModal to find merchant data
    let taskPage = 0;

    function resetAndFetchTasks() {
    taskPage = 0;
    fetchAllMyTasks();
}

function changeTaskPage(dir) {
    taskPage += dir;
    if (taskPage < 0) taskPage = 0;
    fetchAllMyTasks();
}

// Update your fetchAllMyTasks to send the new filter values
async function fetchAllMyTasks() {
    const payload = {
        action: 'get_global_tasks',
        userid: sessionStorage.getItem('pp_userid'),
        targetUser: document.getElementById('userFilter').value,
        status: document.getElementById('taskStatusFilter').value,
        page: taskPage
    };
    
    const res = await fetch('/api/merchants', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    });
    const result = await res.json();
    
    if (result.success) {
        // Essential: Map the merchant data so openModal works correctly
        currentRecords = result.data.map(t => t.merchants); 
        renderTaskTable(result.data);
        document.getElementById('taskPageInfo').innerText = `Page ${taskPage + 1}`;
    }
}

            fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'get_notes', merchant_uuid: m.id, type: 'manual' }) }),
            fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'get_notes', merchant_uuid: m.id, type: 'system' }) }),
            fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'get_attachments', merchant_uuid: m.id }) }),

</select>

}
    window.switchTab = (tab) => {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.modal-tab-btn').forEach(t => t.classList.remove('active-tab'));
        document.getElementById('content-' + tab).style.display = 'block';
        document.getElementById('tab-' + tab).classList.add('active-tab');
        if (tab === 'equipment') fetchMerchantEquipment();
        if (tab === 'lifecycle') fetchMerchantLifecycle();
        if (tab === 'tasks') fetchMerchantTasks();
    };

  async function fetchAllMyTasks() {
    const myId = sessionStorage.getItem('pp_userid');
    const tbody = document.getElementById('global-task-list');

    try {
        const res = await fetch('/api/merchants', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'get_global_tasks', userid: myId })
        });
        const result = await res.json();

        if (result.success && result.data.length > 0) {
            // Store merchants in currentRecords so openModal can find them
            currentRecords = result.data.map(t => ({ 
                ...t.merchants, 
                id: t.merchant_id 
            }));

            tbody.innerHTML = result.data.map(t => `
                <tr class="task-row" onclick="openModal('${t.merchant_id}')">
                    <td>
                        <div style="font-weight:700; color:var(--pp-blue);">${t.title}</div>
                        <div style="font-size:11px; color:#64748b;">${t.body || 'No details'}</div>
                    </td>
                    <td><strong>${t.dba_name}</strong></td>
                    <td><span class="badge-due">${t.due_date || 'N/A'}</span></td>
                    <td><span class="slds-badge">${t.status}</span></td>
                    <td style="text-align: right;">
                        <button class="slds-button slds-button_brand slds-button_small" style="border-radius:8px;">MANAGE</button>
                    </td>
                </tr>
            `).join('');
        } else {
            tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:50px; color:#94a3b8;">No tasks found.</td></tr>`;
        }
    } catch (err) {
        console.error("Dashboard Load Error:", err);
    }
}
