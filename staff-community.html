<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community | PayProTec Staff Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="css/pp-system.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>(function(){const u=localStorage.getItem('pp_userid'),v=localStorage.getItem('pp_verified');if(!u||v!=='true')window.location.href='index.html?reason=unauthorized';})();</script>
    <style>
        *,*::before,*::after{box-sizing:border-box;}
        :root{--blue:#004990;--navy:#001e3c;--teal:#0d9488;--border:#e2e8f0;--surface:#f0f4f8;--white:#fff;--text:#0a1628;--muted:#94a3b8;}
        body{margin:0;font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--text);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;height:100vh;overflow:hidden;}

        /* NAV */
        .staff-nav{background:linear-gradient(135deg,#001e3c,#004990);padding:10px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
        .staff-nav-logo{height:26px;filter:brightness(0) invert(1);}
        .staff-nav-title{font-size:14px;font-weight:800;color:white;}
        .staff-nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
        .nav-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;font-size:11px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;text-decoration:none;color:white;background:rgba(255,255,255,0.15);}
        .nav-btn:hover{background:rgba(255,255,255,0.25);}
        .avatar-sm{width:30px;height:30px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:white;flex-shrink:0;}

        /* LAYOUT */
        .layout{display:grid;grid-template-columns:220px 1fr 260px;flex:1;overflow:hidden;}

        /* LEFT SIDEBAR */
        .left-col{background:white;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;}
        .sidebar-section{padding:10px;}
        .sidebar-label{font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:8px 8px 4px;}
        .sidebar-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:12px;font-weight:600;color:#475569;cursor:pointer;border:none;background:none;width:100%;font-family:'DM Sans',sans-serif;transition:all 0.15s;}
        .sidebar-item:hover{background:var(--surface);color:var(--blue);}
        .sidebar-item.active{background:#eff6ff;color:var(--blue);font-weight:800;}
        .sidebar-item .material-icons{font-size:17px;}
        .cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

        /* FEED */
        .feed-col{display:flex;flex-direction:column;overflow:hidden;}
        .feed-header{background:white;border-bottom:1px solid var(--border);padding:12px 18px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
        .feed-title{font-size:14px;font-weight:800;margin:0;}
        .feed-scroll{flex:1;overflow-y:auto;padding:16px;}

        /* COMPOSER */
        .composer{background:white;border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:14px;}
        .composer-row{display:flex;gap:10px;align-items:flex-start;}
        .composer-avatar{width:38px;height:38px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:white;flex-shrink:0;}
        .composer-input{flex:1;min-height:65px;padding:10px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:'DM Sans',sans-serif;resize:none;outline:none;transition:all 0.2s;}
        .composer-input:focus{border-color:var(--teal);}
        .composer-footer{display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
        .media-btn{display:flex;align-items:center;gap:4px;padding:6px 10px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;}
        .media-btn.photo{background:#eff6ff;color:#2563eb;}
        .media-btn.video{background:#fdf4ff;color:#9333ea;}
        .cat-select{padding:6px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;background:#f8fafc;}
        .post-btn{margin-left:auto;background:var(--teal);color:white;padding:7px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;}
        .post-btn:disabled{opacity:0.5;cursor:not-allowed;}
        .media-preview{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
        .media-thumb{position:relative;width:72px;height:72px;border-radius:8px;overflow:hidden;border:1px solid var(--border);}
        .media-thumb img,.media-thumb video{width:100%;height:100%;object-fit:cover;}
        .media-thumb .rm{position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.6);color:white;border:none;border-radius:50%;width:16px;height:16px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:900;}

        /* POST CARD */
        .post-card{background:white;border:1px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden;}
        .post-header{display:flex;align-items:center;gap:10px;padding:12px 14px 8px;}
        .post-avatar{width:38px;height:38px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:white;flex-shrink:0;}
        .post-author{font-size:13px;font-weight:800;color:var(--text);}
        .post-time{font-size:11px;color:var(--muted);}
        .cat-badge{font-size:10px;padding:2px 7px;border-radius:99px;font-weight:700;margin-left:5px;}
        .post-body{padding:0 14px 10px;font-size:13px;line-height:1.6;color:var(--text);white-space:pre-wrap;}
        .post-media{display:grid;gap:2px;}
        .post-media.count-1 img,.post-media.count-1 video{width:100%;max-height:380px;object-fit:cover;}
        .post-media.count-2{grid-template-columns:1fr 1fr;}
        .post-media.count-2 img,.post-media.count-2 video{width:100%;height:190px;object-fit:cover;}
        .post-media img{cursor:pointer;width:100%;object-fit:cover;}
        .post-media video{width:100%;}
        .post-actions{display:flex;gap:2px;padding:6px 10px;border-top:1px solid var(--border);}
        .action-btn{display:flex;align-items:center;gap:4px;padding:6px 10px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;border:none;background:none;color:#475569;font-family:'DM Sans',sans-serif;}
        .action-btn:hover{background:#f1f5f9;}
        .action-btn.liked{color:#ef4444;}
        .action-btn .material-icons{font-size:17px;}
        .comments-section{padding:0 12px 12px;display:none;}
        .comment-item{display:flex;gap:8px;margin-bottom:8px;}
        .comment-avatar{width:28px;height:28px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:10px;color:white;flex-shrink:0;}
        .comment-bubble{background:#f1f5f9;border-radius:10px;padding:7px 11px;flex:1;}
        .comment-author{font-size:11px;font-weight:800;margin-bottom:1px;}
        .comment-body{font-size:12px;color:#475569;}
        .comment-input-row{display:flex;gap:8px;margin-top:6px;align-items:center;}
        .comment-input{flex:1;padding:6px 12px;border:1.5px solid var(--border);border-radius:20px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;}
        .comment-input:focus{border-color:var(--teal);}
        .comment-send{background:var(--teal);color:white;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

        /* RIGHT COL */
        .right-col{background:white;border-left:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:14px;}
        .right-title{font-size:12px;font-weight:800;color:var(--text);margin:0 0 10px;}
        .member-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f1f5f9;}
        .member-avatar{width:30px;height:30px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:white;}
        .member-name{font-size:12px;font-weight:700;}
        .member-role{font-size:10px;color:var(--muted);}

        @keyframes spin{to{transform:rotate(360deg);}}
        .spinner{width:20px;height:20px;border:2px solid #e2e8f0;border-top-color:var(--teal);border-radius:50%;animation:spin 0.8s linear infinite;margin:24px auto;}
        .load-more{text-align:center;padding:10px;color:var(--teal);font-weight:700;cursor:pointer;font-size:13px;}
    </style>
</head>
<body>

<nav class="staff-nav">
    <img src="https://assets.cdn.filesafe.space/dfg08aPdtlQ1RhIKkCnN/media/66cf5cf28a35e448970f1ead.png" class="staff-nav-logo">
    <span class="staff-nav-title">Partner Community</span>
    <div class="staff-nav-right">
        <a href="index.html" class="nav-btn"><span class="material-icons" style="font-size:14px;">arrow_back</span> Back</a>
        <div class="avatar-sm" id="staffAvatar">?</div>
    </div>
</nav>

<div class="layout">
    <!-- LEFT: Categories -->
    <div class="left-col">
        <div class="sidebar-section">
            <div class="sidebar-label">Feed</div>
            <button class="sidebar-item active" id="cat-all" onclick="filterFeed(null,'cat-all')">
                <span class="material-icons">dynamic_feed</span> All Posts
            </button>
            <button class="sidebar-item" id="cat-general" onclick="filterFeed('general','cat-general')">
                <div class="cat-dot" style="background:#94a3b8;"></div> General
            </button>
            <button class="sidebar-item" id="cat-partner_support" onclick="filterFeed('partner_support','cat-partner_support')">
                <div class="cat-dot" style="background:#2563eb;"></div> Partner Support
            </button>
            <button class="sidebar-item" id="cat-industry_news" onclick="filterFeed('industry_news','cat-industry_news')">
                <div class="cat-dot" style="background:#166534;"></div> Industry News
            </button>
            <button class="sidebar-item" id="cat-wins" onclick="filterFeed('wins','cat-wins')">
                <div class="cat-dot" style="background:#92400e;"></div> Wins & Milestones
            </button>
        </div>
        <div class="sidebar-section">
            <div class="sidebar-label">My Posts</div>
            <button class="sidebar-item" id="cat-mine" onclick="filterFeed('mine','cat-mine')">
                <span class="material-icons">person</span> Posted by me
            </button>
        </div>
    </div>

    <!-- CENTER: Feed -->
    <div class="feed-col">
        <div class="feed-header">
            <h2 class="feed-title" id="feedTitle">All Posts</h2>
            <span style="font-size:11px;color:var(--muted);" id="feedSubtitle">Shared across the partner network</span>
        </div>
        <div class="feed-scroll">
            <!-- Composer -->
            <div class="composer">
                <div class="composer-row">
                    <div class="composer-avatar" id="composerAvatar">?</div>
                    <textarea class="composer-input" id="postText" placeholder="Share something with the partner network..."></textarea>
                </div>
                <div id="mediaPreview" class="media-preview"></div>
                <div class="composer-footer">
                    <select class="cat-select" id="postCategory">
                        <option value="general">💬 General</option>
                        <option value="partner_support">🤝 Partner Support</option>
                        <option value="industry_news">📰 Industry News</option>
                        <option value="wins">🏆 Wins & Milestones</option>
                    </select>
                    <button class="media-btn photo" onclick="document.getElementById('photoInput').click()">
                        <span class="material-icons" style="font-size:15px;">photo</span> Photo
                    </button>
                    <button class="media-btn video" onclick="document.getElementById('videoInput').click()">
                        <span class="material-icons" style="font-size:15px;">videocam</span> Video
                    </button>
                    <button class="post-btn" id="postBtn" onclick="submitPost()">Post</button>
                </div>
                <input type="file" id="photoInput" accept="image/*" multiple style="display:none" onchange="handleMediaSelect(this,'image')">
                <input type="file" id="videoInput" accept="video/*" style="display:none" onchange="handleMediaSelect(this,'video')">
            </div>

            <div id="feedContainer"><div class="spinner"></div></div>
            <div id="loadMore" class="load-more" style="display:none" onclick="loadFeed(true)">Load more posts</div>
        </div>
    </div>

    <!-- RIGHT: Active members -->
    <div class="right-col">
        <div class="right-title">Network Members</div>
        <div id="membersList"><div class="spinner"></div></div>
    </div>
</div>

<script>
var staffId = localStorage.getItem('pp_userid') || '';
var staffName = (localStorage.getItem('pp_user_first_name') || '') + ' ' + (localStorage.getItem('pp_user_last_name') || '');
staffName = staffName.trim() || 'Staff';
var pendingMedia = [], feedPage = 0, currentCategory = null, mineOnly = false;

function initials(name) { return (name||'?').split(' ').map(function(w){return w[0];}).join('').toUpperCase().slice(0,2); }
function timeAgo(d) {
    var diff=(Date.now()-new Date(d))/1000;
    if(diff<60)return 'Just now'; if(diff<3600)return Math.floor(diff/60)+'m ago';
    if(diff<86400)return Math.floor(diff/3600)+'h ago'; return new Date(d).toLocaleDateString(undefined,{month:'short',day:'numeric'});
}

function init() {
    document.getElementById('staffAvatar').textContent = initials(staffName);
    document.getElementById('composerAvatar').textContent = initials(staffName);
    loadFeed(false);
    loadMembers();
}

// Staff posts go through the partners API with a staff token approach
// Staff creates posts as "Staff: [Name]" using direct Supabase insert via API
function api(body) {
    return fetch('/api/partners', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(Object.assign({ action_source: 'staff', staff_id: staffId, staff_name: staffName }, body))
    }).then(function(r) { return r.json(); });
}

async function loadFeed(append) {
    if (!append) { feedPage = 0; document.getElementById('feedContainer').innerHTML = '<div class="spinner"></div>'; }
    var result = await api({
        action: 'get_community_feed',
        page: feedPage,
        category: currentCategory,
        mine_only: mineOnly,
        mine_id: staffId
    });
    if (!result.success) return;
    var posts = result.data || [];
    if (posts.length < 20) document.getElementById('loadMore').style.display = 'none';
    else document.getElementById('loadMore').style.display = 'block';
    if (!append) document.getElementById('feedContainer').innerHTML = '';
    if (!append) document.getElementById('feedContainer').innerHTML = '';
    if (!posts.length) {
        if (!append) document.getElementById('feedContainer').innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted);font-size:14px;">No posts yet. Be the first to share something!</div>';
        document.getElementById('loadMore').style.display = 'none';
        return;
    }
    posts.forEach(function(p) { document.getElementById('feedContainer').appendChild(buildPostCard(p)); });
    feedPage++;
}

function filterFeed(cat, btnId) {
    document.querySelectorAll('.sidebar-item').forEach(function(b){ b.classList.remove('active'); });
    document.getElementById(btnId).classList.add('active');
    mineOnly = cat === 'mine';
    currentCategory = (cat === 'mine' || cat === null) ? null : cat;
    var titles = { null:'All Posts', general:'General', partner_support:'Partner Support', industry_news:'Industry News', wins:'Wins & Milestones', mine:'My Posts' };
    document.getElementById('feedTitle').textContent = titles[cat] || 'All Posts';
    loadFeed(false);
}

var catLabels = { general:'💬 General', partner_support:'🤝 Partner Support', industry_news:'📰 Industry News', wins:'🏆 Wins & Milestones' };
var catStyles = { general:'background:#f1f5f9;color:#475569', partner_support:'background:#eff6ff;color:#2563eb', industry_news:'background:#f0fdf4;color:#166534', wins:'background:#fef3c7;color:#92400e' };

function buildPostCard(p) {
    var card = document.createElement('div'); card.className = 'post-card'; card.id = 'post-' + p.id;
    var ini = initials(p.author_name);
    var isOwn = p.staff_author_id === staffId || p.author_id === staffId;
    var cat = p.category || 'general';
    var catStyle = catStyles[cat] || catStyles.general;
    var catLabel = catLabels[cat] || '💬 General';

    var mediaHtml = '';
    if (p.media_urls && p.media_urls.length) {
        var cnt = p.media_urls.length;
        mediaHtml = '<div class="post-media count-' + Math.min(cnt,2) + '">';
        p.media_urls.slice(0,4).forEach(function(url, i) {
            var type = p.media_types && p.media_types[i];
            if (type === 'video') { mediaHtml += '<video src="' + url + '" controls></video>'; }
            else { mediaHtml += '<img src="' + url + '" onclick="openLightbox(this.src)" style="cursor:pointer;" loading="lazy">'; }
        });
        mediaHtml += '</div>';
    }

    var delBtn = isOwn ? '<button onclick="deletePost(\'' + p.id + '\')" style="margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;" title="Delete"><span class="material-icons" style="font-size:17px;">delete</span></button>' : '';

    card.innerHTML = '<div class="post-header">'
        + '<div class="post-avatar">' + ini + '</div>'
        + '<div style="flex:1;"><div class="post-author">' + p.author_name
        + ' <span class="cat-badge" style="' + catStyle + '">' + catLabel + '</span></div>'
        + '<div class="post-time">' + timeAgo(p.created_at) + '</div></div>'
        + delBtn + '</div>'
        + (p.body ? '<div class="post-body">' + escapeHtml(p.body) + '</div>' : '')
        + mediaHtml
        + '<div class="post-actions">'
        + '<button class="action-btn' + (p.liked_by_me ? ' liked' : '') + '" id="like-btn-' + p.id + '" onclick="toggleLike(\'' + p.id + '\')">'
        + '<span class="material-icons">' + (p.liked_by_me ? 'favorite' : 'favorite_border') + '</span>'
        + '<span id="like-count-' + p.id + '">' + (p.likes_count||0) + '</span></button>'
        + '<button class="action-btn" onclick="toggleComments(\'' + p.id + '\')">'
        + '<span class="material-icons">chat_bubble_outline</span>'
        + '<span id="comment-count-' + p.id + '">' + (p.comments_count||0) + '</span></button>'
        + '</div>'
        + '<div class="comments-section" id="comments-' + p.id + '">'
        + '<div id="comments-list-' + p.id + '"></div>'
        + '<div class="comment-input-row"><div class="comment-avatar">' + ini + '</div>'
        + '<input class="comment-input" id="ci-' + p.id + '" placeholder="Write a comment..." onkeydown="if(event.key===\'Enter\')submitComment(\'' + p.id + '\')">'
        + '<button class="comment-send" onclick="submitComment(\'' + p.id + '\')"><span class="material-icons" style="font-size:15px;">send</span></button>'
        + '</div></div>';
    return card;
}

function escapeHtml(s) { var d=document.createElement('div');d.textContent=s;return d.innerHTML; }

function openLightbox(url) {
    var ov = document.createElement('div');
    ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:zoom-out;';
    var img = document.createElement('img'); img.src = url;
    img.style.cssText = 'max-width:95vw;max-height:95vh;object-fit:contain;border-radius:8px;';
    var btn = document.createElement('button');
    btn.innerHTML = '&times;'; btn.style.cssText = 'position:fixed;top:16px;right:20px;background:none;border:none;color:white;font-size:36px;cursor:pointer;z-index:10000;';
    ov.onclick = function(){ document.body.removeChild(ov); };
    btn.onclick = function(e){ e.stopPropagation(); document.body.removeChild(ov); };
    document.addEventListener('keydown', function esc(e){ if(e.key==='Escape'&&document.body.contains(ov)){ document.body.removeChild(ov); document.removeEventListener('keydown',esc); }});
    ov.appendChild(img); ov.appendChild(btn); document.body.appendChild(ov);
}

async function toggleLike(postId) {
    var result = await api({ action:'community_like', post_id:postId });
    if (result.success) {
        var btn = document.getElementById('like-btn-' + postId);
        var cnt = document.getElementById('like-count-' + postId);
        btn.classList.toggle('liked', result.liked);
        btn.querySelector('.material-icons').textContent = result.liked ? 'favorite' : 'favorite_border';
        cnt.textContent = result.count;
    }
}

function toggleComments(postId) {
    var s = document.getElementById('comments-' + postId);
    var open = s.style.display === 'block'; s.style.display = open ? 'none' : 'block';
    if (!open) loadComments(postId);
}

async function loadComments(postId) {
    var result = await api({ action:'community_comments', post_id:postId });
    var el = document.getElementById('comments-list-' + postId); el.innerHTML = '';
    (result.data||[]).forEach(function(c) {
        var d = document.createElement('div'); d.className = 'comment-item';
        d.innerHTML = '<div class="comment-avatar">' + initials(c.author_name) + '</div>'
            + '<div class="comment-bubble"><div class="comment-author">' + c.author_name + '</div>'
            + '<div class="comment-body">' + escapeHtml(c.body) + '</div></div>';
        el.appendChild(d);
    });
    if (!result.data || !result.data.length) el.innerHTML = '<div style="font-size:11px;color:var(--muted);padding:4px 0;">No comments yet.</div>';
}

async function submitComment(postId) {
    var input = document.getElementById('ci-' + postId);
    var body = input ? input.value.trim() : ''; if (!body) return;
    input.value = '';
    var result = await api({ action:'community_comment', post_id:postId, body:body });
    if (result.success) {
        loadComments(postId);
        var cnt = document.getElementById('comment-count-' + postId);
        if (cnt) cnt.textContent = parseInt(cnt.textContent||0)+1;
    }
}

async function deletePost(postId) {
    var conf = await Swal.fire({ title:'Delete post?', icon:'warning', showCancelButton:true, confirmButtonColor:'#ef4444', confirmButtonText:'Delete' });
    if (conf.isConfirmed) {
        var r = await api({ action:'community_delete', post_id:postId });
        if (r.success) { var c = document.getElementById('post-' + postId); if(c) c.remove(); }
    }
}

// ── MEDIA ───────────────────────────────────────────────
function compressImage(file, callback) {
    var reader = new FileReader();
    reader.onload = function(e) {
        var img = new Image();
        img.onload = function() {
            var w=img.width, h=img.height, max=1200;
            if(w>max){h=Math.round(h*max/w);w=max;} if(h>max){w=Math.round(w*max/h);h=max;}
            var cv=document.createElement('canvas'); cv.width=w; cv.height=h;
            cv.getContext('2d').drawImage(img,0,0,w,h);
            callback(cv.toDataURL('image/jpeg', 0.8));
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

function handleMediaSelect(input, type) {
    Array.from(input.files).forEach(function(file) {
        if (pendingMedia.length >= 4) { Swal.fire('Max 4 files per post.','','info'); return; }
        if (type === 'video') {
            if (file.size > 50*1024*1024) { Swal.fire('Video too large','Max 50MB.','warning'); return; }
            var r = new FileReader(); r.onload = function(e) { pendingMedia.push({dataUrl:e.target.result,type:'video',mimeType:file.type,name:file.name}); renderPreview(); }; r.readAsDataURL(file);
        } else {
            compressImage(file, function(dataUrl) { pendingMedia.push({dataUrl:dataUrl,type:'image',mimeType:'image/jpeg',name:file.name.replace(/\.[^.]+$/,'')+'.jpg'}); renderPreview(); });
        }
    });
    input.value = '';
}

function renderPreview() {
    var el = document.getElementById('mediaPreview'); el.innerHTML = '';
    pendingMedia.forEach(function(m, i) {
        var w = document.createElement('div'); w.className = 'media-thumb';
        var el2 = m.type === 'video' ? document.createElement('video') : document.createElement('img');
        el2.src = m.dataUrl; if(m.type==='video') el2.style.cssText='width:100%;height:100%;object-fit:cover;';
        var rm = document.createElement('button'); rm.className='rm'; rm.textContent='×';
        rm.onclick = (function(idx){ return function(){ pendingMedia.splice(idx,1); renderPreview(); }; })(i);
        w.appendChild(el2); w.appendChild(rm); el.appendChild(w);
    });
}

async function submitPost() {
    var text = document.getElementById('postText').value.trim();
    if (!text && !pendingMedia.length) return;
    var btn = document.getElementById('postBtn'); btn.disabled=true; btn.textContent='Posting...';
    try {
        var mediaUrls=[], mediaTypes=[];
        for (var i=0;i<pendingMedia.length;i++) {
            var m = pendingMedia[i];
            var r = await api({ action:'community_upload', file_base64:m.dataUrl.split(',')[1], file_name:m.name, content_type:m.mimeType });
            if (r.success) { mediaUrls.push(r.url); mediaTypes.push(r.type); }
        }
        var cat = document.getElementById('postCategory').value;
        var postType = mediaTypes.includes('video') ? 'video' : mediaUrls.length ? 'photo' : 'text';
        var result = await api({ action:'community_post', body:text, media_urls:mediaUrls, media_types:mediaTypes, post_type:postType, category:cat });
        if (result.success) {
            document.getElementById('postText').value = ''; pendingMedia=[]; renderPreview();
            var card = buildPostCard(Object.assign(result.data, { liked_by_me:false }));
            document.getElementById('feedContainer').insertBefore(card, document.getElementById('feedContainer').firstChild);
        } else { Swal.fire('Error', result.message, 'error'); }
    } catch(e) { Swal.fire('Error', e.message, 'error'); }
    btn.disabled=false; btn.textContent='Post';
}

async function loadMembers() {
    var result = await api({ action:'community_members' });
    var el = document.getElementById('membersList'); el.innerHTML = '';
    (result.data||[]).forEach(function(m) {
        var d = document.createElement('div'); d.className='member-item';
        d.innerHTML = '<div class="member-avatar">' + initials(m.full_name) + '</div>'
            + '<div><div class="member-name">' + m.full_name + '</div><div class="member-role">Partner</div></div>';
        el.appendChild(d);
    });
}

window.onload = init;
</script>
</body>
