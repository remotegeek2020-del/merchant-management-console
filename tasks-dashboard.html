<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task Center | Secure Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="icon" type="image/png" href="/images/favicon-32x32.png" sizes="32x32" />
    <style>
        :root { --pp-blue: #004990; --pp-accent: #00a1e0; }
        body { background: #f1f5f9; padding: 25px; font-family: 'Inter', sans-serif; }
        .dashboard-container { max-width: 1400px; margin: 0 auto; }
        .modern-header { background: white; border-radius: 16px; padding: 25px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .main-card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .slds-table thead th { background-color: #f8fafc !important; font-weight: 700 !important; color: #475569 !important; padding: 15px !important; }
        .task-row:hover { background-color: #f8fafc !important; cursor: pointer; }
        .badge-due { font-weight: 800; font-size: 10px; padding: 4px 10px; border-radius: 4px; background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .modern-input { border-radius: 8px !important; border: 1px solid #cbd5e1 !important; padding: 8px 12px !important; width: 100%; font-size: 0.8rem; margin-bottom: 12px; }
        .edit-label { font-size: 9px; font-weight: 700; color: #64748b; margin-bottom: 3px; display: block; text-transform: uppercase; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
    (function() {
        // 1. Check if a session exists in LocalStorage
        const sessionUser = localStorage.getItem('pp_userid');
        const isVerified = localStorage.getItem('pp_verified');

        // 2. If no session, boot them to the login page immediately
        if (!sessionUser || isVerified !== 'true') {
            window.location.href = 'index.html?reason=unauthorized';
        }
    })();
</script>
</head>
<body>

<div class="dashboard-container">
    <div class="modern-header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <a href="index.html" class="slds-button slds-button_neutral" style="border-radius: 10px;">HOME</a>
            <h1 style="font-size: 1.6rem; font-weight: 800; color: #002d5a; margin: 0;">Task Center</h1>
        </div>
        <div style="display: flex; gap: 10px;">
            <select id="userFilter" class="slds-select" style="width: 180px; border-radius:10px; display:none;" onchange="resetAndFetchTasks()">
                <option value="">All Assignees</option>
            </select>
            <select id="taskStatusFilter" class="slds-select" style="width: 150px; border-radius:10px;" onchange="resetAndFetchTasks()">
                <option value="Pending">Pending</option>
                <option value="Completed">Completed</option>
                <option value="">All Statuses</option>
            </select>
        </div>
    </div>

    <article class="main-card">
        <table class="slds-table slds-table_bordered slds-table_cell-buffer slds-no-row-hover">
            <thead>
                <tr>
                    <th style="width: 30%;">Task Description</th>
                    <th style="width: 25%;">Merchant (DBA)</th>
                    <th style="width: 15%;">Due Date</th>
                    <th style="width: 15%;">Status</th>
                    <th style="width: 15%; text-align: right;">Action</th>
                </tr>
            </thead>
            <tbody id="global-task-list"></tbody>
        </table>
        <div style="padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #f8fafc; border-top: 1px solid #e2e8f0;">
            <div id="taskPageInfo" style="font-weight:700; font-size: 12px; color: var(--pp-blue);">Page 1</div>
            <div>
                <button class="slds-button slds-button_neutral" onclick="changeTaskPage(-1)">Prev</button>
                <button class="slds-button slds-button_neutral" onclick="changeTaskPage(1)">Next</button>
            </div>
        </div>
    </article>
</div>

<script>
    let currentTasks = []; 
    let taskPage = 0;
    const taskLimit = 20;
    let staffList = [];

    async function loadStaffFilter() {
        const res = await fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'get_staff' }) });
        const result = await res.json();
        if (result.success) {
            staffList = result.data;
            document.getElementById('userFilter').innerHTML = '<option value="">All Assignees</option>' + 
                staffList.map(s => `<option value="${s.id}">${s.full_name}</option>`).join('');
        }
    }

    async function fetchAllMyTasks() {
        const myId = sessionStorage.getItem('pp_userid');
        const res = await fetch('/api/merchants', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                action: 'get_global_tasks', 
                userid: myId, 
                targetUser: document.getElementById('userFilter').value || null, 
                status: document.getElementById('taskStatusFilter').value || null, 
                page: taskPage, 
                limit: taskLimit 
            })
        });
        const result = await res.json();
        if (result.success) {
            currentTasks = result.data;
            renderTaskTable(result.data);
            document.getElementById('taskPageInfo').innerHTML = `Page ${taskPage + 1} (Total: ${result.total || 0})`;
        }
    }

    function renderTaskTable(tasks) {
        const tbody = document.getElementById('global-task-list');
        if (!tasks || tasks.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:80px;"><span class="material-icons" style="font-size:48px; color:#22c55e;">check_circle</span><br><b>Congrats, you don't have a pending task today!</b></td></tr>`;
            return;
        }
        tbody.innerHTML = tasks.map(t => `
            <tr class="task-row" onclick="manageTaskModal('${t.id}')">
                <td><div style="font-weight:700; color:var(--pp-blue);">${t.title}</div><div style="font-size:11px; color:#64748b;">${t.body || ''}</div></td>
                <td><strong>${t.merchants?.dba_name || '---'}</strong></td>
                <td><span class="badge-due">${t.due_date || 'N/A'}</span></td>
                <td><span class="slds-badge">${t.status}</span></td>
                <td style="text-align: right;"><button class="slds-button slds-button_brand slds-button_small">MANAGE</button></td>
            </tr>`).join('');
    }

    async function manageTaskModal(taskId) {
        const task = currentTasks.find(t => t.id === taskId);
        if (!task) return;

        const staffOptions = staffList.map(s => 
            `<option value="${s.id}" ${s.id === task.assigned_to ? 'selected' : ''}>${s.full_name}</option>`
        ).join('');

        Swal.fire({
            title: `<div style="text-align:left; font-weight:800; color:#002d5a;">Manage Task</div>`,
            width: '600px',
            html: `
                <div style="text-align:left; padding:10px;">
                    <div style="background:#f8fafc; padding:10px; border-radius:8px; margin-bottom:15px;">
                        <small style="color:#64748b; font-weight:700;">MERCHANT</small>
                        <div style="font-weight:800; color:#004990;">${task.merchants?.dba_name || '---'}</div>
                    </div>

                    <label class="edit-label">Task Title</label>
                    <input id="edit-task-title" class="modern-input" value="${task.title || ''}">

                    <label class="edit-label">Task Details</label>
                    <textarea id="edit-task-body" class="modern-input" style="height:80px;">${task.body || ''}</textarea>

                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                        <div>
                            <label class="edit-label">Due Date</label>
                            <input type="date" id="edit-task-due" class="modern-input" value="${task.due_date || ''}">
                        </div>
                        <div>
                            <label class="edit-label">Assign To</label>
                            <select id="edit-task-assign" class="modern-input">
                                ${staffOptions}
                            </select>
                        </div>
                    </div>

                    <div style="margin-top:15px; display:flex; align-items:center; gap:10px; background:#f1f5f9; padding:12px; border-radius:8px;">
                        <input type="checkbox" id="edit-task-complete" style="width:20px; height:20px;" ${task.status === 'Completed' ? 'checked' : ''}>
                        <label for="edit-task-complete" style="font-weight:700; color:#002d5a; cursor:pointer;">Mark as Completed</label>
                    </div>

                    <button onclick="saveTaskUpdates('${taskId}')" style="background:#004990; color:white; width:100%; padding:15px; border-radius:10px; border:none; margin-top:20px; font-weight:700; cursor:pointer;">SAVE UPDATES</button>
                </div>`,
            showConfirmButton: false, showCloseButton: true
        });
    }

    async function saveTaskUpdates(taskId) {
        const payload = {
            title: document.getElementById('edit-task-title').value,
            body: document.getElementById('edit-task-body').value,
            due_date: document.getElementById('edit-task-due').value,
            assigned_to: document.getElementById('edit-task-assign').value,
            status: document.getElementById('edit-task-complete').checked ? 'Completed' : 'Pending'
        };

        const res = await fetch('/api/merchants', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'update_task', task_id: taskId, payload })
        });

        if ((await res.json()).success) {
            Swal.fire({ icon: 'success', title: 'Task Updated', timer: 1500, showConfirmButton: false });
            fetchAllMyTasks();
        }
    }

    function changeTaskPage(dir) { taskPage += dir; if (taskPage < 0) taskPage = 0; fetchAllMyTasks(); }
    function resetAndFetchTasks() { taskPage = 0; fetchAllMyTasks(); }

    window.onload = async () => { 
        const role = (sessionStorage.getItem('pp_role') || "").toUpperCase();
        if (role === 'ADMIN' || role === 'SUPER ADMIN') {
            document.getElementById('userFilter').style.display = 'inline-block';
        }
        await loadStaffFilter(); 
        fetchAllMyTasks(); 
    };
</script>
</body>
</html>
