<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Merchant | Portal Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --pp-blue: #004990; --pp-accent: #00a1e0; --glass: rgba(255, 255, 255, 0.9); }
        body { background: radial-gradient(circle at top right, #f8fafc, #e2e8f0); padding: 30px; font-family: 'Inter', sans-serif; color: #2b3d51; }
        .slds-form-container { max-width: 1200px; margin: auto; background: var(--glass); backdrop-filter: blur(12px); border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.08); overflow: hidden; }
        .header-box { background: rgba(0, 73, 144, 0.03); padding: 25px 35px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .form-section-title { font-size: 0.75rem; font-weight: 800; color: var(--pp-accent); text-transform: uppercase; letter-spacing: 1px; margin: 25px 0 15px 0; padding-bottom: 5px; border-bottom: 1px solid #e2e8f0; }
        .form-body { padding: 40px; }
        .slds-input, .slds-select, .slds-textarea { border-radius: 10px !important; border: 1px solid #d1d9e6 !important; height: 40px; }
        .readonly-field { background-color: #f1f5f9 !important; color: #64748b !important; cursor: not-allowed !important; font-family: monospace; }
        .footer-action { background: rgba(255,255,255,0.4); padding: 25px 40px; border-top: 1px solid #e2e8f0; display: flex; justify-content: flex-end; gap: 15px; }
    </style>
</head>
<body>

    <div class="slds-form-container">
        <div class="header-box">
            <h1 style="font-size: 1.2rem; font-weight: 800; color: var(--pp-blue);" id="m-title">Edit Merchant Profile</h1>
            <button class="slds-button slds-button_destructive" onclick="deleteMerchant()">Delete Record</button>
        </div>

        <div class="form-body">
            <div class="slds-grid slds-wrap slds-gutters">
                
                <div class="slds-col slds-size_1-of-1"><h2 class="form-section-title">Core Identity & Status</h2></div>
                <div class="slds-col slds-size_1-of-3">
                    <div class="slds-form-element slds-m-bottom_small"><label class="slds-form-element__label">DBA Name</label><input type="text" id="dba_name" class="slds-input" /></div>
                    <div class="slds-form-element slds-m-bottom_small"><label class="slds-form-element__label">Merchant ID (MID)</label><input type="text" id="merchant_id" class="slds-input readonly-field" readonly /></div>
                </div>
                <div class="slds-col slds-size_1-of-3">
                    <div class="slds-form-element slds-m-bottom_small"><label class="slds-form-element__label">Account Status</label>
                        <select id="account_status" class="slds-select">
                            <option value="Approved">Approved</option>
                            <option value="Approved - Collections">Approved - Collections</option>
                            <option value="Closed">Closed</option>
                            <option value="Closed - Collections">Closed - Collections</option>
                            <option value="Closed - Risk">Closed - Risk</option>
                            <option value="Collections">Collections</option>
                            <option value="Declined">Declined</option>
                            <option value="Enrollment">Enrollment</option>
                            <option value="Fraud">Fraud</option>
                            <option value="Pending">Pending</option>
                            <option value="Withdrawn">Withdrawn</option>
                        </select>
                    </div>
                    <div class="slds-form-element slds-m-bottom_small"><label class="slds-form-element__label">Partner ID (Agent ID)</label><input type="text" id="agent_id" class="slds-input readonly-field" readonly /></div>
                </div>
                <div class="slds-col slds-size_1-of-3">
                    <div class="slds-form-element slds-m-bottom_small"><label class="slds-form-element__label">Account Code</label><input type="text" id="account_code" class="slds-input" /></div>
                    <div class="slds-form-element slds-m-bottom_small"><label class="slds-form-element__label">Source</label><input type="text" id="source" class="slds-input" /></div>
                </div>

                <div class="slds-col slds-size_1-of-1"><h2 class="form-section-title">Contact Information</h2></div>
                <div class="slds-col slds-size_1-of-3">
                    <div class="slds-form-element slds-m-bottom_small"><label class="slds-form-element__label">Primary Contact</label><input type="text" id="merchant_primary_contact" class="slds-input" /></div>
                </div>
                <div class="slds-col slds-size_1-of-3">
                    <div class="slds-form-element slds-m-bottom_small"><label class="slds-form-element__label">Email</label><input type="email" id="email" class="slds-input" /></div>
                </div>
                <div class="slds-col slds-size_1-of-3">
                    <div class="slds-form-element slds-m-bottom_small"><label class="slds-form-element__label">Phone</label><input type="text" id="merchant_phone" class="slds-input" /></div>
                </div>

                <div class="slds-col slds-size_1-of-1"><h2 class="form-section-title">Processor & Compliance</h2></div>
                <div class="slds-col slds-size_1-of-4">
                    <div class="slds-form-element slds-m-bottom_small"><label class="slds-form-element__label">Processor</label><input type="text" id="processor" class="slds-input" /></div>
                </div>
                <div class="slds-col slds-size_1-of-4">
                    <div class="slds-form-element slds-m-bottom_small"><label class="slds-form-element__label">Platform</label><input type="text" id="processor_platform" class="slds-input" /></div>
                </div>
                <div class="slds-col slds-size_1-of-4">
                    <div class="slds-form-element slds-m-bottom_small"><label class="slds-form-element__label">PCI Compliant</label><input type="text" id="is_pci_compliant" class="slds-input" /></div>
                </div>
                <div class="slds-col slds-size_1-of-4">
                    <div class="slds-form-element slds-m-bottom_small"><label class="slds-form-element__label">IRS TIN Status</label><input type="text" id="irs_tin_status" class="slds-input" /></div>
                </div>

                <div class="slds-col slds-size_1-of-1"><h2 class="form-section-title">Performance (Volume)</h2></div>
                <div class="slds-col slds-size_1-of-4">
                    <div class="slds-form-element slds-m-bottom_small"><label class="slds-form-element__label">30 Day Volume</label><input type="text" id="volume_30_day" class="slds-input" /></div>
                </div>
                <div class="slds-col slds-size_1-of-4">
                    <div class="slds-form-element slds-m-bottom_small"><label class="slds-form-element__label">90 Day Volume</label><input type="text" id="volume_90_day" class="slds-input" /></div>
                </div>
                <div class="slds-col slds-size_1-of-4">
                    <div class="slds-form-element slds-m-bottom_small"><label class="slds-form-element__label">MTD Volume</label><input type="text" id="volume_mtd" class="slds-input" /></div>
                </div>
                <div class="slds-col slds-size_1-of-4">
                    <div class="slds-form-element slds-m-bottom_small"><label class="slds-form-element__label">Total Volume</label><input type="text" id="volume" class="slds-input" /></div>
                </div>

                <div class="slds-col slds-size_1-of-1"><h2 class="form-section-title">Underwriting & Notes</h2></div>
                <div class="slds-col slds-size_1-of-1">
                    <div class="slds-form-element slds-m-bottom_small">
                        <label class="slds-form-element__label">Underwriting Decision Note</label>
                        <textarea id="underwriting_decision_note" class="slds-textarea" style="height: 100px;"></textarea>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer-action">
            <button class="slds-button slds-button_neutral" onclick="window.history.back()">Cancel</button>
            <button class="slds-button slds-button_brand" onclick="updateMerchant()">Commit Profile Update</button>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const recordId = params.get('id');

        // Fields to auto-populate from URL (and save back)
        const FIELDS = [
            'dba_name', 'merchant_id', 'agent_id', 'account_status', 'account_code', 
            'source', 'merchant_primary_contact', 'email', 'merchant_phone', 
            'processor', 'processor_platform', 'is_pci_compliant', 'irs_tin_status',
            'volume_30_day', 'volume_90_day', 'volume_mtd', 'volume', 'underwriting_decision_note'
        ];

        window.onload = function() {
            if (!recordId) {
                Swal.fire('Error', 'No Record ID provided.', 'error');
                return;
            }

            // Populate what we have from the dashboard URL params
            FIELDS.forEach(f => {
                const val = params.get(f);
                if (val && document.getElementById(f)) {
                    document.getElementById(f).value = val;
                }
            });
            
            document.getElementById('m-title').innerText = `Edit: ${params.get('dba_name') || 'Merchant'}`;
        };

        async function updateMerchant() {
            Swal.fire({ title: 'Synchronizing...', didOpen: () => Swal.showLoading() });
            
            const payload = {};
            FIELDS.forEach(f => {
                const el = document.getElementById(f);
                if (el) payload[f] = el.value;
            });

            try {
                const res = await fetch('/api/merchants', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        action: 'update', 
                        id: recordId, 
                        payload: payload,
                        userEmail: sessionStorage.getItem('pp_userid')
                    })
                });

                const result = await res.json();
                if (result.success) {
                    Swal.fire('Success', 'Merchant Profile Updated', 'success').then(() => {
                        window.location.href = 'merchants-dashboard.html';
                    });
                } else {
                    throw new Error(result.message);
                }
            } catch (e) {
                Swal.fire('Update Failed', e.message, 'error');
            }
        }

        async function deleteMerchant() {
            const confirm = await Swal.fire({
                title: 'Delete Merchant?',
                text: "This action is permanent and will be logged.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'Confirm Delete',
                confirmButtonColor: '#d33'
            });

            if (confirm.isConfirmed) {
                const res = await fetch('/api/merchants', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        action: 'delete', 
                        id: recordId,
                        userEmail: sessionStorage.getItem('pp_userid')
                    })
                });
                if (res.ok) window.location.href = 'merchants-dashboard.html';
            }
        }
    </script>
</body>
</html>
