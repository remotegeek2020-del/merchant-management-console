<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Merchant Portfolio | Secure Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --pp-blue: #004990; --pp-accent: #00a1e0; --glass: rgba(255, 255, 255, 0.9); }
        body { background: radial-gradient(circle at top right, #f8fafc, #e2e8f0); padding: 25px; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .modern-header { background: var(--glass); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .kpi-card { background: var(--glass); padding: 20px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.4); box-shadow: 0 8px 20px rgba(0,0,0,0.03); display: flex; align-items: center; gap: 15px; }
        .custom-modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0, 25, 50, 0.4); backdrop-filter: blur(5px); align-items: center; justify-content: center; }
        .custom-modal-content { background: white; width: 95%; max-width: 950px; border-radius: 24px; overflow: hidden; max-height: 90vh; display: flex; flex-direction: column; }
        .modal-tabs { display: flex; background: #f8fafc; border-bottom: 1px solid #e2e8f0; padding: 0 30px; }
        .modal-tab-btn { padding: 15px 20px; font-weight: 700; font-size: 11px; color: #64748b; border: none; background: none; cursor: pointer; border-bottom: 3px solid transparent; }
        .modal-tab-btn.active { color: var(--pp-blue); border-bottom-color: var(--pp-blue); }
        .detail-item { border-bottom: 1px solid #f1f5f9; padding: 8px 0; display: flex; justify-content: space-between; font-size: 11px; align-items: center; }
        .badge { font-weight: 800; font-size: 9px; padding: 4px 12px; border-radius: 50px; text-transform: uppercase; }
        .status-approved { background: #dcfce7; color: #166534; }
        .status-closed { background: #fee2e2; color: #991b1b; }
        .status-pending { background: #fef9c3; color: #854d0e; }
        .note-card { background: white; border: 1px solid #e2e8f0; padding: 12px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid var(--pp-blue); }
    </style>
</head>
<body>

    <div class="modern-header">
        <h1 style="font-size: 1.6rem; font-weight: 800; color: #002d5a;">Merchant Portfolio</h1>
        <div class="slds-grid slds-grid_vertical-align-center">
            <select id="statusFilter" class="slds-select" style="width: 170px; margin-right: 8px; border-radius:12px;" onchange="resetAndFetch()">
                <option value="">All Statuses</option>
                <option value="Approved">Approved</option>
                <option value="Pending">Pending</option>
                <option value="Closed">Closed</option>
            </select>
            <input type="text" id="searchInput" placeholder="Search DBA..." class="slds-input" style="width:200px; border-radius:12px;" onkeypress="if(event.key==='Enter') resetAndFetch()">
            <button class="slds-button slds-button_brand" style="border-radius:12px;" onclick="resetAndFetch()">Search</button>
        </div>
    </div>

    <article class="slds-card" style="border-radius: 20px; overflow: hidden; border: none;">
        <table class="slds-table slds-table_bordered slds-table_cell-buffer slds-no-row-hover">
            <thead>
                <tr class="slds-line-height_reset">
                    <th scope="col" style="background:#f8fafc; font-weight:700;">DBA Name</th>
                    <th scope="col" style="background:#f8fafc; font-weight:700;">Merchant ID</th>
                    <th scope="col" style="background:#f8fafc; font-weight:700;">Partner ID</th>
                    <th scope="col" style="background:#f8fafc; font-weight:700;">Company</th>
                    <th scope="col" style="background:#f8fafc; font-weight:700;">Partner Name</th>
                    <th scope="col" style="background:#f8fafc; font-weight:700;">Status</th>
                </tr>
            </thead>
            <tbody id="merchantTableBody"></tbody>
        </table>
    </article>

    <div id="merchantModal" class="custom-modal">
        <div class="custom-modal-content">
            <div style="padding: 20px; background: var(--pp-blue); color: white; display: flex; justify-content: space-between;">
                <h2 id="modalTitle" style="font-weight: 800;">Merchant Profile</h2>
                <span class="material-icons" style="cursor:pointer" onclick="closeModal()">close</span>
            </div>
            <div class="modal-tabs">
                <button onclick="switchTab('details')" id="tab-btn-details" class="modal-tab-btn active">DETAILS</button>
                <button onclick="switchTab('notes')" id="tab-btn-notes" class="modal-tab-btn">NOTES</button>
                <button onclick="switchTab('history')" id="tab-btn-history" class="modal-tab-btn">HISTORY</button>
                <button onclick="switchTab('attachments')" id="tab-btn-attachments" class="modal-tab-btn">VAULT</button>
            </div>
            <div class="modal-scroll" style="padding: 30px; overflow-y: auto;">
                <div id="view-details"><div id="modalDetailsGrid" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px 30px;"></div></div>
                <div id="view-notes" style="display:none;">
                    <input type="text" id="noteTitle" class="slds-input" placeholder="Subject" style="margin-bottom:8px;">
                    <textarea id="noteBody" class="slds-textarea" placeholder="Note body..." style="margin-bottom:8px;"></textarea>
                    <button class="slds-button slds-button_brand" style="width:100%; margin-bottom:20px;" onclick="submitNote()">Save Note</button>
                    <div id="notesContainer"></div>
                </div>
                <div id="view-history" style="display:none;"><div id="historyContainer"></div></div>
                <div id="view-attachments" style="display:none;">
                    <input type="text" id="attName" class="slds-input" placeholder="Label" style="margin-bottom:8px;">
                    <input type="file" id="fileInput" class="slds-input" style="margin-bottom:8px; padding:5px;">
                    <button class="slds-button slds-button_brand" style="width:100%; margin-bottom:20px;" onclick="handleFileUpload()">Upload</button>
                    <div id="attachmentsContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        // REPLACE THESE WITH YOUR KEYS
        const supabase = supabase.createClient('https://yourproject.supabase.co', 'your-anon-key');
        
        let activeMerchantUuid = null, currentRecords = [];

        async function fetchMerchants() {
            const res = await fetch('/api/merchants', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ action: 'list', query: document.getElementById('searchInput').value, filterBy: 'dba_name', statusFilter: document.getElementById('statusFilter').value }) });
            const result = await res.json();
            if (result.success) {
                currentRecords = result.data;
                document.getElementById('merchantTableBody').innerHTML = result.data.map(m => {
                    const company = m.agent_identifiers?.agents?.companies?.company_name || '---';
                    const partner = m.agent_identifiers?.agents?.companies?.company_person_mapping?.[0]?.persons?.full_name || '---';
                    const statusClass = m.account_status?.toLowerCase().includes('approved') ? 'status-approved' : m.account_status?.toLowerCase().includes('closed') ? 'status-closed' : 'status-pending';
                    return `<tr>
                        <td><a onclick="openModal('${m.id}')" style="font-weight:700; cursor:pointer; color:var(--pp-blue);">${m.dba_name || '---'}</a></td>
                        <td><code>${m.merchant_id || '---'}</code></td>
                        <td>${m.agent_id || '---'}</td>
                        <td>${company}</td>
                        <td>${partner}</td>
                        <td><span class="badge ${statusClass}">${m.account_status || '---'}</span></td>
                    </tr>`;
                }).join('');
            }
        }

        function switchTab(tab) {
            ['details', 'notes', 'history', 'attachments'].forEach(t => {
                document.getElementById(`view-${t}`).style.display = t === tab ? 'block' : 'none';
                document.getElementById(`tab-btn-${t}`).classList.toggle('active', t === tab);
            });
            if(tab === 'notes') fetchNotes(activeMerchantUuid, 'manual');
            if(tab === 'history') fetchNotes(activeMerchantUuid, 'system');
            if(tab === 'attachments') fetchAttachments(activeMerchantUuid);
        }

        async function fetchNotes(uuid, type) {
            const container = type === 'manual' ? document.getElementById('notesContainer') : document.getElementById('historyContainer');
            const res = await fetch('/api/merchants', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ action: 'get_notes', merchant_uuid: uuid, type })});
            const r = await res.json();
            if (r.success) container.innerHTML = r.data.map(n => `<div class="note-card"><div style="font-weight:700; font-size:11px;">${n.title}</div><div style="font-size:11px; white-space:pre-wrap; font-family:${type==='system'?'monospace':'inherit'};">${n.body}</div><div style="font-size:9px; color:#94a3b8; margin-top:5px;">BY ${n.created_by} • ${new Date(n.created_at).toLocaleString()}</div></div>`).join('');
        }

        async function fetchAttachments(uuid) {
            const res = await fetch('/api/merchants', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ action: 'get_attachments', merchant_uuid: uuid })});
            const r = await res.json();
            if (r.success) document.getElementById('attachmentsContainer').innerHTML = r.data.map(a => `<div class="note-card"><a href="${a.file_url}" target="_blank" style="font-weight:700; font-size:11px;">${a.attachment_name}</a><div style="font-size:9px; color:#94a3b8;">UPLOADED: ${new Date(a.created_at).toLocaleDateString()}</div></div>`).join('');
        }

        async function handleFileUpload() {
            const file = document.getElementById('fileInput').files[0];
            const name = document.getElementById('attName').value;
            if(!file || !name) return;
            Swal.fire({ title: 'Uploading...', didOpen: () => Swal.showLoading() });
            const path = `${activeMerchantUuid}/${Date.now()}_${file.name}`;
            const { data, error } = await supabase.storage.from('merchant-docs').upload(path, file);
            if (!error) {
                const { data: urlData } = supabase.storage.from('merchant-docs').getPublicUrl(path);
                await fetch('/api/merchants', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ action: 'save_attachment', merchant_uuid: activeMerchantUuid, name, url: urlData.publicUrl })});
                Swal.fire('Success', '', 'success'); fetchAttachments(activeMerchantUuid);
            }
        }

        function openModal(id) {
            const m = currentRecords.find(r => r.id === id);
            activeMerchantUuid = m.id;
            switchTab('details');
            document.getElementById('modalDetailsGrid').innerHTML = ['dba_name', 'merchant_id', 'account_status', 'email'].map(f => `<div class="detail-item"><span style="font-weight:700; color:#64748b;">${f.toUpperCase()}</span><input type="text" id="edit-${f}" class="slds-input" value="${m[f]||''}" style="width:60%; height:28px;"></div>`).join('');
            document.getElementById('merchantModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('merchantModal').style.display = 'none'; }
        function resetAndFetch() { fetchMerchants(); }
        window.onload = () => fetchMerchants();
    </script>
</body>
</html>
