<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchant Portfolio | Global Ledger</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.13.7/styles/salesforce-lightning-design-system.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --pp-blue: #004a99; --pp-light: #f8fafc; }
        body { background: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .kpi-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border-left: 5px solid var(--pp-blue); }
        .custom-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .custom-modal-content { background: white; border-radius: 20px; width: 100%; max-width: 900px; max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; }
        .modal-scroll { padding: 30px; overflow-y: auto; flex-grow: 1; }
        .detail-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .detail-item { border-bottom: 1px solid #f1f5f9; padding: 8px 0; display: flex; justify-content: space-between; align-items: center; }
        .detail-label { color: #64748b; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="slds-p-around_large">
        <div class="slds-grid slds-grid_vertical-align-center slds-m-bottom_large">
            <div class="slds-col">
                <h1 class="slds-text-heading_large" style="font-weight:900; color:var(--pp-blue);">Merchant Portfolio</h1>
                <p class="slds-text-color_weak">Managing 99,000+ Active Ledgers</p>
            </div>
            <div class="slds-col slds-grow-none slds-grid slds-gutter_small">
                <select id="statusFilter" class="slds-select" style="width:160px;">
                    <option value="">All Statuses</option>
                    <option value="Approved">Approved</option>
                    <option value="Pending">Pending</option>
                    <option value="Closed">Closed</option>
                </select>
                <select id="filterBy" class="slds-select" style="width:160px;">
                    <option value="dba_name">DBA Name</option>
                    <option value="merchant_id">Merchant ID</option>
                    <option value="partner_name">Partner Name</option>
                </select>
                <input type="text" id="searchInput" class="slds-input" placeholder="Search..." style="width:250px;">
                <button onclick="fetchMerchants(0)" class="slds-button slds-button_brand" style="padding:0 30px;">Search</button>
            </div>
        </div>

        <div class="slds-grid slds-gutters slds-m-bottom_large">
            <div class="slds-col slds-size_1-of-4">
                <div class="kpi-card">
                    <p class="detail-label">Filtered MTD Volume</p>
                    <h2 id="kpiMTD" style="font-size:24px; font-weight:800;">$0.00</h2>
                </div>
            </div>
            <div class="slds-col slds-size_1-of-4">
                <div class="kpi-card">
                    <p class="detail-label">Portfolio Share</p>
                    <h2 id="kpiShare" style="font-size:24px; font-weight:800; color:var(--pp-blue);">0.00%</h2>
                </div>
            </div>
        </div>

        <div style="background:white; border-radius:15px; overflow:hidden; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);">
            <table class="slds-table slds-table_cell-buffer slds-table_bordered">
                <thead style="background:#f8fafc;">
                    <tr class="slds-line-height_reset">
                        <th scope="col"><div class="slds-truncate">DBA Name</div></th>
                        <th scope="col"><div class="slds-truncate">Merchant ID</div></th>
                        <th scope="col"><div class="slds-truncate">Partner Name</div></th>
                        <th scope="col"><div class="slds-truncate">Status</div></th>
                        <th scope="col"><div class="slds-truncate">Action</div></th>
                    </tr>
                </thead>
                <tbody id="merchantTableBody">
                    </tbody>
            </table>
        </div>
        
        <div class="slds-m-top_medium slds-grid slds-grid_align-spread">
            <p id="totalCount" class="slds-text-color_weak"></p>
            <div class="slds-button-group">
                <button id="prevBtn" class="slds-button slds-button_neutral">Previous</button>
                <button id="nextBtn" class="slds-button slds-button_neutral">Next</button>
            </div>
        </div>
    </div>

    <div id="merchantModal" class="custom-modal">
        <div class="custom-modal-content">
            <div style="padding: 20px; background: var(--pp-blue); color: white; display: flex; justify-content: space-between;">
                <h2 style="font-weight: 800;">Merchant Editor</h2>
                <span style="cursor:pointer" onclick="closeModal()">✕</span>
            </div>
            <div class="modal-scroll">
                <div id="modalDetailsGrid" class="detail-grid"></div>
            </div>
            <div style="padding: 20px; background: #f8fafc; display: flex; justify-content: space-between;">
                <button class="slds-button slds-button_neutral" onclick="closeModal()">Cancel</button>
                <div>
                    <button class="slds-button slds-button_outline-brand" id="fullEditBtn">Full Edit Page</button>
                    <button class="slds-button slds-button_brand" id="saveChangeBtn">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentPage = 0;
        let currentRecords = [];
        const ALL_FIELDS = ['dba_name', 'merchant_id', 'agent_id', 'account_status', 'enrollment_date', 'approved_date', 'volume_mtd'];

        async function fetchMerchants(page = 0) {
            currentPage = page;
            const query = document.getElementById('searchInput').value;
            const filterBy = document.getElementById('filterBy').value;
            const statusFilter = document.getElementById('statusFilter').value;

            try {
                const res = await fetch('/api/merchants', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'list', query, filterBy, statusFilter, page })
                });
                const result = await res.json();
                
                if (result.success) {
                    currentRecords = result.data;
                    renderTable(result.data);
                    updateKPIs(result.metrics);
                    document.getElementById('totalCount').innerText = `Total Found: ${result.count}`;
                }
            } catch (err) {
                console.error("Fetch error:", err);
            }
        }

        function renderTable(data) {
            const body = document.getElementById('merchantTableBody');
            body.innerHTML = data.map(m => `
                <tr>
                    <td><b>${m.dba_name}</b></td>
                    <td>${m.merchant_id}</td>
                    <td>${m.partner_name}</td>
                    <td><span class="status-badge">${m.account_status}</span></td>
                    <td><button onclick="openModal('${m.id}')" class="slds-button slds-button_neutral">View/Edit</button></td>
                </tr>
            `).join('');
        }

        function updateKPIs(m) {
            const cur = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' });
            document.getElementById('kpiMTD').innerText = cur.format(m.totalMTD);
            document.getElementById('kpiShare').innerText = `${m.portfolioShare}%`;
        }

        function openModal(id) {
            const m = currentRecords.find(r => r.id === id);
            if (!m) return;

            const statusOptions = ["Approved", "Approved - Collections", "Closed", "Closed - Collections", "Collections", "Pending", "Withdrawn"];
            
            let gridHtml = ALL_FIELDS.map(f => {
                const label = f.replace(/_/g, ' ').toUpperCase();
                let input = `<input type="text" id="edit-${f}" class="slds-input" value="${m[f] || ''}">`;
                
                if (f === 'merchant_id' || f === 'agent_id') {
                    input = `<input type="text" id="edit-${f}" class="slds-input" style="background:#f1f5f9;" value="${m[f]}" readonly>`;
                } else if (f === 'account_status') {
                    input = `<select id="edit-${f}" class="slds-select">${statusOptions.map(o => `<option ${m[f]===o?'selected':''}>${o}</option>`).join('')}</select>`;
                } else if (f.includes('date')) {
                    input = `<input type="date" id="edit-${f}" class="slds-input" value="${m[f] ? m[f].split('T')[0] : ''}">`;
                }

                return `<div class="detail-item"><span class="detail-label">${label}</span>${input}</div>`;
            }).join('');

            document.getElementById('modalDetailsGrid').innerHTML = gridHtml;
            document.getElementById('saveChangeBtn').onclick = () => saveChanges(m.id);
            document.getElementById('fullEditBtn').onclick = () => window.location.href = `merchants-update.html?id=${m.id}`;
            document.getElementById('merchantModal').style.display = 'flex';
        }

        async function saveChanges(id) {
            const payload = {};
            ALL_FIELDS.forEach(f => payload[f] = document.getElementById(`edit-${f}`).value);

            Swal.fire({ title: 'Saving...', didOpen: () => Swal.showLoading() });

            const res = await fetch('/api/merchants', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'update', id, payload })
            });

            if ((await res.json()).success) {
                Swal.fire('Saved!', '', 'success');
                closeModal();
                fetchMerchants(currentPage);
            }
        }

        function closeModal() { document.getElementById('merchantModal').style.display = 'none'; }

        // Initial Load
        fetchMerchants();
    </script>
</body>
</html>
