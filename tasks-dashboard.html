<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task Center | Secure Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --pp-blue: #004990; --pp-accent: #00a1e0; }
        body { background: #f1f5f9; padding: 25px; font-family: 'Inter', sans-serif; }
        .dashboard-container { max-width: 1400px; margin: 0 auto; }
        
        .modern-header { background: white; border-radius: 16px; padding: 25px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .main-card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        
        .slds-table thead th { background-color: #f8fafc !important; font-weight: 700 !important; color: #475569 !important; padding: 15px !important; }
        .task-row:hover { background-color: #f8fafc !important; cursor: pointer; }
        
        .badge-due { font-weight: 800; font-size: 10px; padding: 4px 10px; border-radius: 4px; background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        
        /* Modal Styles */
        .modal-tab-btn { padding: 10px 15px; border: none; background: none; font-weight: 700; color: #94a3b8; cursor: pointer; border-bottom: 3px solid transparent; transition: 0.3s; flex: 1; font-size: 11px; text-align: center; }
        .active-tab { color: var(--pp-blue) !important; border-bottom-color: var(--pp-blue) !important; }
        .modern-input { border-radius: 8px !important; border: 1px solid #cbd5e1 !important; padding: 8px 12px !important; width: 100%; font-size: 0.8rem; margin-bottom: 8px; }
        .edit-label { font-size: 9px; font-weight: 700; color: #64748b; margin-bottom: 3px; display: block; text-transform: uppercase; }
        .field-section-title { grid-column: span 3; font-weight:800; color:#004990; border-bottom:1px solid #eee; margin-top:15px; text-transform:uppercase; font-size:10px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<div class="dashboard-container">
    <div class="modern-header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <a href="index.html" class="slds-button slds-button_neutral" style="border-radius: 10px;">HOME</a>
            <h1 style="font-size: 1.6rem; font-weight: 800; color: #002d5a; margin: 0;">Task Center</h1>
        </div>
        <div style="display: flex; gap: 10px;">
            <select id="userFilter" class="slds-select" style="width: 180px; border-radius:10px;" onchange="resetAndFetchTasks()">
                <option value="">All Assignees</option>
            </select>
            <select id="taskStatusFilter" class="slds-select" style="width: 150px; border-radius:10px;" onchange="resetAndFetchTasks()">
                <option value="Pending">Pending</option>
                <option value="Completed">Completed</option>
                <option value="">All Statuses</option>
            </select>
        </div>
    </div>

    <article class="main-card">
        <table class="slds-table slds-table_bordered slds-table_cell-buffer slds-no-row-hover">
            <thead>
                <tr>
                    <th style="width: 30%;">Task Description</th>
                    <th style="width: 25%;">Merchant (DBA)</th>
                    <th style="width: 15%;">Due Date</th>
                    <th style="width: 15%;">Status</th>
                    <th style="width: 15%; text-align: right;">Action</th>
                </tr>
            </thead>
            <tbody id="global-task-list">
                <tr><td colspan="5" style="text-align:center; padding:50px; color:#94a3b8;">Loading assignments...</td></tr>
            </tbody>
        </table>
        
        <div style="padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #f8fafc; border-top: 1px solid #e2e8f0;">
            <div id="taskPageInfo" style="font-weight:700; font-size: 12px; color: var(--pp-blue);">Page 1</div>
            <div>
                <button class="slds-button slds-button_neutral" onclick="changeTaskPage(-1)">Prev</button>
                <button class="slds-button slds-button_neutral" onclick="changeTaskPage(1)">Next</button>
            </div>
        </div>
    </article>
</div>

<script>
    let currentRecords = []; 
    let taskPage = 0;
    const taskLimit = 20;

    // --- 1. STAFF FILTER LOGIC ---
    async function loadStaffFilter() {
        try {
            const res = await fetch('/api/merchants', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'get_staff' })
            });
            const result = await res.json();
            if (result.success) {
                const select = document.getElementById('userFilter');
                select.innerHTML = '<option value="">All Assignees</option>' + 
                    result.data.map(s => `<option value="${s.id}">${s.full_name}</option>`).join('');
            }
        } catch (err) { console.error("Staff load failed", err); }
    }

    // --- 2. DATA FETCHING ---
    async function fetchAllMyTasks() {
        const tbody = document.getElementById('global-task-list');
        const myId = sessionStorage.getItem('pp_userid');
        const targetUser = document.getElementById('userFilter').value;
        const status = document.getElementById('taskStatusFilter').value;

        try {
            const res = await fetch('/api/merchants', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    action: 'get_global_tasks', 
                    userid: myId,
                    targetUser: targetUser || null,
                    status: status || null,
                    page: taskPage,
                    limit: taskLimit
                })
            });
            const result = await res.json();

            if (result.success) {
                // Map merchants for modal compatibility
                currentRecords = result.data.map(t => ({
                    ...t.merchants,
                    id: t.merchant_id 
                }));

                renderTaskTable(result.data);
                
                const totalFound = result.total || 0;
                document.getElementById('taskPageInfo').innerHTML = 
                    `Page ${taskPage + 1} <span style="font-weight:400; color:#94a3b8; margin-left:10px;">(Total: ${totalFound})</span>`;
            }
        } catch (err) { console.error(err); }
    }

    function renderTaskTable(tasks) {
        const tbody = document.getElementById('global-task-list');
        if (!tasks || tasks.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:50px;">No tasks found.</td></tr>`;
            return;
        }

        tbody.innerHTML = tasks.map(t => `
            <tr class="task-row" onclick="openModal('${t.merchant_id}')">
                <td>
                    <div style="font-weight:700; color:var(--pp-blue);">${t.title}</div>
                    <div style="font-size:11px; color:#64748b;">${t.body || ''}</div>
                </td>
                <td><strong>${t.merchants?.dba_name || '---'}</strong></td>
                <td><span class="badge-due">${t.due_date || 'N/A'}</span></td>
                <td><span class="slds-badge">${t.status}</span></td>
                <td style="text-align: right;">
                    <button class="slds-button slds-button_brand slds-button_small" style="border-radius:8px;">MANAGE</button>
                </td>
            </tr>
        `).join('');
    }

    // --- 3. PAGINATION HELPERS ---
    function changeTaskPage(dir) {
        taskPage += dir;
        if (taskPage < 0) taskPage = 0;
        fetchAllMyTasks();
    }

    function resetAndFetchTasks() {
        taskPage = 0;
        fetchAllMyTasks();
    }

    // --- 4. MERCHANT MODAL (FULL VERSION) ---
    async function openModal(id) {
        const m = currentRecords.find(r => r.id === id);
        if (!m) return;
        Swal.fire({ title: 'Loading...', didOpen: () => { Swal.showLoading(); } });

        try {
            const [nRes, lRes, aRes, sRes] = await Promise.all([
                fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'get_notes', merchant_uuid: m.id, type: 'manual' }) }),
                fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'get_notes', merchant_uuid: m.id, type: 'system' }) }),
                fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'get_attachments', merchant_uuid: m.id }) }),
                fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'get_staff' }) })
            ]);
            
            const notes = (await nRes.json()).data || [];
            const logs = (await lRes.json()).data || [];
            const files = (await aRes.json()).data || [];
            const staff = (await sRes.json()).data || [];

            Swal.fire({
                title: `<div style="text-align:left; font-weight:800; color:#002d5a;">${m.dba_name}</div>`,
                width: '1100px',
                html: `
                    <input type="hidden" id="modal-merchant-id" value="${m.id}">
                    <div style="display:flex; border-bottom:1px solid #e2e8f0; margin-bottom:20px;">
                        <button onclick="switchTab('details')" id="tab-details" class="modal-tab-btn active-tab">DETAILS</button>
                        <button onclick="switchTab('equipment')" id="tab-equipment" class="modal-tab-btn">EQUIPMENT</button>
                        <button onclick="switchTab('notes')" id="tab-notes" class="modal-tab-btn">INTERNAL NOTES</button>
                        <button onclick="switchTab('tasks')" id="tab-tasks" class="modal-tab-btn">TASKS</button>
                    </div>

                    <div id="content-details" class="tab-content" style="text-align:left; max-height:600px; overflow-y:auto; padding-right:10px;">
                        <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:12px;">
                            <div class="field-section-title">Core Identity</div>
                            <div><label class="edit-label">DBA Name</label><input id="edit-dba_name" class="modern-input" value="${m.dba_name || ''}"></div>
                            <div><label class="edit-label">MID (Locked)</label><input class="modern-input" value="${m.merchant_id || ''}" disabled style="background:#f8fafc;"></div>
                            <div>
                                <label class="edit-label">Status</label>
                                <select id="edit-account_status" class="modern-input">
                                    <option value="${m.account_status}" selected>${m.account_status}</option>
                                    <option value="Approved">Approved</option>
                                    <option value="Closed">Closed</option>
                                    <option value="Pending">Pending</option>
                                </select>
                            </div>
                        </div>
                        <button onclick="saveMerchant('${m.id}')" style="background:#004990; color:white; width:100%; padding:15px; border-radius:10px; border:none; margin-top:20px; font-weight:700; cursor:pointer;">SAVE CHANGES</button>
                    </div>

                    <div id="content-equipment" class="tab-content" style="display:none; text-align:left;">
                        <table class="slds-table slds-table_bordered">
                            <thead><tr><th>SERIAL</th><th>MODEL</th><th>STATUS</th></tr></thead>
                            <tbody id="merchant-equip-list"></tbody>
                        </table>
                        <div id="equip-empty-state" style="padding:20px; text-align:center; color:#94a3b8; display:none;">No equipment assigned.</div>
                    </div>

                    <div id="content-tasks" class="tab-content" style="display:none; text-align:left;">
                        <div id="tasks-list-internal" style="max-height:400px; overflow-y:auto;">
                            <p style="text-align:center; padding:20px;">Loading tasks...</p>
                        </div>
                    </div>

                    <div id="content-notes" class="tab-content" style="display:none; text-align:left;">
                        <div id="notes-list-box">${notes.map(n => `<div style="background:white; border:1px solid #e2e8f0; border-radius:12px; padding:15px; margin-bottom:10px;"><b>${n.title}</b><p style="font-size:13px;">${n.body}</p></div>`).join('')}</div>
                    </div>
                `,
                showConfirmButton: false, showCloseButton: true
            });
        } catch (err) { Swal.fire('Error', 'Load failed: ' + err.message, 'error'); }
    }

    // --- 5. MODAL HELPERS ---
    window.switchTab = (tab) => {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.modal-tab-btn').forEach(t => t.classList.remove('active-tab'));
        document.getElementById('content-' + tab).style.display = 'block';
        document.getElementById('tab-' + tab).classList.add('active-tab');
        
        if (tab === 'tasks') fetchMerchantTasks();
        if (tab === 'equipment') fetchMerchantEquipment();
    };

    async function fetchMerchantTasks() {
        const merchantUuid = document.getElementById('modal-merchant-id')?.value;
        const listDiv = document.getElementById('tasks-list-internal');
        if (!merchantUuid || !listDiv) return;

        try {
            const res = await fetch('/api/merchants', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'get_tasks', merchant_uuid: merchantUuid })
            });
            const result = await res.json();
            
            listDiv.innerHTML = result.data && result.data.length > 0 
                ? result.data.map(t => `<div style="background:#f8fafc; border:1px solid #e2e8f0; padding:15px; margin-bottom:10px; border-radius:10px;">
                    <div style="font-weight:700;">${t.title}</div>
                    <div style="font-size:11px; color:#64748b;">Status: ${t.status} | Due: ${t.due_date || 'N/A'}</div>
                  </div>`).join('')
                : '<p style="text-align:center; padding:20px;">No other tasks for this merchant.</p>';
        } catch (err) { listDiv.innerHTML = 'Error loading tasks.'; }
    }

    async function fetchMerchantEquipment() {
        const merchantUuid = document.getElementById('modal-merchant-id')?.value;
        const tbody = document.getElementById('merchant-equip-list');
        const emptyState = document.getElementById('equip-empty-state');
        if (!merchantUuid || !tbody) return;

        try {
            const res = await fetch('/api/merchants', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'get_merchant_equipment', merchant_uuid: merchantUuid })
            });
            const result = await res.json();
            tbody.innerHTML = "";
            if (!result.data || result.data.length === 0) {
                emptyState.style.display = 'block';
            } else {
                emptyState.style.display = 'none';
                result.data.forEach(e => {
                    const row = tbody.insertRow();
                    row.innerHTML = `<td><b>${e.serial_number}</b></td><td>${e.terminal_type}</td><td>${e.status}</td>`;
                });
            }
        } catch (err) { console.error(err); }
    }

    window.saveMerchant = async (uuid) => {
        const payload = { dba_name: document.getElementById('edit-dba_name').value, account_status: document.getElementById('edit-account_status').value };
        try {
            const res = await fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'update', id: uuid, payload }) });
            const result = await res.json();
            if(result.success) { Swal.fire({icon: 'success', title: 'Saved', timer: 1000, showConfirmButton: false}); fetchAllMyTasks(); }
        } catch (err) { console.error(err); }
    };

    window.onload = async () => {
        await loadStaffFilter();
        fetchAllMyTasks();
    };
</script>
</body>
</html>
