<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Merchant Portfolio | Secure Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --pp-blue: #004990; --pp-accent: #00a1e0; --glass: rgba(255, 255, 255, 0.9); }
        body { background: radial-gradient(circle at top right, #f8fafc, #e2e8f0); padding: 25px; font-family: 'Inter', sans-serif; min-height: 100vh; margin: 0; }
        
        /* Container that prevents the "edge-to-edge" clunky look */
        .dashboard-container { max-width: 1440px; margin: 0 auto; }

        .modern-header { background: var(--glass); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid rgba(255,255,255,0.5); }
        
        .summary-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 25px; }
        
        .kpi-card { background: var(--glass); padding: 20px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.4); box-shadow: 0 8px 20px rgba(0,0,0,0.03); display: flex; align-items: center; gap: 15px; transition: transform 0.2s; }
        .kpi-card:hover { transform: translateY(-3px); }
        .kpi-icon { background: rgba(0,73,144,0.1); color: var(--pp-blue); padding: 12px; border-radius: 12px; display: flex; align-items: center; }
        
        .kpi-val { font-size: 1.3rem; font-weight: 800; color: #002d5a; display: block; }
        .kpi-label { font-size: 0.65rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .badge { font-weight: 800; font-size: 9px; padding: 4px 12px; border-radius: 50px; text-transform: uppercase; display: inline-block; }
        .status-approved { background: #dcfce7; color: #166534; }
        .status-closed { background: #fee2e2; color: #991b1b; }
        .status-pending { background: #fef9c3; color: #854d0e; }
        
        .slds-table thead th { background-color: #f8fafc !important; color: #64748b !important; text-transform: uppercase; font-size: 11px; padding: 15px !important; border-bottom: 2px solid #edf2f7 !important; }
        .slds-table td { padding: 15px !important; vertical-align: middle; }
        
        .modal-tab-btn { padding: 14px 20px; border: none; background: none; font-weight: 700; font-size: 0.75rem; color: #94a3b8; cursor: pointer; border-bottom: 3px solid transparent; transition: 0.3s; }
        .active-tab { color: var(--pp-blue) !important; border-bottom-color: var(--pp-blue) !important; }
        .edit-label { font-size: 10px; font-weight: 700; color: #64748b; margin-bottom: 4px; display: block; text-transform: uppercase; }
        .modern-input { border-radius: 8px !important; border: 1px solid #cbd5e1 !important; padding: 8px 12px !important; width: 100%; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="modern-header">
        <div>
            <div style="display:flex; align-items:center; gap:12px; margin-bottom:8px;">
                <a href="index.html" style="background:white; border:1px solid #e2e8f0; padding:6px 14px; border-radius:50px; color:var(--pp-blue); font-weight:700; font-size:0.7rem; text-decoration:none; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">HOME</a>
                <div id="user-greeting" style="background:rgba(0,73,144,0.08); padding:6px 16px; border-radius:50px; font-size:0.7rem; font-weight:700; color:var(--pp-blue);">Staff Member</div>
            </div>
            <h1 style="font-size: 1.8rem; font-weight: 800; color: #002d5a; letter-spacing: -0.5px;">Merchant Portfolio</h1>
        </div>

        <div style="display: flex; gap: 10px;">
            <select id="statusFilter" class="slds-select" style="width: 170px; border-radius:12px; height:42px; border: 1px solid #cbd5e1;" onchange="resetAndFetch()">
                <option value="">All Statuses</option>
                <option value="Approved">Approved</option>
                <option value="Closed">Closed</option>
                <option value="Fraud">Fraud</option>
            </select>
            <input type="text" id="searchInput" placeholder="Search merchants..." class="slds-input" style="width:250px; border-radius:12px; height:42px; border: 1px solid #cbd5e1;" onkeypress="if(event.key==='Enter') resetAndFetch()">
            <button class="slds-button slds-button_brand" style="border-radius:12px; height: 42px; padding: 0 30px; background: var(--pp-blue);" onclick="resetAndFetch()">Search</button>
        </div>
    </div>

    <div class="summary-bar">
        <div class="kpi-card">
            <div class="kpi-icon"><span class="material-icons">payments</span></div>
            <div><span class="kpi-label">Filtered MTD</span><span class="kpi-val" id="mtd-val">$0.00</span></div>
        </div>
        <div class="kpi-card">
            <div class="kpi-icon" style="color:#00a1e0;"><span class="material-icons">calendar_today</span></div>
            <div><span class="kpi-label">Total 30D</span><span class="kpi-val" id="30d-val">$0.00</span></div>
        </div>
        <div class="kpi-card">
            <div class="kpi-icon" style="color:#2e7d32;"><span class="material-icons">history</span></div>
            <div><span class="kpi-label">Total 90D</span><span class="kpi-val" id="90d-val">$0.00</span></div>
        </div>
        <div class="kpi-card" style="background:var(--pp-blue); color:white;">
            <div class="kpi-icon" style="color:white; background: rgba(255,255,255,0.2);"><span class="material-icons">pie_chart</span></div>
            <div><span class="kpi-label" style="color:rgba(255,255,255,0.7);">Portfolio Share</span><span class="kpi-val" id="share-val" style="color:white;">0.00%</span></div>
        </div>
    </div>

    <article class="slds-card" style="border-radius: 20px; overflow: hidden; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05); background: white;">
        <table class="slds-table slds-table_bordered slds-table_cell-buffer slds-no-row-hover">
            <thead>
                <tr class="slds-line-height_reset">
                    <th scope="col">DBA Name</th>
                    <th scope="col">Merchant ID</th>
                    <th scope="col">Partner ID</th>
                    <th scope="col">Company</th>
                    <th scope="col">Partner Name</th>
                    <th scope="col">Status</th>
                </tr>
            </thead>
            <tbody id="merchantTableBody"></tbody>
        </table>
        
        <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center; background: #f8fafc; border-top: 1px solid #e2e8f0;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 11px; font-weight: 700; color: #64748b;">DISPLAY:</span>
                <select id="pageLimit" class="slds-select" style="width: 80px; height: 32px !important; border-radius:8px;" onchange="resetAndFetch()">
                    <option value="20">20</option><option value="50">50</option><option value="100">100</option>
                </select>
            </div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="slds-button slds-button_neutral" id="prevBtn" onclick="changePage(-1)" disabled>Previous</button>
                <span id="pageInfo" style="font-weight:700; font-size: 12px; color: var(--pp-blue);">Page 1</span>
                <button class="slds-button slds-button_neutral" id="nextBtn" onclick="changePage(1)">Next</button>
            </div>
        </div>
    </article>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    let currentPage = 0;
    let currentRecords = [];

    async function fetchMerchants() {
        const tbody = document.getElementById('merchantTableBody');
        const limit = document.getElementById('pageLimit').value;
        tbody.innerHTML = "<tr><td colspan='6' style='text-align:center; padding:60px; color: #94a3b8;'>Synchronizing Secure Ledger...</td></tr>";
        
        try {
            const res = await fetch('/api/merchants', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    action: 'list', 
                    page: currentPage, 
                    limit: limit, 
                    query: document.getElementById('searchInput').value, 
                    filterBy: 'dba_name', 
                    statusFilter: document.getElementById('statusFilter').value 
                })
            });
            const result = await res.json();
            if (!result.success) throw new Error(result.message);
            
            currentRecords = result.data;
            tbody.innerHTML = "";

            const cur = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' });
            document.getElementById('mtd-val').innerText = cur.format(result.metrics.totalMTD || 0);
            document.getElementById('30d-val').innerText = cur.format(result.metrics.total30D || 0);
            document.getElementById('90d-val').innerText = cur.format(result.metrics.total90D || 0);
            document.getElementById('share-val').innerText = (result.metrics.portfolioShare || 0) + '%';

            currentRecords.forEach(m => {
                const row = tbody.insertRow();
                const statusVal = m.account_status || '';
                const s = statusVal.toLowerCase();
                const statusClass = s.includes('approved') ? 'status-approved' : s.includes('closed') ? 'status-closed' : 'status-pending';
                
                row.innerHTML = `
                    <td><a onclick="openModal('${m.id}')" style="font-weight:700; color:var(--pp-blue); cursor:pointer;">${m.dba_name || '---'}</a></td>
                    <td><code style="background:#f1f5f9; padding:2px 6px; border-radius:4px;">${m.merchant_id || '---'}</code></td>
                    <td>${m.agent_id || '---'}</td>
                    <td style="font-weight:600;">${m.company_name || '---'}</td>
                    <td>${m.partner_name || '---'}</td>
                    <td><span class="badge ${statusClass}">${statusVal || '---'}</span></td>
                `;
            });

            document.getElementById('pageInfo').innerHTML = `Page ${currentPage + 1}`;
            document.getElementById('prevBtn').disabled = (currentPage === 0);
            document.getElementById('nextBtn').disabled = (currentRecords.length < limit);

        } catch (err) { 
            tbody.innerHTML = `<tr><td colspan='6' style='color:red; text-align:center; padding:20px;'>Sync error: ${err.message}</td></tr>`; 
        }
    }

    // Modal, Tab Switcher, and Helper functions
    window.switchTab = function(tab) {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.modal-tab-btn').forEach(t => t.classList.remove('active-tab'));
        document.getElementById('content-' + tab).style.display = 'block';
        document.getElementById('tab-' + tab).classList.add('active-tab');
    };

    function changePage(dir) { currentPage += dir; fetchMerchants(); }
    function resetAndFetch() { currentPage = 0; fetchMerchants(); }
    window.onload = fetchMerchants;

    // ... Keep your openModal and saveMerchant logic here, just ensure no duplicates ...
</script>
</body>
</html>
