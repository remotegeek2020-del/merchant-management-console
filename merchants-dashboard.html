<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchant Portfolio | Secure Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root { --pp-blue: #004990; --pp-accent: #00a1e0; --glass: rgba(255, 255, 255, 0.9); }
        body { background: radial-gradient(circle at top right, #f8fafc, #e2e8f0); padding: 25px; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .modern-header { background: var(--glass); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 30px rgba(0, 45, 90, 0.05); }
        .slds-select, .slds-input { border-radius: 12px !important; height: 40px !important; border: 1px solid #d1d9e6 !important; }
        .btn-export { background: #2e7d32 !important; color: white !important; border-radius: 12px !important; height: 40px !important; margin-left: 8px; border: none; cursor: pointer; display: flex; align-items: center; padding: 0 15px; transition: all 0.2s; }
        .btn-export:hover { background: #1b5e20 !important; }
        .slds-card { border-radius: 20px !important; background: var(--glass) !important; backdrop-filter: blur(10px); box-shadow: 0 15px 35px rgba(0,0,0,0.05) !important; overflow: hidden; }
        .custom-modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0, 25, 50, 0.4); backdrop-filter: blur(5px); align-items: center; justify-content: center; }
        .custom-modal-content { background: white; width: 95%; max-width: 550px; border-radius: 24px; overflow: hidden; box-shadow: 0 25px 60px rgba(0,0,0,0.2); }
        .detail-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f1f5f9; }
        .status-badge { font-weight: 800; font-size: 10px; background: #f1f5f9; color: #475569; padding: 3px 10px; border-radius: 50px; text-transform: uppercase; }
        .user-pill { background: rgba(0, 73, 144, 0.08); padding: 6px 16px; border-radius: 50px; font-size: 0.7rem; font-weight: 700; color: var(--pp-blue); text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="modern-header">
        <div>
            <div style="display:flex; align-items:center; gap:12px; margin-bottom:8px;">
                <a href="index.html" style="background:white; border:1px solid #e2e8f0; padding:6px 14px; border-radius:50px; color:var(--pp-blue); font-weight:700; font-size:0.7rem; text-decoration:none;">HOME</a>
                <div id="user-greeting" class="user-pill">Staff Member</div>
            </div>
            <h1 style="font-size: 1.6rem; font-weight: 800; color: #002d5a;">Merchant Portfolio</h1>
        </div>
        <div class="slds-grid slds-grid_vertical-align-center">
            <select id="filterBy" class="slds-select" style="width: 200px; margin-right: 8px;">
                <option value="">Select what to search</option>
                <option value="dba_name">DBA Name</option>
                <option value="merchant_id">Merchant ID (MID)</option>
                <option value="agent_id">Partner ID</option>
                <option value="company_name">Company Name</option>
                <option value="partner_name">Partner Name</option>
            </select>
            <input type="text" id="searchInput" placeholder="Enter search term..." class="slds-input" style="width:250px; margin-right: 8px;" onkeypress="if(event.key==='Enter') resetAndFetch()">
            <button class="slds-button slds-button_brand" style="border-radius:12px; height: 40px;" onclick="resetAndFetch()">Search</button>
            <button class="btn-export" onclick="exportToCSV()"><span class="material-icons" style="font-size:18px;">download</span></button>
        </div>
    </div>

    <article class="slds-card">
        <table class="slds-table slds-table_bordered slds-table_cell-buffer slds-no-row-hover">
            <thead>
                <tr class="slds-line-height_reset">
                    <th scope="col">DBA Name</th>
                    <th scope="col">Merchant ID</th>
                    <th scope="col">Partner ID</th>
                    <th scope="col">Company</th>
                    <th scope="col">Partner Name</th>
                    <th scope="col">Status</th>
                </tr>
            </thead>
            <tbody id="merchantTableBody"></tbody>
        </table>
        <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.3);">
            <div style="display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 12px; font-weight: 700; color: #64748b;">Show:</span>
                <select id="pageLimit" class="slds-select" style="width: 80px; height: 32px !important;" onchange="resetAndFetch()">
                    <option value="20">20</option><option value="50">50</option><option value="100">100</option>
                </select>
            </div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="slds-button slds-button_neutral" id="prevBtn" onclick="changePage(-1)" disabled>Previous</button>
                <span id="pageInfo" style="font-weight:700;">Page 1</span>
                <button class="slds-button slds-button_neutral" id="nextBtn" onclick="changePage(1)">Next</button>
            </div>
        </div>
    </article>

    <div id="merchantModal" class="custom-modal" onclick="if(event.target == this) closeModal()">
        <div class="custom-modal-content">
            <div style="padding: 25px; background: var(--pp-blue); color: white; display: flex; justify-content: space-between; align-items: center;">
                <h2 style="font-weight: 800; font-size: 1.2rem;">Merchant Profile</h2>
                <span class="material-icons" style="cursor:pointer" onclick="closeModal()">close</span>
            </div>
            <div id="modalBody" style="padding: 30px;"></div>
            <div style="padding: 20px 30px; background: #f8fafc; display: flex; justify-content: space-between;">
                <button class="slds-button slds-button_brand" id="editBtn" style="border-radius:10px;">Edit Profile</button>
                <button class="slds-button slds-button_neutral" style="border-radius:8px;" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        let currentPage = 0;
        let currentRecords = [];

        async function fetchMerchants() {
            const tbody = document.getElementById('merchantTableBody');
            const pageInfo = document.getElementById('pageInfo');
            const limit = document.getElementById('pageLimit').value;
            tbody.innerHTML = "<tr><td colspan='6' style='text-align:center; padding:40px;'>Syncing Ledger...</td></tr>";

            try {
                const response = await fetch('/api/merchants', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        action: 'list', 
                        page: currentPage, 
                        limit: limit, 
                        query: document.getElementById('searchInput').value, 
                        filterBy: document.getElementById('filterBy').value 
                    })
                });
                const result = await response.json();
                if (!result.success) throw new Error(result.message);

                currentRecords = result.data;
                tbody.innerHTML = "";
                
                if (currentRecords.length === 0) {
                    tbody.innerHTML = "<tr><td colspan='6' style='text-align:center; padding:40px;'>No results found.</td></tr>";
                }

                currentRecords.forEach(m => {
                    const row = tbody.insertRow();
                    row.innerHTML = `
                        <td><a onclick="openModal('${m.id}')" style="font-weight:700; color:var(--pp-blue); cursor:pointer;">${m.dba_name || '---'}</a></td>
                        <td><code>${m.merchant_id || '---'}</code></td>
                        <td><span style="background:#f1f5f9; padding:2px 8px; border-radius:4px; font-size:11px;">${m.agent_id || '---'}</span></td>
                        <td style="font-size:11px; font-weight:600;">${m.company_name}</td>
                        <td style="font-size:11px; color:var(--pp-accent); font-weight:600;">${m.partner_name}</td>
                        <td><span class="status-badge">${m.account_status || '---'}</span></td>
                    `;
                });

                const total = result.count || 0;
                pageInfo.innerHTML = `Page ${currentPage + 1} <span style="color:#94a3b8; font-weight:400; margin-left:10px;">(Total: ${total})</span>`;
                document.getElementById('nextBtn').disabled = ((currentPage + 1) * limit) >= total;
                document.getElementById('prevBtn').disabled = (currentPage === 0);
            } catch (e) { 
                console.error(e);
                tbody.innerHTML = `<tr><td colspan='6' style='text-align:center; color:red; padding:20px;'>Error: ${e.message}</td></tr>`; 
            }
        }

        function openModal(id) {
            const m = currentRecords.find(r => r.id === id);
            if (!m) return;
            document.getElementById('modalBody').innerHTML = `
                <div class="detail-row"><span>DBA Name</span> <b>${m.dba_name}</b></div>
                <div class="detail-row"><span>Merchant ID</span> <b>${m.merchant_id}</b></div>
                <div class="detail-row"><span>Partner ID</span> <b>${m.agent_id}</b></div>
                <div class="detail-row"><span>Company</span> <b>${m.company_name}</b></div>
                <div class="detail-row"><span>Partner Name</span> <b>${m.partner_name}</b></div>
                <div class="detail-row"><span>Status</span> <b class="status-badge">${m.account_status || '---'}</b></div>
            `;
            document.getElementById('editBtn').onclick = () => {
                const p = new URLSearchParams({ 
                    id: m.id, 
                    dba: m.dba_name, 
                    mid: m.merchant_id, 
                    aid: m.agent_id,
                    status: m.account_status || ''
                });
                window.location.href = `merchants-update.html?${p.toString()}`;
            };
            document.getElementById('merchantModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('merchantModal').style.display = 'none'; }
        function changePage(dir) { currentPage += dir; fetchMerchants(); }
        function resetAndFetch() { currentPage = 0; fetchMerchants(); }
        
        async function exportToCSV() {
            Swal.fire({ title: 'Exporting...', didOpen: () => Swal.showLoading() });
            try {
                const response = await fetch('/api/merchants', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'list', page: 0, limit: 1000, query: document.getElementById('searchInput').value, filterBy: document.getElementById('filterBy').value })
                });
                const result = await response.json();
                let csv = "DBA Name,Merchant ID,Partner ID,Company,Partner Name,Status\n";
                result.data.forEach(m => { csv += `"${m.dba_name}","${m.merchant_id}","${m.agent_id}","${m.company_name}","${m.partner_name}","${m.account_status}"\n`; });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
                link.download = "Merchant_Portfolio_Export.csv";
                link.click();
                Swal.close();
            } catch (e) { Swal.fire('Error', 'Export Failed', 'error'); }
        }

        window.onload = () => { 
            const user = sessionStorage.getItem('pp_userid');
            if (document.getElementById('user-greeting')) document.getElementById('user-greeting').innerText = `Staff: ${user || 'Console'}`;
            fetchMerchants(); 
        };
    </script>
</body>
</html>
