<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchant Portfolio | Secure Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root { --pp-blue: #004990; --pp-accent: #00a1e0; --glass: rgba(255, 255, 255, 0.9); }
        body { background: radial-gradient(circle at top right, #f8fafc, #e2e8f0); padding: 25px; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .modern-header { background: var(--glass); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 30px rgba(0, 45, 90, 0.05); }
        .btn-export { background: #2e7d32 !important; color: white !important; border-radius: 12px !important; height: 40px !important; margin-left: 8px; border: none; cursor: pointer; display: flex; align-items: center; padding: 0 15px; transition: all 0.2s; }
        .btn-export:hover { background: #1b5e20 !important; transform: translateY(-1px); }
        .slds-select { border-radius: 12px !important; height: 40px !important; margin-right: 8px; border: 1px solid #d1d9e6 !important; }
        .slds-input { border-radius: 12px !important; height: 40px !important; border: 1px solid #d1d9e6 !important; }
        .slds-card { border-radius: 20px !important; background: var(--glass) !important; backdrop-filter: blur(10px); box-shadow: 0 15px 35px rgba(0,0,0,0.05) !important; overflow: hidden; }
        .user-pill { background: rgba(0, 73, 144, 0.08); padding: 6px 16px; border-radius: 50px; font-size: 0.7rem; font-weight: 700; color: var(--pp-blue); text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="modern-header">
        <div>
            <div style="display:flex; align-items:center; gap:12px; margin-bottom:8px;">
                <a href="index.html" style="background:white; border:1px solid #e2e8f0; padding:6px 14px; border-radius:50px; color:var(--pp-blue); font-weight:700; font-size:0.7rem; text-decoration:none; transition: all 0.2s;">HOME</a>
                <div id="user-greeting" class="user-pill">Staff Member</div>
            </div>
            <h1 style="font-size: 1.6rem; font-weight: 800; color: #002d5a;">Merchant Portfolio</h1>
        </div>
        <div class="slds-grid slds-grid_vertical-align-center">
            
            <select id="filterBy" class="slds-select" style="width: 200px;">
                <option value="">Select what to search</option>
                <option value="dba_name">DBA Name</option>
                <option value="merchant_id">Merchant ID (MID)</option>
                <option value="agent_id">Partner ID</option>
                <option value="company_name">Company Name</option>
                <option value="partner_name">Partner Name</option>
            </select>

            <input type="text" id="searchInput" placeholder="Enter search term..." class="slds-input" style="width:250px; margin-right: 8px;" onkeypress="if(event.key==='Enter') resetAndFetch()">
            
            <button class="slds-button slds-button_brand" style="border-radius:12px; height: 40px; font-weight:700;" onclick="resetAndFetch()">Search</button>
            
            <button class="btn-export" onclick="exportToCSV()" title="Export to CSV">
                <span class="material-icons" style="font-size:18px; margin-right:5px;">download</span> Export
            </button>
        </div>
    </div>

    <article class="slds-card">
        <table class="slds-table slds-table_bordered slds-table_cell-buffer slds-no-row-hover">
            <thead>
                <tr class="slds-line-height_reset">
                    <th scope="col">DBA Name</th>
                    <th scope="col">Merchant ID</th>
                    <th scope="col">Partner ID</th>
                    <th scope="col">Company</th>
                    <th scope="col">Partner Name</th>
                    <th scope="col">Status</th>
                </tr>
            </thead>
            <tbody id="merchantTableBody"></tbody>
        </table>
        <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.3);">
            <div class="slds-button-group">
                <button class="slds-button slds-button_neutral" style="border-radius:8px;" id="prevBtn" onclick="changePage(-1)" disabled>Previous</button>
                <button class="slds-button slds-button_neutral" style="border-radius:8px;" id="nextBtn" onclick="changePage(1)">Next</button>
            </div>
            <span id="pageInfo" style="font-weight:700; color: #54698d;">Page 1</span>
        </div>
    </article>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        let currentPage = 0;
        const PAGE_SIZE = 15;

        async function fetchMerchants() {
            const tbody = document.getElementById('merchantTableBody');
            const pageInfo = document.getElementById('pageInfo');
            const query = document.getElementById('searchInput').value;
            const filterBy = document.getElementById('filterBy').value;
            
            tbody.innerHTML = "<tr><td colspan='6' style='text-align:center; padding:40px;'>Loading Secure Ledger...</td></tr>";

            try {
                // Ensure we add a cache-buster timestamp if needed
                const response = await fetch('/api/merchants', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        action: 'list', 
                        page: currentPage, 
                        query: query, 
                        filterBy: filterBy 
                    })
                });
                
                const result = await response.json();
                if (!result.success) throw new Error(result.message);

                tbody.innerHTML = "";
                
                if (result.data.length === 0) {
                    tbody.innerHTML = "<tr><td colspan='6' style='text-align:center; padding:40px; color:#64748b;'>No records found matching your criteria.</td></tr>";
                }

                result.data.forEach(m => {
                    const row = tbody.insertRow();
                    row.innerHTML = `
                        <td><b style="color:var(--pp-blue);">${m.dba_name || '---'}</b></td>
                        <td><code>${m.merchant_id || '---'}</code></td>
                        <td><span style="background:#f1f5f9; padding:2px 8px; border-radius:4px; font-size:11px;">${m.agent_id || '---'}</span></td>
                        <td style="font-size:11px; font-weight:600;">${m.company_name}</td>
                        <td style="font-size:11px; color:var(--pp-accent); font-weight:600;">${m.partner_name}</td>
                        <td><span style="color:#008a8a; font-weight:800; font-size:10px; background:#e0f5f5; padding:3px 10px; border-radius:50px;">ACTIVE</span></td>
                    `;
                });

                // Display Total Count
                const total = result.count || 0;
                pageInfo.innerHTML = `Page ${currentPage + 1} <span style="color:#94a3b8; font-weight:400; margin-left:12px;">(Total Records: ${total})</span>`;
                
                document.getElementById('nextBtn').disabled = ((currentPage + 1) * PAGE_SIZE) >= total;
                document.getElementById('prevBtn').disabled = (currentPage === 0);

            } catch (e) { 
                console.error(e);
                tbody.innerHTML = `<tr><td colspan='6' style='text-align:center; color:red; padding:20px;'>Error: ${e.message}</td></tr>`; 
            }
        }

        async function exportToCSV() {
            const query = document.getElementById('searchInput').value;
            const filterBy = document.getElementById('filterBy').value;

            Swal.fire({ title: 'Exporting...', text: 'Preparing your CSV file', didOpen: () => Swal.showLoading() });

            try {
                const response = await fetch('/api/merchants', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        action: 'list', 
                        page: 0, 
                        limit: 1000, 
                        query: query, 
                        filterBy: filterBy 
                    })
                });
                const result = await response.json();
                
                if (!result.success) throw new Error("Export failed");

                let csv = "DBA Name,Merchant ID,Partner ID,Company,Partner Name\n";
                result.data.forEach(m => {
                    csv += `"${m.dba_name}","${m.merchant_id}","${m.agent_id}","${m.company_name}","${m.partner_name}"\n`;
                });

                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                const url = URL.createObjectURL(blob);
                link.setAttribute('href', url);
                link.setAttribute('download', `Merchants_Export_${new Date().toISOString().split('T')[0]}.csv`);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                Swal.close();
            } catch (e) { 
                Swal.fire('Error', 'Export Failed: ' + e.message, 'error'); 
            }
        }

        function changePage(dir) { currentPage += dir; fetchMerchants(); }
        function resetAndFetch() { currentPage = 0; fetchMerchants(); }

        window.onload = () => {
            const user = sessionStorage.getItem('pp_userid');
            const greeting = document.getElementById('user-greeting');
            if (greeting) greeting.innerText = user ? `Staff: ${user}` : "Hardware Console";
            fetchMerchants();
        };
    </script>
</body>
</html>
