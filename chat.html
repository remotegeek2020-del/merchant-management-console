<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Messenger | Secure Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: #f0f2f5; font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; }
        
        /* Layout Structure */
        .messenger { display: flex; width: 100%; height: 100%; background: white; }
        
        /* Left Side: Contact List */
        .sidebar { width: 360px; border-right: 1px solid #e5e7eb; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; font-size: 1.5rem; font-weight: 800; border-bottom: 1px solid #f3f4f6; }
        .user-item { padding: 15px 20px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.2s; }
        .user-item:hover { background: #f3f4f6; }
        .user-item.active { background: #e7f3ff; color: #0084ff; font-weight: 600; }
        
        /* Right Side: Chat Window */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: white; }
        .chat-header { padding: 15px 25px; border-bottom: 1px solid #f3f4f6; font-weight: 700; font-size: 1.1rem; }
        .messages-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #fff; }
        
        /* Chat Bubbles */
        .bubble { max-width: 65%; padding: 10px 16px; border-radius: 20px; font-size: 0.95rem; line-height: 1.4; }
        .bubble.me { align-self: flex-end; background: #0084ff; color: white; border-bottom-right-radius: 4px; }
        .bubble.them { align-self: flex-start; background: #e4e6eb; color: #050505; border-bottom-left-radius: 4px; }
        
        /* Input area */
        .input-bar { padding: 20px; border-top: 1px solid #f3f4f6; display: flex; gap: 10px; align-items: center; }
        .input-bar input { flex: 1; border-radius: 20px !important; background: #f0f2f5 !important; border: none !important; padding: 10px 20px; }
    </style>
</head>
<body>

<div class="messenger">
    <div class="sidebar">
        <div class="sidebar-header">Chats</div>
        <div id="userList">
            <p style="padding: 20px; color: #65676b;">Loading users...</p>
        </div>
    </div>

    <div class="chat-area">
        <div class="chat-header" id="currentChatName">Select a user to start</div>
        <div class="messages-container" id="msgHistory">
            <div style="text-align: center; margin-top: 50px; color: #bcc0c4;">No conversation selected</div>
        </div>
        <div class="input-bar">
            <input type="text" id="messageInput" class="slds-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()" class="slds-button slds-button_brand" style="border-radius: 20px; padding: 0 20px;">Send</button>
        </div>
    </div>
</div>
