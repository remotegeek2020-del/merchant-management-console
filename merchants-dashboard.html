<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchant Management | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        :root { --pp-blue: #004990; --pp-accent: #00a1e0; --glass: rgba(255, 255, 255, 0.9); --teal: #008a8a; }
        body { background: radial-gradient(circle at top right, #f8fafc, #e2e8f0); padding: 30px; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .modern-header { background: var(--glass); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 30px rgba(0, 45, 90, 0.05); }
        .user-pill { background: rgba(0, 73, 144, 0.08); padding: 6px 16px; border-radius: 50px; font-size: 0.7rem; font-weight: 700; color: var(--pp-blue); }
        .status-pill { padding: 4px 12px; border-radius: 50px; font-size: 10px; font-weight: 800; background: #e0f5f5; color: var(--teal); }
        .custom-modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0, 25, 50, 0.4); backdrop-filter: blur(5px); align-items: center; justify-content: center; }
        .custom-modal-content { background: white; width: 95%; max-width: 550px; border-radius: 24px; overflow: hidden; }
    </style>
</head>
<body>
    <div class="modern-header">
        <div>
            <div style="display:flex; align-items:center; gap:12px;">
                <a href="index.html" style="background:white; border:1px solid #e2e8f0; padding:6px 14px; border-radius:50px; color:var(--pp-blue); font-weight:700; font-size:0.7rem; text-decoration:none;">HOME</a>
                <div id="user-greeting" class="user-pill">Loading...</div>
            </div>
            <h1 style="font-size: 1.6rem; font-weight: 800; color: #002d5a; margin-top:8px;">Merchant Portfolio</h1>
        </div>
        <div class="slds-grid">
            <input type="text" id="searchInput" placeholder="Search DBA or Agent ID..." class="slds-input" style="width:240px; border-radius: 12px; margin-right: 10px;" onkeypress="if(event.key==='Enter') resetAndFetch()">
            <button class="slds-button slds-button_brand" style="border-radius:12px;" onclick="resetAndFetch()">Search</button>
        </div>
    </div>

    <article class="slds-card" style="border-radius:20px; overflow:hidden;">
        <table class="slds-table slds-table_bordered slds-table_cell-buffer">
            <thead>
                <tr class="slds-line-height_reset">
                    <th scope="col">DBA Name</th>
                    <th scope="col">Merchant ID</th>
                    <th scope="col">Agent ID</th>
                    <th scope="col">Company</th>
                    <th scope="col">Partner</th>
                    <th scope="col">Status</th>
                </tr>
            </thead>
            <tbody id="merchantTableBody"></tbody>
        </table>
        <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.4);">
            <button class="slds-button slds-button_neutral" id="prevBtn" onclick="changePage(-1)" disabled>Previous</button>
            <span id="pageInfo" style="font-weight:700;">Page 1</span>
            <button class="slds-button slds-button_neutral" id="nextBtn" onclick="changePage(1)">Next</button>
        </div>
    </article>

    <div id="merchantModal" class="custom-modal" onclick="if(event.target == this) closeModal()">
        <div class="custom-modal-content">
            <div style="padding:25px; background:var(--pp-blue); color:white; display:flex; justify-content:space-between;">
                <h2 style="font-weight:800;">Merchant Details</h2>
                <span class="material-icons" style="cursor:pointer;" onclick="closeModal()">close</span>
            </div>
            <div id="modalBody" style="padding:30px;"></div>
        </div>
    </div>

    <script>
        let currentPage = 0;
        const PAGE_SIZE = 15;
        let currentRecords = [];

        async function fetchMerchants() {
            const tbody = document.getElementById('merchantTableBody');
            const query = document.getElementById('searchInput').value;
            tbody.innerHTML = "<tr><td colspan='6' style='text-align:center; padding:40px;'>Syncing Ledger...</td></tr>";

            try {
                const response = await fetch('/api/merchants', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'list', page: currentPage, query: query })
                });

                const result = await response.json();
                if (!result.success) throw new Error(result.message);

                currentRecords = result.data;
                tbody.innerHTML = "";
                currentRecords.forEach(m => {
                    const row = tbody.insertRow();
                    row.innerHTML = `
                        <td><a style="font-weight:700; color:var(--pp-blue); cursor:pointer;" onclick="openModal('${m.id}')">${m.dba_name || '---'}</a></td>
                        <td><code>${m.merchant_id || '---'}</code></td>
                        <td><span style="background:#f1f5f9; padding:2px 8px; border-radius:4px; font-size:11px;">${m.agent_id || '---'}</span></td>
                        <td style="font-size:11px; font-weight:600;">${m.company_name}</td>
                        <td style="font-size:11px; color:var(--pp-accent);">${m.partner_name}</td>
                        <td><span class="status-pill">ACTIVE</span></td>
                    `;
                });

                document.getElementById('pageInfo').innerText = `Page ${currentPage + 1}`;
                document.getElementById('nextBtn').disabled = (currentRecords.length < PAGE_SIZE);
                document.getElementById('prevBtn').disabled = (currentPage === 0);
            } catch (e) { tbody.innerHTML = `<tr><td colspan='6' style='text-align:center; color:red;'>Error: ${e.message}</td></tr>`; }
        }

        function openModal(id) {
            const m = currentRecords.find(r => r.id === id);
            document.getElementById('modalBody').innerHTML = `
                <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #eee;"><b>DBA</b> <span>${m.dba_name}</span></div>
                <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #eee;"><b>MID</b> <span>${m.merchant_id}</span></div>
                <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #eee;"><b>Agent ID</b> <span>${m.agent_id}</span></div>
                <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #eee;"><b>Owner</b> <span>${m.partner_name}</span></div>
                <div style="display:flex; justify-content:space-between; padding:10px 0;"><b>Company</b> <span>${m.company_name}</span></div>
            `;
            document.getElementById('merchantModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('merchantModal').style.display = 'none'; }
        function changePage(dir) { currentPage += dir; fetchMerchants(); }
        function resetAndFetch() { currentPage = 0; fetchMerchants(); }

        window.onload = () => {
            document.getElementById('user-greeting').innerText = `Staff: ${sessionStorage.getItem('pp_userid') || 'Console'}`;
            fetchMerchants();
        };
    </script>
</body>
</html>
