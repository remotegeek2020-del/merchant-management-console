<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Messenger | PayProtec</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #f0f2f5; font-family: 'Inter', sans-serif; }
        .sidebar { width: 360px; border-right: 1px solid #e5e7eb; background: white; }
        .user-item { padding: 15px; cursor: pointer; border-bottom: 1px solid #f9f9f9; }
        .chat-area { flex: 1; display: flex; flex-direction: column; background: white; }
        .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 60%; padding: 10px 15px; border-radius: 18px; background: #e4e6eb; }
        .bubble.me { align-self: flex-end; background: #0084ff; color: white; }
        .input-bar { padding: 20px; border-top: 1px solid #eee; display: flex; gap: 10px; }
    </style>
</head>
<body>
    <div style="display: flex; width: 100%;">
        <div class="sidebar">
            <div style="padding:20px; font-weight:800; font-size:1.5rem;">Chats</div>
            <div id="userList">Loading...</div>
        </div>
        <div class="chat-area">
            <div id="chatHeader" style="padding:15px; border-bottom:1px solid #eee; font-weight:bold;">Select a user</div>
            <div class="messages" id="msgHistory"></div>
            <div class="input-bar">
                <input type="text" id="msgInput" class="slds-input" placeholder="Type a message...">
                <button onclick="send()" class="slds-button slds-button_brand">Send</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        console.log("Script initializing...");

        const SUPA_URL = 'https://zuzwljjrppyrzngmhdru.supabase.co';
        const SUPA_KEY = 'sb_publishable_DgzVF5uoTSV1A_c0V7jvpQ_v96Ov0bO';

        // Use a try-catch to catch initialization errors
        let supabase;
        try {
            supabase = window.supabase.createClient(SUPA_URL, SUPA_KEY);
            console.log("Supabase Client Ready");
        } catch (e) {
            console.error("Supabase Init Failed:", e);
        }

        const myUserId = localStorage.getItem('userid'); 
        console.log("My UserID from localStorage:", myUserId);

        async function loadUsers() {
            console.log("Fetching users from /api/chat...");
            try {
                const res = await fetch('/api/chat', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ action: 'getUserList' }) 
                });
                
                const result = await res.json();
                console.log("API Response:", result);

                if (result.success) {
                    const list = document.getElementById('userList');
                    list.innerHTML = result.data
                        .filter(u => u.userid !== myUserId)
                        .map(u => `<div class="user-item" onclick="selectUser('${u.userid}', '${u.first_name}')">${u.first_name} ${u.last_name}</div>`)
                        .join('');
                } else {
                    console.error("API returned success:false", result.message);
                }
            } catch (err) {
                console.error("Fetch call failed:", err);
            }
        }

        // Auto-run on load
        if (myUserId) {
            loadUsers();
        } else {
            document.getElementById('userList').innerHTML = '<div style="padding:20px; color:red;">Not logged in. Please re-login.</div>';
        }

        async function selectUser(id, name) { alert("Selected " + name); }
        async function send() { alert("Sending..."); }
    </script>
</body>
</html>
