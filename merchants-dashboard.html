<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* [Existing Styles] */
        .btn-export { background: #2e7d32 !important; color: white !important; border-radius: 12px !important; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="modern-header">
        <div>
            <div class="header-controls">
                <a href="index.html" class="btn-back"><span class="material-icons" style="font-size:14px;">arrow_back</span> Home</a>
                <div id="user-greeting" class="user-pill">Staff Member: Loading...</div>
            </div>
            <h1 style="font-size: 1.6rem; font-weight: 800; color: #002d5a;">Merchant Portfolio</h1>
        </div>
        
        <div class="slds-grid slds-grid_vertical-align-center">
            <div style="position: relative; margin-right: 12px;">
                <span class="material-icons" style="position: absolute; left: 10px; top: 10px; font-size: 18px; color: #94a3b8; z-index: 5;">search</span>
                <input type="text" id="searchInput" placeholder="Search DBA, MID, Partner ID..." class="slds-input" style="width:280px; border-radius: 12px; padding-left: 35px;" onkeypress="if(event.key==='Enter') resetAndFetch()" />
            </div>

            <select id="sortOrder" class="slds-select slds-m-right_small" style="width: 180px; border-radius: 12px;" onchange="resetAndFetch()">
                <option value="created_at">Recently Created</option>
                <option value="updated_at">Recently Updated</option>
            </select>

            <button class="slds-button slds-button_brand" style="border-radius:12px;" onclick="resetAndFetch()">Search</button>
            <button class="slds-button btn-export" onclick="exportToCSV()">
                <span class="material-icons" style="font-size:16px; margin-right:5px;">download</span> CSV
            </button>
        </div>
    </div>

    <article class="slds-card">
        <table class="slds-table slds-table_bordered slds-table_cell-buffer">
            <thead>
                <tr class="slds-line-height_reset">
                    <th scope="col">DBA Name</th>
                    <th scope="col">Merchant ID</th>
                    <th scope="col">Partner ID (Agent)</th>
                    <th scope="col">Company</th>
                    <th scope="col">Partner Name</th>
                    <th scope="col">Status</th>
                </tr>
            </thead>
            <tbody id="merchantTableBody"></tbody>
        </table>
        </article>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        let currentPage = 0;
        const PAGE_SIZE = 15;
        let currentRecords = [];

        async function fetchMerchants() {
            const tbody = document.getElementById('merchantTableBody');
            const query = document.getElementById('searchInput').value;
            const sortBy = document.getElementById('sortOrder').value;
            
            tbody.innerHTML = "<tr><td colspan='6' style='text-align:center; padding: 40px;'>Updating Ledger...</td></tr>";

            try {
                const response = await fetch('/api/merchants', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        action: 'list', 
                        page: currentPage, 
                        query: query,
                        sortBy: sortBy 
                    })
                });

                const result = await response.json();
                currentRecords = result.data;
                
                tbody.innerHTML = "";
                currentRecords.forEach(m => {
                    const row = tbody.insertRow();
                    row.innerHTML = `
                        <td><a style="font-weight:700; color:var(--pp-blue); cursor:pointer;" onclick="openModal('${m.id}')">${m.dba_name || '---'}</a></td>
                        <td><code>${m.merchant_id || '---'}</code></td>
                        <td><span style="background:#f1f5f9; padding:2px 8px; border-radius:4px; font-size:11px;">${m.partner_id || '---'}</span></td>
                        <td style="font-size:11px; font-weight:600;">${m.company_name}</td>
                        <td style="font-size:11px; color:var(--pp-accent);">${m.partner_name}</td>
                        <td><span class="status-pill status-active">ACTIVE</span></td>
                    `;
                });

                document.getElementById('pageInfo').innerText = `Page ${currentPage + 1}`;
                document.getElementById('nextBtn').disabled = (currentRecords.length < PAGE_SIZE);
            } catch (e) { 
                tbody.innerHTML = "<tr><td colspan='6' style='text-align:center; color:red;'>Fetch Error</td></tr>"; 
            }
        }

        async function exportToCSV() {
            Swal.fire({ title: 'Generating CSV...', didOpen: () => Swal.showLoading() });
            
            try {
                // Fetch a larger set for the export (e.g., top 100 based on current filters)
                const response = await fetch('/api/merchants', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'list', page: 0, limit: 100, query: document.getElementById('searchInput').value })
                });
                const result = await response.json();
                
                let csv = "DBA Name,Merchant ID,Partner ID,Company,Partner Name\n";
                result.data.forEach(m => {
                    csv += `"${m.dba_name}","${m.merchant_id}","${m.partner_id}","${m.company_name}","${m.partner_name}"\n`;
                });

                const blob = new Blob([csv], { type: 'text/csv' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `Merchant_Export_${new Date().toISOString().split('T')[0]}.csv`;
                link.click();
                Swal.close();
            } catch (e) { Swal.fire('Export Failed', e.message, 'error'); }
        }

        function changePage(dir) { currentPage += dir; fetchMerchants(); }
        function resetAndFetch() { currentPage = 0; fetchMerchants(); }
        window.onload = () => fetchMerchants();
    </script>
</body>
</html>
