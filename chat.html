<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Staff Messenger</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <link rel="icon" type="image/png" href="/images/favicon-32x32.png" sizes="32x32" />
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #f0f2f5; font-family: sans-serif; }
        .sidebar { width: 320px; border-right: 1px solid #ddd; background: #fff; display: flex; flex-direction: column; }
        .user-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; position: relative; }
        .user-item:hover { background: #f0f2f5; }
        .user-item.active { background: #e7f3ff; color: #0084ff; font-weight: bold; }
        
        /* Online Dot */
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; margin-right: 10px; border: 2px solid white; }
        .status-dot.online { background: #31a24c; }
        
        /* Notification Badge */
        .badge { background: #fa3e3e; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; font-weight: bold; min-width: 18px; text-align: center; }
        
        .chat-main { flex: 1; display: flex; flex-direction: column; background: #fff; }
        .msg-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .bubble { max-width: 70%; padding: 10px; border-radius: 15px; background: #e4e6eb; }
        .bubble.me { align-self: flex-end; background: #0084ff; color: #fff; }
        .input-bar { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; background: #bdc3c7; display: inline-block; margin-right: 8px; border: 2px solid #fff; }
    .status-dot.online { background: #2ecc71 !important; box-shadow: 0 0 5px #2ecc71; }
    .badge { background: #e74c3c; color: white; border-radius: 10px; padding: 2px 8px; font-size: 11px; font-weight: bold; margin-left: auto; }
    </style>
    <script>
    (function() {
        // 1. Check if a session exists in LocalStorage
        const sessionUser = localStorage.getItem('pp_userid');
        const isVerified = localStorage.getItem('pp_verified');

        // 2. If no session, boot them to the login page immediately
        if (!sessionUser || isVerified !== 'true') {
            window.location.href = 'index.html?reason=unauthorized';
        }
    })();
</script>
</head>
<body>

<div class="sidebar">
    <div style="padding:20px; font-weight:bold; border-bottom:1px solid #eee; display: flex; justify-content: space-between;">
        CHATS
        <span id="globalUnread" class="badge" style="display:none;">0</span>
    </div>
    <div id="userList" style="flex:1; overflow-y:auto;">Loading...</div>
</div>

<div class="chat-main">
    <div id="chatHeader" style="padding:15px; border-bottom:1px solid #eee; font-weight:bold;">Select User</div>
    <div class="msg-container" id="msgHistory"></div>
    <div class="input-bar">
        <input type="text" id="msgInput" class="slds-input" placeholder="Type here..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()" class="slds-button slds-button_brand">Send</button>
    </div>
</div>

<script>
    // 1. SET UP GLOBAL VARIABLES (Crucial to prevent "Loading..." hang)
    const myId = localStorage.getItem('userid') || sessionStorage.getItem('pp_userid');
    let activeId = null;
    let currentSidebarHTML = ""; // This stops the flickering

    // 2. REFRESH MESSAGES FUNCTION
    async function refreshMessages() {
        if (!activeId) return;
        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'getHistory', sender_id: myId, recipient_id: activeId })
            });
            const result = await res.json();
            const hist = document.getElementById('msgHistory');
            
            // Generate HTML for bubbles
            const newBubbles = (result.data || []).map(m => `
                <div class="bubble ${m.sender_id === myId ? 'me' : 'them'}">${m.content}</div>
            `).join('');

            // Only update if messages changed to prevent scrolling jumps
            if (hist.innerHTML !== newBubbles) {
                hist.innerHTML = newBubbles;
                hist.scrollTop = hist.scrollHeight;
            }
        } catch (e) { console.error("Msg Refresh Error:", e); }
    }

    // 3. SYNC SIDEBAR (Online dots & Red badges)
    async function syncSystem() {
        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'getUserList', sender_id: myId })
            });
            const result = await response.json();
            
            if (result.success) {
                const listHtml = result.data
                    .filter(u => u.userid !== myId)
                    .map(u => {
                        let isOnline = false;
                        if (u.last_seen) {
                            const diff = (Date.now() - new Date(u.last_seen).getTime()) / 1000;
                            if (diff < 90) isOnline = true;
                        }
                        const count = result.unreadCounts ? result.unreadCounts[u.userid] : 0;
                        
                        return `
                            <div class="user-item ${u.userid === activeId ? 'active' : ''}" onclick="openChat('${u.userid}', '${u.first_name}')">
                                <div style="display:flex; align-items:center;">
                                    <div class="status-dot ${isOnline ? 'online' : ''}"></div>
                                    <span>${u.first_name} ${u.last_name || ''}</span>
                                </div>
                                ${count > 0 ? `<span class="badge">${count}</span>` : ''}
                            </div>
                        `;
                    }).join('');

                // FLICKER PREVENTION: Only update if the data actually changed
                if (listHtml !== currentSidebarHTML) {
                    document.getElementById('userList').innerHTML = listHtml;
                    currentSidebarHTML = listHtml;
                }
            }
        } catch (err) { console.error("Sidebar Sync Error:", err); }
    }

    // 4. OPEN CHAT
    async function openChat(id, name) {
        activeId = id;
        document.getElementById('chatHeader').innerText = "Chat with " + name;
        
        // Mark as read and get history immediately
        await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'getHistory', sender_id: myId, recipient_id: id })
        });
        
        refreshMessages();
        syncSystem(); // Instantly clears the badge
    }

    // 5. SEND MESSAGE
    async function send() {
        const input = document.getElementById('msgInput');
        if (!input.value.trim() || !activeId) return;
        
        const text = input.value;
        input.value = "";

        await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'sendMessage', sender_id: myId, recipient_id: activeId, content: text })
        });
        
        refreshMessages();
    }

    // 6. LOOPS
    // Check for new messages every 3 seconds
    setInterval(refreshMessages, 3000);
    
    // Check online status/badges every 6 seconds
    setInterval(syncSystem, 6000);

    // Initial Start
    syncSystem();
</script>
</body>
</html>
