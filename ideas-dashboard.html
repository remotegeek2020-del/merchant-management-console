<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ideas & Dev Activity | PayProTec</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="js/tz.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        (function() {
            if (!localStorage.getItem('pp_userid') || localStorage.getItem('pp_verified') !== 'true') {
                window.location.href = 'index.html?reason=unauthorized';
            }
        })();
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #f1f5f9; font-family: 'DM Sans', sans-serif; min-height: 100vh; }

        .page-header { background: linear-gradient(135deg, #0d9488 0%, #14b8a6 100%); padding: 24px 32px 0; }
        .header-top { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; padding-bottom: 20px; }
        .content { max-width: 960px; margin: 0 auto; padding: 28px 24px; }

        .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: 8px; font-size: 13px; font-weight: 700; font-family: 'DM Sans', sans-serif; cursor: pointer; border: none; transition: all 0.2s; }
        .btn-white  { background: white; color: #0d9488; }
        .btn-white:hover { background: #f0fdfa; }
        .btn-indigo { background: white; color: #4338ca; }
        .btn-indigo:hover { background: #e0e7ff; }

        /* Tabs */
        .tab-bar { display: flex; gap: 0; }
        .tab-btn { padding: 12px 24px; font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.65); cursor: pointer; border: none; background: none; font-family: 'DM Sans', sans-serif; border-bottom: 3px solid transparent; transition: all 0.2s; display: flex; align-items: center; gap: 7px; }
        .tab-btn:hover { color: white; }
        .tab-btn.active { color: white; border-bottom-color: white; }

        /* Filter chips */
        .filter-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 10px; }
        .filter-label { font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
        .chip { padding: 5px 13px; border-radius: 99px; font-size: 12px; font-weight: 700; cursor: pointer; border: 2px solid #e2e8f0; background: white; color: #64748b; transition: all 0.15s; }
        .chip.active { color: white; border-color: transparent; }
        .chip-all.active        { background: #334155; }
        .chip-pending.active    { background: #6366f1; }
        .chip-in_progress.active { background: #f59e0b; }
        .chip-done.active       { background: #22c55e; }
        .chip-rejected.active   { background: #ef4444; }
        .chip-cat.active        { background: #0d9488; }

        /* Sort toggle */
        .sort-toggle { display: flex; gap: 4px; align-items: center; margin-left: auto; }
        .sort-btn { padding: 5px 11px; border-radius: 6px; border: 1px solid #e2e8f0; background: white; color: #64748b; font-size: 11px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 4px; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
        .sort-btn.active { background: #0d9488; color: white; border-color: #0d9488; }

        /* Idea cards */
        .idea-card { background: white; border-radius: 12px; padding: 18px 20px; margin-bottom: 12px; border: 1px solid #e2e8f0; display: flex; gap: 14px; align-items: flex-start; transition: box-shadow 0.15s; }
        .idea-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }

        /* Vote button */
        .vote-btn { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 8px 10px; border-radius: 10px; border: 1.5px solid #e2e8f0; background: white; cursor: pointer; transition: all 0.15s; flex-shrink: 0; min-width: 44px; font-family: 'DM Sans', sans-serif; }
        .vote-btn:hover { border-color: #0d9488; background: #f0fdfa; }
        .vote-btn.voted { border-color: #0d9488; background: #f0fdfa; color: #0d9488; }
        .vote-btn .material-icons { font-size: 18px; color: #94a3b8; transition: color 0.15s; }
        .vote-btn.voted .material-icons { color: #0d9488; }
        .vote-count { font-size: 13px; font-weight: 800; color: #1e293b; line-height: 1; }
        .vote-label { font-size: 9px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.4px; }

        .idea-body-col { flex: 1; min-width: 0; }
        .idea-title { font-size: 14px; font-weight: 700; color: #1e293b; margin-bottom: 5px; }
        .idea-desc { font-size: 13px; color: #475569; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
        .idea-meta { display: flex; align-items: center; gap: 10px; margin-top: 9px; flex-wrap: wrap; }
        .idea-requester { font-size: 11px; color: #94a3b8; display: flex; align-items: center; gap: 4px; }
        .idea-date { font-size: 11px; color: #cbd5e1; }

        .status-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; flex-shrink: 0; }
        .badge-pending    { background: #e0e7ff; color: #4338ca; }
        .badge-in_progress { background: #fef3c7; color: #92400e; }
        .badge-done       { background: #dcfce7; color: #166534; }
        .badge-rejected   { background: #fee2e2; color: #991b1b; }

        .cat-badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 99px; font-size: 10px; font-weight: 700; background: #f1f5f9; color: #64748b; text-transform: uppercase; letter-spacing: 0.4px; }

        .status-actions { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; }
        .status-btn { padding: 5px 11px; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; border: 1px solid; background: white; transition: all 0.15s; white-space: nowrap; }
        .status-btn-progress { color: #92400e; border-color: #f59e0b; }
        .status-btn-progress:hover { background: #fef3c7; }
        .status-btn-done { color: #166534; border-color: #22c55e; }
        .status-btn-done:hover { background: #dcfce7; }
        .status-btn-pending { color: #4338ca; border-color: #6366f1; }
        .status-btn-pending:hover { background: #e0e7ff; }
        .status-btn-reject { color: #991b1b; border-color: #ef4444; }
        .status-btn-reject:hover { background: #fee2e2; }
        .status-btn-delete { color: #64748b; border-color: #e2e8f0; }
        .status-btn-delete:hover { background: #f1f5f9; color: #ef4444; border-color: #ef4444; }

        /* Dev Activity */
        .dev-timeline { position: relative; padding-left: 28px; }
        .dev-timeline::before { content: ''; position: absolute; left: 9px; top: 0; bottom: 0; width: 2px; background: #e2e8f0; }
        .dev-entry { position: relative; margin-bottom: 20px; }
        .dev-dot { position: absolute; left: -24px; top: 16px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 0 2px currentColor; }
        .dev-card { background: white; border-radius: 12px; padding: 16px 20px; border: 1px solid #e2e8f0; transition: box-shadow 0.15s; }
        .dev-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.07); }
        .dev-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 8px; flex-wrap: wrap; }
        .dev-title { font-size: 14px; font-weight: 700; color: #1e293b; margin-top: 6px; }
        .dev-body { font-size: 13px; color: #475569; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
        .dev-meta { font-size: 11px; color: #94a3b8; margin-top: 10px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

        .tag-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; white-space: nowrap; }
        .tag-completed   { background: #dcfce7; color: #166534; }
        .tag-in_progress { background: #fef3c7; color: #92400e; }
        .tag-planned     { background: #e0e7ff; color: #4338ca; }
        .tag-fix         { background: #fee2e2; color: #991b1b; }
        .tag-update      { background: #f1f5f9; color: #475569; }
        .dot-completed   { color: #22c55e; }
        .dot-in_progress { color: #f59e0b; }
        .dot-planned     { color: #6366f1; }
        .dot-fix         { color: #ef4444; }
        .dot-update      { color: #94a3b8; }

        .empty-state { text-align: center; padding: 60px 20px; color: #94a3b8; }
        .empty-state .material-icons { font-size: 56px; display: block; margin-bottom: 12px; color: #cbd5e1; }
        .count-badge { background: rgba(255,255,255,0.25); color: white; border-radius: 99px; padding: 2px 10px; font-size: 12px; font-weight: 700; margin-left: 8px; }
        .section { display: none; }
        .section.active { display: block; }
    </style>
</head>
<body>

<div class="page-header">
    <div class="header-top">
        <div style="display:flex; align-items:center; gap:16px;">
            <a href="index.html" style="background:rgba(255,255,255,0.2); border:none; border-radius:8px; color:white; padding:7px 14px; font-size:12px; font-weight:700; cursor:pointer; text-decoration:none; display:flex; align-items:center; gap:5px;">
                <span class="material-icons" style="font-size:16px;">arrow_back</span> Back
            </a>
            <div>
                <h1 style="color:white; font-size:1.4rem; font-weight:800; margin:0;">Ideas & Dev Activity</h1>
                <p style="color:#ccfbf1; opacity:0.9; margin:0; font-size:12px;">Feature suggestions from the team · Developer updates &amp; progress</p>
            </div>
        </div>
        <div id="header-action"></div>
    </div>
    <div class="tab-bar">
        <button class="tab-btn active" id="tab-ideas-btn" onclick="switchTab('ideas')">
            <span class="material-icons" style="font-size:17px;">lightbulb</span>
            Ideas &amp; Requests
            <span class="count-badge" id="total-count">…</span>
        </button>
        <button class="tab-btn" id="tab-dev-btn" onclick="switchTab('dev')">
            <span class="material-icons" style="font-size:17px;">code</span>
            Dev Activity
            <span class="count-badge" id="dev-count">…</span>
        </button>
    </div>
</div>

<div class="content">

    <!-- ── IDEAS ──────────────────────────────────────── -->
    <div id="section-ideas" class="section active">

        <div style="background:white; border-radius:12px; padding:14px 18px; margin-bottom:18px; border:1px solid #e2e8f0;">
            <div class="filter-row" style="margin-bottom:8px;">
                <span class="filter-label">Status:</span>
                <div class="chip chip-all active" onclick="setStatusFilter('all')">All</div>
                <div class="chip chip-pending" onclick="setStatusFilter('pending')">Pending</div>
                <div class="chip chip-in_progress" onclick="setStatusFilter('in_progress')">In Progress</div>
                <div class="chip chip-done" onclick="setStatusFilter('done')">Done</div>
                <div class="chip chip-rejected" onclick="setStatusFilter('rejected')">Rejected</div>
                <div class="sort-toggle">
                    <button class="sort-btn active" id="sort-votes" onclick="setSort('votes')">
                        <span class="material-icons" style="font-size:14px;">thumb_up</span> Top
                    </button>
                    <button class="sort-btn" id="sort-new" onclick="setSort('new')">
                        <span class="material-icons" style="font-size:14px;">schedule</span> New
                    </button>
                </div>
            </div>
            <div class="filter-row" style="margin-bottom:0;">
                <span class="filter-label">Category:</span>
                <div class="chip chip-cat active" data-cat="all" onclick="setCatFilter('all')">All</div>
                <div class="chip chip-cat" data-cat="general" onclick="setCatFilter('general')">General</div>
                <div class="chip chip-cat" data-cat="ui_ux" onclick="setCatFilter('ui_ux')">UI / UX</div>
                <div class="chip chip-cat" data-cat="api" onclick="setCatFilter('api')">API</div>
                <div class="chip chip-cat" data-cat="reporting" onclick="setCatFilter('reporting')">Reporting</div>
                <div class="chip chip-cat" data-cat="performance" onclick="setCatFilter('performance')">Performance</div>
                <div class="chip chip-cat" data-cat="security" onclick="setCatFilter('security')">Security</div>
                <div class="chip chip-cat" data-cat="other" onclick="setCatFilter('other')">Other</div>
            </div>
        </div>

        <div id="ideas-list">
            <div class="empty-state"><span class="material-icons">hourglass_empty</span>Loading…</div>
        </div>
    </div>

    <!-- ── DEV ACTIVITY ───────────────────────────────── -->
    <div id="section-dev" class="section">
        <div id="dev-list">
            <div class="empty-state"><span class="material-icons">hourglass_empty</span>Loading…</div>
        </div>
    </div>

</div>

<script>
const userId    = localStorage.getItem('pp_userid') || '';
const userRole  = (localStorage.getItem('pp_role') || '').toLowerCase().replace(/\s+/g, '_');
const firstName = localStorage.getItem('pp_user_first_name') || '';
const lastName  = localStorage.getItem('pp_user_last_name')  || '';
const userName  = [firstName, lastName].filter(Boolean).join(' ') || 'Staff';
const isSuperAdmin = userRole === 'super_admin';
const isAdmin      = isSuperAdmin || userRole === 'developer';

let allIdeas      = [];
let allActivities = [];
let statusFilter  = 'all';
let catFilter     = 'all';
let sortMode      = 'votes';
let currentTab    = 'ideas';

async function api(action, extra = {}) {
    const r = await fetch('/api/ideas', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, ...extra })
    });
    return r.json();
}

// ── TABS ───────────────────────────────────────────────────────
function switchTab(tab) {
    currentTab = tab;
    document.getElementById('section-ideas').classList.toggle('active', tab === 'ideas');
    document.getElementById('section-dev').classList.toggle('active', tab === 'dev');
    document.getElementById('tab-ideas-btn').classList.toggle('active', tab === 'ideas');
    document.getElementById('tab-dev-btn').classList.toggle('active', tab === 'dev');
    updateHeaderAction();
}

function updateHeaderAction() {
    const el = document.getElementById('header-action');
    if (currentTab === 'ideas') {
        el.innerHTML = `<button class="btn btn-white" onclick="openAddIdea()"><span class="material-icons" style="font-size:16px;">add_circle</span> Submit Idea</button>`;
    } else if (currentTab === 'dev' && isSuperAdmin) {
        el.innerHTML = `<button class="btn btn-indigo" onclick="openAddActivity()"><span class="material-icons" style="font-size:16px;">add_circle</span> Log Activity</button>`;
    } else {
        el.innerHTML = '';
    }
}

// ── IDEAS ──────────────────────────────────────────────────────
async function loadIdeas() {
    const r = await api('list', { userid: userId });
    allIdeas = r.ideas || [];
    document.getElementById('total-count').textContent = allIdeas.length;
    renderIdeas();
}

function setStatusFilter(f) {
    statusFilter = f;
    document.querySelectorAll('.chip:not(.chip-cat)').forEach(c => c.classList.remove('active'));
    document.querySelector(`.chip-${f}`).classList.add('active');
    renderIdeas();
}

function setCatFilter(cat) {
    catFilter = cat;
    document.querySelectorAll('.chip-cat').forEach(c => c.classList.toggle('active', c.dataset.cat === cat));
    renderIdeas();
}

function setSort(mode) {
    sortMode = mode;
    document.getElementById('sort-votes').classList.toggle('active', mode === 'votes');
    document.getElementById('sort-new').classList.toggle('active', mode === 'new');
    renderIdeas();
}

const catLabels = { general: 'General', ui_ux: 'UI / UX', api: 'API', reporting: 'Reporting', performance: 'Performance', security: 'Security', other: 'Other' };

function statusBadge(status) {
    const labels = { pending: 'Pending', in_progress: 'In Progress', done: 'Done', rejected: 'Rejected' };
    return `<span class="status-badge badge-${status}">${labels[status] || status}</span>`;
}

function renderIdeas() {
    let list = allIdeas;
    if (statusFilter !== 'all') list = list.filter(i => i.status === statusFilter);
    if (catFilter !== 'all')    list = list.filter(i => i.category === catFilter);

    if (sortMode === 'new') {
        list = [...list].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    } else {
        list = [...list].sort((a, b) => (b.votes - a.votes) || (new Date(b.created_at) - new Date(a.created_at)));
    }

    const el = document.getElementById('ideas-list');
    if (!list.length) {
        el.innerHTML = `<div class="empty-state"><span class="material-icons">lightbulb</span>
            <div style="font-weight:700;color:#475569;margin-bottom:6px;">No ideas found</div>
            <div style="font-size:13px;">Try a different filter or be the first to submit one!</div>
        </div>`;
        return;
    }

    el.innerHTML = list.map(idea => {
        const controls = isAdmin ? buildAdminControls(idea) : '';
        return `<div class="idea-card" id="idea-${idea.id}">
            <button class="vote-btn ${idea.voted_by_me ? 'voted' : ''}" onclick="toggleVote('${idea.id}')" title="${idea.voted_by_me ? 'Remove vote' : 'Upvote this idea'}">
                <span class="material-icons">arrow_upward</span>
                <span class="vote-count" id="votes-${idea.id}">${idea.votes || 0}</span>
                <span class="vote-label">votes</span>
            </button>
            <div class="idea-body-col">
                <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px;">
                    ${statusBadge(idea.status)}
                    <span class="cat-badge">${catLabels[idea.category] || idea.category}</span>
                </div>
                <div class="idea-title">${escHtml(idea.title)}</div>
                <div class="idea-desc">${escHtml(idea.body)}</div>
                <div class="idea-meta">
                    <span class="idea-requester"><span class="material-icons" style="font-size:13px;">person</span>${escHtml(idea.requested_by_name)}</span>
                    <span class="idea-date">${fmtDate(idea.created_at)}</span>
                </div>
            </div>
            ${controls}
        </div>`;
    }).join('');
}

async function toggleVote(id) {
    const idea = allIdeas.find(i => i.id === id);
    if (!idea) return;

    // Optimistic update
    idea.voted_by_me = !idea.voted_by_me;
    idea.votes = Math.max(0, (idea.votes || 0) + (idea.voted_by_me ? 1 : -1));
    const voteEl  = document.getElementById(`votes-${id}`);
    const voteBtn = voteEl?.closest('.vote-btn');
    if (voteEl)  voteEl.textContent = idea.votes;
    if (voteBtn) voteBtn.classList.toggle('voted', idea.voted_by_me);

    const r = await api('vote', { id, userid: userId });
    if (!r.success) {
        // Revert on failure
        idea.voted_by_me = !idea.voted_by_me;
        idea.votes = r.votes ?? idea.votes;
        renderIdeas();
    } else {
        idea.votes = r.votes;
        if (voteEl) voteEl.textContent = idea.votes;
    }
}

function buildAdminControls(idea) {
    const btns = [];
    if (idea.status !== 'in_progress') btns.push(`<button class="status-btn status-btn-progress" onclick="updateStatus('${idea.id}','in_progress')">In Progress</button>`);
    if (idea.status !== 'done')        btns.push(`<button class="status-btn status-btn-done" onclick="updateStatus('${idea.id}','done')">Mark Done</button>`);
    if (idea.status !== 'pending')     btns.push(`<button class="status-btn status-btn-pending" onclick="updateStatus('${idea.id}','pending')">Reset</button>`);
    if (idea.status !== 'rejected')    btns.push(`<button class="status-btn status-btn-reject" onclick="updateStatus('${idea.id}','rejected')">Reject</button>`);
    btns.push(`<button class="status-btn status-btn-delete" onclick="deleteIdea('${idea.id}')">Delete</button>`);
    return `<div class="status-actions">${btns.join('')}</div>`;
}

async function updateStatus(id, status) {
    const r = await api('update_status', { id, status });
    if (r.success) {
        const idx = allIdeas.findIndex(i => i.id === id);
        if (idx !== -1) { allIdeas[idx].status = status; }
        renderIdeas();
    } else {
        Swal.fire({ icon: 'error', title: 'Error', text: r.message });
    }
}

async function deleteIdea(id) {
    const { isConfirmed } = await Swal.fire({ title: 'Delete this idea?', text: 'This cannot be undone.', icon: 'warning', showCancelButton: true, confirmButtonText: 'Delete', confirmButtonColor: '#ef4444' });
    if (!isConfirmed) return;
    const r = await api('delete', { id });
    if (r.success) {
        allIdeas = allIdeas.filter(i => i.id !== id);
        document.getElementById('total-count').textContent = allIdeas.length;
        renderIdeas();
    }
}

async function openAddIdea() {
    const { value: fv } = await Swal.fire({
        title: 'Submit an Idea',
        html: `<div style="text-align:left;">
            <label style="font-size:12px;font-weight:700;color:#475569;display:block;margin-bottom:4px;">CATEGORY *</label>
            <select id="idea-cat" class="swal2-input" style="margin:0 0 14px;width:100%;">
                <option value="general">General</option>
                <option value="ui_ux">UI / UX</option>
                <option value="api">API</option>
                <option value="reporting">Reporting</option>
                <option value="performance">Performance</option>
                <option value="security">Security</option>
                <option value="other">Other</option>
            </select>
            <label style="font-size:12px;font-weight:700;color:#475569;display:block;margin-bottom:4px;">TITLE *</label>
            <input id="idea-title" class="swal2-input" style="margin:0 0 14px;width:100%;" placeholder="Short, clear title for your idea">
            <label style="font-size:12px;font-weight:700;color:#475569;display:block;margin-bottom:4px;">DESCRIPTION *</label>
            <textarea id="idea-body" class="swal2-textarea" style="margin:0;width:100%;height:110px;" placeholder="Describe the idea — what problem does it solve?"></textarea>
        </div>`,
        confirmButtonText: 'Submit Idea', confirmButtonColor: '#0d9488', showCancelButton: true, focusConfirm: false,
        preConfirm: () => {
            const title = document.getElementById('idea-title').value.trim();
            const body  = document.getElementById('idea-body').value.trim();
            const cat   = document.getElementById('idea-cat').value;
            if (!title) { Swal.showValidationMessage('Title is required'); return false; }
            if (!body)  { Swal.showValidationMessage('Description is required'); return false; }
            return { title, body, category: cat };
        }
    });
    if (!fv) return;
    const r = await api('add', { ...fv, requested_by_userid: userId, requested_by_name: userName });
    if (r.success) {
        allIdeas.unshift(r.idea);
        document.getElementById('total-count').textContent = allIdeas.length;
        renderIdeas();
        Swal.fire({ icon: 'success', title: 'Idea Submitted!', text: 'Thanks! The team will review your suggestion.', confirmButtonColor: '#0d9488', timer: 2200, showConfirmButton: false });
    } else {
        Swal.fire({ icon: 'error', title: 'Error', text: r.message });
    }
}

// ── DEV ACTIVITY ───────────────────────────────────────────────
async function loadActivities() {
    const r = await api('dev_activity_list');
    allActivities = r.activities || [];
    document.getElementById('dev-count').textContent = allActivities.length;
    renderActivities();
}

const tagLabels = { completed: 'Completed', in_progress: 'In Progress', planned: 'Planned', fix: 'Bug Fix', update: 'Update' };
const tagIcons  = { completed: 'check_circle', in_progress: 'pending', planned: 'schedule', fix: 'bug_report', update: 'update' };

function renderActivities() {
    const el = document.getElementById('dev-list');
    if (!allActivities.length) {
        el.innerHTML = `<div class="empty-state"><span class="material-icons">code</span>
            <div style="font-weight:700;color:#475569;margin-bottom:6px;">No activity logged yet</div>
            <div style="font-size:13px;">${isSuperAdmin ? 'Use the Log Activity button to post an update.' : 'Check back later for developer updates.'}</div>
        </div>`;
        return;
    }
    el.innerHTML = `<div class="dev-timeline">${allActivities.map(a => `
        <div class="dev-entry">
            <div class="dev-dot dot-${a.tag}" style="background:currentColor;"></div>
            <div class="dev-card">
                <div class="dev-card-top">
                    <div>
                        <span class="tag-badge tag-${a.tag}">
                            <span class="material-icons" style="font-size:12px;">${tagIcons[a.tag] || 'update'}</span>
                            ${tagLabels[a.tag] || a.tag}
                        </span>
                        <div class="dev-title">${escHtml(a.title)}</div>
                    </div>
                    ${isSuperAdmin ? `<button onclick="deleteActivity('${a.id}')" style="background:none;border:none;cursor:pointer;color:#cbd5e1;padding:0;flex-shrink:0;" title="Delete"><span class="material-icons" style="font-size:18px;">delete_outline</span></button>` : ''}
                </div>
                <div class="dev-body">${escHtml(a.body)}</div>
                <div class="dev-meta">
                    <span style="display:flex;align-items:center;gap:4px;"><span class="material-icons" style="font-size:13px;">person</span>${escHtml(a.posted_by_name)}</span>
                    <span>${fmtDate(a.created_at)}</span>
                </div>
            </div>
        </div>`).join('')}
    </div>`;
}

async function openAddActivity() {
    const { value: fv } = await Swal.fire({
        title: 'Log Developer Activity',
        html: `<div style="text-align:left;">
            <label style="font-size:12px;font-weight:700;color:#475569;display:block;margin-bottom:4px;">TAG *</label>
            <select id="act-tag" class="swal2-input" style="margin:0 0 14px;width:100%;">
                <option value="completed">✅ Completed</option>
                <option value="in_progress">🔄 In Progress</option>
                <option value="planned">📋 Planned</option>
                <option value="fix">🐛 Bug Fix</option>
                <option value="update" selected>📝 Update</option>
            </select>
            <label style="font-size:12px;font-weight:700;color:#475569;display:block;margin-bottom:4px;">TITLE *</label>
            <input id="act-title" class="swal2-input" style="margin:0 0 14px;width:100%;" placeholder="e.g. Deployed pagination to ticketing system">
            <label style="font-size:12px;font-weight:700;color:#475569;display:block;margin-bottom:4px;">DETAILS *</label>
            <textarea id="act-body" class="swal2-textarea" style="margin:0;width:100%;height:110px;" placeholder="What was done, what's next, any notes for the team…"></textarea>
        </div>`,
        confirmButtonText: 'Post Update', confirmButtonColor: '#4338ca', showCancelButton: true, focusConfirm: false,
        preConfirm: () => {
            const tag   = document.getElementById('act-tag').value;
            const title = document.getElementById('act-title').value.trim();
            const body  = document.getElementById('act-body').value.trim();
            if (!title) { Swal.showValidationMessage('Title is required'); return false; }
            if (!body)  { Swal.showValidationMessage('Details are required'); return false; }
            return { tag, title, body };
        }
    });
    if (!fv) return;
    const r = await api('dev_activity_add', { userid: userId, posted_by_name: userName, ...fv });
    if (r.success) {
        allActivities.unshift(r.activity);
        document.getElementById('dev-count').textContent = allActivities.length;
        renderActivities();
        Swal.fire({ icon: 'success', title: 'Activity Posted!', timer: 1800, showConfirmButton: false });
    } else {
        Swal.fire({ icon: 'error', title: 'Error', text: r.message });
    }
}

async function deleteActivity(id) {
    const { isConfirmed } = await Swal.fire({ title: 'Delete this entry?', text: 'This cannot be undone.', icon: 'warning', showCancelButton: true, confirmButtonText: 'Delete', confirmButtonColor: '#ef4444' });
    if (!isConfirmed) return;
    const r = await api('dev_activity_delete', { userid: userId, id });
    if (r.success) {
        allActivities = allActivities.filter(a => a.id !== id);
        document.getElementById('dev-count').textContent = allActivities.length;
        renderActivities();
    } else {
        Swal.fire({ icon: 'error', title: 'Error', text: r.message });
    }
}

// ── UTILS ──────────────────────────────────────────────────────
function escHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
// ── INIT ───────────────────────────────────────────────────────
updateHeaderAction();
loadIdeas();
loadActivities();
</script>
