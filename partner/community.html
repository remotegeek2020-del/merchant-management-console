<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community | PayProTec Partner Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        *,*::before,*::after{box-sizing:border-box;}
        :root{
            --teal:#0d9488;--teal-dark:#0f766e;--teal-bg:#f0fdfa;--teal-light:#ccfbf1;
            --navy:#001e3c;--border:#e2e8f0;--surface:#f8fafc;--white:#fff;
            --text:#0a1628;--secondary:#475569;--muted:#94a3b8;
            --shadow-sm:0 1px 3px rgba(0,0,0,0.06);--shadow-md:0 4px 16px rgba(0,0,0,0.07);
        }
        body{margin:0;padding:0;font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}

        /* SIDEBAR */
        .sidebar{position:fixed;top:0;left:0;width:240px;height:100vh;background:var(--navy);display:flex;flex-direction:column;z-index:100;box-shadow:4px 0 20px rgba(0,0,0,0.15);}
        .sidebar-header{padding:20px;border-bottom:1px solid rgba(255,255,255,0.08);}
        .sidebar-logo{height:26px;filter:brightness(0) invert(1);display:block;margin-bottom:14px;}
        .sidebar-partner{display:flex;align-items:center;gap:10px;}
        .sidebar-avatar{width:36px;height:36px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:white;flex-shrink:0;overflow:hidden;}
        .sidebar-avatar img{width:100%;height:100%;object-fit:cover;}
        .sidebar-name{font-size:12px;font-weight:700;color:white;line-height:1.3;}
        .sidebar-tag{font-size:10px;color:rgba(255,255,255,0.4);}
        .sidebar-nav{flex:1;padding:12px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
        .nav-section{font-size:9px;font-weight:800;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:1px;padding:12px 12px 4px;}
        .nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;font-size:12px;font-weight:600;color:rgba(255,255,255,0.6);text-decoration:none;cursor:pointer;transition:all 0.2s;border:none;background:none;width:100%;font-family:'DM Sans',sans-serif;position:relative;}
        .nav-item:hover{background:rgba(255,255,255,0.08);color:white;}
        .nav-item.active{background:var(--teal);color:white;}
        .nav-item .material-icons{font-size:18px;flex-shrink:0;}
        .nav-badge{background:#ef4444;color:white;border-radius:99px;font-size:9px;font-weight:800;padding:1px 6px;margin-left:auto;}
        .channel-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
        .nav-divider{height:1px;background:rgba(255,255,255,0.08);margin:6px 0;}

        /* MAIN LAYOUT */
        .main{margin-left:240px;min-height:100vh;display:flex;flex-direction:column;}
        .topbar{background:white;padding:14px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;}
        .topbar-title{font-size:1.1rem;font-weight:800;color:var(--text);margin:0;}

        /* COMMUNITY LAYOUT */
        .community-layout{display:grid;grid-template-columns:1fr 300px;gap:20px;padding:20px 24px;max-width:1200px;width:100%;}

        /* FEED */
        .feed{display:flex;flex-direction:column;gap:16px;}

        /* POST COMPOSER */
        .composer{background:white;border:1px solid var(--border);border-radius:16px;padding:16px;box-shadow:var(--shadow-sm);}
        .composer-top{display:flex;gap:12px;align-items:flex-start;}
        .composer-avatar{width:38px;height:38px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:white;flex-shrink:0;overflow:hidden;}
        .composer-avatar img{width:100%;height:100%;object-fit:cover;}
        .composer-input{flex:1;border:1.5px solid var(--border);border-radius:12px;padding:10px 14px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);resize:none;min-height:60px;outline:none;transition:border-color 0.2s;background:#f8fafc;}
        .composer-input:focus{border-color:var(--teal);background:white;}
        .composer-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
        .channel-select{padding:7px 12px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:'DM Sans',sans-serif;color:var(--text);background:white;outline:none;cursor:pointer;}
        .btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;transition:all 0.2s;}
        .btn-teal{background:var(--teal);color:white;}
        .btn-teal:hover{background:var(--teal-dark);}
        .btn-teal:disabled{opacity:0.5;cursor:not-allowed;}
        .btn-outline{background:white;color:var(--secondary);border:1px solid var(--border);}
        .btn-outline:hover{border-color:var(--teal);color:var(--teal);}
        .btn-sm{padding:5px 10px;font-size:11px;}

        /* POST CARD */
        .post-card{background:white;border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow-sm);overflow:hidden;transition:box-shadow 0.2s;}
        .post-card:hover{box-shadow:var(--shadow-md);}
        .post-header{padding:14px 16px 0;display:flex;align-items:center;gap:10px;}
        .post-avatar{width:38px;height:38px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:white;flex-shrink:0;overflow:hidden;cursor:pointer;}
        .post-avatar img{width:100%;height:100%;object-fit:cover;}
        .post-meta{flex:1;}
        .post-author{font-size:13px;font-weight:700;color:var(--text);cursor:pointer;}
        .post-author:hover{color:var(--teal);}
        .post-time{font-size:11px;color:var(--muted);}
        .post-channel{display:inline-flex;align-items:center;gap:4px;background:var(--teal-bg);color:var(--teal-dark);padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;margin-left:6px;}
        .post-pin{color:var(--teal);font-size:14px;margin-left:auto;}
        .post-body{padding:12px 16px;font-size:14px;line-height:1.6;color:var(--text);white-space:pre-wrap;word-break:break-word;}
        .post-image{width:100%;max-height:400px;object-fit:cover;}
        .post-footer{padding:8px 16px 12px;display:flex;align-items:center;gap:4px;border-top:1px solid var(--border);}
        .reaction-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--muted);transition:all 0.2s;font-family:'DM Sans',sans-serif;}
        .reaction-btn:hover{background:var(--teal-bg);color:var(--teal);}
        .reaction-btn.reacted{color:var(--teal);background:var(--teal-bg);}
        .reaction-btn .material-icons{font-size:16px;}
        .comment-section{background:#f8fafc;border-top:1px solid var(--border);padding:12px 16px;}
        .comment-item{display:flex;gap:8px;margin-bottom:10px;}
        .comment-avatar{width:28px;height:28px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:10px;color:white;flex-shrink:0;overflow:hidden;}
        .comment-avatar img{width:100%;height:100%;object-fit:cover;}
        .comment-bubble{background:white;border:1px solid var(--border);border-radius:0 10px 10px 10px;padding:8px 12px;flex:1;}
        .comment-author{font-size:11px;font-weight:700;color:var(--text);}
        .comment-body{font-size:12px;color:var(--secondary);margin-top:2px;line-height:1.5;}
        .comment-time{font-size:10px;color:var(--muted);margin-top:3px;}
        .comment-input-row{display:flex;gap:8px;align-items:center;margin-top:8px;}
        .comment-input{flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s;}
        .comment-input:focus{border-color:var(--teal);}

        /* RIGHT SIDEBAR */
        .right-sidebar{display:flex;flex-direction:column;gap:16px;}
        .widget{background:white;border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:var(--shadow-sm);}
        .widget-title{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:12px;}
        .online-user{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);}
        .online-user:last-child{border-bottom:none;}
        .online-dot{width:8px;height:8px;border-radius:50%;background:#10b981;flex-shrink:0;}
        .online-name{font-size:12px;font-weight:600;color:var(--text);}
        .online-type{font-size:10px;color:var(--muted);}
        .channel-pill{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:background 0.15s;}
        .channel-pill:hover{background:var(--surface);}
        .channel-pill.active-channel{background:var(--teal-bg);}
        .channel-pill-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
        .channel-pill-name{font-size:12px;font-weight:700;color:var(--text);}
        .channel-pill-desc{font-size:10px;color:var(--muted);}

        /* EMPTY + LOADING */
        .empty{padding:40px;text-align:center;color:var(--muted);}
        .empty .material-icons{font-size:40px;opacity:0.3;display:block;margin-bottom:8px;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin 0.8s linear infinite;margin:20px auto;}
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
        .post-card{animation:fadeIn 0.3s ease both;}

        /* DM PANEL */
        .dm-panel{position:fixed;bottom:20px;right:20px;width:340px;background:white;border-radius:16px;box-shadow:0 20px 40px rgba(0,0,0,0.15);border:1px solid var(--border);z-index:200;display:none;flex-direction:column;height:450px;}
        .dm-panel.open{display:flex;}
        .dm-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--navy);border-radius:16px 16px 0 0;}
        .dm-other-name{font-weight:700;font-size:13px;color:white;flex:1;}
        .dm-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;}
        .dm-msg{max-width:75%;padding:8px 12px;border-radius:12px;font-size:12px;line-height:1.5;}
        .dm-msg.sent{background:var(--teal);color:white;border-radius:12px 12px 0 12px;align-self:flex-end;}
        .dm-msg.recv{background:#f1f5f9;color:var(--text);border-radius:12px 12px 12px 0;}
        .dm-msg-time{font-size:10px;opacity:0.6;margin-top:3px;}
        .dm-input-row{padding:10px;border-top:1px solid var(--border);display:flex;gap:8px;}
        .dm-input{flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;}
        .dm-input:focus{border-color:var(--teal);}

        @media(max-width:900px){.community-layout{grid-template-columns:1fr;}.right-sidebar{display:none;}}
        @media(max-width:640px){.sidebar{transform:translateX(-100%);}.main{margin-left:0;}.community-layout{padding:12px;}}
    
        /* NOTIFICATION BELL */
        .notif-bell{position:relative;cursor:pointer;background:none;border:none;padding:6px;border-radius:8px;color:#475569;display:flex;align-items:center;}
        .notif-bell:hover{background:#f1f5f9;}
        .notif-bell .material-icons{font-size:22px;}
        .notif-dot{position:absolute;top:4px;right:4px;width:8px;height:8px;background:#ef4444;border-radius:50%;border:2px solid white;display:none;}
        .notif-count{position:absolute;top:0;right:0;background:#ef4444;color:white;border-radius:99px;font-size:9px;font-weight:800;padding:0 4px;min-width:16px;text-align:center;display:none;}
        .notif-panel{position:fixed;top:56px;right:16px;width:340px;background:white;border:1px solid #e2e8f0;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.12);z-index:1000;display:none;max-height:480px;overflow-y:auto;}
        .notif-panel-header{padding:14px 16px;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center;}
        .notif-panel-title{font-size:13px;font-weight:800;}
        .notif-mark-all{font-size:11px;color:#0d9488;cursor:pointer;font-weight:700;border:none;background:none;}
        .notif-item{display:flex;gap:10px;padding:12px 16px;border-bottom:1px solid #f8fafc;cursor:pointer;transition:background 0.15s;}
        .notif-item:hover{background:#f8fafc;}
        .notif-item.unread{background:#f0fdfa;}
        .notif-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;}
        .notif-text{flex:1;}
        .notif-title{font-size:12px;font-weight:700;color:#0a1628;margin-bottom:2px;}
        .notif-body{font-size:11px;color:#64748b;}
        .notif-time{font-size:10px;color:#94a3b8;margin-top:2px;}
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <img src="https://assets.cdn.filesafe.space/dfg08aPdtlQ1RhIKkCnN/media/66cf5cf28a35e448970f1ead.png" class="sidebar-logo">
        <div class="sidebar-partner">
            <div class="sidebar-avatar" id="sidebarAvatar">?</div>
            <div>
                <div class="sidebar-name" id="sidebarName">Loading...</div>
                <div class="sidebar-tag">Partner Portal</div>
            </div>
        </div>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-section">Menu</div>
        <a class="nav-item" href="/partner/dashboard"><span class="material-icons">dashboard</span> Overview</a>
        <a class="nav-item" href="/partner/merchants"><span class="material-icons">storefront</span> My Merchants</a>
        <a class="nav-item active" href="/partner/community"><span class="material-icons">groups</span> Community</a>
        <a class="nav-item" href="/partner/messages"><span class="material-icons">forum</span> Messages <span class="nav-badge" id="dmBadge" style="display:none;">0</span></a>
        <a class="nav-item" href="/partner/tickets"><span class="material-icons">confirmation_number</span> My Tickets</a>
        <a class="nav-item" href="/partner/profile"><span class="material-icons">account_circle</span> My Profile</a>
        <a class="nav-item" href="/partner/settings"><span class="material-icons">settings</span> Settings</a>
        <div class="nav-divider"></div>
        <div class="nav-section">Channels</div>
        <div id="channelNav"></div>
        <div class="nav-divider"></div>
        <button class="nav-item" onclick="handleLogout()"><span class="material-icons">logout</span> Sign Out</button>
    </nav>
    <div style="padding:12px;font-size:10px;color:rgba(255,255,255,0.2);text-align:center;">PayProTec Community v1.0</div>
</div>

<div class="main">
    <div class="topbar">
        <h1 class="topbar-title" id="topbarTitle">🌐 Community Feed</h1>
        <div style="display:flex;gap:8px;">
            <button class="btn btn-outline btn-sm" onclick="openDMSearch()"><span class="material-icons" style="font-size:14px;">mail</span> New Message</button>
        
        <div style="display:flex;align-items:center;gap:8px;margin-left:auto;">
            <button class="notif-bell" onclick="toggleNotifPanel()" title="Notifications">
                <span class="material-icons">notifications</span>
                <span class="notif-count" id="notifBellCount"></span>
            </button>
        </div>
        </div>
        <!-- NOTIFICATION PANEL -->
        <div class="notif-panel" id="notifPanel">
            <div class="notif-panel-header">
                <span class="notif-panel-title">Notifications</span>
                <button class="notif-mark-all" onclick="markAllNotifsRead()">Mark all read</button>
            </div>
            <div id="notifList"><div style="padding:20px;text-align:center;color:#94a3b8;font-size:13px;">Loading...</div></div>
        </div>
    </div>

    <div class="community-layout">
        <!-- FEED -->
        <div class="feed">
            <!-- COMPOSER -->
            <div class="composer" id="composer">
                <div class="composer-top">
                    <div class="composer-avatar" id="composerAvatar">?</div>
                    <textarea class="composer-input" id="postInput" placeholder="Share an update, ask a question, or celebrate a win..." rows="3"></textarea>
                </div>
                <div class="composer-footer">
                    <select class="channel-select" id="postChannel">
                        <option value="">📡 All Channels</option>
                    </select>
                    <div style="display:flex;gap:8px;align-items:center;">
                        <button class="btn btn-outline btn-sm" onclick="triggerImageUpload()"><span class="material-icons" style="font-size:14px;">image</span> Photo</button>
                        <button class="btn btn-teal" onclick="submitPost()" id="postBtn"><span class="material-icons" style="font-size:14px;">send</span> Post</button>
                    </div>
                </div>
                <input type="file" id="imageUpload" accept="image/*" style="display:none" onchange="handleImageUpload(this)">
                <div id="imagePreview" style="display:none;margin-top:10px;position:relative;">
                    <img id="previewImg" style="width:100%;border-radius:8px;max-height:200px;object-fit:cover;">
                    <button onclick="clearImage()" style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.6);border:none;border-radius:50%;width:24px;height:24px;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;">✕</button>
                </div>
            </div>

            <!-- POSTS -->
            <div id="feedContainer">
                <div class="spinner"></div>
            </div>
            <div id="loadMoreWrap" style="text-align:center;display:none;">
                <button class="btn btn-outline" onclick="loadMorePosts()" style="width:100%;">Load more posts</button>
            </div>
        </div>

        <!-- RIGHT SIDEBAR -->
        <div class="right-sidebar">
            <div class="widget">
                <div class="widget-title">📡 Channels</div>
                <div id="channelWidget"></div>
            </div>
            <div class="widget">
                <div class="widget-title">🟢 Online Now</div>
                <div id="onlineWidget"><div class="spinner"></div></div>
            </div>
        </div>
    </div>
</div>

<!-- DM PANEL -->
<div class="dm-panel" id="dmPanel">
    <div class="dm-header">
        <div class="sidebar-avatar" id="dmOtherAvatar" style="width:28px;height:28px;font-size:10px;"></div>
        <div class="dm-other-name" id="dmOtherName">—</div>
        <button onclick="closeDM()" style="background:none;border:none;color:rgba(255,255,255,0.6);cursor:pointer;"><span class="material-icons">close</span></button>
    </div>
    <div class="dm-messages" id="dmMessages"></div>
    <div class="dm-input-row">
        <input class="dm-input" id="dmInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter')sendDM()">
        <button class="btn btn-teal btn-sm" onclick="sendDM()"><span class="material-icons" style="font-size:14px;">send</span></button>
    </div>
</div>

<script>
const token = localStorage.getItem('pp_partner_token');
if (!token) window.location.href = '/partner';

let currentUser = null;
let currentProfile = null;
let channels = [];
let activeChannelId = null;
let feedPage = 0;
let feedHasMore = false;
let pendingImageUrl = null;
let dmOtherId = null, dmOtherType = null;
let dmPollInterval = null;

// ── INIT ──────────────────────────────────────────────────
async function init() {
    try {
        const auth = await api('partner-auth', { action:'validate', token });
        if (!auth.success) { localStorage.clear(); window.location.href='/partner'; return; }
        currentUser = { id: auth.partner.id, type: 'partner', name: auth.partner.name };

        const initials = auth.partner.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
        document.getElementById('sidebarAvatar').innerHTML = `<span>${initials}</span>`;
        document.getElementById('composerAvatar').innerHTML = `<span>${initials}</span>`;
        document.getElementById('sidebarName').innerText = auth.partner.name;

        // Load profile for avatar
        const profRes = await api('community', { action:'get_profile', token });
        if (profRes.success && profRes.profile?.avatar_url) {
            const av = profRes.profile.avatar_url;
            document.getElementById('sidebarAvatar').innerHTML = `<img src="${av}">`;
            document.getElementById('composerAvatar').innerHTML = `<img src="${av}">`;
        }
        currentProfile = profRes.profile;

        await loadChannels();
        await loadFeed();
        loadOnlineUsers();
        startHeartbeat();
    } catch(err) { console.error('Init error:', err); }
}

function api(endpoint, body) {
    return fetch(`/api/${endpoint}`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) }).then(r=>r.json());
}

// ── CHANNELS ──────────────────────────────────────────────
async function loadChannels() {
    const res = await api('community', { action:'get_channels', token });
    channels = res.data || [];

    // Populate nav
    const nav = document.getElementById('channelNav');
    const widget = document.getElementById('channelWidget');
    const select = document.getElementById('postChannel');

    // All feed option
    select.innerHTML = '<option value="">📡 All Channels</option>';

    nav.innerHTML = `<div class="nav-item ${!activeChannelId?'active':''}" onclick="setChannel(null)" style="cursor:pointer;">
        <span class="material-icons" style="font-size:18px;">public</span> All Posts
    </div>`;

    widget.innerHTML = `<div class="channel-pill ${!activeChannelId?'active-channel':''}" onclick="setChannel(null)">
        <div class="channel-pill-icon" style="background:#f1f5f9;color:#475569;"><span class="material-icons" style="font-size:16px;">public</span></div>
        <div><div class="channel-pill-name">All Posts</div></div>
    </div>`;

    channels.forEach(ch => {
        const isActive = activeChannelId === ch.id;
        const canPost = !ch.is_announcement; // partners can't post in announcements

        nav.innerHTML += `<div class="nav-item ${isActive?'active':''}" onclick="setChannel('${ch.id}')" style="cursor:pointer;">
            <span class="material-icons" style="font-size:18px;">${ch.icon}</span> ${ch.name}
        </div>`;

        widget.innerHTML += `<div class="channel-pill ${isActive?'active-channel':''}" onclick="setChannel('${ch.id}')">
            <div class="channel-pill-icon" style="background:${ch.color}22;color:${ch.color};"><span class="material-icons" style="font-size:16px;">${ch.icon}</span></div>
            <div><div class="channel-pill-name">${ch.name}</div><div class="channel-pill-desc">${ch.description||''}</div></div>
        </div>`;

        if (canPost) {
            select.innerHTML += `<option value="${ch.id}">${ch.name}</option>`;
        }
    });
}

function setChannel(channelId) {
    activeChannelId = channelId;
    feedPage = 0;
    const ch = channels.find(c => c.id === channelId);
    document.getElementById('topbarTitle').innerText = ch ? `#${ch.name}` : '🌐 Community Feed';

    // Update composer visibility for announcements
    const announceChannel = channels.find(c => c.id === channelId && c.is_announcement);
    document.getElementById('composer').style.display = announceChannel ? 'none' : 'block';

    loadChannels(); // re-render active states
    loadFeed();
}

// ── FEED ──────────────────────────────────────────────────
async function loadFeed(append=false) {
    if (!append) {
        feedPage = 0;
        document.getElementById('feedContainer').innerHTML = '<div class="spinner"></div>';
    }
    const res = await api('community', { action:'get_feed', token, channel_id: activeChannelId, page: feedPage, limit: 10 });
    feedHasMore = res.has_more;
    document.getElementById('loadMoreWrap').style.display = feedHasMore ? 'block' : 'none';

    if (!res.data?.length && !append) {
        document.getElementById('feedContainer').innerHTML = `<div class="empty"><span class="material-icons">forum</span><p>No posts yet. Be the first to share something!</p></div>`;
        return;
    }

    const html = (res.data || []).map(renderPost).join('');
    if (append) {
        document.getElementById('feedContainer').insertAdjacentHTML('beforeend', html);
    } else {
        document.getElementById('feedContainer').innerHTML = html;
    }
}

function loadMorePosts() { feedPage++; loadFeed(true); }

function renderPost(post) {
    const author = post.author || {};
    const initials = (author.display_name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    const avatarHtml = author.avatar_url ? `<img src="${author.avatar_url}">` : `<span>${initials}</span>`;
    const staffBadge = author.user_type === 'staff' ? `<span style="background:#004990;color:white;padding:1px 6px;border-radius:99px;font-size:9px;font-weight:800;margin-left:5px;">STAFF</span>` : '';
    const channelTag = post.community_channels ? `<span class="post-channel"><span class="material-icons" style="font-size:10px;">${post.community_channels.icon}</span>${post.community_channels.name}</span>` : '';
    const pinTag = post.is_pinned ? `<span class="material-icons post-pin" title="Pinned">push_pin</span>` : '';
    const timeAgo = getTimeAgo(post.created_at);

    return `<div class="post-card" id="post-${post.id}">
        <div class="post-header">
            <div class="post-avatar" onclick="openProfile('${post.author_id}')">${avatarHtml}</div>
            <div class="post-meta">
                <div>
                    <span class="post-author" onclick="openProfile('${post.author_id}')">${author.display_name||'Unknown'}</span>
                    ${staffBadge}${channelTag}
                </div>
                <div class="post-time">${timeAgo}</div>
            </div>
            ${pinTag}
            ${post.author_id === currentUser?.id ? `<button onclick="deletePost('${post.id}')" style="background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;"><span class="material-icons" style="font-size:16px;">more_horiz</span></button>` : ''}
        </div>
        <div class="post-body">${escHtml(post.body)}</div>
        ${post.image_url ? `<img src="${post.image_url}" class="post-image" alt="Post image">` : ''}
        <div class="post-footer">
            <button class="reaction-btn ${post.user_reacted?'reacted':''}" onclick="toggleReact('${post.id}', this)">
                <span class="material-icons">${post.user_reacted?'favorite':'favorite_border'}</span>
                <span class="react-count">${post.reaction_count||0}</span>
            </button>
            <button class="reaction-btn" onclick="toggleComments('${post.id}')">
                <span class="material-icons">chat_bubble_outline</span>
                <span>${post.comment_count||0}</span>
            </button>
            <button class="reaction-btn" onclick="openDM('${post.author_id}','${(author.display_name||'').replace(/'/g,"\\'")}','${author.user_type||'partner'}')">
                <span class="material-icons">send</span> Message
            </button>
        </div>
        <div class="comment-section" id="comments-${post.id}" style="display:none;"></div>
    </div>`;
}

// ── POST ACTIONS ──────────────────────────────────────────
async function submitPost() {
    const body = document.getElementById('postInput').value.trim();
    const channelId = document.getElementById('postChannel').value || null;
    if (!body) return;

    const btn = document.getElementById('postBtn');
    btn.disabled = true; btn.innerHTML = '<span class="material-icons" style="animation:spin 0.8s linear infinite;font-size:14px;">sync</span>';

    await api('community', { action:'create_post', token, body, channel_id: channelId, image_url: pendingImageUrl });
    
    document.getElementById('postInput').value = '';
    clearImage();
    btn.disabled = false; btn.innerHTML = '<span class="material-icons" style="font-size:14px;">send</span> Post';
    feedPage = 0; loadFeed();
}

async function toggleReact(postId, btn) {
    const res = await api('community', { action:'react', token, post_id: postId });
    if (res.success) {
        const count = btn.querySelector('.react-count');
        const icon = btn.querySelector('.material-icons');
        if (res.action === 'added') { btn.classList.add('reacted'); icon.innerText='favorite'; count.innerText = parseInt(count.innerText)+1; }
        else { btn.classList.remove('reacted'); icon.innerText='favorite_border'; count.innerText = Math.max(0, parseInt(count.innerText)-1); }
    }
}

async function toggleComments(postId) {
    const section = document.getElementById(`comments-${postId}`);
    if (section.style.display === 'none') {
        section.style.display = 'block';
        section.innerHTML = '<div class="spinner" style="margin:10px auto;"></div>';
        const res = await api('community', { action:'get_comments', token, post_id: postId });
        const comments = res.data || [];
        section.innerHTML = `
            ${comments.map(c => {
                const initials = (c.author?.display_name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
                const avHtml = c.author?.avatar_url ? `<img src="${c.author.avatar_url}">` : initials;
                return `<div class="comment-item">
                    <div class="comment-avatar">${avHtml}</div>
                    <div class="comment-bubble">
                        <div class="comment-author">${c.author?.display_name||'Unknown'}</div>
                        <div class="comment-body">${escHtml(c.body)}</div>
                        <div class="comment-time">${getTimeAgo(c.created_at)}</div>
                    </div>
                </div>`;
            }).join('')}
            <div class="comment-input-row">
                <div class="comment-avatar">${currentProfile?.avatar_url ? `<img src="${currentProfile.avatar_url}">` : (currentUser?.name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}</div>
                <input class="comment-input" id="comment-input-${postId}" placeholder="Write a comment..." onkeypress="if(event.key==='Enter')addComment('${postId}')">
                <button class="btn btn-teal btn-sm" onclick="addComment('${postId}')">Reply</button>
            </div>`;
    } else {
        section.style.display = 'none';
    }
}

async function addComment(postId) {
    const input = document.getElementById(`comment-input-${postId}`);
    const body = input.value.trim();
    if (!body) return;
    await api('community', { action:'add_comment', token, post_id: postId, body });
    input.value = '';
    toggleComments(postId);
    setTimeout(() => toggleComments(postId), 100);
}

async function deletePost(postId) {
    const { isConfirmed } = await Swal.fire({ title:'Delete post?', icon:'warning', showCancelButton:true, confirmButtonColor:'#ef4444', confirmButtonText:'Delete' });
    if (isConfirmed) {
        await api('community', { action:'delete_post', token, post_id: postId });
        document.getElementById(`post-${postId}`)?.remove();
    }
}

// ── IMAGE UPLOAD ──────────────────────────────────────────
function triggerImageUpload() { document.getElementById('imageUpload').click(); }

async function handleImageUpload(input) {
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = e => {
        document.getElementById('previewImg').src = e.target.result;
        document.getElementById('imagePreview').style.display = 'block';
    };
    reader.readAsDataURL(file);

    // Get signed upload URL
    const urlRes = await api('community', { action:'get_avatar_upload_url', token, file_type: file.type });
    if (urlRes.success) {
        await fetch(urlRes.upload_url, { method:'PUT', body: file, headers:{ 'Content-Type': file.type } });
        pendingImageUrl = urlRes.public_url;
    }
}

function clearImage() {
    pendingImageUrl = null;
    document.getElementById('imagePreview').style.display = 'none';
    document.getElementById('imageUpload').value = '';
}

// ── DM ────────────────────────────────────────────────────
async function openDMSearch() {
    const { value: search } = await Swal.fire({
        title: 'New Message',
        input: 'text',
        inputPlaceholder: 'Search by name...',
        showCancelButton: true,
        confirmButtonColor: '#0d9488',
        confirmButtonText: 'Search',
        didOpen: async () => {
            const input = Swal.getInput();
            input.addEventListener('input', async () => {
                const res = await api('community', { action:'get_all_users', token, search: input.value });
                const list = document.getElementById('userSearchResults');
                if (list) list.innerHTML = (res.data||[]).map(u => `
                    <div onclick="selectDMUser('${u.user_id}','${u.display_name?.replace(/'/g,"\\'")||''}','${u.user_type}')" 
                         style="padding:8px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;border-bottom:1px solid #f1f5f9;">
                        <div style="width:28px;height:28px;border-radius:50%;background:${u.user_type==='staff'?'#004990':'#0d9488'};display:flex;align-items:center;justify-content:center;font-weight:800;font-size:10px;color:white;flex-shrink:0;">
                            ${(u.display_name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}
                        </div>
                        <div>
                            <div style="font-size:12px;font-weight:700;">${u.display_name||'Unknown'}</div>
                            <div style="font-size:10px;color:#94a3b8;">${u.user_type==='staff'?'PayProTec Staff':'Partner'}${u.is_online?' · 🟢 Online':''}</div>
                        </div>
                    </div>`).join('');
            });
        },
        html: `<div id="userSearchResults" style="max-height:250px;overflow-y:auto;border:1px solid #e2e8f0;border-radius:8px;margin-top:8px;"></div>`
    });
}

function selectDMUser(userId, name, type) {
    Swal.close();
    openDM(userId, name, type);
}

async function openDM(otherId, otherName, otherType) {
    if (otherId === currentUser?.id) return;
    dmOtherId = otherId; dmOtherType = otherType;
    document.getElementById('dmOtherName').innerText = otherName;
    document.getElementById('dmOtherAvatar').innerHTML = otherName.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    document.getElementById('dmPanel').classList.add('open');
    await loadDMThread();
    if (dmPollInterval) clearInterval(dmPollInterval);
    dmPollInterval = setInterval(loadDMThread, 5000);
}

function closeDM() {
    document.getElementById('dmPanel').classList.remove('open');
    if (dmPollInterval) clearInterval(dmPollInterval);
    dmOtherId = null;
}

async function loadDMThread() {
    if (!dmOtherId) return;
    const res = await api('community', { action:'get_dm_thread', token, other_id: dmOtherId });
    const msgs = document.getElementById('dmMessages');
    const wasAtBottom = msgs.scrollTop + msgs.clientHeight >= msgs.scrollHeight - 10;
    
    msgs.innerHTML = (res.data||[]).map(m => {
        const isSent = m.sender_id === currentUser?.id;
        return `<div style="display:flex;flex-direction:column;align-items:${isSent?'flex-end':'flex-start'};">
            <div class="dm-msg ${isSent?'sent':'recv'}">${escHtml(m.body)}<div class="dm-msg-time">${getTimeAgo(m.created_at)}</div></div>
        </div>`;
    }).join('') || '<div style="text-align:center;color:#94a3b8;font-size:12px;padding:20px;">No messages yet</div>';
    
    if (wasAtBottom) msgs.scrollTop = msgs.scrollHeight;
}

async function sendDM() {
    const input = document.getElementById('dmInput');
    const body = input.value.trim();
    if (!body || !dmOtherId) return;
    input.value = '';
    await api('community', { action:'send_dm', token, recipient_id: dmOtherId, recipient_type: dmOtherType, body });
    loadDMThread();
}

// ── ONLINE USERS ──────────────────────────────────────────
async function loadOnlineUsers() {
    const res = await api('community', { action:'get_all_users', token, search:'' });
    const widget = document.getElementById('onlineWidget');
    const onlineUsers = (res.data||[]).filter(u => u.is_online).slice(0,8);
    if (!onlineUsers.length) { widget.innerHTML = '<div style="font-size:12px;color:var(--muted);text-align:center;padding:10px;">Nobody online right now</div>'; return; }
    widget.innerHTML = onlineUsers.map(u => `
        <div class="online-user" onclick="openDM('${u.user_id}','${u.display_name?.replace(/'/g,"\\'")||''}','${u.user_type}')" style="cursor:pointer;">
            <div class="online-dot"></div>
            <div>
                <div class="online-name">${u.display_name||'Unknown'}</div>
                <div class="online-type">${u.user_type==='staff'?'PayProTec Staff':'Partner'}</div>
            </div>
        </div>`).join('');
}

// ── PROFILE ───────────────────────────────────────────────
async function openProfile(userId) {
    const res = await api('community', { action:'get_profile', token, profile_user_id: userId });
    if (!res.success) return;
    const p = res.profile;
    const s = res.stats;
    const initials = (p.display_name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    Swal.fire({
        html: `
            <div style="text-align:center;padding-bottom:16px;border-bottom:1px solid #e2e8f0;margin-bottom:16px;">
                <div style="width:72px;height:72px;border-radius:50%;background:${p.user_type==='staff'?'#004990':'#0d9488'};display:flex;align-items:center;justify-content:center;font-weight:800;font-size:24px;color:white;margin:0 auto 12px;overflow:hidden;">
                    ${p.avatar_url ? `<img src="${p.avatar_url}" style="width:100%;height:100%;object-fit:cover;">` : initials}
                </div>
                <div style="font-size:18px;font-weight:800;color:#0a1628;">${p.display_name||'Unknown'}</div>
                ${p.user_type==='staff'?'<span style="background:#004990;color:white;padding:2px 10px;border-radius:99px;font-size:10px;font-weight:800;">PAYPROTEC STAFF</span>':'<span style="background:#ccfbf1;color:#0f766e;padding:2px 10px;border-radius:99px;font-size:10px;font-weight:800;">PARTNER</span>'}
                ${p.tagline ? `<div style="font-size:13px;color:#64748b;margin-top:8px;font-style:italic;">"${p.tagline}"</div>` : ''}
            </div>
            ${p.bio ? `<div style="font-size:13px;color:#475569;text-align:left;margin-bottom:12px;">${p.bio}</div>` : ''}
            ${p.location ? `<div style="font-size:12px;color:#94a3b8;text-align:left;margin-bottom:6px;"><span class="material-icons" style="font-size:14px;vertical-align:middle;">location_on</span> ${p.location}</div>` : ''}
            ${s ? `
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid #e2e8f0;">
                <div style="text-align:center;background:#f0fdfa;border-radius:10px;padding:10px;">
                    <div style="font-size:18px;font-weight:800;color:#0d9488;font-family:'DM Mono',monospace;">${s.merchants}</div>
                    <div style="font-size:10px;color:#94a3b8;font-weight:700;text-transform:uppercase;">Merchants</div>
                </div>
                <div style="text-align:center;background:#f0fdfa;border-radius:10px;padding:10px;">
                    <div style="font-size:14px;font-weight:800;color:#0d9488;font-family:'DM Mono',monospace;">$${(s.mtd/1000).toFixed(1)}K</div>
                    <div style="font-size:10px;color:#94a3b8;font-weight:700;text-transform:uppercase;">MTD Vol</div>
                </div>
                <div style="text-align:center;background:#f0fdfa;border-radius:10px;padding:10px;">
                    <div style="font-size:14px;font-weight:800;color:#0d9488;font-family:'DM Mono',monospace;">$${(s.vol90/1000).toFixed(1)}K</div>
                    <div style="font-size:10px;color:#94a3b8;font-weight:700;text-transform:uppercase;">90D Vol</div>
                </div>
            </div>` : ''}
            ${userId !== currentUser?.id ? `
            <button onclick="Swal.close();openDM('${userId}','${(p.display_name||'').replace(/'/g,"\\'")}','${p.user_type}')" 
                    style="width:100%;margin-top:14px;padding:10px;background:#0d9488;color:white;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;">
                <span class="material-icons" style="font-size:14px;vertical-align:middle;">send</span> Send Message
            </button>` : ''}`,
        showConfirmButton: false,
        showCloseButton: true,
        width: 400
    });
}

// ── HEARTBEAT ─────────────────────────────────────────────
function startHeartbeat() {
    api('community', { action:'heartbeat', token });
    setInterval(() => api('community', { action:'heartbeat', token }), 60000);
    // Poll for unread counts every 15s
    pollUnreadCounts();
    setInterval(pollUnreadCounts, 15000);
}

async function pollUnreadCounts() {
    const res = await api('community', { action:'get_unread_counts', token });
    if (!res.success) return;
    const dmBadge = document.getElementById('dmBadge');
    const notifCount = document.getElementById('notifBellCount');
    if (dmBadge) {
        if (res.dms > 0) { dmBadge.textContent = res.dms; dmBadge.style.display = 'inline'; }
        else dmBadge.style.display = 'none';
    }
    if (notifCount) {
        if (res.notifications > 0) { notifCount.textContent = res.notifications; notifCount.style.display = 'inline'; }
        else notifCount.style.display = 'none';
    }
}

async function toggleNotifPanel() {
    const panel = document.getElementById('notifPanel');
    const isOpen = panel && panel.style.display === 'block';
    if (panel) panel.style.display = isOpen ? 'none' : 'block';
    if (!isOpen) loadNotifications();
    if (!isOpen && panel) {
        setTimeout(function() {
            document.addEventListener('click', function oc(e) {
                if (!panel.contains(e.target) && !e.target.closest('.notif-bell')) {
                    panel.style.display = 'none';
                    document.removeEventListener('click', oc);
                }
            });
        }, 100);
    }
}

async function loadNotifications() {
    const res = await api('community', { action:'get_notifications', token });
    const el = document.getElementById('notifList');
    if (!el) return;
    const notifs = res.data || [];
    if (!notifs.length) { el.innerHTML = '<div style="padding:24px;text-align:center;color:#94a3b8;font-size:13px;">No notifications yet.</div>'; return; }
    const icons = { post:'🏷️', comment:'💬', reaction:'❤️', dm:'✉️' };
    const bgColors = { post:'#eff6ff', comment:'#f0fdf4', reaction:'#fff1f2', dm:'#f0fdfa' };
    el.innerHTML = notifs.map(function(n) {
        var t = new Date(n.created_at);
        var ago = ((Date.now()-t)/60000 < 60) ? Math.floor((Date.now()-t)/60000)+'m ago' : Math.floor((Date.now()-t)/3600000)+'h ago';
        return '<div class="notif-item' + (n.is_read ? '' : ' unread') + '" onclick="handleNotifClick(this)" data-id="' + n.id + '" data-link="' + (n.link||'') + '">'
            + '<div class="notif-icon" style="background:' + (bgColors[n.type]||'#f8fafc') + '">' + (icons[n.type]||'🔔') + '</div>'
            + '<div class="notif-text"><div class="notif-title">' + escHtml(n.title||'') + '</div>'
            + (n.body ? '<div class="notif-body">' + escHtml(n.body) + '</div>' : '')
            + '<div class="notif-time">' + ago + '</div></div></div>';
    }).join('');
}

function handleNotifClick(el) {
    var id = el.getAttribute('data-id');
    var link = el.getAttribute('data-link');
    api('community', { action:'mark_notifications_read', token, ids:[id] });
    if (link) window.location.href = link;
    pollUnreadCounts();
}

async function markAllNotifsRead() {
    await api('community', { action:'mark_notifications_read', token });
    loadNotifications();
    pollUnreadCounts();
}

// ── UTILS ─────────────────────────────────────────────────
function escHtml(str) {
    return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeAgo(dateStr) {
    return getTimeAgo(dateStr);
}
function getTimeAgo(dateStr) {
    const diff = Date.now() - new Date(dateStr).getTime();
    const m = Math.floor(diff/60000), h = Math.floor(m/60), d = Math.floor(h/24);
    if (d > 0) return `${d}d ago`;
    if (h > 0) return `${h}h ago`;
    if (m > 0) return `${m}m ago`;
    return 'just now';
}

async function handleLogout() {
    await fetch('/api/partner-auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'logout',token})});
    localStorage.clear(); window.location.href='/partner';
}

window.onload = init;
document.getElementById('postInput').addEventListener('keydown', e => { if (e.key==='Enter' && e.metaKey) submitPost(); });
