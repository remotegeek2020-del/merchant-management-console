<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Account Setup | PayProtec</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f3f6f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .setup-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
    </style>
</head>
<body>
    <div class="setup-card">
        <div style="text-align: center; margin-bottom: 30px;">
            <h2 style="font-size: 1.5rem; font-weight: 800; color: #004990;">Create Password</h2>
            <p style="color: #64748b; font-size: 0.9rem;">Please set a secure password for your staff portal account.</p>
        </div>

        <div class="slds-form-element slds-m-bottom_medium">
            <label class="slds-form-element__label">New Password</label>
            <input type="password" id="pass1" class="slds-input" placeholder="••••••••">
        </div>

        <div class="slds-form-element slds-m-bottom_large">
            <label class="slds-form-element__label">Confirm Password</label>
            <input type="password" id="pass2" class="slds-input" placeholder="••••••••">
        </div>

        <button class="slds-button slds-button_brand slds-size_1-of-1" onclick="submitPassword()">ACTIVATE ACCOUNT</button>
    </div>

    <script>
        async function submitPassword() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            const p1 = document.getElementById('pass1').value;
            const p2 = document.getElementById('pass2').value;

            if (!token) return Swal.fire('Error', 'Missing invitation token.', 'error');
            if (p1 !== p2) return Swal.fire('Mismatch', 'Passwords do not match.', 'warning');
            if (p1.length < 8) return Swal.fire('Weak Password', 'Minimum 8 characters required.', 'warning');

            Swal.fire({ title: 'Activating...', didOpen: () => Swal.showLoading() });

            try {
                const res = await fetch('/api/setup-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password: p1 })
                });
                const result = await res.json();

                if (result.success) {
                    Swal.fire('Success!', 'Account active. You can now login.', 'success')
                        .then(() => window.location.href = 'index.html');
                } else {
                    Swal.fire('Failed', result.message, 'error');
                }
            } catch (err) {
                Swal.fire('Error', 'Server connection failed.', 'error');
            }
        }
    </script>
</body>
</html>
