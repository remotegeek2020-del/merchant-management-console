<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System Activity Logs</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle at top right, #f8fafc, #e2e8f0); min-height: 100vh; font-family: 'Inter', sans-serif; padding: 20px; }
        .log-container { max-width: 1200px; margin: 40px auto; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px); border-radius: 24px; padding: 40px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05); }
        code { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; color: #004990; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div id="page-content" class="log-container" style="display:none;">
        <div class="slds-grid slds-grid_vertical-align-center slds-m-bottom_large" style="justify-content: space-between;">
            <h1 class="slds-text-heading_large" style="color:#004990; font-weight:800;">Activity Audit Trail</h1>
            <button class="slds-button slds-button_neutral" style="border-radius: 50px; font-weight: 700;" onclick="window.location.href='index.html'">🏠 HOME</button>
        </div>

        <table class="slds-table slds-table_bordered slds-table_cell-buffer slds-no-row-hover">
            <thead>
                <tr class="slds-line-height_reset">
                    <th scope="col" style="font-weight: 700;">Timestamp</th>
                    <th scope="col" style="font-weight: 700;">Staff Member</th>
                    <th scope="col" style="font-weight: 700;">Merchant</th>
                    <th scope="col" style="font-weight: 700;">Action Type</th>
                    <th scope="col" style="font-weight: 700;">Log Details</th>
                </tr>
            </thead>
            <tbody id="log-list">
                <tr><td colspan="5" style="text-align:center; padding: 40px;">Syncing global logs...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        async function fetchLogs() {
            try {
                const response = await fetch('/api/merchants', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'global_logs' })
                });
                const result = await response.json();
                
                if (result.success) {
                    const tbody = document.getElementById('log-list');
                    tbody.innerHTML = result.data.map(log => `
                        <tr>
                            <td style="font-size: 11px; color: #64748b;">${new Date(log.created_at).toLocaleString()}</td>
                            <td><span class="slds-badge" style="background:#e0f2fe; color:#0369a1; font-weight:700;">${log.created_by}</span></td>
                            <td style="font-weight: 700; color: #002d5a;">${log.merchants?.dba_name || 'System Update'}</td>
                            <td><code>${log.title}</code></td>
                            <td style="font-size: 11px; color: #475569;">${log.body}</td>
                        </tr>
                    `).join('') || '<tr><td colspan="5" style="text-align:center;">No activity found.</td></tr>';
                }
            } catch (err) {
                document.getElementById('log-list').innerHTML = '<tr><td colspan="5" style="text-align:center; color:red;">Connection failed.</td></tr>';
            }
        }

        window.onload = () => {
            const role = (sessionStorage.getItem('pp_role') || "").toLowerCase();
            // Allow admin or staff to view
            if (role.includes('admin') || role.includes('staff')) {
                document.getElementById('page-content').style.display = 'block';
                fetchLogs();
            } else {
                window.location.href = 'index.html';
            }
        };
    </script>
</body>
</html>
