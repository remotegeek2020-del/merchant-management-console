<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner Network | Secure Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --pp-blue: #004990; --pp-accent: #00a1e0; }
        body { background: #f1f5f9; padding: 25px; font-family: 'Inter', sans-serif; }
        .dashboard-container { max-width: 1400px; margin: 0 auto; }
        .modern-header { background: white; border-radius: 16px; padding: 25px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .partner-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .partner-card { background: white; border-radius: 16px; padding: 20px; border: 1px solid #e2e8f0; transition: 0.3s; cursor: pointer; }
        .partner-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-color: var(--pp-blue); }
        .id-badge { background: #f1f5f9; color: #0369a1; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; border: 1px solid #e2e8f0; }
        .modal-tab-btn { padding: 14px 20px; border: none; background: none; font-weight: 700; color: #94a3b8; cursor: pointer; border-bottom: 3px solid transparent; }
        .active-tab { color: var(--pp-blue) !important; border-bottom-color: var(--pp-blue) !important; }
        .company-box { border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px; margin-bottom: 15px; background: #fafbfc; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        /* Add this to your styles to indent sub-partners */
.sub-id-container {
    margin-left: 15px;
    border-left: 2px solid #e2e8f0;
    padding-left: 8px;
    margin-top: 5px;
}

.id-badge.sub {
    font-size: 11px;
    background: #f8fafc;
}
    </style>
</head>
<body>

<div id="loadingOverlay" style="display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;">
    <span class="material-icons" style="animation: spin 2s linear infinite; font-size: 50px; color: var(--pp-blue);">sync</span>
    <p style="margin-top:15px; font-weight:700; color: var(--pp-blue);">UPDATING PARTNER NETWORK...</p>
</div>

<div class="dashboard-container">
    <div class="modern-header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <a href="index.html" class="slds-button slds-button_neutral" style="border-radius: 10px;">BACK</a>
            <h1 style="font-size: 1.6rem; font-weight: 800; color: #002d5a;">Partner Network</h1>
        </div>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="partnerSearch" placeholder="Search..." class="slds-input" style="width:300px; border-radius:10px;" onkeyup="filterPartners()">
        </div>
    </div>
    <div id="partnerGrid" class="partner-grid"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    let allPartners = [];

    function processPartnerData(payload) {
        if (!payload || !payload.persons) return [];
        const { persons, agents, identifiers, companies } = payload;
        
        // 1. Map all IDs for easy lookup
        const idMap = {};
        identifiers.forEach(id => {
            idMap[id.id] = { 
                db_id: id.id, 
                string: id.id_string, 
                rev: id.rev_share || '0%',
                isPrime: !!id.prime49, 
                sub_ids: [], 
                agent_id: id.agent_id,
                parent_config_id: id.parent_config_id,
                rolled_up_to: null // Placeholder for parent owner name
            };
        });

        // 2. NEW: Trace Ownership for Sub-IDs
        identifiers.forEach(id => {
            const current = idMap[id.id];
            if (id.parent_config_id && idMap[id.parent_config_id]) {
                // Link the child to the parent's sub_ids array
                idMap[id.parent_config_id].sub_ids.push(current);

                // Identify the human owner of the Parent ID
                const parentIdRecord = idMap[id.parent_config_id];
                const parentAgent = agents.find(a => a.id === parentIdRecord.agent_id);
                const parentPerson = persons.find(p => p.id === parentAgent?.parent_agent_id);
                
                // If the parent owner is NOT the same person, label it
                const currentAgent = agents.find(a => a.id === current.agent_id);
                if (parentPerson && parentPerson.id !== currentAgent?.parent_agent_id) {
                    current.rolled_up_to = parentPerson.full_name;
                }
            }
        });

        // 3. Assemble Grid: Show EVERY person who has an agent record
        return persons.map(person => {
            const myAgents = agents.filter(a => a.parent_agent_id === person.id);
            if (myAgents.length === 0) return null;

            const companyGroups = {};
            myAgents.forEach(agent => {
                const co = companies.find(c => c.id === agent.company_id);
                const coName = co ? co.company_name : "Independent";
                
                const myAgentIds = identifiers.filter(i => i.agent_id === agent.id);

                // Logic: Show IDs that aren't children of OTHER IDs owned by this same person
                const topLevelForThisPerson = myAgentIds.filter(id => {
                    const parent = identifiers.find(p => p.id === id.parent_config_id);
                    return !(parent && parent.agent_id === id.agent_id);
                });

                if (topLevelForThisPerson.length > 0) {
                    if (!companyGroups[coName]) companyGroups[coName] = [];
                    topLevelForThisPerson.forEach(id => {
                        companyGroups[coName].push(idMap[id.id]);
                    });
                }
            });

            const formatted = Object.entries(companyGroups).map(([name, ids]) => ({ name, ids }));
            return formatted.length > 0 ? { id: person.id, name: person.full_name, companies: formatted } : null;
        }).filter(Boolean);
    }

    function renderBadge(id) {
        // NEW: Show "Owner: Name" if this ID is rolling up to someone else
        let rollUpInfo = id.rolled_up_to ? 
            `<span style="font-size:8px; color:#94a3b8; display:block; line-height:1; margin-bottom:2px;">Owner: ${id.rolled_up_to}</span>` : '';

        let html = `
            <div class="id-badge-container" style="margin-top:4px; width: 100%;">
                <div class="id-badge ${id.isPrime ? 'prime' : ''}" 
                     style="display:flex; justify-content:space-between; align-items:center; cursor:pointer;"
                     onclick="event.stopPropagation(); editIdentifier('${id.db_id}', '${id.string}', '${id.rev}', ${id.isPrime})">
                    <div style="text-align:left;">
                        ${rollUpInfo}
                        <span>${id.string} ${id.isPrime ? '⭐' : ''}</span>
                    </div>
                    <span style="font-size:9px; opacity:0.7;">${id.rev}</span>
                </div>
        `;
        if (id.sub_ids.length > 0) {
            html += `<div style="margin-left:20px; border-left:2px solid #cbd5e1; padding-left:10px;">
                ${id.sub_ids.map(renderBadge).join('')}
            </div>`;
        }
        html += `</div>`;
        return html;
    }

    async function loadPartners() {
        const loader = document.getElementById('loadingOverlay');
        if (loader) loader.style.display = 'flex';
        try {
            const res = await fetch('/api/partners', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'get_partners_list' })
            });
            const result = await res.json();
            if (result.success) {
                allPartners = processPartnerData(result.data);
                renderGrid(allPartners);
            }
        } catch (err) { console.error(err); }
        if (loader) loader.style.display = 'none';
    }

    function renderGrid(data) {
        const grid = document.getElementById('partnerGrid');
        if (!grid) return;
        grid.innerHTML = data.map(p => `
            <div class="partner-card" onclick="openPartnerDetails('${p.id}')">
                <h2 style="font-weight:800; color:#002d5a; margin-bottom:15px;">${p.name}</h2>
                ${p.companies.map(co => `
                    <div style="margin-top:10px; border-top:1px solid #f1f5f9; padding-top:8px;">
                        <b style="font-size:12px; color:#64748b;">${co.name.toUpperCase()}</b>
                        <div style="margin-top:5px;">${co.ids.map(renderBadge).join('')}</div>
                    </div>
                `).join('')}
            </div>
        `).join('');
    }

    window.editIdentifier = async function(db_id, name, rev, isPrime) {
        const { value: formValues } = await Swal.fire({
            title: `Settings: ${name}`,
            html: `
                <div style="text-align:left;">
                    <label style="font-size:11px; font-weight:700; color:#64748b;">REVENUE SHARE (%)</label>
                    <input id="swal-rev" class="swal2-input" value="${rev}" style="width:100%; margin: 10px 0;">
                    <label style="display:flex; align-items:center; gap:10px; cursor:pointer; font-weight:700;">
                        <input type="checkbox" id="swal-prime" ${isPrime ? 'checked' : ''}> Prime49 Gold Badge
                    </label>
                </div>`,
            showCancelButton: true,
            confirmButtonText: 'SAVE CHANGES',
            preConfirm: () => ({ 
                rev_share: document.getElementById('swal-rev').value, 
                prime49: document.getElementById('swal-prime').checked 
            })
        });

        if (formValues) {
            const res = await fetch('/api/partners', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ action: 'update_identifier', id: db_id, payload: formValues }) 
            });
            if ((await res.json()).success) { loadPartners(); Swal.fire('Updated!', '', 'success'); }
        }
    }

    window.openPartnerDetails = function(personId) {
        const p = allPartners.find(ptr => ptr.id === personId);
        if(!p) return;
        
        Swal.fire({
            title: `<div style="text-align:left; font-weight:800; color:#002d5a;">${p.name}</div>`,
            width: '800px', showConfirmButton: false, showCloseButton: true,
            html: `
                <div style="text-align:left; margin-top:20px;">
                    <h3 style="font-size:14px; border-bottom:1px solid #e2e8f0; padding-bottom:5px;">PORTFOLIO & HIERARCHY</h3>
                    <div style="background:#f8fafc; padding:15px; border-radius:12px; margin-top:10px;">
                        ${p.companies.map(co => `
                            <div style="margin-bottom:15px;">
                                <b style="color:#64748b; font-size:11px;">${co.name}</b>
                                <div>${co.ids.map(renderBadge).join('')}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>`
        });
    }

    window.addEventListener('load', loadPartners);
</script>
</body>
</html>
