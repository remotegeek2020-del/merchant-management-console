<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hardware Console | New Activity</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --pp-blue: #004990; --pp-accent: #00a1e0; --glass: rgba(255, 255, 255, 0.9); --glass-border: rgba(255, 255, 255, 0.4); }
        body { background: radial-gradient(circle at top right, #f8fafc, #e2e8f0); padding: 30px; font-family: 'Inter', sans-serif; min-height: 100vh; color: #2b3d51; }
        .ghl-container { max-width: 1000px; margin: auto; background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 24px; box-shadow: 0 20px 50px rgba(0, 45, 90, 0.08); overflow: hidden; position: relative; }
        .activity-header-box { background: rgba(0, 73, 144, 0.03); padding: 30px; border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        .hidden-field { display: none !important; }
        .show-flex { display: flex !important; }
        #saveOverlay { display: none; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(255,255,255,0.85); z-index: 100; align-items: center; justify-content: center; flex-direction: column; }
        .custom-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 95%; max-width: 850px; background: white; z-index: 9001; border-radius: 24px; box-shadow: 0 30px 70px rgba(0,0,0,0.25); overflow: hidden; }
        .custom-modal-backdrop { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 25, 50, 0.4); backdrop-filter: blur(5px); z-index: 9000; }
        .date-input-fix { border: 2px solid var(--pp-blue) !important; font-weight: 700 !important; color: var(--pp-blue) !important; text-align: center; font-family: monospace; }
    </style>
</head>
<body>
<div class="ghl-container">
    <div id="saveOverlay">
        <div role="status" class="slds-spinner slds-spinner_medium slds-spinner_brand"><div class="slds-spinner__dot-a"></div><div class="slds-spinner__dot-b"></div></div>
        <p style="margin-top: 60px; font-weight: 700; color: var(--pp-blue);">Pushing Data to HighLevel Ledger...</p>
    </div>

    <div class="activity-header-box">
        <div>
            <a href="index.html" style="background: white; padding: 8px 16px; border-radius: 50px; font-size: 0.7rem; font-weight: 800; color: var(--pp-blue); text-decoration: none; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 6px;"><span class="material-icons" style="font-size: 14px;">arrow_back</span> Home</a>
            <div id="user-greeting" style="font-size: 11px; font-weight: 700; color: var(--pp-blue); margin-top: 5px;">Staff Member: Loading...</div>
        </div>
        <select id="activityType" style="width: 250px; border-radius: 12px; height: 45px; font-weight: 700; border: 1px solid #d1d9e6;" onchange="toggleFields(this.value)">
            <option value="">-- Choose Activity --</option>
            <option value="receiving_inventory">1. New Equipment</option>
            <option value="deployment">2. New Deployment</option>
            <option value="process_return">3. Process Return</option>
        </select>
    </div>

    <div id="mainFormArea" class="slds-p-around_xx-large hidden-field">
        <div class="slds-grid slds-wrap slds-gutters">
            <div class="slds-col slds-size_1-of-2 f-genID hidden-field slds-m-bottom_large">
                <label class="slds-form-element__label">Reference ID</label>
                <input type="text" id="generatedTag" class="slds-input" readonly value="ASSIGNED ON SAVE">
            </div>
            <div class="slds-col slds-size_1-of-2 f-account hidden-field slds-m-bottom_large">
                <label class="slds-form-element__label">Account / Location</label>
                <input type="text" id="accountDisplay" class="slds-input" readonly onclick="openModal('account')" placeholder="Search Accounts...">
                <input type="hidden" id="accountID">
            </div>
            <div class="slds-col slds-size_1-of-2 f-equipmentLookup hidden-field slds-m-bottom_large">
                <label class="slds-form-element__label">Hardware Lookup</label>
                <input type="text" id="equipmentDisplay" class="slds-input" readonly onclick="openModal('equipment')" placeholder="Search Inventory...">
                <input type="hidden" id="equipmentID">
            </div>
            <div class="slds-col slds-size_1-of-2 f-type hidden-field slds-m-bottom_large">
                <label class="slds-form-element__label">Terminal Model</label>
                <select id="type" class="slds-select">
                    <option value="z11_terminal">Z11 Terminal</option>
                    <option value="z9">Z9</option>
                    <option value="z8_terminal">Z8 Terminal</option>
                    <option value="z3__pin_pad">Z3 - Pin Pad</option>
                    <option value="valor_vl500">Valor VL500</option>
                </select>
            </div>
            <div class="slds-col slds-size_1-of-2 f-serial hidden-field slds-m-bottom_large">
                <label class="slds-form-element__label">Serial Number</label>
                <input type="text" id="serial" class="slds-input">
            </div>
            <div class="slds-col slds-size_1-of-1 f-date hidden-field slds-m-bottom_large">
                <label class="slds-form-element__label" style="font-weight: 700; color: #e11d48;">Received Date (YYYY-MM-DD)</label>
                <input type="text" id="receivedDateInput" class="slds-input date-input-fix" placeholder="2026-03-10" maxlength="10">
            </div>
        </div>
        <button class="slds-button slds-button_brand slds-size_1-of-1 slds-m-top_large" onclick="saveData()" style="height: 50px;">CONFIRM & SAVE RECORD</button>
    </div>
</div>

<div id="backdrop" class="custom-modal-backdrop" onclick="closeModal()"></div>
<div id="lookupModal" class="custom-modal">
    <div class="slds-p-around_large">
        <input type="text" id="modalSearch" class="slds-input slds-m-bottom_medium" placeholder="Search..." onkeyup="handleSearchInput(this.value)">
        <div style="max-height: 400px; overflow-y: auto;">
            <table class="slds-table slds-table_bordered">
                <tbody id="lookupResults"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const API_URL = "/api/equipments";
    let currentLookupType = '';

    // MASK SCRIPT
    document.getElementById('receivedDateInput').addEventListener('input', function (e) {
        let v = e.target.value.replace(/\D/g, '');
        if (v.length > 4 && v.length <= 6) v = v.slice(0, 4) + '-' + v.slice(4);
        if (v.length > 6) v = v.slice(0, 4) + '-' + v.slice(4, 6) + '-' + v.slice(6, 8);
        e.target.value = v;
    });

    function toggleFields(val) {
        document.getElementById('mainFormArea').classList.toggle('hidden-field', !val);
        document.querySelectorAll('.slds-col').forEach(c => c.classList.add('hidden-field'));
        if (val === 'receiving_inventory') showFields(['.f-genID', '.f-account', '.f-type', '.f-serial', '.f-date']);
        if (val === 'deployment') showFields(['.f-genID', '.f-account', '.f-equipmentLookup', '.f-serial', '.f-date']);
        if (val === 'process_return') showFields(['.f-genID', '.f-equipmentLookup', '.f-type', '.f-serial']);
    }
    function showFields(sel) { sel.forEach(s => document.querySelector(s)?.classList.remove('hidden-field')); }

    async function saveData() {
        const dateStr = document.getElementById('receivedDateInput').value;
        const type = document.getElementById('activityType').value;
        if (type === 'receiving_inventory' && !/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) {
            Swal.fire("Error", "Date must be YYYY-MM-DD", "error"); return;
        }
        document.getElementById('saveOverlay').classList.add('show-flex');
        try {
            const idRes = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: 'getNextID', prefix: 'Equip-' }), headers: {'Content-Type': 'application/json'} });
            const { nextID } = await idRes.json();
            const payload = {
                "custom_objects.equipments.equipment_id": nextID,
                "custom_objects.equipments.merchant_account": document.getElementById('accountDisplay').value,
                "custom_objects.equipments.terminal_type": document.getElementById('type').value,
                "custom_objects.equipments.serial_number": document.getElementById('serial').value,
                "custom_objects.equipments.received_date": dateStr
            };
            const res = await fetch(API_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ action: 'createEquipment', payload, merchantID: document.getElementById('accountID').value }) });
            if (res.ok) Swal.fire('Saved!', '', 'success').then(() => location.reload());
        } catch (e) { document.getElementById('saveOverlay').classList.remove('show-flex'); Swal.fire('Error', e.message, 'error'); }
    }

    async function fetchLookup(q) {
        const res = await fetch(API_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ action: 'list', schemaId: currentLookupType === 'account' ? '6713847a517aa62ab429e204' : '6717da1c4a74233fa104889f', query: q }) });
        const data = await res.json();
        const tbody = document.getElementById('lookupResults');
        tbody.innerHTML = "";
        data.records.forEach(r => {
            const row = document.createElement('tr'); row.style.cursor = "pointer";
            const p = r.properties;
            row.innerHTML = `<td><b>${p.merchant_name || p.equipment_id || r.name}</b></td>`;
            row.onclick = () => {
                if (currentLookupType === 'account') { document.getElementById('accountDisplay').value = p.merchant_name || r.name; document.getElementById('accountID').value = r.id; }
                else { document.getElementById('equipmentDisplay').value = p.equipment_id; document.getElementById('equipmentID').value = r.id; document.getElementById('serial').value = p.serial_number; }
                closeModal();
            };
            tbody.appendChild(row);
        });
    }

    function openModal(t) { currentLookupType = t; document.getElementById('lookupModal').style.display='block'; document.getElementById('backdrop').style.display='block'; fetchLookup(""); }
    function closeModal() { document.getElementById('lookupModal').style.display='none'; document.getElementById('backdrop').style.display='none'; }
    function handleSearchInput(v) { clearTimeout(window.sT); window.sT = setTimeout(() => fetchLookup(v), 500); }
    window.onload = () => { document.getElementById('user-greeting').innerText = `Staff: ${sessionStorage.getItem('pp_userid')}`; };
</script>
</body>
</html>
