<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Merchant Portfolio | Secure Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --pp-blue: #004990; --pp-accent: #00a1e0; }
        body { background: #f1f5f9; padding: 25px; font-family: 'Inter', sans-serif; }
        .dashboard-container { max-width: 1600px; margin: 0 auto; }
        
        .modern-header { background: white; border-radius: 16px; padding: 25px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .summary-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 20px; }
        .kpi-card { background: white; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 15px; }
        .kpi-val { font-size: 1.3rem; font-weight: 800; color: #002d5a; display: block; }
        .kpi-label { font-size: 0.65rem; font-weight: 700; color: #64748b; text-transform: uppercase; }

        .main-card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .slds-table thead th { background-color: #f8fafc !important; font-weight: 700 !important; color: #475569 !important; padding: 12px !important; }
        
        .badge { font-weight: 800; font-size: 9px; padding: 4px 10px; border-radius: 4px; text-transform: uppercase; display: inline-block; }
        .status-approved { background: #dcfce7; color: #166534; }
        .status-closed { background: #fee2e2; color: #991b1b; }
        .status-fraud { background: #1e293b; color: #ffffff; }

        .modal-tab-btn { padding: 14px 24px; border: none; background: none; font-weight: 700; color: #94a3b8; cursor: pointer; border-bottom: 3px solid transparent; transition: 0.3s; }
        .active-tab { color: var(--pp-blue) !important; border-bottom-color: var(--pp-blue) !important; }
        .modern-input { border-radius: 8px !important; border: 1px solid #cbd5e1 !important; padding: 8px 12px !important; width: 100%; font-size: 0.8rem; margin-bottom: 8px; }
        .edit-label { font-size: 9px; font-weight: 700; color: #64748b; margin-bottom: 3px; display: block; text-transform: uppercase; }
        .section-header { grid-column: span 3; font-size: 10px; font-weight: 800; color: var(--pp-blue); text-transform: uppercase; border-bottom: 1px solid #eee; padding: 15px 0 5px; margin-bottom: 10px; }
        @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}
        .slds-button_neutral:hover {
    background-color: #f8fafc !important;
    border-color: var(--pp-blue) !important;
    color: var(--pp-blue) !important;
}
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="modern-header">
       <div style="display: flex; align-items: center; gap: 15px;">
    <a href="index.html" class="slds-button slds-button_neutral" style="display: flex; align-items: center; gap: 8px; border-radius: 10px; padding: 5px 15px; border: 1px solid #cbd5e1; text-decoration: none; color: #475569;">
        <span class="material-icons" style="font-size: 18px;">arrow_back</span>
        <span style="font-weight: 700; font-size: 12px;">BACK TO HOME</span>
    </a>
    
    <div>
        <h1 style="font-size: 1.6rem; font-weight: 800; color: #002d5a; margin: 0;">Merchant Portfolio</h1>
    </div>
</div>
        <div style="display: flex; gap: 10px;">
            <select id="statusFilter" class="slds-select" style="width: 170px; border-radius:10px;" onchange="resetAndFetch()">
               <option value="">All Statuses</option>
    <option value="Approved">Approved</option>
    <option value="Approved - Collections">Approved - Collections</option>
    <option value="Closed">Closed</option>
    <option value="Closed - Collections">Closed - Collections</option>
    <option value="Closed - Risk">Closed - Risk</option>
    <option value="Collections">Collections</option>
    <option value="Declined">Declined</option>
    <option value="Enrollment">Enrollment</option>
    <option value="Fraud">Fraud</option>
    <option value="Pending">Pending</option>
    <option value="Withdrawn">Withdrawn</option>
            </select>
            <select id="filterBy" class="slds-select" style="width: 150px; border-radius:10px;">
                <option value="dba_name">DBA Name</option>
                <option value="merchant_id">MID</option>
                <option value="agent_id">Partner ID</option>
                <option value="company_name">Company Name</option>
                <option value="partner_name">Partner Name</option>
            </select>
            <input type="text" id="searchInput" placeholder="Search..." class="slds-input" style="width:200px; border-radius:10px;">
            <button class="slds-button slds-button_brand" style="border-radius:10px; background:var(--pp-blue);" onclick="resetAndFetch()">Search</button>
        </div>
    </div>

    <div class="summary-bar">
        <div class="kpi-card"><div><span class="kpi-label">Filtered MTD</span><span class="kpi-val" id="mtd-val">$0.00</span></div></div>
        <div class="kpi-card"><div><span class="kpi-label">Total 30D</span><span class="kpi-val" id="30d-val">$0.00</span></div></div>
        <div class="kpi-card"><div><span class="kpi-label">Total 90D</span><span class="kpi-val" id="90d-val">$0.00</span></div></div>
        <div class="kpi-card" style="background:var(--pp-blue); color:white; border:none;"><div><span class="kpi-label" style="color:rgba(255,255,255,0.7);">Share</span><span class="kpi-val" id="share-val" style="color:white;">0.00%</span></div></div>
    </div>

    <article class="main-card">
        <table class="slds-table slds-table_bordered slds-table_cell-buffer slds-no-row-hover">
            <thead>
                <tr>
                    <th>DBA Name</th>
                    <th>Merchant ID</th>
                    <th>Partner ID</th>
                    <th>Company</th>
                    <th>Partner Name</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="merchantTableBody"></tbody>
        </table>
        <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center; background: #f8fafc;">
            <select id="pageLimit" onchange="resetAndFetch()"><option value="20">20</option><option value="50">50</option></select>
            <div id="pageInfo" style="font-weight:700; font-size: 12px; color: var(--pp-blue);">Page 1</div>
            <div>
                <button class="slds-button slds-button_neutral" id="prevBtn" onclick="changePage(-1)">Prev</button>
                <button class="slds-button slds-button_neutral" id="nextBtn" onclick="changePage(1)">Next</button>
            </div>
        </div>
    </article>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    let currentPage = 0;
    let currentRecords = [];

    async function fetchMerchants() {
        const tbody = document.getElementById('merchantTableBody');
        const limit = document.getElementById('pageLimit').value;
        
        // RE-ADDED: Syncing Message
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:60px; color:#94a3b8;">
            <div style="margin-bottom:10px;"><span class="material-icons" style="animation: spin 2s linear infinite;">sync</span></div>
            Synchronizing Ledger...
        </td></tr>`;

        try {
            const res = await fetch('/api/merchants', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'list', page: currentPage, limit: limit, query: document.getElementById('searchInput').value, filterBy: document.getElementById('filterBy').value, statusFilter: document.getElementById('statusFilter').value })
            });
            const result = await res.json();
            currentRecords = result.data;
            tbody.innerHTML = "";

            currentRecords.forEach(m => {
                const row = tbody.insertRow();
                const s = (m.account_status || '').toLowerCase();
                const statusClass = s.includes('approved') ? 'status-approved' : s.includes('closed') ? 'status-closed' : s.includes('fraud') ? 'status-fraud' : '';
                row.innerHTML = `
                    <td><a onclick="openModal('${m.id}')" style="font-weight:700; color:var(--pp-blue); cursor:pointer;">${m.dba_name || '---'}</a></td>
                    <td><code>${m.merchant_id || '---'}</code></td>
                    <td>${m.agent_id || '---'}</td>
                    <td>${m.company_name || '---'}</td>
                    <td>${m.partner_name || '---'}</td>
                    <td><span class="badge ${statusClass}">${m.account_status || '---'}</span></td>
                `;
            });
            document.getElementById('pageInfo').innerHTML = `Page ${currentPage + 1} <span style="font-weight:400; color:#94a3b8; margin-left:10px;">(Total Found: ${result.count.toLocaleString()})</span>`;
        } catch (err) { console.error(err); }
    }

    async function openModal(id) {
        const m = currentRecords.find(r => r.id === id);
        if (!m) return;
        Swal.fire({ title: 'Loading...', didOpen: () => { Swal.showLoading(); } });

        try {
            const [nRes, lRes] = await Promise.all([
                fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'get_notes', merchant_uuid: m.id, type: 'manual' }) }),
                fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'get_notes', merchant_uuid: m.id, type: 'system' }) })
            ]);
            const notes = (await nRes.json()).data || [];
            const logs = (await lRes.json()).data || [];

            Swal.fire({
                title: `<div style="text-align:left; font-weight:800; color:#002d5a;">${m.dba_name}</div>`,
                width: '1100px',
                html: `
                    <div style="display:flex; border-bottom:1px solid #e2e8f0; margin-bottom:20px;">
                        <button onclick="switchTab('details')" id="tab-details" class="modal-tab-btn active-tab">DETAILS</button>
                        <button onclick="switchTab('notes')" id="tab-notes" class="modal-tab-btn">INTERNAL NOTES</button>
                        <button onclick="switchTab('audit')" id="tab-audit" class="modal-tab-btn">AUDIT HISTORY</button>
                    </div>

                    <div id="content-details" class="tab-content" style="text-align:left; max-height:650px; overflow-y:auto; padding-right:15px;">
                        <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:12px;">
                            <div class="field-section-title" style="grid-column: span 3; font-weight:800; color:#004990; border-bottom:1px solid #eee; margin-top:15px; text-transform:uppercase; font-size:10px;">Core Identity & Status</div>
                            <div><label class="edit-label">DBA Name</label><input id="edit-dba_name" class="modern-input" value="${m.dba_name || ''}"></div>
                            <div><label class="edit-label">Merchant ID (Locked)</label><input class="modern-input" value="${m.merchant_id || ''}" disabled style="background:#f8fafc;"></div>
                            <div>
                                <label class="edit-label">Account Status</label>
                                <select id="edit-account_status" class="modern-input">
                                    <option value="${m.account_status}" selected>${m.account_status}</option>
                                    <option value="Approved">Approved</option>
                                    <option value="Approved - Collections">Approved - Collections</option>
                                    <option value="Closed">Closed</option>
                                    <option value="Closed - Collections">Closed - Collections</option>
                                    <option value="Closed - Risk">Closed - Risk</option>
                                    <option value="Collections">Collections</option>
                                    <option value="Declined">Declined</option>
                                    <option value="Enrollment">Enrollment</option>
                                    <option value="Fraud">Fraud</option>
                                    <option value="Pending">Pending</option>
                                    <option value="Withdrawn">Withdrawn</option>
                                </select>
                            </div>
                            <div><label class="edit-label">Status ID</label><input id="edit-status_id" class="modern-input" value="${m.status_id || ''}"></div>
                            <div><label class="edit-label">Account Code</label><input id="edit-account_code" class="modern-input" value="${m.account_code || ''}"></div>
                            <div><label class="edit-label">Major Merchant</label><input id="edit-major_merchant" class="modern-input" value="${m.major_merchant || ''}"></div>

                            <div class="field-section-title" style="grid-column: span 3; font-weight:800; color:#004990; border-bottom:1px solid #eee; margin-top:15px; text-transform:uppercase; font-size:10px;">Contact Information</div>
                            <div><label class="edit-label">Email</label><input id="edit-email" class="modern-input" value="${m.email || ''}"></div>
                            <div><label class="edit-label">Merchant Phone</label><input id="edit-merchant_phone" class="modern-input" value="${m.merchant_phone || ''}"></div>
                            <div><label class="edit-label">Primary Contact</label><input id="edit-merchant_primary_contact" class="modern-input" value="${m.merchant_primary_contact || ''}"></div>
                            <div style="grid-column: span 2;"><label class="edit-label">Websites</label><input id="edit-merchant_websites" class="modern-input" value="${m.merchant_websites || ''}"></div>
                            <div><label class="edit-label">ACH Properties</label><input id="edit-ach_properties" class="modern-input" value="${m.ach_properties || ''}"></div>

                            <div class="field-section-title" style="grid-column: span 3; font-weight:800; color:#004990; border-bottom:1px solid #eee; margin-top:15px; text-transform:uppercase; font-size:10px;">Processing & Technical</div>
                            <div><label class="edit-label">Processor</label><input id="edit-processor" class="modern-input" value="${m.processor || ''}"></div>
                            <div><label class="edit-label">Platform</label><input id="edit-processor_platform" class="modern-input" value="${m.processor_platform || ''}"></div>
                            <div><label class="edit-label">Gateway ID</label><input id="edit-gateway_account_id" class="modern-input" value="${m.gateway_account_id || ''}"></div>
                            <div><label class="edit-label">Edge Enabled</label><input id="edit-is_edge_enabled" class="modern-input" value="${m.is_edge_enabled || ''}"></div>
                            <div><label class="edit-label">PCI Compliant</label><input id="edit-is_pci_compliant" class="modern-input" value="${m.is_pci_compliant || ''}"></div>
                            <div><label class="edit-label">Mobile</label><input id="edit-is_mobile" class="modern-input" value="${m.is_mobile || ''}"></div>
                            <div><label class="edit-label">Source</label><input id="edit-source" class="modern-input" value="${m.source || ''}"></div>
                            <div><label class="edit-label">Activated</label><input id="edit-is_activated" class="modern-input" value="${m.is_activated || ''}"></div>
                            <div><label class="edit-label">Device Hub</label><input id="edit-is_device_hub_link_enabled" class="modern-input" value="${m.is_device_hub_link_enabled || ''}"></div>

                            <div class="field-section-title" style="grid-column: span 3; font-weight:800; color:#004990; border-bottom:1px solid #eee; margin-top:15px; text-transform:uppercase; font-size:10px;">Volume & Financials</div>
                            <div><label class="edit-label">Vol MTD</label><input id="edit-volume_mtd" class="modern-input" value="${m.volume_mtd || ''}"></div>
                            <div><label class="edit-label">Vol 30D</label><input id="edit-volume_30_day" class="modern-input" value="${m.volume_30_day || ''}"></div>
                            <div><label class="edit-label">Vol 90D</label><input id="edit-volume_90_day" class="modern-input" value="${m.volume_90_day || ''}"></div>
                            <div><label class="edit-label">Total Volume</label><input id="edit-volume" class="modern-input" value="${m.volume || ''}"></div>
                            <div><label class="edit-label">Buy Rate Tier</label><input id="edit-fresno_buy_rate_tier" class="modern-input" value="${m.fresno_buy_rate_tier || ''}"></div>
                            <div><label class="edit-label">Commission Code</label><input id="edit-isv_commission_code" class="modern-input" value="${m.isv_commission_code || ''}"></div>

                            <div class="field-section-title" style="grid-column: span 3; font-weight:800; color:#004990; border-bottom:1px solid #eee; margin-top:15px; text-transform:uppercase; font-size:10px;">Dates & Compliance</div>
                            <div><label class="edit-label">Enroll Date</label><input type="date" id="edit-enrollment_date" class="modern-input" value="${m.enrollment_date || ''}"></div>
                            <div><label class="edit-label">Approve Date</label><input type="date" id="edit-approved_date" class="modern-input" value="${m.approved_date || ''}"></div>
                            <div><label class="edit-label">Batch Date</label><input type="date" id="edit-last_batch_date" class="modern-input" value="${m.last_batch_date || ''}"></div>
                            <div><label class="edit-label">Status Change</label><input type="date" id="edit-account_status_change_date" class="modern-input" value="${m.account_status_change_date || ''}"></div>
                            <div><label class="edit-label">Days Approved</label><input id="edit-days_approved" class="modern-input" value="${m.days_approved || ''}"></div>
                            <div><label class="edit-label">Shipping Status</label><input id="edit-shipping_status" class="modern-input" value="${m.shipping_status || ''}"></div>
                            <div><label class="edit-label">IRS TIN Status</label><input id="edit-irs_tin_status" class="modern-input" value="${m.irs_tin_status || ''}"></div>
                            <div><label class="edit-label">NDF</label><input id="edit-ndf" class="modern-input" value="${m.ndf || ''}"></div>
                            <div><label class="edit-label">Credit Review</label><input id="edit-credit_review" class="modern-input" value="${m.credit_review || ''}"></div>

                            <div class="field-section-title" style="grid-column: span 3; font-weight:800; color:#004990; border-bottom:1px solid #eee; margin-top:15px; text-transform:uppercase; font-size:10px;">Underwriting Notes</div>
                            <div style="grid-column: span 3;"><textarea id="edit-underwriting_decision_note" class="modern-input" style="height:80px;">${m.underwriting_decision_note || ''}</textarea></div>
                        </div>
                        <button onclick="saveMerchant('${m.id}')" style="background:#004990; color:white; width:100%; padding:15px; border-radius:10px; border:none; margin-top:25px; font-weight:700; cursor:pointer;">SAVE CHANGES</button>
                    </div>

                    <div id="content-notes" class="tab-content" style="display:none; text-align:left;">
                        <div style="background:#f1f5f9; padding:15px; border-radius:12px; margin-bottom:20px;">
                            <input id="new-note-title" placeholder="Subject" class="modern-input" style="margin-bottom:8px;">
                            <textarea id="new-note-body" placeholder="Internal commentary..." class="modern-input" style="height:60px;"></textarea>
                            <button onclick="addNote('${m.id}')" style="background:var(--pp-blue); color:white; width:100%; padding:10px; border-radius:8px; border:none; cursor:pointer;">ADD NEW NOTE</button>
                        </div>
                        <div id="notes-list">${notes.map(n => `
                            <div style="background:white; border:1px solid #e2e8f0; border-radius:12px; padding:15px; margin-bottom:10px;">
                                <input id="note-title-${n.id}" class="modern-input" value="${n.title}" style="border:none; background:transparent; font-weight:700; padding:0;">
                                <textarea id="note-body-${n.id}" class="modern-input" style="border:none; background:transparent; padding:5px 0; font-size:13px; height:auto;">${n.body}</textarea>
                                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px; border-top:1px solid #eee; padding-top:10px;">
                                    <small style="color:#64748b;">By: ${n.created_by}</small>
                                    <button onclick="updateNote('${n.id}', '${m.id}')" style="color:var(--pp-accent); font-weight:700; background:none; border:none; cursor:pointer;">UPDATE NOTE</button>
                                </div>
                            </div>
                        `).join('')}</div>
                    </div>

                    <div id="content-audit" class="tab-content" style="display:none; text-align:left;">
                        <div style="background:white; border-radius:12px; border:1px solid #e2e8f0; overflow:hidden;">
                            ${logs.map(l => `<div style="padding:12px; border-bottom:1px solid #f1f5f9; font-size:12px;"><span style="color:#94a3b8; font-weight:600;">[${new Date(l.created_at).toLocaleString()}]</span> ${l.body}</div>`).join('') || '<p style="padding:20px;">No history recorded.</p>'}
                        </div>
                    </div>
                `,
                showConfirmButton: false, showCloseButton: true
            });
        } catch (err) { Swal.fire('Error', 'Load failed', 'error'); }
    }

    window.switchTab = (tab) => {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.modal-tab-btn').forEach(t => t.classList.remove('active-tab'));
        document.getElementById('content-' + tab).style.display = 'block';
        document.getElementById('tab-' + tab).classList.add('active-tab');
    };

    window.saveMerchant = async (uuid) => {
        const fields = ['dba_name', 'account_status', 'status_id', 'account_code', 'major_merchant', 'email', 'merchant_phone', 'merchant_primary_contact', 'merchant_websites', 'ach_properties', 'processor', 'processor_platform', 'gateway_account_id', 'is_edge_enabled', 'is_pci_compliant', 'is_mobile', 'source', 'is_activated', 'is_device_hub_link_enabled', 'volume_mtd', 'volume_30_day', 'volume_90_day', 'volume', 'fresno_buy_rate_tier', 'isv_commission_code', 'enrollment_date', 'approved_date', 'last_batch_date', 'account_status_change_date', 'days_approved', 'shipping_status', 'irs_tin_status', 'ndf', 'credit_review', 'underwriting_decision_note'];
        const payload = {}; 
        fields.forEach(f => { const el = document.getElementById('edit-' + f); if(el) payload[f] = el.value; });
        try {
            const res = await fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'update', id: uuid, payload }) });
            const result = await res.json();
            if(result.success) { Swal.fire({icon: 'success', title: 'Saved', timer: 1000, showConfirmButton: false}); fetchMerchants(); }
        } catch (err) { console.error(err); }
    };

    // FIXED: Cleaned logic and Toast feedback
   window.addNote = async function(uuid) {
    try {
        const title = document.getElementById('new-note-title').value;
        const body = document.getElementById('new-note-body').value;
        
        // Try to get ID from session, fallback to a 'placeholder' UUID if session is empty
        // IMPORTANT: Replace the '00000000-...' string with your actual Supabase User ID if known
        const currentUserId = sessionStorage.getItem('pp_userid') || '00000000-0000-0000-0000-000000000000'; 

        if (!title || !body) return Swal.fire('Error', 'Subject and Body are required.', 'warning');

       const res = await fetch('/api/merchants', { 
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify({ 
                action: 'add_note', 
                merchant_uuid: uuid, 
                title: title, 
                body: body, 
                // Send BOTH to be safe, the backend will pick the right one
                userId: currentUserId,
                created_by: currentUserId 
            }) 
        });
        
        const result = await res.json();
        
        if (result.success) {
            const Toast = Swal.mixin({
                toast: true,
                position: 'top-end',
                showConfirmButton: false,
                timer: 1500,
                timerProgressBar: true
            });
            await Toast.fire({ icon: 'success', title: 'New note created' });
            openModal(uuid); 
        } else {
            // This will catch the Postgres "not-null" error if it still fails
            throw new Error(result.message || 'Database rejected the entry');
        }
    } catch (err) {
        Swal.fire('Error', 'Failed to add note: ' + err.message, 'error');
    }
};
    // FIXED: Correct ID lookup and Toast feedback
    window.updateNote = async function(noteId, merchantId) {
        const title = document.getElementById(`note-title-${noteId}`).value;
        const body = document.getElementById(`note-body-${noteId}`).value;
        try {
            const res = await fetch('/api/merchants', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ action: 'update_note', note_id: noteId, title: title, body: body }) 
            });
            const result = await res.json();
            if(result.success) {
                const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 2000, timerProgressBar: true });
                Toast.fire({ icon: 'success', title: 'Note updated successfully' });
            } else { Swal.fire('Error', 'Could not save note: ' + result.message, 'error'); }
        } catch (err) {
            Swal.fire('Error', 'Network error while saving note', 'error');
        }
    };

    function changePage(dir) { currentPage += dir; fetchMerchants(); }
    function resetAndFetch() { currentPage = 0; fetchMerchants(); }
 
    window.onload = () => {
        Swal.fire({ title: 'Initializing Secure Console', html: 'Establishing encrypted link...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
        fetchMerchants().then(() => { Swal.close(); });
    };
</script>
</body>
</html>
