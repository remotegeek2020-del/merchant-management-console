<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Merchant Portfolio | Secure Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root { --pp-blue: #004990; --glass: rgba(255, 255, 255, 0.9); }
        body { background: radial-gradient(circle at top right, #f8fafc, #e2e8f0); padding: 25px; font-family: 'Inter', sans-serif; }
        .slds-select, .slds-input { border-radius: 12px !important; height: 40px !important; }
        .custom-modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0, 25, 50, 0.4); backdrop-filter: blur(5px); align-items: center; justify-content: center; }
        .custom-modal-content { background: white; width: 95%; max-width: 700px; border-radius: 24px; overflow-y: auto; max-height: 90vh; }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .detail-item { border-bottom: 1px solid #f1f5f9; padding: 8px 0; display: flex; justify-content: space-between; font-size: 12px; }
        .detail-label { color: #64748b; font-weight: 600; }
    </style>
</head>
<body>
    <div id="merchantModal" class="custom-modal" onclick="if(event.target == this) closeModal()">
        <div class="custom-modal-content">
            <div style="padding: 25px; background: var(--pp-blue); color: white; display: flex; justify-content: space-between;">
                <h2 style="font-weight: 800; font-size: 1.2rem;">Full Merchant Profile</h2>
                <span class="material-icons" style="cursor:pointer" onclick="closeModal()">close</span>
            </div>
            <div class="detail-grid" id="modalBody"></div>
            <div style="padding: 20px; background: #f8fafc; display: flex; justify-content: space-between;">
                <button class="slds-button slds-button_brand" id="editBtn">Edit Profile</button>
                <button class="slds-button slds-button_neutral" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <script>
        // List of all requested fields for display
        const DISPLAY_FIELDS = [
            'merchant_id', 'status_id', 'dba_name', 'agent_name', 'agent_id', 'account_status', 
            'is_edge_enabled', 'is_pci_compliant', 'isv_commission_code', 'is_mobile', 
            'is_device_hub_link_enabled', 'enrollment_date', 'approved_date', 'source', 
            'processor', 'processor_platform', 'is_activated', 'days_approved', 'shipping_status', 
            'gateway_account_id', 'last_batch_date', 'account_status_change_date', 'account_code', 
            'ndf', 'irs_tin_status', 'volume', 'volume_30_day', 'volume_90_day', 'volume_mtd', 
            'credit_review', 'fresno_buy_rate_tier', 'underwriting_decision_note', 'email', 
            'ach_properties', 'major_merchant', 'merchant_websites', 'merchant_primary_contact', 'merchant_phone'
        ];

        function openModal(id) {
            const m = currentRecords.find(r => r.id === id);
            const container = document.getElementById('modalBody');
            container.innerHTML = DISPLAY_FIELDS.map(field => `
                <div class="detail-item">
                    <span class="detail-label">${field.replace(/_/g, ' ').toUpperCase()}</span>
                    <span>${m[field] || '---'}</span>
                </div>
            `).join('');

            document.getElementById('editBtn').onclick = () => {
                const p = new URLSearchParams({ id: m.id, dba: m.dba_name, mid: m.merchant_id, aid: m.agent_id, status: m.account_status });
                // Add contact info to params for the update page
                p.append('contact', m.merchant_primary_contact || '');
                p.append('email', m.email || '');
                p.append('phone', m.merchant_phone || '');
                window.location.href = `merchants-update.html?${p.toString()}`;
            };
            document.getElementById('merchantModal').style.display = 'flex';
        }
        // ... rest of scripts same as previous ...
    </script>
</body>
</html>
