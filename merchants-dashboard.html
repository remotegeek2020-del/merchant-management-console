<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Merchant Portfolio | Secure Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --pp-blue: #004990; --pp-accent: #00a1e0; --glass: rgba(255, 255, 255, 0.9); }
        body { background: radial-gradient(circle at top right, #f8fafc, #e2e8f0); padding: 25px; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .modern-header { background: var(--glass); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .summary-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        .kpi-card { background: var(--glass); padding: 20px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.4); box-shadow: 0 8px 20px rgba(0,0,0,0.03); display: flex; align-items: center; gap: 15px; transition: transform 0.2s; }
        .kpi-card:hover { transform: translateY(-3px); }
        .kpi-icon { background: rgba(0,73,144,0.1); color: var(--pp-blue); padding: 12px; border-radius: 12px; }
        .kpi-val { font-size: 1.3rem; font-weight: 800; color: #002d5a; display: block; }
        .kpi-label { font-size: 0.65rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
        .custom-modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0, 25, 50, 0.4); backdrop-filter: blur(5px); align-items: center; justify-content: center; }
        .custom-modal-content { background: white; width: 95%; max-width: 900px; border-radius: 24px; overflow: hidden; max-height: 90vh; display: flex; flex-direction: column; box-shadow: 0 25px 50px rgba(0,0,0,0.2); }
        .modal-scroll { overflow-y: auto; padding: 30px; flex-grow: 1; }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 30px; }
        .detail-item { border-bottom: 1px solid #f1f5f9; padding: 10px 0; display: flex; justify-content: space-between; font-size: 11px; align-items: center; }
        .detail-label { color: #64748b; font-weight: 700; text-transform: uppercase; font-size: 9px; }
        .badge { font-weight: 800; font-size: 9px; padding: 4px 12px; border-radius: 50px; text-transform: uppercase; }
        .status-approved { background: #dcfce7; color: #166534; }
        .status-closed { background: #fee2e2; color: #991b1b; }
        .status-pending { background: #fef9c3; color: #854d0e; }
        .note-card { background: white; border: 1px solid #e2e8f0; padding: 12px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid var(--pp-blue); }
        
        /* Tabs Styling */
        .modal-tabs { display: flex; background: #f8fafc; border-bottom: 1px solid #e2e8f0; padding: 0 30px; }
        .modal-tab-btn { padding: 15px 25px; font-weight: 700; font-size: 11px; color: #64748b; border: none; background: none; cursor: pointer; border-bottom: 3px solid transparent; }
        .modal-tab-btn.active { color: var(--pp-blue); border-bottom-color: var(--pp-blue); }
    </style>
</head>
<body>

    <div class="modern-header">
        <div>
            <div style="display:flex; align-items:center; gap:12px; margin-bottom:8px;">
                <a href="index.html" style="background:white; border:1px solid #e2e8f0; padding:6px 14px; border-radius:50px; color:var(--pp-blue); font-weight:700; font-size:0.7rem; text-decoration:none;">HOME</a>
                <div id="user-greeting" style="background:rgba(0,73,144,0.08); padding:6px 16px; border-radius:50px; font-size:0.7rem; font-weight:700; color:var(--pp-blue);">Staff Member</div>
            </div>
            <h1 style="font-size: 1.6rem; font-weight: 800; color: #002d5a;">Merchant Portfolio</h1>
        </div>

        <div class="slds-grid slds-grid_vertical-align-center">
            <select id="statusFilter" class="slds-select" style="width: 170px; margin-right: 8px; border-radius:12px; height:40px;" onchange="resetAndFetch()">
                <option value="">All Statuses</option>
                <option value="Approved">Approved</option>
                <option value="Approved - Collections">Approved - Collections</option>
                <option value="Closed">Closed</option>
                <option value="Closed - Collections">Closed - Collections</option>
                <option value="Closed - Risk">Closed - Risk</option>
                <option value="Collections">Collections</option>
                <option value="Declined">Declined</option>
                <option value="Enrollment">Enrollment</option>
                <option value="Fraud">Fraud</option>
                <option value="Pending">Pending</option>
                <option value="Withdrawn">Withdrawn</option>
            </select>
            <select id="filterBy" class="slds-select" style="width: 160px; margin-right: 8px; border-radius:12px; height:40px;">
                <option value="dba_name">DBA Name</option>
                <option value="merchant_id">Merchant ID (MID)</option>
                <option value="agent_id">Partner ID</option>
                <option value="company_name">Company Name</option>
                <option value="partner_name">Partner Name</option>
            </select>
            <input type="text" id="searchInput" placeholder="Search..." class="slds-input" style="width:200px; border-radius:12px; height:40px; margin-right:8px;" onkeypress="if(event.key==='Enter') resetAndFetch()">
            <button class="slds-button slds-button_brand" style="border-radius:12px; height: 40px; padding: 0 25px;" onclick="resetAndFetch()">Search</button>
        </div>
    </div>

    <div class="summary-bar">
        <div class="kpi-card">
            <div class="kpi-icon"><span class="material-icons">payments</span></div>
            <div><span class="kpi-label">Filtered MTD</span><span class="kpi-val" id="mtd-val">$0.00</span></div>
        </div>
        <div class="kpi-card">
            <div class="kpi-icon" style="color:#00a1e0;"><span class="material-icons">calendar_today</span></div>
            <div><span class="kpi-label">Total 30D</span><span class="kpi-val" id="30d-val">$0.00</span></div>
        </div>
        <div class="kpi-card">
            <div class="kpi-icon" style="color:#2e7d32;"><span class="material-icons">history</span></div>
            <div><span class="kpi-label">Total 90D</span><span class="kpi-val" id="90d-val">$0.00</span></div>
        </div>
        <div class="kpi-card" style="background:#004990; color:white;">
            <div class="kpi-icon" style="color:white;"><span class="material-icons">pie_chart</span></div>
            <div><span class="kpi-label" style="color:rgba(255,255,255,0.7);">Portfolio Share</span><span class="kpi-val" id="share-val" style="color:white;">0.00%</span></div>
        </div>
    </div>

    <article class="slds-card" style="border-radius: 20px; overflow: hidden; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05);">
        <table class="slds-table slds-table_bordered slds-table_cell-buffer slds-no-row-hover">
            <thead>
                <tr class="slds-line-height_reset">
                    <th scope="col" style="background:#f8fafc; font-weight:700;">DBA Name</th>
                    <th scope="col" style="background:#f8fafc; font-weight:700;">Merchant ID</th>
                    <th scope="col" style="background:#f8fafc; font-weight:700;">Partner ID</th>
                    <th scope="col" style="background:#f8fafc; font-weight:700;">Company</th>
                    <th scope="col" style="background:#f8fafc; font-weight:700;">Partner Name</th>
                    <th scope="col" style="background:#f8fafc; font-weight:700;">Status</th>
                </tr>
            </thead>
            <tbody id="merchantTableBody"></tbody>
        </table>
        <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center; background: #f8fafc; border-top: 1px solid #e2e8f0;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 11px; font-weight: 700; color: #64748b;">Display:</span>
                <select id="pageLimit" class="slds-select" style="width: 80px; height: 32px !important; border-radius:8px;" onchange="resetAndFetch()">
                    <option value="20">20</option><option value="50">50</option><option value="100">100</option>
                </select>
            </div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="slds-button slds-button_neutral" id="prevBtn" onclick="changePage(-1)" disabled>Previous</button>
                <span id="pageInfo" style="font-weight:700; font-size: 12px;">Page 1</span>
                <button class="slds-button slds-button_neutral" id="nextBtn" onclick="changePage(1)">Next</button>
            </div>
        </div>
    </article>

    <div id="merchantModal" class="custom-modal" onclick="if(event.target == this) closeModal()">
        <div class="custom-modal-content">
            <div style="padding: 25px; background: var(--pp-blue); color: white; display: flex; justify-content: space-between; align-items: center;">
                <h2 style="font-weight: 800; font-size: 1.1rem; letter-spacing: 0.5px;">Merchant Ledger</h2>
                <span class="material-icons" style="cursor:pointer" onclick="closeModal()">close</span>
            </div>

            <div class="modal-tabs">
                <button onclick="switchTab('details')" id="tab-btn-details" class="modal-tab-btn active">Account Details</button>
                <button onclick="switchTab('notes')" id="tab-btn-notes" class="modal-tab-btn">Internal Notes</button>
                <button onclick="switchTab('history')" id="tab-btn-history" class="modal-tab-btn">Audit History</button>
            </div>
            
            <div class="modal-scroll">
                <div id="view-details">
                    <div id="modalVolumeSummary" style="background:#f1f5f9; padding:20px; border-radius:15px; margin-bottom:25px; display:grid; grid-template-columns:repeat(3, 1fr); gap:15px;"></div>
                    <div id="modalDetailsGrid" class="detail-grid"></div>
                </div>

                <div id="view-notes" style="display: none;">
                    <div style="background: #f8fafc; padding: 20px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #e2e8f0;">
                        <h3 style="font-weight: 800; color: var(--pp-blue); margin-bottom: 12px; font-size: 0.9rem;">New Internal Entry</h3>
                        <input type="text" id="noteTitle" class="slds-input" placeholder="Subject" style="margin-bottom: 8px; border-radius: 8px;">
                        <textarea id="noteBody" class="slds-textarea" placeholder="Write your note..." style="margin-bottom: 8px; border-radius: 8px; min-height: 80px;"></textarea>
                        <button class="slds-button slds-button_brand" id="addNoteBtn" onclick="submitNote()" style="border-radius: 8px; width: 100%;">Add Note</button>
                    </div>
                    <div id="notesContainer"></div>
                </div>

                <div id="view-history" style="display: none;">
                    <h3 style="font-weight: 800; color: #64748b; margin-bottom: 15px; font-size: 0.9rem; text-transform: uppercase;">Automated Profile Updates</h3>
                    <div id="historyContainer"></div>
                </div>
            </div>

            <div style="padding: 20px 30px; background: #f8fafc; border-top:1px solid #e2e8f0; display: flex; justify-content: space-between; gap: 10px;">
                <button class="slds-button slds-button_neutral" onclick="closeModal()" style="border-radius:10px;">Cancel</button>
                <div style="display: flex; gap: 10px;">
                    <button class="slds-button slds-button_brand" id="saveChangeBtn" style="border-radius:10px; padding: 0 30px;">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        let currentPage = 0;
        let currentRecords = [];
        let activeMerchantUuid = null;
        let editingNoteId = null;

        const ALL_FIELDS = ['merchant_id', 'status_id', 'dba_name', 'agent_name', 'agent_id', 'account_status', 'is_edge_enabled', 'is_pci_compliant', 'isv_commission_code', 'is_mobile', 'is_device_hub_link_enabled', 'enrollment_date', 'approved_date', 'source', 'processor', 'processor_platform', 'is_activated', 'days_approved', 'shipping_status', 'gateway_account_id', 'last_batch_date', 'account_status_change_date', 'account_code', 'ndf', 'irs_tin_status', 'volume', 'volume_30_day', 'volume_90_day', 'volume_mtd', 'credit_review', 'fresno_buy_rate_tier', 'underwriting_decision_note', 'email', 'ach_properties', 'major_merchant', 'merchant_websites', 'merchant_primary_contact', 'merchant_phone'];

        function switchTab(tab) {
            document.getElementById('view-details').style.display = tab === 'details' ? 'block' : 'none';
            document.getElementById('view-notes').style.display = tab === 'notes' ? 'block' : 'none';
            document.getElementById('view-history').style.display = tab === 'history' ? 'block' : 'none';
            
            document.getElementById('tab-btn-details').classList.toggle('active', tab === 'details');
            document.getElementById('tab-btn-notes').classList.toggle('active', tab === 'notes');
            document.getElementById('tab-btn-history').classList.toggle('active', tab === 'history');
            
            if(tab === 'notes') fetchNotes(activeMerchantUuid, 'manual');
            if(tab === 'history') fetchNotes(activeMerchantUuid, 'system');
        }

        async function fetchMerchants() {
            const tbody = document.getElementById('merchantTableBody');
            const limit = document.getElementById('pageLimit').value;
            tbody.innerHTML = "<tr><td colspan='6' style='text-align:center; padding:60px;'>Syncing Secure Ledger...</td></tr>";
            try {
                const res = await fetch('/api/merchants', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'list', page: currentPage, limit: limit, query: document.getElementById('searchInput').value, filterBy: document.getElementById('filterBy').value, statusFilter: document.getElementById('statusFilter').value })
                });
                const result = await res.json();
                if (!result.success) throw new Error(result.message);
                currentRecords = result.data;
                tbody.innerHTML = "";
                const cur = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' });
                document.getElementById('mtd-val').innerText = cur.format(result.metrics.totalMTD || 0);
                document.getElementById('30d-val').innerText = cur.format(result.metrics.total30D || 0);
                document.getElementById('90d-val').innerText = cur.format(result.metrics.total90D || 0);
                document.getElementById('share-val').innerText = (result.metrics.portfolioShare || 0) + '%';
              // merchants-dashboard.html - Inside fetchMerchants()
currentRecords.forEach(m => {
    const row = tbody.insertRow();
    const statusClass = m.account_status?.toLowerCase().includes('approved') ? 'status-approved' : m.account_status?.toLowerCase().includes('closed') ? 'status-closed' : 'status-pending';
    
    // Safely navigate the nested object structure from the API
    const companyName = m.agent_identifiers?.agents?.companies?.company_name || '---';
    const partnerName = m.agent_identifiers?.agents?.companies?.company_person_mapping?.[0]?.persons?.full_name || '---';

    row.innerHTML = `
        <td><a onclick="openModal('${m.id}')" style="font-weight:700; color:var(--pp-blue); cursor:pointer;">${m.dba_name || '---'}</a></td>
        <td><code>${m.merchant_id || '---'}</code></td>
        <td>${m.agent_id || '---'}</td>
        <td>${companyName}</td>
        <td>${partnerName}</td>
        <td><span class="badge ${statusClass}">${m.account_status || '---'}</span></td>`;
});

        function openModal(id) {
            const m = currentRecords.find(r => r.id === id);
            if (!m) return;
            activeMerchantUuid = m.id;
            editingNoteId = null;
            switchTab('details');
            
            const statusOptions = ["Approved", "Approved - Collections", "Closed", "Closed - Collections", "Closed - Risk", "Collections", "Declined", "Enrollment", "Fraud", "Pending", "Withdrawn"];
            document.getElementById('modalDetailsGrid').innerHTML = ALL_FIELDS.map(f => {
                const label = f.replace(/_/g, ' ').toUpperCase();
                let inputHtml = '';
                if (f === 'account_status') {
                    inputHtml = `<select id="edit-${f}" class="slds-select" style="width: 60%; height: 32px; font-size: 11px;">${statusOptions.map(opt => `<option value="${opt}" ${m[f] === opt ? 'selected' : ''}>${opt}</option>`).join('')}</select>`;
                } else if (f === 'enrollment_date' || f === 'approved_date' || f === 'last_batch_date') {
                    const dateVal = m[f] ? new Date(m[f]).toISOString().split('T')[0] : '';
                    inputHtml = `<input type="date" id="edit-${f}" class="slds-input" style="width: 60%; height: 32px; font-size: 11px;" value="${dateVal}">`;
                } else if (f === 'merchant_id' || f === 'agent_id') {
                    inputHtml = `<input type="text" id="edit-${f}" class="slds-input" style="width: 60%; height: 28px; font-size: 11px; background: #f1f5f9; cursor: not-allowed;" value="${m[f] || ''}" readonly>`;
                } else {
                    inputHtml = `<input type="text" id="edit-${f}" class="slds-input" style="width: 60%; height: 28px; font-size: 11px;" value="${m[f] || ''}">`;
                }
                return `<div class="detail-item"><span class="detail-label">${label}</span>${inputHtml}</div>`;
            }).join('');

            document.getElementById('noteTitle').value = '';
            document.getElementById('noteBody').value = '';
            document.getElementById('addNoteBtn').innerText = "Add Note";
            document.getElementById('saveChangeBtn').onclick = () => saveMerchantChanges(m.id);
            document.getElementById('merchantModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('merchantModal').style.display = 'none'; }

        async function fetchNotes(uuid, type) {
            const container = (type === 'manual') ? document.getElementById('notesContainer') : document.getElementById('historyContainer');
            container.innerHTML = "<p style='font-size:11px; color:#64748b; text-align:center;'>Fetching data...</p>";
            try {
                const res = await fetch('/api/merchants', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ action: 'get_notes', merchant_uuid: uuid, type: type }) 
                });
                const result = await res.json();
                if (result.success) {
                    container.innerHTML = result.data.map(n => {
                        const isSystem = n.title === 'System Update';
                        return `
                        <div class="note-card" style="${isSystem ? 'border-left-color: #cbd5e1; background: #fcfcfc;' : ''}">
                            <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                                <div style="font-weight: 700; font-size: 11px; color: ${isSystem ? '#64748b' : '#002d5a'}; margin-bottom: 4px;">${n.title}</div>
                                ${!isSystem ? `<button onclick="prepareEditNote('${n.id}', \`${n.title.replace(/'/g, "\\'")}\`, \`${n.body.replace(/'/g, "\\'")}\`)" style="background:none; border:none; color:var(--pp-blue); cursor:pointer; font-size:10px; font-weight:700;">EDIT</button>` : ''}
                            </div>
                            <div style="font-size: 11px; color: #475569; line-height: 1.4; white-space: pre-wrap;">${n.body}</div>
                            <div style="font-size: 9px; color: #94a3b8; margin-top: 8px; font-weight: 600;">BY ${n.created_by.toUpperCase()} • ${new Date(n.created_at).toLocaleString()}</div>
                        </div>`;
                    }).join('') || `<p style="font-size:11px; color:#94a3b8; text-align:center;">No ${type} history found.</p>`;
                }
            } catch (err) { container.innerHTML = "<p style='color:red; font-size:11px; text-align:center;'>Sync error.</p>"; }
        }

        function prepareEditNote(id, title, body) {
            editingNoteId = id;
            document.getElementById('noteTitle').value = title;
            document.getElementById('noteBody').value = body;
            document.getElementById('addNoteBtn').innerText = "Update Note";
            document.getElementById('noteTitle').focus();
        }

        async function submitNote() {
            const title = document.getElementById('noteTitle').value;
            const body = document.getElementById('noteBody').value;
            const userName = document.getElementById('user-greeting').innerText.replace('Staff: ', '').trim() || 'Unknown Staff';

            if (!title || !body) return Swal.fire('Error', 'Subject and Body are required', 'warning');
            const action = editingNoteId ? 'update_note' : 'add_note';
            const payload = editingNoteId ? { action, note_id: editingNoteId, title, body, user: userName } : { action, merchant_uuid: activeMerchantUuid, title, body, user: userName };
            
            try {
                const res = await fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if ((await res.json()).success) {
                    editingNoteId = null;
                    document.getElementById('noteTitle').value = '';
                    document.getElementById('noteBody').value = '';
                    document.getElementById('addNoteBtn').innerText = "Add Note";
                    fetchNotes(activeMerchantUuid, 'manual');
                }
            } catch (err) { Swal.fire('Error', 'Action failed', 'error'); }
        }

        async function saveMerchantChanges(merchantId) {
            const payload = {};
            const userName = document.getElementById('user-greeting').innerText.replace('Staff: ', '').trim();
            ALL_FIELDS.forEach(f => { const input = document.getElementById(`edit-${f}`); if (input) payload[f] = input.value; });
            Swal.fire({ title: 'Synchronizing...', text: 'Updating master ledger', didOpen: () => { Swal.showLoading(); } });
            try {
                const res = await fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'update', id: merchantId, payload: payload, user: userName }) });
                const result = await res.json();
                if (result.success) { Swal.fire('Saved!', 'Merchant record updated.', 'success'); closeModal(); fetchMerchants(); } else { throw new Error(result.message); }
            } catch (err) { Swal.fire('Update Failed', err.message, 'error'); }
        }

        function changePage(dir) { currentPage += dir; fetchMerchants(); }
        function resetAndFetch() { currentPage = 0; fetchMerchants(); }
        window.onload = () => { const user = sessionStorage.getItem('pp_userid'); if(user) document.getElementById('user-greeting').innerText = `Staff: ${user}`; fetchMerchants(); };
    </script>
</body>
</html>
