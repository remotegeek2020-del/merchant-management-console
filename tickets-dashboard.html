<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner Tickets | PayProTec</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="icon" type="image/png" href="/images/favicon-32x32.png" sizes="32x32" />
    <link rel="stylesheet" href="css/pp-system.css">
    <script src="js/tz.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        (function() {
            if (!localStorage.getItem('pp_userid') || localStorage.getItem('pp_verified') !== 'true') {
                window.location.href = 'index.html?reason=unauthorized';
            }
        })();
    </script>
    <style>
        body { background: var(--surface-0); font-family: 'DM Sans', sans-serif; padding: var(--page-pad); }
        .dashboard-container { max-width: 1400px; margin: 0 auto; }
        .modern-header { background: white; border-radius: var(--radius-lg); padding: 16px 24px; margin-bottom: var(--gap); display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow-sm); border: 1px solid var(--border); gap: 12px; flex-wrap: wrap; }
        .filter-bar { background: white; border-radius: var(--radius-lg); padding: 14px 20px; margin-bottom: var(--gap); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; box-shadow: var(--shadow-sm); border: 1px solid var(--border); }
        .filter-chip { padding: 6px 14px; border-radius: 99px; font-size: 11px; font-weight: 700; border: 1px solid var(--border); background: white; color: var(--text-secondary); cursor: pointer; transition: all 0.15s; }
        .filter-chip.active { background: var(--pp-navy); color: white; border-color: var(--pp-navy); }
        .filter-chip.mine-chip.active { background: #0d9488; border-color: #0d9488; }
        .filter-sep { width: 1px; height: 24px; background: var(--border); }
        .tickets-panel { background: white; border-radius: var(--radius-lg); border: 1px solid var(--border); box-shadow: var(--shadow-sm); overflow: hidden; }
        .panel-header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .panel-title { font-size: 13px; font-weight: 700; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }
        .ticket-row { display: grid; grid-template-columns: auto 1fr auto auto auto auto auto; gap: 14px; align-items: center; padding: 14px 20px; border-bottom: 1px solid var(--border); font-size: 13px; cursor: pointer; transition: background 0.12s; }
        .ticket-row:last-child { border-bottom: none; }
        .ticket-row:hover { background: var(--surface-2); }
        .ticket-icon { width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; position: relative; }
        .icon-deployment { background: #e0f2fe; color: #0369a1; }
        .icon-rma { background: #fef3c7; color: #92400e; }
        .icon-general { background: #f3e8ff; color: #7c3aed; }
        .unread-dot { position: absolute; top: -4px; right: -4px; background: #ef4444; color: white; font-size: 9px; font-weight: 800; min-width: 16px; height: 16px; border-radius: 99px; display: flex; align-items: center; justify-content: center; padding: 0 3px; border: 2px solid white; }
        .badge { font-weight: 700; font-size: 10px; padding: 3px 10px; border-radius: 99px; text-transform: uppercase; letter-spacing: 0.3px; white-space: nowrap; }
        .badge-open { background: var(--blue-bg); color: var(--blue-text); }
        .badge-in_progress { background: var(--amber-bg); color: var(--amber-text); }
        .badge-resolved { background: var(--green-bg); color: var(--green-text); }
        .badge-closed { background: var(--gray-bg); color: var(--gray-text); }
        .badge-urgent { background: var(--red-bg); color: var(--red-text); }
        .badge-high { background: var(--amber-bg); color: var(--amber-text); }
        .badge-normal { background: var(--gray-bg); color: var(--gray-text); }
        .badge-low { background: #f0fdf4; color: #166534; }
        .empty-state { padding: 48px 20px; text-align: center; color: var(--text-muted); font-size: 13px; }
        .skeleton { background: linear-gradient(90deg,#f0f4f8 25%,#e2e8f0 50%,#f0f4f8 75%); background-size:400% 100%; animation:shimmer 1.2s infinite; border-radius:6px; }
        @keyframes shimmer { 0%{background-position:100% 0} 100%{background-position:-100% 0} }

        /* Pagination */
        .pagination-bar { padding:12px 20px; border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
        .page-btn { min-width:32px; height:32px; border-radius:8px; border:1px solid var(--border); background:white; color:var(--text-primary); font-size:12px; font-weight:700; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; transition:all 0.15s; padding:0 6px; }
        .page-btn:hover:not(:disabled) { border-color:var(--pp-navy); color:var(--pp-navy); }
        .page-btn.active { background:var(--pp-navy); color:white; border-color:var(--pp-navy); }
        .page-btn:disabled { opacity:0.4; cursor:default; }
        .page-size-btn { padding:4px 11px; border-radius:6px; border:1px solid var(--border); background:white; color:var(--text-secondary); font-size:11px; font-weight:700; cursor:pointer; transition:all 0.15s; }
        .page-size-btn.active { background:var(--pp-navy); color:white; border-color:var(--pp-navy); }

        /* Modal */
        .ticket-modal { display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.55); z-index:9999; align-items:center; justify-content:center; }
        .ticket-modal.is-open { display:flex; }
        .ticket-modal-box { background:white; border-radius:16px; width:95%; max-width:760px; box-shadow:0 30px 60px rgba(0,0,0,0.2); overflow:hidden; max-height:95vh; display:flex; flex-direction:column; }
        .tm-header { padding:16px 20px; background:var(--pp-navy); display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
        .tm-body { overflow-y:auto; flex:1; }
        .tm-section { padding:16px 20px; border-bottom:1px solid var(--border); }
        .tm-section:last-child { border-bottom:none; }
        .tm-label { font-size:9px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.6px; margin-bottom:10px; }
        .tm-row { display:flex; justify-content:space-between; margin-bottom:6px; font-size:13px; }
        .tm-key { color:var(--text-muted); }
        .tm-val { font-weight:600; color:var(--text-primary); text-align:right; max-width:65%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .form-group { margin-bottom:12px; }
        .form-label { display:block; font-size:10px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:5px; }
        .form-input { width:100%; padding:9px 12px; border:1.5px solid var(--border); border-radius:8px; font-size:13px; font-family:'DM Sans',sans-serif; color:var(--text-primary); background:#f8fafc; outline:none; transition:border-color 0.2s; box-sizing:border-box; }
        .form-input:focus { border-color:var(--pp-accent); background:white; }
        textarea.form-input { resize:vertical; min-height:72px; }

        /* Comment thread */
        .comment-thread { display:flex; flex-direction:column; gap:10px; padding:16px 20px; }
        .comment-entry { display:flex; gap:10px; }
        .comment-entry.staff-comment { flex-direction:row-reverse; }
        .comment-entry.partner-comment { flex-direction:row; }
        .comment-avatar { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0; margin-top:2px; }
        .comment-bubble { max-width:75%; padding:9px 13px; border-radius:12px; font-size:12px; line-height:1.55; }
        .staff-comment .comment-avatar { background:#001e3c; color:white; }
        .staff-comment .comment-bubble { background:#001e3c; color:white; border-radius:12px 2px 12px 12px; }
        .staff-comment.internal .comment-bubble { background:#78350f; color:#fef3c7; }
        .partner-comment .comment-avatar { background:#0d9488; color:white; }
        .partner-comment .comment-bubble { background:#f0fdfa; color:#134e4a; border-radius:2px 12px 12px 12px; border:1px solid #99f6e4; }
        .comment-meta { font-size:10px; opacity:0.65; margin-top:4px; }
        .staff-comment .comment-meta { text-align:right; }
        .system-event { text-align:center; font-size:11px; color:var(--text-muted); padding:4px 0; display:flex; align-items:center; gap:8px; }
        .system-event::before, .system-event::after { content:''; flex:1; height:1px; background:var(--border); }
        .internal-badge { font-size:9px; font-weight:700; background:#fef3c7; color:#92400e; padding:1px 6px; border-radius:99px; text-transform:uppercase; vertical-align:middle; margin-left:4px; }
        .linked-record-box { background:#f0fdf4; border:1px solid #bbf7d0; border-radius:8px; padding:10px 14px; font-size:12px; color:#166534; display:flex; align-items:center; gap:8px; }
        .linked-record-box .material-icons { font-size:16px; }
        .create-record-btn { display:inline-flex; align-items:center; gap:5px; padding:7px 14px; border-radius:8px; font-size:11px; font-weight:700; cursor:pointer; border:none; font-family:'DM Sans',sans-serif; }
        .btn-create-dep { background:#e0f2fe; color:#0369a1; }
        .btn-create-dep:hover { background:#bae6fd; }
        .btn-create-rma { background:#fef3c7; color:#92400e; }
        .btn-create-rma:hover { background:#fde68a; }
    </style>
</head>
<body>
<div class="dashboard-container">

    <div class="modern-header">
        <div style="display:flex; align-items:center; gap:15px;">
            <a href="index.html" class="slds-button slds-button_neutral" style="border-radius:10px; padding:5px 15px;">
                <span class="material-icons" style="font-size:18px; vertical-align:middle;">arrow_back</span>
                <span style="font-weight:700; font-size:11px; margin-left:5px;">HOME</span>
            </a>
            <div>
                <h1 style="font-size:1.5rem; font-weight:800; color:var(--pp-navy); margin:0;">Partner Tickets</h1>
                <p style="font-size:11px; color:var(--text-muted); margin:0;" id="last-updated">Loading...</p>
            </div>
        </div>
        <button onclick="loadTickets()" class="slds-button slds-button_neutral" style="border-radius:10px; font-weight:700; font-size:12px; padding:8px 16px;">
            <span class="material-icons" style="font-size:16px; vertical-align:middle;">refresh</span>
            Refresh
        </button>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
        <span style="font-size:11px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px;">Status:</span>
        <button class="filter-chip active" data-status="all" onclick="setStatusFilter(this,'all')">All</button>
        <button class="filter-chip" data-status="open" onclick="setStatusFilter(this,'open')">Open</button>
        <button class="filter-chip" data-status="in_progress" onclick="setStatusFilter(this,'in_progress')">In Progress</button>
        <button class="filter-chip" data-status="resolved" onclick="setStatusFilter(this,'resolved')">Resolved</button>
        <button class="filter-chip" data-status="closed" onclick="setStatusFilter(this,'closed')">Closed</button>
        <div class="filter-sep"></div>
        <span style="font-size:11px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px;">Type:</span>
        <button class="filter-chip active" data-type="all" onclick="setTypeFilter(this,'all')">All</button>
        <button class="filter-chip" data-type="deployment_request" onclick="setTypeFilter(this,'deployment_request')">Deployments</button>
        <button class="filter-chip" data-type="rma_request" onclick="setTypeFilter(this,'rma_request')">Returns</button>
        <button class="filter-chip" data-type="general" onclick="setTypeFilter(this,'general')">General</button>
        <div class="filter-sep"></div>
        <button class="filter-chip mine-chip" id="mine-chip" onclick="toggleMineFilter(this)">
            <span class="material-icons" style="font-size:13px; vertical-align:middle;">person</span>
            Mine
        </button>
        <div class="filter-sep"></div>
        <div style="position:relative; flex:1; min-width:200px;">
            <span class="material-icons" style="position:absolute; left:9px; top:50%; transform:translateY(-50%); font-size:16px; color:var(--text-muted); pointer-events:none;">search</span>
            <input id="ticket-search" type="text" placeholder="Search ticket #, MID, merchant name…" oninput="setSearchQuery(this.value)"
                style="width:100%; padding:6px 30px 6px 30px; border:1.5px solid var(--border); border-radius:99px; font-size:12px; font-family:'DM Sans',sans-serif; color:var(--text-primary); background:white; outline:none; transition:border-color 0.2s; box-sizing:border-box;">
            <button id="search-clear" onclick="clearSearch()" style="display:none; position:absolute; right:9px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; padding:0; color:var(--text-muted);">
                <span class="material-icons" style="font-size:15px;">close</span>
            </button>
        </div>
    </div>

    <!-- Ticket List -->
    <div class="tickets-panel">
        <div class="panel-header">
            <div class="panel-title">
                <span class="material-icons" style="color:#0d9488; font-size:18px;">confirmation_number</span>
                Tickets
            </div>
            <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
                <span id="ticket-count" style="font-size:11px; color:var(--text-muted);"></span>
                <div style="display:flex;align-items:center;gap:4px;">
                    <span style="font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.4px;">Show:</span>
                    <button class="page-size-btn active" onclick="setPageSize(20)">20</button>
                    <button class="page-size-btn" onclick="setPageSize(50)">50</button>
                    <button class="page-size-btn" onclick="setPageSize(100)">100</button>
                </div>
            </div>
        </div>
        <div id="ticket-table">
            <div class="empty-state"><div class="skeleton" style="height:14px;width:200px;margin:0 auto;"></div></div>
        </div>
        <div id="ticket-pagination"></div>
    </div>

</div>

<!-- Ticket Detail Modal -->
<div class="ticket-modal" id="ticket-modal">
    <div class="ticket-modal-box">
        <div class="tm-header">
            <div>
                <div style="font-weight:800; font-size:14px; color:white;" id="modal-ticket-num">Ticket Detail</div>
                <div style="font-size:11px; color:rgba(255,255,255,0.6); margin-top:2px;" id="modal-ticket-sub"></div>
            </div>
            <div style="display:flex; align-items:center; gap:8px;">
                <button id="delete-ticket-btn" onclick="deleteTicket()" style="display:none; background:rgba(239,68,68,0.2); border:1px solid rgba(239,68,68,0.5); color:#fca5a5; border-radius:8px; font-size:11px; font-weight:700; padding:5px 12px; cursor:pointer; align-items:center; gap:4px;">
                    <span class="material-icons" style="font-size:13px; vertical-align:middle;">delete</span>
                    Delete
                </button>
                <button onclick="closeModal()" style="background:none; border:none; color:white; cursor:pointer; padding:0;"><span class="material-icons">close</span></button>
            </div>
        </div>
        <div class="tm-body" id="modal-ticket-body">
            <div style="padding:40px; text-align:center; color:var(--text-muted);">Loading...</div>
        </div>
    </div>
</div>

<script>
const timeAgo = d => {
    const s = Math.floor((Date.now() - new Date(d)) / 1000);
    if (s < 60) return s + 's ago';
    if (s < 3600) return Math.floor(s/60) + 'm ago';
    if (s < 86400) return Math.floor(s/3600) + 'h ago';
    return Math.floor(s/86400) + 'd ago';
};
const escapeHtml = s => s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;') : '';
const typeLabel = t => t === 'deployment_request' ? 'Deployment' : t === 'rma_request' ? 'Returns/RMA' : 'General';
const typeIconClass = t => t === 'deployment_request' ? 'icon-deployment' : t === 'rma_request' ? 'icon-rma' : 'icon-general';
const typeIconName = t => t === 'deployment_request' ? 'local_shipping' : t === 'rma_request' ? 'assignment_return' : 'help_outline';
const fmt = fmtDateTime;

let allTickets = [];
let statusFilter = 'all';
let typeFilter = 'all';
let mineFilter = false;
let searchQuery = '';
let currentStaffName = '';
let currentUserRole = '';
let currentTicketId = null;
let currentTicketData = null;
let staffList = [];
let depEquipLookupTimeout;
let currentPage = 0;
let pageSize = 20;

async function init() {
    const staffRes = await fetch('/api/users', { method: 'GET' });
    const sr = await staffRes.json();
    staffList = (sr.data || []).filter(u => u.is_active);
    // Try to find current user's full name from staff list
    const uid = localStorage.getItem('pp_userid');
    if (uid) {
        const me = staffList.find(u => String(u.userid) === String(uid));
        if (me) {
            currentStaffName = [me.first_name, me.last_name].filter(Boolean).join(' ');
        }
    }
    // Fallback to first name stored at login
    if (!currentStaffName) {
        currentStaffName = localStorage.getItem('pp_user_first_name') || 'Staff';
    }
    currentUserRole = localStorage.getItem('pp_role') || '';
    loadTickets().then(() => {
        const urlQ = new URLSearchParams(window.location.search).get('q');
        if (urlQ) {
            const searchEl = document.getElementById('ticket-search');
            if (searchEl) searchEl.value = urlQ;
            setSearchQuery(urlQ);
        }
    });
}

async function loadTickets() {
    document.getElementById('last-updated').textContent = 'Loading...';
    const r = await fetch('/api/tickets', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'list_for_staff', limit: 500 })
    });
    const result = await r.json();
    if (result.success) {
        allTickets = result.data || [];
        renderTickets();
        document.getElementById('last-updated').textContent = 'Last updated: ' + fmtTime(new Date());
    }
}

function renderTickets() {
    let filtered = allTickets;
    if (statusFilter !== 'all') filtered = filtered.filter(t => t.status === statusFilter);
    if (typeFilter !== 'all') filtered = filtered.filter(t => t.type === typeFilter);
    if (mineFilter && currentStaffName) filtered = filtered.filter(t => t.assigned_to === currentStaffName);
    if (searchQuery) {
        const q = searchQuery.toLowerCase();
        filtered = filtered.filter(t =>
            (t.ticket_number || '').toLowerCase().includes(q) ||
            (t.merchants?.dba_name || '').toLowerCase().includes(q) ||
            (t.merchants?.merchant_id || '').toLowerCase().includes(q) ||
            (t.persons?.full_name || '').toLowerCase().includes(q) ||
            (t.subject || '').toLowerCase().includes(q)
        );
    }

    const total = filtered.length;
    const totalPages = Math.max(1, Math.ceil(total / pageSize));
    if (currentPage >= totalPages) currentPage = totalPages - 1;
    if (currentPage < 0) currentPage = 0;

    const start = currentPage * pageSize;
    const pageItems = filtered.slice(start, start + pageSize);

    document.getElementById('ticket-count').textContent = `${total} ticket(s)`;

    if (!total) {
        document.getElementById('ticket-table').innerHTML = `<div class="empty-state"><span class="material-icons" style="font-size:32px; display:block; margin-bottom:8px;">confirmation_number</span>No tickets found.</div>`;
        document.getElementById('ticket-pagination').innerHTML = '';
        return;
    }

    document.getElementById('ticket-table').innerHTML = pageItems.map(t => `
        <div class="ticket-row" onclick="openTicket(${t.id})">
            <div class="ticket-icon ${typeIconClass(t.type)}">
                <span class="material-icons" style="font-size:18px;">${typeIconName(t.type)}</span>
                ${t.unread_count > 0 ? `<div class="unread-dot">${t.unread_count > 9 ? '9+' : t.unread_count}</div>` : ''}
            </div>
            <div style="min-width:0;">
                <div style="font-weight:700; color:var(--text-primary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${escapeHtml(t.subject)}</div>
                <div style="font-size:11px; color:var(--text-muted); margin-top:2px;">
                    <span style="font-family:'DM Mono',monospace;">${t.ticket_number}</span>
                    ${t.persons?.full_name ? ` · ${t.persons.full_name}` : ''}
                    ${t.merchants?.dba_name ? ` · ${t.merchants.dba_name}` : ''}
                </div>
            </div>
            <span style="font-size:11px; color:var(--text-muted); white-space:nowrap;">${typeLabel(t.type)}</span>
            <span class="badge badge-${t.priority}">${t.priority}</span>
            <span class="badge badge-${t.status}">${t.status.replace('_',' ')}</span>
            ${t.assigned_to ? `<span style="font-size:11px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px;" title="${t.assigned_to}">${t.assigned_to.split(' ')[0]}</span>` : `<span style="font-size:11px;color:var(--text-muted);">—</span>`}
            <span style="font-size:11px; color:var(--text-muted); white-space:nowrap;">${timeAgo(t.created_at)}</span>
        </div>`).join('');

    renderPagination(total, totalPages);
}

function renderPagination(total, totalPages) {
    const pag = document.getElementById('ticket-pagination');
    if (!pag) return;
    if (totalPages <= 1) { pag.innerHTML = ''; return; }

    const start = currentPage * pageSize + 1;
    const end = Math.min((currentPage + 1) * pageSize, total);

    // Build visible page range: first, last, current ±1
    const visibleSet = new Set(
        [0, totalPages - 1, currentPage - 1, currentPage, currentPage + 1].filter(p => p >= 0 && p < totalPages)
    );
    const sorted = [...visibleSet].sort((a, b) => a - b);

    let pageButtons = '';
    let prev = -1;
    for (const p of sorted) {
        if (prev !== -1 && p - prev > 1) pageButtons += `<span style="padding:0 2px;color:var(--text-muted);font-size:13px;">…</span>`;
        pageButtons += `<button class="page-btn ${p === currentPage ? 'active' : ''}" onclick="goToPage(${p})">${p + 1}</button>`;
        prev = p;
    }

    pag.innerHTML = `<div class="pagination-bar">
        <span style="font-size:12px;color:var(--text-muted);">Showing ${start}–${end} of ${total}</span>
        <div style="display:flex;gap:4px;align-items:center;">
            <button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 0 ? 'disabled' : ''}>
                <span class="material-icons" style="font-size:16px;">chevron_left</span>
            </button>
            ${pageButtons}
            <button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage >= totalPages - 1 ? 'disabled' : ''}>
                <span class="material-icons" style="font-size:16px;">chevron_right</span>
            </button>
        </div>
    </div>`;
}

function setPageSize(n) {
    pageSize = n;
    currentPage = 0;
    document.querySelectorAll('.page-size-btn').forEach(b => b.classList.toggle('active', parseInt(b.textContent) === n));
    renderTickets();
}

function goToPage(p) {
    currentPage = p;
    renderTickets();
    document.querySelector('.tickets-panel')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function setStatusFilter(btn, val) {
    document.querySelectorAll('[data-status]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    statusFilter = val;
    currentPage = 0;
    renderTickets();
}

function setTypeFilter(btn, val) {
    document.querySelectorAll('[data-type]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    typeFilter = val;
    currentPage = 0;
    renderTickets();
}

function toggleMineFilter(btn) {
    mineFilter = !mineFilter;
    btn.classList.toggle('active', mineFilter);
    currentPage = 0;
    renderTickets();
}

function setSearchQuery(val) {
    searchQuery = val.trim();
    currentPage = 0;
    const clearBtn = document.getElementById('search-clear');
    if (clearBtn) clearBtn.style.display = searchQuery ? 'block' : 'none';
    renderTickets();
}

function clearSearch() {
    searchQuery = '';
    const input = document.getElementById('ticket-search');
    const clearBtn = document.getElementById('search-clear');
    if (input) input.value = '';
    if (clearBtn) clearBtn.style.display = 'none';
    renderTickets();
}

async function openTicket(ticketId) {
    currentTicketId = ticketId;
    document.getElementById('modal-ticket-num').textContent = 'Loading...';
    document.getElementById('modal-ticket-sub').textContent = '';
    document.getElementById('modal-ticket-body').innerHTML = '<div style="padding:40px; text-align:center; color:var(--text-muted);">Loading...</div>';
    document.getElementById('ticket-modal').classList.add('is-open');

    const [ticketRes, commentsRes] = await Promise.all([
        fetch('/api/tickets', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'get_detail', ticket_id: ticketId }) }),
        fetch('/api/tickets', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'get_comments', ticket_id: ticketId }) })
    ]);
    const result = await ticketRes.json();

    let commentsResult = null;
    try { commentsResult = await commentsRes.json(); } catch {}
    const commentsOk = commentsResult?.success !== false;

    // Mark as read in background
    fetch('/api/tickets', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'mark_read', ticket_id: ticketId }) });

    if (!result.success) {
        document.getElementById('modal-ticket-body').innerHTML = `<div style="padding:20px; color:var(--red-text);">Error loading ticket.</div>`;
        return;
    }
    const t = result.ticket;
    currentTicketData = t;
    const comments = commentsOk ? (commentsResult?.comments || []) : null;
    document.getElementById('modal-ticket-num').textContent = t.ticket_number;
    document.getElementById('modal-ticket-sub').textContent = t.subject;

    // Show delete button for super admin only
    const delBtn = document.getElementById('delete-ticket-btn');
    if (delBtn) delBtn.style.display = currentUserRole === 'super_admin' ? 'inline-flex' : 'none';

    const isLocked = !t.assigned_to;

    const staffOptions = `<option value="">— Unassigned —</option>` +
        staffList.map(u => {
            const name = [u.first_name, u.last_name].filter(Boolean).join(' ');
            return `<option value="${name}" ${t.assigned_to === name ? 'selected' : ''}>${name} (${u.role || 'staff'})</option>`;
        }).join('');

    // Build comment thread HTML
    const commentsHtml = comments === null
        ? `<div style="text-align:center;padding:16px;font-size:12px;color:var(--red-text);background:#fff1f2;border-radius:8px;"><span class="material-icons" style="font-size:15px;vertical-align:middle;">warning</span> Could not load activity. <button onclick="openTicket(${ticketId})" style="background:none;border:none;color:var(--pp-accent);font-size:12px;font-weight:700;cursor:pointer;text-decoration:underline;">Retry</button></div>`
        : comments.length === 0
        ? `<div style="text-align:center;padding:20px;font-size:12px;color:var(--text-muted);">No activity yet.</div>`
        : comments.map(c => {
            if (c.author_type === 'system') {
                return `<div class="system-event">${escapeHtml(c.change_summary)} <span style="opacity:0.7;">· ${escapeHtml(c.author_name)} · ${timeAgo(c.created_at)}</span></div>`;
            }
            const isStaff = c.author_type === 'staff';
            const initials = (c.author_name || '?').split(' ').map(w => w[0]).slice(0,2).join('').toUpperCase();
            return `<div class="comment-entry ${isStaff ? 'staff-comment' + (c.is_internal ? ' internal' : '') : 'partner-comment'}">
                <div class="comment-avatar">${initials}</div>
                <div>
                    <div class="comment-bubble">
                        ${escapeHtml(c.body)}
                        ${c.is_internal ? `<span class="internal-badge">Internal</span>` : ''}
                    </div>
                    <div class="comment-meta">${escapeHtml(c.author_name)} · ${timeAgo(c.created_at)}</div>
                </div>
            </div>`;
        }).join('');

    // Linked records section
    let linkedHtml = '';
    if (t.linked_deployment_id) {
        linkedHtml += `<div class="linked-record-box"><span class="material-icons">local_shipping</span>Deployment: <strong style="font-family:'DM Mono',monospace;">${t.linked_deployment_id}</strong></div>`;
    } else if (t.type === 'deployment_request') {
        linkedHtml += `<button class="create-record-btn btn-create-dep" onclick="createLinkedDeployment()" ${isLocked ? 'disabled style="opacity:0.45;cursor:not-allowed;"' : ''}><span class="material-icons" style="font-size:14px;">add</span>Create Deployment Record</button>`;
        if (isLocked) linkedHtml += `<div style="font-size:11px;color:#92400e;margin-top:4px;">Assign ticket first to create records.</div>`;
    }
    if (t.linked_return_id) {
        linkedHtml += `<div class="linked-record-box" style="margin-top:8px;background:#fefce8;border-color:#fde047;color:#713f12;"><span class="material-icons">assignment_return</span>RMA: <strong style="font-family:'DM Mono',monospace;">${t.linked_return_id}</strong></div>`;
    } else if (t.type === 'rma_request') {
        linkedHtml += `<button class="create-record-btn btn-create-rma" style="margin-top:8px;" onclick="createLinkedRMA()" ${isLocked ? 'disabled style="opacity:0.45;cursor:not-allowed;"' : ''}><span class="material-icons" style="font-size:14px;">add</span>Create RMA Record</button>`;
    }

    document.getElementById('modal-ticket-body').innerHTML = `
        <div class="tm-section">
            <div class="tm-label">Ticket Info</div>
            <div class="tm-row"><span class="tm-key">Type</span><span class="tm-val">${typeLabel(t.type)}</span></div>
            <div class="tm-row"><span class="tm-key">Status</span><span class="tm-val"><span class="badge badge-${t.status}">${t.status.replace('_',' ')}</span></span></div>
            <div class="tm-row"><span class="tm-key">Priority</span><span class="tm-val"><span class="badge badge-${t.priority}">${t.priority}</span></span></div>
            ${t.category ? `<div class="tm-row"><span class="tm-key">Category</span><span class="tm-val">${t.category}</span></div>` : ''}
            <div class="tm-row"><span class="tm-key">Opened</span><span class="tm-val">${fmt(t.created_at)}</span></div>
            ${t.resolved_at ? `<div class="tm-row"><span class="tm-key">Resolved</span><span class="tm-val">${fmt(t.resolved_at)}</span></div>` : ''}
        </div>
        <div class="tm-section">
            <div class="tm-label">Partner</div>
            <div class="tm-row"><span class="tm-key">Name</span><span class="tm-val">${t.persons?.full_name || '—'}</span></div>
            <div class="tm-row"><span class="tm-key">Email</span><span class="tm-val"><a href="mailto:${t.persons?.email}" style="color:var(--pp-blue);">${t.persons?.email || '—'}</a></span></div>
            ${t.persons?.phone_number ? `<div class="tm-row"><span class="tm-key">Phone</span><span class="tm-val">${t.persons.phone_number}</span></div>` : ''}
        </div>
        ${t.merchants ? `
        <div class="tm-section">
            <div class="tm-label">Merchant</div>
            <div class="tm-row"><span class="tm-key">Name</span><span class="tm-val">${t.merchants.dba_name}</span></div>
            <div class="tm-row"><span class="tm-key">MID</span><span class="tm-val" style="font-family:'DM Mono',monospace;">${t.merchants.merchant_id}</span></div>
            <div class="tm-row"><span class="tm-key">Location</span><span class="tm-val">${[t.merchants.merchant_city, t.merchants.merchant_state].filter(Boolean).join(', ') || '—'}</span></div>
        </div>` : ''}
        ${t.description ? `
        <div class="tm-section">
            <div class="tm-label">Description</div>
            <div style="font-size:13px; color:var(--text-primary); line-height:1.6; white-space:pre-wrap;">${escapeHtml(t.description)}</div>
        </div>` : ''}
        ${linkedHtml ? `<div class="tm-section"><div class="tm-label">Linked Records</div>${linkedHtml}</div>` : ''}
        <div class="tm-section">
            <div class="tm-label">Activity &amp; History</div>
            <div class="comment-thread">${commentsHtml}</div>
        </div>
        <div class="tm-section">
            <div class="tm-label">Add Note</div>
            ${isLocked ? `<div style="background:#fef3c7;border:1px solid #fde68a;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:12px;color:#92400e;display:flex;align-items:center;gap:6px;"><span class="material-icons" style="font-size:15px;">lock</span>Assign this ticket to a staff member before adding notes or making changes.</div>` : ''}
            <div class="form-group">
                <textarea id="new-comment-body" class="form-input" placeholder="Write a note or reply..." ${isLocked ? 'disabled' : ''}></textarea>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                <label style="display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-muted); cursor:pointer;">
                    <input type="checkbox" id="comment-internal" style="width:14px; height:14px;" ${isLocked ? 'disabled' : ''}>
                    Internal only (not visible to partner)
                </label>
                <button onclick="submitComment()" style="background:var(--pp-navy); color:white; border:none; border-radius:8px; font-size:12px; font-weight:700; padding:7px 16px; cursor:pointer; opacity:${isLocked ? '0.45' : '1'};" ${isLocked ? 'disabled' : ''}>
                    <span class="material-icons" style="font-size:14px;vertical-align:middle;">send</span>

async function submitComment() {
    const body = document.getElementById('new-comment-body')?.value?.trim();
    const is_internal = document.getElementById('comment-internal')?.checked || false;
    if (!body) { Swal.fire('Required', 'Please write a note first.', 'warning'); return; }

    const btn = document.querySelector('[onclick="submitComment()"]');
    if (btn) { btn.disabled = true; btn.textContent = 'Sending...'; }

    const r = await fetch('/api/tickets', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'add_comment', ticket_id: currentTicketId, body, is_internal, staff_name: currentStaffName })
    });
    const result = await r.json();
    if (result.success) {
        openTicket(currentTicketId);
    } else {
        if (btn) { btn.disabled = false; btn.textContent = 'Add Note'; }
        Swal.fire('Error', result.message || 'Failed to add note.', 'error');
    }
}

async function saveTicketUpdate(ticketId) {
    const status = document.getElementById('upd-status').value;
    const priority = document.getElementById('upd-priority').value;
    const assigned_to = document.getElementById('upd-assigned').value || null;
    const staff_notes = document.getElementById('upd-notes').value.trim() || null;

    const r = await fetch('/api/tickets', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'update_status', ticket_id: ticketId, status, priority, assigned_to, staff_notes, staff_name: currentStaffName })
    });
    const result = await r.json();
    if (result.success) {
        loadTickets();
        openTicket(ticketId);
    } else {
        Swal.fire('Error', result.message || 'Update failed', 'error');
    }
}

// Live equipment search inside Swal — called via oninput in Swal HTML
async function searchDepEquipment(val) {
    const sugg = document.getElementById('dep-eq-suggestions');
    const hidden = document.getElementById('dep-eq-id');
    if (!sugg || !hidden) return;
    hidden.value = '';
    if (!val || val.length < 1) { sugg.style.display = 'none'; return; }

    clearTimeout(depEquipLookupTimeout);
    depEquipLookupTimeout = setTimeout(async () => {
        try {
            const res = await fetch('/api/deployments', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'getLookups', query: val })
            });
            const result = await res.json();
            const items = result.inventory || [];
            if (!items.length) { sugg.style.display = 'none'; return; }
            sugg.innerHTML = items.map(e =>
                `<div onclick="selectDepEquip('${e.id}','${e.serial_number}','${e.terminal_type || ''}')"
                    style="padding:10px 12px; cursor:pointer; border-bottom:1px solid #f1f5f9; font-size:12px; display:flex; justify-content:space-between; align-items:center;">
                    <div><strong style="color:#004990;">${e.serial_number}</strong><div style="font-size:10px;color:#64748b;">${e.terminal_type || ''}</div></div>
                    <span style="font-size:9px;background:#f0fdf4;color:#166534;padding:2px 6px;border-radius:4px;font-weight:700;">${(e.status||'').toUpperCase()}</span>
                </div>`
            ).join('');
            sugg.style.display = 'block';
        } catch (e) { console.error(e); }
    }, 250);
}

function selectDepEquip(id, serial, type) {
    const inp = document.getElementById('dep-eq-search');
    const hid = document.getElementById('dep-eq-id');
    const sugg = document.getElementById('dep-eq-suggestions');
    if (inp) inp.value = `${serial}${type ? ' (' + type + ')' : ''}`;
    if (hid) hid.value = id;
    if (sugg) sugg.style.display = 'none';
}

            </div>
            <div>
                <label style="display:block;font-weight:700;font-size:10px;color:#64748b;text-transform:uppercase;margin-bottom:4px;">INTERNAL NOTES</label>

                    <option value="">Select reason...</option>
                    <option value="Merchant Cancellation">Merchant Cancellation</option>
                    <option value="Equipment Type Swap">Equipment Type Swap</option>
                    <option value="Technical Issue Swap">Technical Issue Swap</option>
                    <option value="Other">Other</option>
                </select>
                <input id="rma-reason-other" class="swal2-input" style="margin:0;display:none;" placeholder="Specify reason...">
            </div>
            <div style="margin-bottom:14px;">
                <label style="display:block;font-weight:700;font-size:10px;color:#64748b;text-transform:uppercase;margin-bottom:4px;">DATE INITIATED</label>
                <input id="rma-date" type="date" class="swal2-input" style="margin:0;" value="${new Date().toISOString().split('T')[0]}">
            </div>
            <div>
                <label style="display:block;font-weight:700;font-size:10px;color:#64748b;text-transform:uppercase;margin-bottom:4px;">NOTES</label>
                <textarea id="rma-notes" class="swal2-textarea" style="margin:0;height:70px;" placeholder="Additional notes..."></textarea>
            </div>
        </div>`,
        preConfirm: () => {
            const reasonSel = document.getElementById('rma-reason-sel').value;
            const reasonOther = document.getElementById('rma-reason-other').value.trim();
            const finalReason = reasonSel === 'Other' ? reasonOther : reasonSel;
            if (!finalReason) { Swal.showValidationMessage('Please select or enter a return reason'); return false; }
            return {
                deployment_internal_id: document.getElementById('rma-dep').value,
                return_reason: finalReason,
                return_date_initiated: document.getElementById('rma-date').value,
                notes: document.getElementById('rma-notes').value
            };
        }
    }).then(async result => {
        if (!result.isConfirmed || !result.value) return;
        Swal.fire({ title: 'Creating RMA...', didOpen: () => Swal.showLoading() });
        const r = await fetch('/api/tickets', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'create_linked_record', ticket_id: currentTicketId, record_type: 'rma', staff_name: currentStaffName, ...result.value })
        });
        const res = await r.json();
        if (res.success) {
            await Swal.fire({ icon: 'success', title: 'RMA Initiated!', html: `RMA ID: <strong style="font-family:'DM Mono',monospace;">${res.return_id}</strong><br><span style="font-size:12px;color:#64748b;">Unit marked In Transit. Complete inspection from Returns & RMA ledger.</span>`, confirmButtonColor: '#001e3c' });
            openTicket(currentTicketId);
            loadTickets();
        } else {
            Swal.fire('Error', res.message || 'Could not create RMA.', 'error');
        }
    });
}

async function deleteTicket() {
    if (currentUserRole !== 'super_admin') return;
    const t = currentTicketData;
    if (!t) return;

    const { value: confirmed } = await Swal.fire({
        title: 'Delete Ticket',
        html: `<p style="font-size:13px;color:#475569;">This will permanently delete ticket <strong>${t.ticket_number}</strong> and all its comments. This cannot be undone.</p>
               <p style="font-size:13px;color:#475569;margin-top:10px;">Type <strong>DELETE</strong> to confirm:</p>
               <input id="del-confirm-input" class="swal2-input" placeholder="Type DELETE">`,
        confirmButtonText: 'Delete Permanently',
        confirmButtonColor: '#dc2626',
        showCancelButton: true,
        focusConfirm: false,
        preConfirm: () => {
            const val = document.getElementById('del-confirm-input').value.trim();
            if (val !== 'DELETE') { Swal.showValidationMessage('You must type DELETE to confirm'); return false; }
            return true;
        }
    });
    if (!confirmed) return;

    Swal.fire({ title: 'Deleting...', didOpen: () => Swal.showLoading() });
    const r = await fetch('/api/tickets', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'delete_ticket', ticket_id: t.id })
    });
    const result = await r.json();
    if (result.success) {
        Swal.fire({ icon: 'success', title: 'Ticket Deleted', timer: 1500, showConfirmButton: false });
        closeModal();
        loadTickets();
    } else {
        Swal.fire('Error', result.message || 'Could not delete ticket.', 'error');
    }
}

function closeModal() {
    document.getElementById('ticket-modal').classList.remove('is-open');
    currentTicketId = null;
}

document.getElementById('ticket-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('ticket-modal')) closeModal();
});

init();
</script>
