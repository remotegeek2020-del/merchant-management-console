<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hardware Console | New Activity</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --pp-blue: #004990; --pp-accent: #00a1e0; --glass: rgba(255, 255, 255, 0.9); --glass-border: rgba(255, 255, 255, 0.4); }
        body { background: radial-gradient(circle at top right, #f8fafc, #e2e8f0); padding: 30px; font-family: 'Inter', sans-serif; min-height: 100vh; color: #2b3d51; }
        .ghl-container { max-width: 1000px; margin: auto; background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 24px; box-shadow: 0 20px 50px rgba(0, 45, 90, 0.08); overflow: hidden; position: relative; }
        .activity-header-box { background: rgba(0, 73, 144, 0.03); padding: 30px; border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        .btn-modern { border-radius: 12px !important; font-weight: 600 !important; padding: 0 25px !important; height: 45px !important; }
        .hidden-field { display: none !important; }
        .show-flex { display: flex !important; }
        #saveOverlay { display: none; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(255,255,255,0.85); backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; flex-direction: column; }
        #debugConsole { max-width: 1000px; margin: 30px auto; background: #1a202c; color: #a0aec0; padding: 20px; border-radius: 20px; font-family: monospace; font-size: 11px; height: 180px; overflow-y: auto; }
        .custom-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 95%; max-width: 850px; background: white; z-index: 9001; border-radius: 24px; box-shadow: 0 30px 70px rgba(0,0,0,0.25); overflow: hidden; }
        .custom-modal-backdrop { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 25, 50, 0.4); backdrop-filter: blur(5px); z-index: 9000; }
        .readonly-lock { background-color: #f1f5f9 !important; cursor: not-allowed !important; font-weight: 600; color: #64748b; }
    </style>
</head>
<body>
<div class="ghl-container">
    <div id="saveOverlay">
        <div role="status" class="slds-spinner slds-spinner_medium slds-spinner_brand"><div class="slds-spinner__dot-a"></div><div class="slds-spinner__dot-b"></div></div>
        <p id="saveStatus" style="margin-top: 60px; font-weight: 700; color: var(--pp-blue);">Syncing Global Data Ledger...</p>
    </div>
    <div class="activity-header-box">
        <div>
            <a href="index.html" style="background: white; padding: 8px 16px; border-radius: 50px; font-size: 0.7rem; font-weight: 800; color: var(--pp-blue); text-decoration: none; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 6px;"><span class="material-icons" style="font-size: 14px;">arrow_back</span> Home</a>
            <div id="user-greeting" style="font-size: 11px; font-weight: 700; color: var(--pp-blue); margin-top: 5px;">Staff Member: Loading...</div>
        </div>
        <select id="activityType" style="width: 250px; border-radius: 12px; height: 45px; font-weight: 700; border: 1px solid #d1d9e6;" onchange="toggleFields(this.value)">
            <option value="">-- Choose Activity --</option>
            <option value="receiving_inventory">1. New Equipment</option>
            <option value="deployment">2. New Deployment</option>
            <option value="process_return">3. Process Return</option>
        </select>
    </div>
    <div id="mainFormArea" class="slds-p-around_xx-large hidden-field">
        <div class="slds-grid slds-wrap slds-gutters">
            <div class="slds-col slds-size_1-of-2 f-genID hidden-field slds-m-bottom_large">
                <label class="slds-form-element__label" style="font-weight: 700;">Reference ID</label>
                <input type="text" id="generatedTag" class="slds-input" style="background:#f0f7ff; font-weight:800; border-radius:12px;" readonly value="ASSIGNED ON SAVE">
            </div>
            <div class="slds-col slds-size_1-of-2 f-account hidden-field slds-m-bottom_large">
                <label class="slds-form-element__label" style="font-weight: 700;">Account / Location</label>
                <input type="text" id="accountDisplay" class="slds-input" readonly placeholder="Search Accounts..." onclick="openModal('account')" style="border-radius:12px; cursor:pointer;">
                <input type="hidden" id="accountID">
            </div>
            <div class="slds-col slds-size_1-of-2 f-equipmentLookup hidden-field slds-m-bottom_large">
                <label class="slds-form-element__label" style="font-weight: 700;">Hardware Lookup</label>
                <input type="text" id="equipmentDisplay" class="slds-input" readonly placeholder="Select existing inventory..." onclick="openModal('equipment')" style="border-radius:12px; cursor:pointer;">
                <input type="hidden" id="equipmentID">
            </div>
            <div class="slds-col slds-size_1-of-2 f-type hidden-field slds-m-bottom_large">
                <label class="slds-form-element__label" style="font-weight: 700;">Terminal Model</label>
                <select id="type" class="slds-select" style="border-radius:12px;">
                    <option value="">-- Select Model --</option>
                    <option value="z11_terminal">Z11 Terminal</option>
                    <option value="z9__4g">Z9 - 4G</option>
                    <option value="z9">Z9</option>
                    <option value="z8_epx_dualcomm_only_no_wifi">Z8 EPX Dual-Comm Only No Wifi</option>
                    <option value="z8_terminal">Z8 Terminal</option>
                    <option value="z6__pin_pad">Z6 - Pin Pad</option>
                    <option value="z3__pin_pad">Z3 - Pin Pad</option>
                    <option value="ict_220">ICT 220</option>
                    <option value="fd_130">FD 130</option>
                    <option value="fd_100">FD 100</option>
                    <option value="pax_s300_pin_pad">Pax S300 Pin Pad</option>
                    <option value="clover_go">Clover Go</option>
                    <option value="clover_mini">Clover Mini</option>
                    <option value="clover_mini_station">Clover Mini Station</option>
                    <option value="z9_base_station">Z9 Base Station</option>
                    <option value="z8_tri_con">Z8 Tri-Con</option>
                    <option value="pax_a920">Pax A920</option>
                    <option value="pax_e600">Pax E600</option>
                    <option value="2_in_1_reader">2-in-1 Reader</option>
                    <option value="ingenico_desk_3500">Ingenico Desk 3500</option>
                    <option value="pax_a920_pro">Pax A920 PRO</option>
                    <option value="valor_vl100">Valor VL100</option>
                    <option value="valor_vl110">Valor VL110</option>
                    <option value="valor_vl500">Valor VL500</option>
                    <option value="qd2">QD2</option>
                    <option value="qd3">QD3</option>
                    <option value="qd4">QD4</option>
                    <option value="valor_vl300">Valor VL300</option>
                </select>
            </div>
            <div class="slds-col slds-size_1-of-2 f-serial hidden-field slds-m-bottom_large">
                <label class="slds-form-element__label" style="font-weight: 700;">Serial Number</label>
                <input type="text" id="serial" class="slds-input" style="border-radius: 12px;">
            </div>
            <div class="slds-col slds-size_1-of-2 f-tid hidden-field slds-m-bottom_large">
                <label class="slds-form-element__label" style="font-weight: 700;">TID</label>
                <input type="text" id="tid" class="slds-input" style="border-radius: 12px;">
            </div>
            <div class="slds-col slds-size_1-of-2 f-tracking hidden-field slds-m-bottom_large">
                <label class="slds-form-element__label" style="font-weight: 700;">Tracking ID</label>
                <input type="text" id="tracking" class="slds-input" style="border-radius: 12px;">
            </div>
            <div class="slds-col slds-size_1-of-2 f-date hidden-field slds-m-bottom_large">
                <label class="slds-form-element__label" id="dateLabel" style="font-weight: 700;">Date</label>
                <input type="date" id="depDate" class="slds-input" style="border-radius: 12px;">
            </div>
            <div class="slds-col slds-size_1-of-2 f-returnReason hidden-field slds-m-bottom_large">
                <label class="slds-form-element__label" style="font-weight: 700;">Return Reason</label>
                <input type="text" id="returnReason" class="slds-input" style="border-radius: 12px;">
            </div>
            <div class="slds-col slds-size_1-of-2 f-condition hidden-field slds-m-bottom_large">
                <label class="slds-form-element__label" style="font-weight: 700;">Condition</label>
                <select id="returnCondition" class="slds-select" style="border-radius: 12px;">
                    <option value="">-- Assessment --</option>
                    <option value="good">Good</option>
                    <option value="broken">Broken</option>
                </select>
            </div>
            <div class="slds-col slds-size_1-of-1 f-returnDestination hidden-field slds-m-bottom_large">
                <label class="slds-form-element__label" style="font-weight: 700;">Warehouse Destination</label>
                <select id="returnDestination" class="slds-select" style="border-radius: 12px;">
                    <option value="warsaw_office__inventory_back_to_stock">Warsaw Office / Inventory (Back to Stock)</option>
                    <option value="warsaw_repairs_sent_to_service_center">Warsaw Repairs (Sent To Service Center)</option>
                </select>
            </div>
        </div>
        <div class="slds-m-top_large slds-grid slds-grid_align-end">
            <button class="slds-button slds-button_brand btn-modern" onclick="saveData()">CONFIRM & SAVE RECORD</button>
        </div>
    </div>
</div>
<div id="debugConsole"><div>SYSTEM MONITOR: STANDBY...</div></div>
<div id="backdrop" class="custom-modal-backdrop" onclick="closeModal()"></div>
<div id="lookupModal" class="custom-modal">
    <div class="slds-modal__header slds-p-around_large" style="background: var(--pp-blue); color: white; border:none;">
        <h2 style="font-weight: 800; font-size: 1.1rem;">Search Database</h2>
    </div>
    <div class="slds-p-around_large">
        <input type="text" id="modalSearch" class="slds-input" style="border-radius: 12px; margin-bottom:15px;" placeholder="Type to search..." onkeyup="handleSearchInput(this.value)">
        <div style="max-height: 400px; overflow-y: auto;">
            <table class="slds-table slds-table_bordered">
                <thead><tr id="modalHead"></tr></thead>
                <tbody id="lookupResults"></tbody>
            </table>
        </div>
    </div>
    <div class="slds-modal__footer"><button class="slds-button slds-button_neutral" onclick="closeModal()">Close</button></div>
</div>
<script>
    const API_URL = "/api/equipments";
    let currentLookupType = '';
    function logDebug(msg) {
        const console = document.getElementById('debugConsole');
        const entry = document.createElement('div');
        entry.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
        console.appendChild(entry);
        console.scrollTop = console.scrollHeight;
    }
    function toggleFields(val) {
        document.getElementById('mainFormArea').classList.toggle('hidden-field', !val);
        document.querySelectorAll('.slds-col').forEach(c => c.classList.add('hidden-field'));
        const modelSelect = document.getElementById('type');
        const serialInput = document.getElementById('serial');
        modelSelect.disabled = false; modelSelect.classList.remove('readonly-lock');
        serialInput.readOnly = false; serialInput.classList.remove('readonly-lock');
        if (val === 'receiving_inventory') {
            document.getElementById('dateLabel').innerText = "Equipment Received Date";
            showFields(['.f-genID', '.f-account', '.f-type', '.f-serial', '.f-date']);
        } else if (val === 'deployment') {
            document.getElementById('dateLabel').innerText = "Deployment Date";
            modelSelect.disabled = true; modelSelect.classList.add('readonly-lock');
            serialInput.readOnly = true; serialInput.classList.add('readonly-lock');
            showFields(['.f-genID', '.f-account', '.f-equipmentLookup', '.f-type', '.f-serial', '.f-tid', '.f-tracking', '.f-date']);
        } else if (val === 'process_return') {
            showFields(['.f-genID', '.f-equipmentLookup', '.f-type', '.f-serial', '.f-returnReason', '.f-condition', '.f-returnDestination']);
        }
    }
    function showFields(selectors) { selectors.forEach(s => document.querySelector(s)?.classList.remove('hidden-field')); }
    async function saveData() {
        const overlay = document.getElementById('saveOverlay');
        const status = document.getElementById('saveStatus');
        const type = document.getElementById('activityType').value;
        const user = sessionStorage.getItem('pp_userid');
        overlay.classList.add('show-flex');
        try {
            const prefixMap = { receiving_inventory: 'Equip-', deployment: 'DPL-', process_return: 'RTR-' };
            logDebug("Requesting unique record ID...");
            const idRes = await fetch(API_URL, { 
                method: "POST", 
                headers: { "Content-Type": "application/json" }, 
                body: JSON.stringify({ action: 'getNextID', prefix: prefixMap[type] }) 
            });
            const { nextID } = await idRes.json();
            status.innerText = "Syncing with global ledger...";
            let body = { action: '', userEmail: user, payload: {} };
            if (type === 'receiving_inventory') {
                body.action = 'createEquipment';
                body.merchantID = document.getElementById('accountID').value;
                body.payload = { 
                    equipment_id: nextID, 
                    merchant_account: document.getElementById('accountDisplay').value, 
                    terminal_type: document.getElementById('type').value, 
                    serial_number: document.getElementById('serial').value,
                    deployment_date: document.getElementById('depDate').value // This maps to your Dashboard column
                };
            } else if (type === 'deployment') {
                body.action = 'createDeployment';
                body.gearID = document.getElementById('equipmentID').value;
                body.merchantID = document.getElementById('accountID').value;
                body.merchantName = document.getElementById('accountDisplay').value;
                body.payload = { 
                    deployment_id: nextID, 
                    tid: document.getElementById('tid').value, 
                    tracking_id: document.getElementById('tracking').value,
                    deployment_date: document.getElementById('depDate').value 
                };
            } else if (type === 'process_return') {
                body.action = 'createReturn';
                body.gearID = document.getElementById('equipmentID').value;
                body.payload = { 
                    return_id: nextID, 
                    return_reason: document.getElementById('returnReason').value, 
                    condition: document.getElementById('returnCondition').value,
                    return_destination: document.getElementById('returnDestination').value
                };
            }
            const res = await fetch(API_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
            if (res.ok) {
                Swal.fire('Success', `${nextID} has been successfully logged.`, 'success').then(() => location.reload());
            } else {
                const err = await res.json();
                throw new Error(err.message || "Communication rejected.");
            }
        } catch (e) { overlay.classList.remove('show-flex'); Swal.fire('Error', e.message, 'error'); }
    }
    async function fetchLookup(q) {
        const tbody = document.getElementById('lookupResults');
        document.getElementById('modalHead').innerHTML = currentLookupType === 'account' ? '<th>Merchant</th><th>MID</th>' : '<th>ID</th><th>Model</th><th>Serial</th>';
        const res = await fetch(API_URL, { 
            method: "POST", 
            headers: { "Content-Type": "application/json" }, 
            body: JSON.stringify({ 
                action: 'list', 
                schemaId: currentLookupType === 'account' ? '6713847a517aa62ab429e204' : '6717da1c4a74233fa104889f',
                query: q, 
                page: 1 
            }) 
        });
        const data = await res.json();
        tbody.innerHTML = "";
        (data.records || []).forEach(r => {
            const row = document.createElement('tr'); row.style.cursor = "pointer";
            const p = r.properties;
            if (currentLookupType === 'account') {
                row.innerHTML = `<td><b>${p.merchant_name || r.name}</b></td><td>${p.mid || "---"}</td>`;
                row.onclick = () => { document.getElementById('accountDisplay').value = p.merchant_name || r.name; document.getElementById('accountID').value = r.id; closeModal(); };
            } else {
                row.innerHTML = `<td><b>${p.equipment_id}</b></td><td>${p.terminal_type}</td><td>${p.serial_number}</td>`;
                row.onclick = () => { document.getElementById('equipmentDisplay').value = p.equipment_id; document.getElementById('equipmentID').value = r.id; document.getElementById('serial').value = p.serial_number; document.getElementById('type').value = p.terminal_type; closeModal(); };
            }
            tbody.appendChild(row);
        });
    }
    function openModal(type) { currentLookupType = type; document.getElementById('lookupModal').style.display = 'block'; document.getElementById('backdrop').style.display = 'block'; if (type === 'account' && document.getElementById('activityType').value === 'receiving_inventory') renderDefaultMerchants(); else fetchLookup(""); }
    function renderDefaultMerchants() { const tbody = document.getElementById('lookupResults'); tbody.innerHTML = `<tr onclick="selectDef('Warsaw Office / Inventory', '6993793b3572dc52847e4fe0')"><td><b>Warsaw Office</b></td><td>STOCK_PRIMARY</td></tr><tr onclick="selectDef('Warsaw Repairs', '6999c33007a6e56e436c0e84')"><td><b>Warsaw Repairs</b></td><td>STOCK_REPAIR</td></tr>`; }
    function selectDef(n, id) { document.getElementById('accountDisplay').value = n; document.getElementById('accountID').value = id; closeModal(); }
    function closeModal() { document.getElementById('lookupModal').style.display = 'none'; document.getElementById('backdrop').style.display = 'none'; }
    function handleSearchInput(v) { clearTimeout(window.sT); window.sT = setTimeout(() => fetchLookup(v), 500); }
    window.onload = () => { document.getElementById('user-greeting').innerText = `Staff Member: ${sessionStorage.getItem('pp_userid')}`; };
</script>
</body>
</html>
