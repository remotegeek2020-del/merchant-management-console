<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Merchant Portfolio | Secure Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --pp-blue: #004990; --pp-accent: #00a1e0; --glass: rgba(255, 255, 255, 0.9); }
        body { background: radial-gradient(circle at top right, #f8fafc, #e2e8f0); padding: 25px; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .modern-header { background: var(--glass); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .summary-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        .kpi-card { background: var(--glass); padding: 20px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.4); box-shadow: 0 8px 20px rgba(0,0,0,0.03); display: flex; align-items: center; gap: 15px; transition: transform 0.2s; }
        .kpi-card:hover { transform: translateY(-3px); }
        .kpi-icon { background: rgba(0,73,144,0.1); color: var(--pp-blue); padding: 12px; border-radius: 12px; }
        .kpi-val { font-size: 1.3rem; font-weight: 800; color: #002d5a; display: block; }
        .kpi-label { font-size: 0.65rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge { font-weight: 800; font-size: 9px; padding: 4px 12px; border-radius: 50px; text-transform: uppercase; }
        .status-approved { background: #dcfce7; color: #166534; }
        .status-closed { background: #fee2e2; color: #991b1b; }
        .status-pending { background: #fef9c3; color: #854d0e; }
        /* Style for Scrollbar in Modal */
        .swal2-html-container::-webkit-scrollbar { width: 6px; }
        .swal2-html-container::-webkit-scrollbar-track { background: #f1f1f1; }
        .swal2-html-container::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="modern-header">
        <div>
            <div style="display:flex; align-items:center; gap:12px; margin-bottom:8px;">
                <a href="index.html" style="background:white; border:1px solid #e2e8f0; padding:6px 14px; border-radius:50px; color:var(--pp-blue); font-weight:700; font-size:0.7rem; text-decoration:none;">HOME</a>
                <div id="user-greeting" style="background:rgba(0,73,144,0.08); padding:6px 16px; border-radius:50px; font-size:0.7rem; font-weight:700; color:var(--pp-blue);">Staff Member</div>
            </div>
            <h1 style="font-size: 1.6rem; font-weight: 800; color: #002d5a;">Merchant Portfolio</h1>
        </div>

        <div class="slds-grid slds-grid_vertical-align-center">
            <select id="statusFilter" class="slds-select" style="width: 170px; margin-right: 8px; border-radius:12px; height:40px;" onchange="resetAndFetch()">
                <option value="">All Statuses</option>
                <option value="Approved">Approved</option>
                <option value="Approved - Collections">Approved - Collections</option>
                <option value="Closed">Closed</option>
                <option value="Closed - Collections">Closed - Collections</option>
                <option value="Closed - Risk">Closed - Risk</option>
                <option value="Collections">Collections</option>
                <option value="Declined">Declined</option>
                <option value="Enrollment">Enrollment</option>
                <option value="Fraud">Fraud</option>
                <option value="Pending">Pending</option>
                <option value="Withdrawn">Withdrawn</option>
            </select>
            <select id="filterBy" class="slds-select" style="width: 160px; margin-right: 8px; border-radius:12px; height:40px;">
                <option value="dba_name">DBA Name</option>
                <option value="merchant_id">Merchant ID (MID)</option>
                <option value="agent_id">Partner ID</option>
                <option value="company_name">Company Name</option>
                <option value="partner_name">Partner Name</option>
            </select>
            <input type="text" id="searchInput" placeholder="Search..." class="slds-input" style="width:200px; border-radius:12px; height:40px; margin-right:8px;" onkeypress="if(event.key==='Enter') resetAndFetch()">
            <button class="slds-button slds-button_brand" style="border-radius:12px; height: 40px; padding: 0 25px;" onclick="resetAndFetch()">Search</button>
        </div>
    </div>

    <div class="summary-bar">
        <div class="kpi-card">
            <div class="kpi-icon"><span class="material-icons">payments</span></div>
            <div><span class="kpi-label">Filtered MTD</span><span class="kpi-val" id="mtd-val">$0.00</span></div>
        </div>
        <div class="kpi-card">
            <div class="kpi-icon" style="color:#00a1e0;"><span class="material-icons">calendar_today</span></div>
            <div><span class="kpi-label">Total 30D</span><span class="kpi-val" id="30d-val">$0.00</span></div>
        </div>
        <div class="kpi-card">
            <div class="kpi-icon" style="color:#2e7d32;"><span class="material-icons">history</span></div>
            <div><span class="kpi-label">Total 90D</span><span class="kpi-val" id="90d-val">$0.00</span></div>
        </div>
        <div class="kpi-card" style="background:#004990; color:white;">
            <div class="kpi-icon" style="color:white;"><span class="material-icons">pie_chart</span></div>
            <div><span class="kpi-label" style="color:rgba(255,255,255,0.7);">Portfolio Share</span><span class="kpi-val" id="share-val" style="color:white;">0.00%</span></div>
        </div>
    </div>

    <article class="slds-card" style="border-radius: 20px; overflow: hidden; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05);">
        <table class="slds-table slds-table_bordered slds-table_cell-buffer slds-no-row-hover">
            <thead>
                <tr class="slds-line-height_reset">
                    <th scope="col" style="background:#f8fafc; font-weight:700;">DBA Name</th>
                    <th scope="col" style="background:#f8fafc; font-weight:700;">Merchant ID</th>
                    <th scope="col" style="background:#f8fafc; font-weight:700;">Partner ID</th>
                    <th scope="col" style="background:#f8fafc; font-weight:700;">Company</th>
                    <th scope="col" style="background:#f8fafc; font-weight:700;">Partner Name</th>
                    <th scope="col" style="background:#f8fafc; font-weight:700;">Status</th>
                </tr>
            </thead>
            <tbody id="merchantTableBody"></tbody>
        </table>
        <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center; background: #f8fafc; border-top: 1px solid #e2e8f0;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 11px; font-weight: 700; color: #64748b;">Display:</span>
                <select id="pageLimit" class="slds-select" style="width: 80px; height: 32px !important; border-radius:8px;" onchange="resetAndFetch()">
                    <option value="20">20</option><option value="50">50</option><option value="100">100</option>
                </select>
            </div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="slds-button slds-button_neutral" id="prevBtn" onclick="changePage(-1)" disabled>Previous</button>
                <span id="pageInfo" style="font-weight:700; font-size: 12px;">Page 1</span>
                <button class="slds-button slds-button_neutral" id="nextBtn" onclick="changePage(1)">Next</button>
            </div>
        </div>
    </article>

 <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        let currentPage = 0;
        let currentRecords = [];

        async function fetchMerchants() {
            const tbody = document.getElementById('merchantTableBody');
            const limit = document.getElementById('pageLimit').value;
            tbody.innerHTML = "<tr><td colspan='6' style='text-align:center; padding:60px;'>Syncing Secure Ledger...</td></tr>";
            
            try {
                const res = await fetch('/api/merchants', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        action: 'list', 
                        page: currentPage, 
                        limit: limit, 
                        query: document.getElementById('searchInput').value, 
                        filterBy: document.getElementById('filterBy').value, 
                        statusFilter: document.getElementById('statusFilter').value 
                    })
                });
                const result = await res.json();
                if (!result.success) throw new Error(result.message);
                
                currentRecords = result.data;
                tbody.innerHTML = "";

                const cur = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' });
                document.getElementById('mtd-val').innerText = cur.format(result.metrics.totalMTD || 0);
                document.getElementById('30d-val').innerText = cur.format(result.metrics.total30D || 0);
                document.getElementById('90d-val').innerText = cur.format(result.metrics.total90D || 0);
                document.getElementById('share-val').innerText = (result.metrics.portfolioShare || 0) + '%';

                currentRecords.forEach(m => {
                    const row = tbody.insertRow();
                    const statusVal = m.account_status || '';
                    const statusClass = statusVal.toLowerCase().includes('approved') ? 'status-approved' : 
                                      statusVal.toLowerCase().includes('closed') ? 'status-closed' : 'status-pending';
                    
                    row.innerHTML = `
                        <td><a onclick="openModal('${m.id}')" style="font-weight:700; color:var(--pp-blue); cursor:pointer;">${m.dba_name || '---'}</a></td>
                        <td><code>${m.merchant_id || '---'}</code></td>
                        <td>${m.agent_id || '---'}</td>
                        <td style="font-weight:600;">${m.company_name || '---'}</td>
                        <td>${m.partner_name || '---'}</td>
                        <td><span class="badge ${statusClass}">${statusVal || '---'}</span></td>
                    `;
                });

                const totalFound = result.count || 0;
                document.getElementById('pageInfo').innerHTML = `Page ${currentPage + 1} <span style="color:#94a3b8; font-weight:400; margin-left:8px;">(Total Found: ${totalFound.toLocaleString()})</span>`;
                
                document.getElementById('prevBtn').disabled = (currentPage === 0);
                document.getElementById('nextBtn').disabled = ((currentPage + 1) * limit) >= totalFound;

            } catch (err) { 
                console.error(err);
                tbody.innerHTML = "<tr><td colspan='6' style='color:red; text-align:center;'>Sync error. Check console.</td></tr>"; 
            }
        }

        async function openModal(id) {
            const m = currentRecords.find(r => r.id === id);
            if (!m) return;

            Swal.fire({ title: 'Syncing Ledger...', didOpen: () => { Swal.showLoading(); } });

            try {
                const [notesRes, logsRes] = await Promise.all([
                    fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'get_notes', merchant_uuid: m.id, type: 'manual' }) }),
                    fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'get_notes', merchant_uuid: m.id, type: 'system' }) })
                ]);
                
                const notes = (await notesRes.json()).data || [];
                const logs = (await logsRes.json()).data || [];

                Swal.fire({
                    title: `<div style="text-align:left; font-size:1.2rem; font-weight:800; color:#002d5a;">${m.dba_name || 'Merchant Profile'}</div>`,
                    width: '900px',
                    html: `
                        <div style="display:flex; border-bottom:2px solid #e2e8f0; margin-bottom:20px;">
                            <button onclick="switchTab('details')" id="tab-details" style="padding:10px 20px; border:none; background:none; font-weight:700; color:var(--pp-blue); border-bottom:3px solid var(--pp-blue); cursor:pointer;">ACCOUNT DETAILS</button>
                            <button onclick="switchTab('notes')" id="tab-notes" style="padding:10px 20px; border:none; background:none; font-weight:700; color:#64748b; cursor:pointer;">INTERNAL NOTES</button>
                            <button onclick="switchTab('audit')" id="tab-audit" style="padding:10px 20px; border:none; background:none; font-weight:700; color:#64748b; cursor:pointer;">AUDIT HISTORY</button>
                        </div>

                        <div id="content-details" class="tab-content" style="max-height:600px; overflow-y:auto; padding-right:10px;">
                            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; text-align:left; background:#f8fafc; padding:20px; border-radius:12px; border:1px solid #e2e8f0;">
                                
                                <div style="grid-column: span 2; display:flex; gap:10px; background:#e2e8f0; padding:10px; border-radius:8px; margin-bottom:10px;">
                                    <div style="flex:1;"><label style="font-size:9px; font-weight:800; color:#475569;">MERCHANT ID (MID)</label><br><strong>${m.merchant_id || '---'}</strong></div>
                                    <div style="flex:1;"><label style="font-size:9px; font-weight:800; color:#475569;">PARTNER ID</label><br><strong>${m.agent_id || '---'}</strong></div>
                                    <div style="flex:1;"><label style="font-size:9px; font-weight:800; color:#475569;">UUID</label><br><small style="font-size:9px;">${m.id}</small></div>
                                </div>

                                <div><label class="edit-label">DBA NAME</label><input id="edit-dba_name" class="slds-input" value="${m.dba_name || ''}"></div>
                                <div><label class="edit-label">ACCOUNT STATUS</label>
                                    <select id="edit-account_status" class="slds-select">
                                        <option value="${m.account_status}" selected>${m.account_status}</option>
                                        <option value="Approved">Approved</option>
                                        <option value="Approved - Collections">Approved - Collections</option>
                                        <option value="Closed">Closed</option>
                                        <option value="Closed - Collections">Closed - Collections</option>
                                        <option value="Closed - Risk">Closed - Risk</option>
                                        <option value="Collections">Collections</option>
                                        <option value="Declined">Declined</option>
                                        <option value="Enrollment">Enrollment</option>
                                        <option value="Fraud">Fraud</option>
                                        <option value="Pending">Pending</option>
                                        <option value="Withdrawn">Withdrawn</option>
                                    </select>
                                </div>

                                <div><label class="edit-label">EMAIL</label><input id="edit-email" class="slds-input" value="${m.email || ''}"></div>
                                <div><label class="edit-label">MERCHANT PHONE</label><input id="edit-merchant_phone" class="slds-input" value="${m.merchant_phone || ''}"></div>
                                <div><label class="edit-label">PRIMARY CONTACT</label><input id="edit-merchant_primary_contact" class="slds-input" value="${m.merchant_primary_contact || ''}"></div>
                                <div><label class="edit-label">AGENT NAME</label><input id="edit-agent_name" class="slds-input" value="${m.agent_name || ''}"></div>

                                <div><label class="edit-label">PROCESSOR</label><input id="edit-processor" class="slds-input" value="${m.processor || ''}"></div>
                                <div><label class="edit-label">PLATFORM</label><input id="edit-processor_platform" class="slds-input" value="${m.processor_platform || ''}"></div>
                                <div><label class="edit-label">EDGE ENABLED</label><input id="edit-is_edge_enabled" class="slds-input" value="${m.is_edge_enabled || ''}"></div>
                                <div><label class="edit-label">PCI COMPLIANT</label><input id="edit-is_pci_compliant" class="slds-input" value="${m.is_pci_compliant || ''}"></div>

                                <div><label class="edit-label">ENROLLMENT DATE</label><input id="edit-enrollment_date" class="slds-input" value="${m.enrollment_date || ''}"></div>
                                <div><label class="edit-label">APPROVED DATE</label><input id="edit-approved_date" class="slds-input" value="${m.approved_date || ''}"></div>

                                <div style="grid-column: span 2;">
                                    <label class="edit-label">UNDERWRITING DECISION NOTE</label>
                                    <textarea id="edit-underwriting_decision_note" class="slds-textarea" style="height:60px;">${m.underwriting_decision_note || ''}</textarea>
                                </div>
                            </div>
                            <button onclick="saveMerchant('${m.id}')" class="slds-button slds-button_brand" style="margin-top:20px; width:100%; height:45px; border-radius:12px; font-weight:700;">COMMIT CHANGES TO SECURE LEDGER</button>
                        </div>

                        <div id="content-notes" class="tab-content" style="display:none; text-align:left;">
                            <div style="background:#f1f5f9; padding:15px; border-radius:12px; margin-bottom:15px;">
                                <input id="new-note-title" placeholder="Short Subject..." class="slds-input" style="margin-bottom:8px; border-radius:8px;">
                                <textarea id="new-note-body" placeholder="Enter staff commentary here..." class="slds-textarea" style="height:80px; border-radius:8px;"></textarea>
                                <button onclick="addNote('${m.id}')" class="slds-button slds-button_neutral" style="margin-top:10px; width:100%; border-radius:8px; font-weight:700;">SAVE INTERNAL NOTE</button>
                            </div>
                            <div style="max-height:300px; overflow-y:auto;">
                                ${notes.map(n => `<div style="padding:12px; border-bottom:1px solid #e2e8f0;"><strong>${n.title}</strong><br><small>${n.body}</small></div>`).join('') || 'No notes.'}
                            </div>
                        </div>

                        <div id="content-audit" class="tab-content" style="display:none; text-align:left;">
                            <div style="max-height:450px; overflow-y:auto; font-family: monospace; font-size:11px; background:#0f172a; color:#38bdf8; padding:15px; border-radius:12px;">
                                ${logs.map(l => `<div style="margin-bottom:10px; border-bottom:1px solid rgba(56,189,248,0.1); padding-bottom:5px;">[${new Date(l.created_at).toLocaleString()}] ${l.body.replace(/\n/g, '<br>')}</div>`).join('') || '> NO LOGS'}
                            </div>
                        </div>
                    `,
                    showConfirmButton: false,
                    showCloseButton: true
                });
            } catch (err) { Swal.fire('Error', err.message, 'error'); }
        }

        window.switchTab = function(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.querySelectorAll('[id^="tab-"]').forEach(t => { t.style.color = '#64748b'; t.style.borderBottom = 'none'; });
            document.getElementById('content-' + tab).style.display = 'block';
            document.getElementById('tab-' + tab).style.color = 'var(--pp-blue)';
            document.getElementById('tab-' + tab).style.borderBottom = '3px solid var(--pp-blue)';
        };

        window.saveMerchant = async function(uuid) {
            // SCRIPT: Collect all fields matching the Supabase schema names
            const fields = [
                'dba_name', 'account_status', 'email', 'merchant_phone', 
                'merchant_primary_contact', 'agent_name', 'processor', 
                'processor_platform', 'is_edge_enabled', 'is_pci_compliant', 
                'enrollment_date', 'approved_date', 'underwriting_decision_note'
            ];
            
            const payload = {};
            fields.forEach(f => {
                const el = document.getElementById('edit-' + f);
                if(el) payload[f] = el.value;
            });
            
            try {
                const res = await fetch('/api/merchants', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'update', id: uuid, payload, user: sessionStorage.getItem('pp_userid') })
                });
                const result = await res.json();
                if(result.success) {
                    Swal.fire('Success', 'Secure Ledger Updated.', 'success');
                    fetchMerchants();
                } else { throw new Error(result.message); }
            } catch (err) { Swal.fire('Error', err.message, 'error'); }
        };

        window.addNote = async function(uuid) {
            const title = document.getElementById('new-note-title').value;
            const body = document.getElementById('new-note-body').value;
            if(!title || !body) return Swal.fire('Error', 'Subject and Body required.', 'warning');
            const res = await fetch('/api/merchants', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'add_note', merchant_uuid: uuid, title, body, user: sessionStorage.getItem('pp_userid') })
            });
            if((await res.json()).success) openModal(uuid);
        };

        window.switchTab = function(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.querySelectorAll('[id^="tab-"]').forEach(t => { t.style.color = '#64748b'; t.style.borderBottom = 'none'; });
            document.getElementById('content-' + tab).style.display = 'block';
            document.getElementById('tab-' + tab).style.color = 'var(--pp-blue)';
            document.getElementById('tab-' + tab).style.borderBottom = '3px solid var(--pp-blue)';
        };

        // FIXED: Now collects ALL editable fields from the modal
        window.saveMerchant = async function(uuid) {
            const payload = {
                dba_name: document.getElementById('edit-dba').value,
                account_status: document.getElementById('edit-status').value,
                legal_name: document.getElementById('edit-legal').value,
                email: document.getElementById('edit-email').value,
                phone: document.getElementById('edit-phone').value,
                agent_name: document.getElementById('edit-agent-name').value,
                address: document.getElementById('edit-address').value
            };
            
            try {
                const res = await fetch('/api/merchants', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'update', id: uuid, payload, user: sessionStorage.getItem('pp_userid') })
                });
                const result = await res.json();
                if(result.success) {
                    Swal.fire('Success', 'Record updated successfully.', 'success');
                    fetchMerchants();
                } else {
                    throw new Error(result.message);
                }
            } catch (err) {
                Swal.fire('Error', err.message, 'error');
            }
        };

        window.addNote = async function(uuid) {
            const title = document.getElementById('new-note-title').value;
            const body = document.getElementById('new-note-body').value;
            if(!title || !body) return Swal.fire('Error', 'Note must have a title and body', 'warning');
            
            const res = await fetch('/api/merchants', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'add_note', merchant_uuid: uuid, title, body, user: sessionStorage.getItem('pp_userid') })
            });
            if((await res.json()).success) openModal(uuid);
        };

        function changePage(dir) { currentPage += dir; fetchMerchants(); }
        function resetAndFetch() { currentPage = 0; fetchMerchants(); }
        window.onload = () => { fetchMerchants(); };
    </script>
</body>
</html>
