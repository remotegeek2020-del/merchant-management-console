<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Merchant Portfolio | Secure Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --pp-blue: #004990; --pp-accent: #00a1e0; --glass: rgba(255, 255, 255, 0.95); }
        body { background: #f1f5f9; padding: 25px; font-family: 'Inter', sans-serif; min-height: 100vh; }
        
        .dashboard-wrapper { max-width: 1600px; margin: 0 auto; }

        .modern-header { 
            background: var(--glass); backdrop-filter: blur(10px); border-radius: 16px; 
            padding: 20px 30px; margin-bottom: 25px; display: flex; 
            justify-content: space-between; align-items: center; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid white;
        }

        .summary-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        
        .kpi-card { 
            background: white; padding: 18px; border-radius: 14px; 
            display: flex; align-items: center; gap: 15px; border: 1px solid #e2e8f0;
        }

        .kpi-icon { background: rgba(0,73,144,0.08); color: var(--pp-blue); padding: 10px; border-radius: 10px; display: flex; }
        .kpi-val { font-size: 1.15rem; font-weight: 800; color: var(--pp-blue); display: block; }
        .kpi-label { font-size: 0.65rem; font-weight: 700; color: #64748b; text-transform: uppercase; }

        /* Status Badges */
        .badge { font-weight: 700; font-size: 10px; padding: 4px 10px; border-radius: 6px; text-transform: uppercase; display: inline-block; }
        .status-approved { background: #dcfce7; color: #166534; }
        .status-closed { background: #fee2e2; color: #991b1b; }
        .status-fraud { background: #1e293b; color: #ffffff; }
        .status-pending { background: #fef9c3; color: #854d0e; }

        .main-table-card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .slds-table thead th { background-color: #f8fafc !important; color: #475569 !important; font-weight: 700 !important; padding: 14px !important; }
        
        /* Interactive DBA Link */
        .dba-link { color: var(--pp-blue); font-weight: 700; cursor: pointer; text-decoration: none; transition: color 0.2s; }
        .dba-link:hover { color: var(--pp-accent); text-decoration: underline; }
    </style>
</head>
<body>

<div class="dashboard-wrapper">
    <div class="modern-header">
        <div>
            <div style="display:flex; align-items:center; gap:12px; margin-bottom:4px;">
                <a href="index.html" style="background:#f8fafc; border:1px solid #e2e8f0; padding:4px 12px; border-radius:50px; color:var(--pp-blue); font-weight:700; font-size:0.65rem; text-decoration:none;">HOME</a>
                <div style="color: #64748b; font-size: 0.75rem; font-weight: 600;">Staff Member</div>
            </div>
            <h1 style="font-size: 1.5rem; font-weight: 800; color: #0f172a;">Merchant Portfolio</h1>
        </div>

        <div style="display: flex; gap: 8px; align-items: center;">
            <select id="statusFilter" class="slds-select" style="width: 150px; border-radius:8px;" onchange="resetAndFetch()">
                <option value="">All Statuses</option>
                <option value="Approved">Approved</option>
                <option value="Closed">Closed</option>
                <option value="Fraud">Fraud</option>
                <option value="Declined">Declined</option>
                <option value="Pending">Pending</option>
            </select>
            <select id="filterBy" class="slds-select" style="width: 160px; border-radius:8px;">
                <option value="dba_name">DBA Name</option>
                <option value="merchant_id">Merchant ID (MID)</option>
                <option value="agent_id">Partner ID</option>
                <option value="company_name">Company Name</option>
                <option value="partner_name">Partner Name</option>
            </select>
            <input type="text" id="searchInput" placeholder="Search..." class="slds-input" style="width:200px; border-radius:8px;" onkeypress="if(event.key==='Enter') resetAndFetch()">
            <button class="slds-button slds-button_brand" style="border-radius:8px; background:var(--pp-blue); padding: 0 20px;" onclick="resetAndFetch()">Search</button>
        </div>
    </div>

    <div class="summary-bar">
        <div class="kpi-card">
            <div class="kpi-icon"><span class="material-icons">payments</span></div>
            <div><span class="kpi-label">Filtered MTD</span><span class="kpi-val" id="mtd-val">$0.00</span></div>
        </div>
        <div class="kpi-card">
            <div class="kpi-icon" style="color:#00a1e0;"><span class="material-icons">calendar_today</span></div>
            <div><span class="kpi-label">Total 30D</span><span class="kpi-val" id="30d-val">$0.00</span></div>
        </div>
        <div class="kpi-card">
            <div class="kpi-icon" style="color:#10b981;"><span class="material-icons">history</span></div>
            <div><span class="kpi-label">Total 90D</span><span class="kpi-val" id="90d-val">$0.00</span></div>
        </div>
        <div class="kpi-card" style="background:var(--pp-blue); border:none;">
            <div class="kpi-icon" style="color:white; background:rgba(255,255,255,0.1);"><span class="material-icons">pie_chart</span></div>
            <div><span class="kpi-label" style="color:rgba(255,255,255,0.7);">Portfolio Share</span><span class="kpi-val" id="share-val" style="color:white;">0.00%</span></div>
        </div>
    </div>

    <article class="main-table-card">
        <table class="slds-table slds-table_bordered slds-table_cell-buffer slds-no-row-hover">
            <thead>
                <tr class="slds-line-height_reset">
                    <th scope="col">DBA Name</th>
                    <th scope="col">Merchant ID</th>
                    <th scope="col">Partner ID</th>
                    <th scope="col">Company</th>
                    <th scope="col">Partner Name</th>
                    <th scope="col">Status</th>
                </tr>
            </thead>
            <tbody id="merchantTableBody"></tbody>
        </table>
        
        <div style="padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; background: #f8fafc; border-top: 1px solid #e2e8f0;">
            <div style="color: #64748b; font-size: 0.75rem; font-weight: 700;">DISPLAY: 
                <select id="pageLimit" class="slds-select" style="width: 70px; margin-left:10px; height: 30px !important;" onchange="resetAndFetch()">
                    <option value="20">20</option><option value="50">50</option>
                </select>
            </div>
            <div style="display: flex; gap: 8px; align-items: center;">
                <span id="pageInfo" style="font-size: 0.75rem; font-weight: 600; margin-right: 10px;">Page 1</span>
                <button class="slds-button slds-button_neutral" id="prevBtn" onclick="changePage(-1)" disabled>Back</button>
                <button class="slds-button slds-button_neutral" id="nextBtn" onclick="changePage(1)">Next</button>
            </div>
        </div>
    </article>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    let currentPage = 0;
    let currentRecords = [];

    async function fetchMerchants() {
        const tbody = document.getElementById('merchantTableBody');
        const limit = document.getElementById('pageLimit').value;
        tbody.innerHTML = "<tr><td colspan='6' style='text-align:center; padding:50px; color:#94a3b8;'>Loading Portfolio...</td></tr>";
        
        try {
            const res = await fetch('/api/merchants', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    action: 'list', 
                    page: currentPage, 
                    limit: limit, 
                    query: document.getElementById('searchInput').value, 
                    filterBy: document.getElementById('filterBy').value,
                    statusFilter: document.getElementById('statusFilter').value 
                })
            });
            const result = await res.json();
            if (!result.success) throw new Error(result.message);
            
            currentRecords = result.data;
            tbody.innerHTML = "";

            currentRecords.forEach(m => {
                const row = tbody.insertRow();
                const s = (m.account_status || '').toLowerCase();
                const statusClass = s.includes('approved') ? 'status-approved' : 
                                   s.includes('closed') ? 'status-closed' : 
                                   s.includes('fraud') ? 'status-fraud' : 'status-pending';
                
                row.innerHTML = `
                    <td><a onclick="openModal('${m.id}')" class="dba-link">${m.dba_name || '---'}</a></td>
                    <td><code style="background:#f1f5f9; padding:2px 6px; border-radius:4px;">${m.merchant_id || '---'}</code></td>
                    <td>${m.agent_id || '---'}</td>
                    <td style="font-weight:600;">${m.company_name || '---'}</td>
                    <td>${m.partner_name || '---'}</td>
                    <td><span class="badge ${statusClass}">${m.account_status || '---'}</span></td>
                `;
            });

            document.getElementById('pageInfo').innerText = `Page ${currentPage + 1}`;
            document.getElementById('prevBtn').disabled = (currentPage === 0);
            document.getElementById('nextBtn').disabled = (currentRecords.length < limit);

            // Update Metrics
            const cur = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' });
            document.getElementById('mtd-val').innerText = cur.format(result.metrics.totalMTD || 0);
            document.getElementById('30d-val').innerText = cur.format(result.metrics.total30D || 0);
            document.getElementById('90d-val').innerText = cur.format(result.metrics.total90D || 0);
            document.getElementById('share-val').innerText = (result.metrics.portfolioShare || 0) + '%';

        } catch (err) { 
            tbody.innerHTML = `<tr><td colspan='6' style='text-align:center; color:red; padding:20px;'>Error: ${err.message}</td></tr>`;
        }
    }

    // Modal, Page and Search functions (restored)
    function changePage(dir) { currentPage += dir; fetchMerchants(); }
    function resetAndFetch() { currentPage = 0; fetchMerchants(); }
    
    // Placeholder for your openModal logic (Restore your full Swal logic here)
    window.openModal = function(id) {
        console.log("Opening Modal for ID:", id);
        // Put your full openModal(id) logic back here
    }

    window.onload = fetchMerchants;
</script>
</body>
</html>
