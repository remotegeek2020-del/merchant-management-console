<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Merchant Portfolio | Secure Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --pp-blue: #004990; --pp-accent: #00a1e0; --glass: rgba(255, 255, 255, 0.9); }
        body { background: radial-gradient(circle at top right, #f8fafc, #e2e8f0); padding: 25px; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .modern-header { background: var(--glass); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .kpi-card { background: var(--glass); padding: 20px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.4); box-shadow: 0 8px 20px rgba(0,0,0,0.03); display: flex; align-items: center; gap: 15px; }
        .custom-modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0, 25, 50, 0.4); backdrop-filter: blur(5px); align-items: center; justify-content: center; }
        .custom-modal-content { background: white; width: 95%; max-width: 900px; border-radius: 24px; overflow: hidden; max-height: 90vh; display: flex; flex-direction: column; }
        .modal-scroll { overflow-y: auto; padding: 30px; flex-grow: 1; }
        .modal-tabs { display: flex; background: #f8fafc; border-bottom: 1px solid #e2e8f0; padding: 0 30px; }
        .modal-tab-btn { padding: 15px 20px; font-weight: 700; font-size: 11px; color: #64748b; border: none; background: none; cursor: pointer; border-bottom: 3px solid transparent; }
        .modal-tab-btn.active { color: var(--pp-blue); border-bottom-color: var(--pp-blue); }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 30px; }
        .detail-item { border-bottom: 1px solid #f1f5f9; padding: 8px 0; display: flex; justify-content: space-between; font-size: 11px; align-items: center; }
        .note-card { background: white; border: 1px solid #e2e8f0; padding: 12px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid var(--pp-blue); }
    </style>
</head>
<body>

    <div class="modern-header">
        <div>
            <div style="display:flex; align-items:center; gap:12px; margin-bottom:8px;">
                <a href="index.html" style="background:white; border:1px solid #e2e8f0; padding:6px 14px; border-radius:50px; color:var(--pp-blue); font-weight:700; font-size:0.7rem; text-decoration:none;">HOME</a>
                <div id="user-greeting" style="background:rgba(0,73,144,0.08); padding:6px 16px; border-radius:50px; font-size:0.7rem; font-weight:700; color:var(--pp-blue);">Staff Member</div>
            </div>
            <h1 style="font-size: 1.6rem; font-weight: 800; color: #002d5a;">Merchant Portfolio</h1>
        </div>
        <div class="slds-grid slds-grid_vertical-align-center">
            <input type="text" id="searchInput" placeholder="Search DBA..." class="slds-input" style="width:200px; border-radius:12px; height:40px; margin-right:8px;" onkeypress="if(event.key==='Enter') resetAndFetch()">
            <button class="slds-button slds-button_brand" style="border-radius:12px; height: 40px;" onclick="resetAndFetch()">Search</button>
        </div>
    </div>

    <article class="slds-card" style="border-radius: 20px; overflow: hidden; border: none;">
        <table class="slds-table slds-table_bordered slds-table_cell-buffer slds-no-row-hover">
            <thead>
                <tr class="slds-line-height_reset">
                    <th scope="col" style="background:#f8fafc; font-weight:700;">DBA Name</th>
                    <th scope="col" style="background:#f8fafc; font-weight:700;">Merchant ID</th>
                    <th scope="col" style="background:#f8fafc; font-weight:700;">Status</th>
                </tr>
            </thead>
            <tbody id="merchantTableBody"></tbody>
        </table>
    </article>

    <div id="merchantModal" class="custom-modal" onclick="if(event.target == this) closeModal()">
        <div class="custom-modal-content">
            <div style="padding: 20px; background: var(--pp-blue); color: white; display: flex; justify-content: space-between; align-items: center;">
                <h2 style="font-weight: 800; font-size: 1rem;">Merchant Profile</h2>
                <span class="material-icons" style="cursor:pointer" onclick="closeModal()">close</span>
            </div>

            <div class="modal-tabs">
                <button onclick="switchTab('details')" id="tab-btn-details" class="modal-tab-btn active">DETAILS</button>
                <button onclick="switchTab('notes')" id="tab-btn-notes" class="modal-tab-btn">NOTES</button>
                <button onclick="switchTab('history')" id="tab-btn-history" class="modal-tab-btn">HISTORY</button>
                <button onclick="switchTab('attachments')" id="tab-btn-attachments" class="modal-tab-btn">VAULT</button>
            </div>
            
            <div class="modal-scroll">
                <div id="view-details">
                    <div id="modalDetailsGrid" class="detail-grid"></div>
                </div>

                <div id="view-notes" style="display: none;">
                    <div style="background: #f8fafc; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #e2e8f0;">
                        <input type="text" id="noteTitle" class="slds-input" placeholder="Subject" style="margin-bottom: 8px;">
                        <textarea id="noteBody" class="slds-textarea" placeholder="Internal note..." style="margin-bottom: 8px;"></textarea>
                        <button class="slds-button slds-button_brand" onclick="submitNote()" style="width: 100%;">Save Note</button>
                    </div>
                    <div id="notesContainer"></div>
                </div>

                <div id="view-history" style="display: none;">
                    <div id="historyContainer"></div>
                </div>

                <div id="view-attachments" style="display: none;">
                    <div style="background: #f8fafc; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #e2e8f0;">
                        <h3 style="font-weight: 800; font-size: 11px; margin-bottom: 10px;">Upload Document</h3>
                        <input type="text" id="attName" class="slds-input" placeholder="File Name (e.g. Agreement)" style="margin-bottom: 8px;">
                        <input type="file" id="fileInput" class="slds-input" style="margin-bottom: 8px; padding: 5px;">
                        <button class="slds-button slds-button_brand" onclick="handleFileUpload()" style="width: 100%;">Secure Upload</button>
                    </div>
                    <table class="slds-table slds-table_bordered">
                        <thead><tr><th>Name</th><th>Date</th><th>Action</th></tr></thead>
                        <tbody id="attachmentsContainer"></tbody>
                    </table>
                </div>
            </div>

            <div style="padding: 20px; background: #f8fafc; border-top:1px solid #e2e8f0; display: flex; justify-content: flex-end; gap: 10px;">
                <button class="slds-button slds-button_neutral" onclick="closeModal()">Cancel</button>
                <button class="slds-button slds-button_brand" id="saveChangeBtn">Save Changes</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        // 1. Initialize Supabase Client (Option A: Direct Upload)
        const supabaseUrl = 'https://zuzwljjrppyrzngmhdru.supabase.co'; 
        const supabaseKey = 'sb_publishable_DgzVF5uoTSV1A_c0V7jvpQ_v96Ov0bO';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let activeMerchantUuid = null;
        let currentRecords = [];

        function switchTab(tab) {
            ['details', 'notes', 'history', 'attachments'].forEach(t => {
                document.getElementById(`view-${t}`).style.display = t === tab ? 'block' : 'none';
                document.getElementById(`tab-btn-${t}`).classList.toggle('active', t === tab);
            });
            if(tab === 'notes') fetchNotes(activeMerchantUuid, 'manual');
            if(tab === 'history') fetchNotes(activeMerchantUuid, 'system');
            if(tab === 'attachments') fetchAttachments(activeMerchantUuid);
        }

        async function fetchMerchants() {
            const res = await fetch('/api/merchants', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'list', query: document.getElementById('searchInput').value, filterBy: 'dba_name' })
            });
            const result = await res.json();
            if (result.success) {
                currentRecords = result.data;
                document.getElementById('merchantTableBody').innerHTML = result.data.map(m => `
                    <tr>
                        <td><a onclick="openModal('${m.id}')" style="font-weight:700; cursor:pointer; color:var(--pp-blue);">${m.dba_name}</a></td>
                        <td><code>${m.merchant_id}</code></td>
                        <td>${m.account_status}</td>
                    </tr>
                `).join('');
            }
        }

        async function fetchNotes(uuid, type) {
            const container = type === 'manual' ? document.getElementById('notesContainer') : document.getElementById('historyContainer');
            const res = await fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'get_notes', merchant_uuid: uuid, type }) });
            const result = await res.json();
            if (result.success) {
                container.innerHTML = result.data.map(n => `
                    <div class="note-card">
                        <div style="font-weight:700; font-size:11px;">${n.title}</div>
                        <div style="font-size:11px; white-space:pre-wrap; font-family:${type==='system'?'monospace':'inherit'};">${n.body}</div>
                        <div style="font-size:9px; color:#94a3b8; margin-top:5px;">BY ${n.created_by} • ${new Date(n.created_at).toLocaleString()}</div>
                    </div>
                `).join('');
            }
        }

        async function fetchAttachments(uuid) {
            const res = await fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'get_attachments', merchant_uuid: uuid }) });
            const result = await res.json();
            if (result.success) {
                document.getElementById('attachmentsContainer').innerHTML = result.data.map(a => `
                    <tr>
                        <td style="font-size:11px; font-weight:700;">${a.attachment_name}</td>
                        <td style="font-size:10px; color:#64748b;">${new Date(a.created_at).toLocaleDateString()}</td>
                        <td><a href="${a.file_url}" target="_blank" class="slds-button slds-button_neutral" style="font-size:9px;">VIEW</a></td>
                    </tr>
                `).join('') || "<tr><td colspan='3' style='text-align:center;'>No files found.</td></tr>";
            }
        }

        async function handleFileUpload() {
            const file = document.getElementById('fileInput').files[0];
            const name = document.getElementById('attName').value;
            if(!file || !name) return Swal.fire('Error', 'Missing file or name', 'warning');
            
            Swal.fire({ title: 'Uploading to Vault...', didOpen: () => Swal.showLoading() });
            
            try {
                const path = `${activeMerchantUuid}/${Date.now()}_${file.name}`;
                const { data, error } = await supabaseClient.storage.from('merchant-docs').upload(path, file);
                if (error) throw error;

                const { data: { publicUrl } } = supabaseClient.storage.from('merchant-docs').getPublicUrl(path);

                await fetch('/api/merchants', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'save_attachment', merchant_uuid: activeMerchantUuid, name, url: publicUrl })
                });

                Swal.fire('Success', 'File uploaded and logged.', 'success');
                fetchAttachments(activeMerchantUuid);
            } catch (err) { Swal.fire('Upload Failed', err.message, 'error'); }
        }

        function openModal(id) {
            const m = currentRecords.find(r => r.id === id);
            activeMerchantUuid = m.id;
            switchTab('details');
            document.getElementById('modalDetailsGrid').innerHTML = ['dba_name', 'merchant_id', 'account_status', 'email'].map(f => `
                <div class="detail-item"><span style="font-weight:700; color:#64748b;">${f.toUpperCase()}</span><input type="text" id="edit-${f}" class="slds-input" value="${m[f]||''}" style="width:60%; height:28px;"></div>
            `).join('');
            document.getElementById('saveChangeBtn').onclick = () => saveChanges(m.id);
            document.getElementById('merchantModal').style.display = 'flex';
        }

        async function saveChanges(id) {
            const payload = {};
            ['dba_name', 'account_status', 'email'].forEach(f => payload[f] = document.getElementById(`edit-${f}`).value);
            const user = document.getElementById('user-greeting').innerText.replace('Staff: ', '');
            await fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'update', id, payload, user }) });
            Swal.fire('Saved', '', 'success'); closeModal(); fetchMerchants();
        }

        function closeModal() { document.getElementById('merchantModal').style.display = 'none'; }
        function resetAndFetch() { fetchMerchants(); }
        window.onload = () => { fetchMerchants(); };
    </script>
</body>
</html>
