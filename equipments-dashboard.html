<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hardware Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #f8fafc; padding: 20px; font-family: 'Inter', sans-serif; }
        .slds-card { border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .received-col { font-weight: 800; color: #004990; background: #f0f7ff; }
    </style>
</head>
<body>

    <div class="slds-grid slds-grid_align-spread slds-m-bottom_large">
        <h1 style="font-size: 1.5rem; font-weight: 700; color: #004990;">Equipments Dashboard</h1>
        <button class="slds-button slds-button_brand" onclick="window.location.href='equipments-form.html'">+ New Entry</button>
    </div>

    <article class="slds-card">
        <table class="slds-table slds-table_bordered slds-table_cell-buffer">
            <thead>
                <tr class="slds-line-height_reset">
                    <th scope="col">ID</th>
                    <th scope="col">Type</th>
                    <th scope="col">Serial</th>
                    <th scope="col">Account</th>
                    <th scope="col">Received Date (YYYY-MM-DD)</th>
                    <th scope="col">Created</th>
                </tr>
            </thead>
            <tbody id="dashboardBody"></tbody>
        </table>
    </article>

    <script>
        const API_URL = "/api/equipments";

        async function loadData() {
            const tbody = document.getElementById('dashboardBody');
            tbody.innerHTML = "<tr><td colspan='6' style='text-align:center;'>Loading Ledger...</td></tr>";

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ action: 'list' })
                });
                const data = await res.json();
                tbody.innerHTML = "";

                data.records.forEach(r => {
                    const p = r.properties || {};
                    const row = tbody.insertRow();
                    
                    // Match the key from equipments-form.html
                    const dateReceived = p["custom_objects.equipments.received_date"] || p.received_date || '---';

                    row.innerHTML = `
                        <td style="font-weight:700;">${p["custom_objects.equipments.equipment_id"] || '---'}</td>
                        <td>${p["custom_objects.equipments.terminal_type"] || '---'}</td>
                        <td>${p["custom_objects.equipments.serial_number"] || '---'}</td>
                        <td>${p["custom_objects.equipments.merchant_account"] || '---'}</td>
                        <td class="received-col">${dateReceived}</td>
                        <td>${new Date(r.createdAt).toLocaleDateString()}</td>
                    `;
                });
            } catch (e) {
                tbody.innerHTML = "<tr><td colspan='6' style='color:red;'>Connection Error</td></tr>";
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
