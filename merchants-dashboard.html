<script>
    let currentPage = 0;
    const PAGE_SIZE = 15;

    async function fetchMerchants() {
        const tbody = document.getElementById('merchantTableBody');
        const pageInfo = document.getElementById('pageInfo'); //
        const query = document.getElementById('searchInput').value; //
        const filterBy = document.getElementById('filterBy').value; //
        const sortBy = document.getElementById('sortOrder').value; //
        
        tbody.innerHTML = "<tr><td colspan='6' style='text-align:center; padding:40px;'>Processing Search...</td></tr>";

        try {
            const response = await fetch('/api/merchants', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    action: 'list', 
                    page: currentPage, 
                    query: query, 
                    filterBy: filterBy,
                    sortBy: sortBy 
                })
            });
            const result = await response.json();
            
            if (!result.success) throw new Error(result.message);

            tbody.innerHTML = "";
            
            // Render rows
            result.data.forEach(m => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td><b style="color:var(--pp-blue);">${m.dba_name || '---'}</b></td>
                    <td><code>${m.merchant_id || '---'}</code></td>
                    <td><span style="background:#f1f5f9; padding:2px 8px; border-radius:4px; font-size:11px;">${m.agent_id || '---'}</span></td>
                    <td style="font-size:11px; font-weight:600;">${m.company_name}</td>
                    <td style="font-size:11px; color:var(--pp-accent);">${m.partner_name}</td>
                    <td><span style="color:#008a8a; font-weight:800; font-size:10px;">ACTIVE</span></td>
                `;
            });

            // UPDATE: Show total count next to page info
            const totalCount = result.count || 0;
            pageInfo.innerHTML = `Page ${currentPage + 1} <span style="color:#94a3b8; font-weight:400; margin-left:10px;">(Total Records: ${totalCount})</span>`;
            
            // Update button states
            document.getElementById('nextBtn').disabled = ((currentPage + 1) * PAGE_SIZE) >= totalCount;
            document.getElementById('prevBtn').disabled = (currentPage === 0);

        } catch (e) { 
            tbody.innerHTML = "<tr><td colspan='6' style='text-align:center; color:red;'>System Error</td></tr>"; 
        }
    }
    // ... rest of scripts ...
</script>
