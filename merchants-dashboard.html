<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Merchant Portfolio | Secure Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --pp-blue: #004990; --pp-accent: #00a1e0; }
        body { background: #f1f5f9; padding: 25px; font-family: 'Inter', sans-serif; }
        .dashboard-container { max-width: 1600px; margin: 0 auto; }
        
        /* Modernized Components */
        .modern-header { background: white; border-radius: 16px; padding: 25px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .summary-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 20px; }
        .kpi-card { background: white; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 15px; }
        .kpi-val { font-size: 1.3rem; font-weight: 800; color: #002d5a; display: block; }
        .kpi-label { font-size: 0.65rem; font-weight: 700; color: #64748b; text-transform: uppercase; }

        /* Table & Badges */
        .main-card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .badge { font-weight: 800; font-size: 9px; padding: 4px 10px; border-radius: 4px; text-transform: uppercase; display: inline-block; }
        .status-approved { background: #dcfce7; color: #166534; }
        .status-closed { background: #fee2e2; color: #991b1b; }
        
        /* Modal & Tabs */
        .modal-tab-btn { padding: 14px 20px; border: none; background: none; font-weight: 700; color: #94a3b8; cursor: pointer; border-bottom: 3px solid transparent; }
        .active-tab { color: var(--pp-blue) !important; border-bottom-color: var(--pp-blue) !important; }
        .modern-input { border-radius: 8px !important; border: 1px solid #cbd5e1 !important; padding: 8px 12px !important; width: 100%; font-size: 0.85rem; }
        .edit-label { font-size: 10px; font-weight: 700; color: #64748b; margin-bottom: 4px; display: block; text-transform: uppercase; }
        .note-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px; margin-bottom: 12px; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="modern-header">
        <div>
            <a href="index.html" style="font-size:11px; font-weight:700; color:var(--pp-blue); text-decoration:none;">HOME</a>
            <h1 style="font-size: 1.6rem; font-weight: 800; color: #002d5a; margin: 0;">Merchant Portfolio</h1>
        </div>
        <div style="display: flex; gap: 10px;">
            <select id="statusFilter" class="slds-select" style="width: 170px; border-radius:10px;" onchange="resetAndFetch()">
                <option value="">All Statuses</option>
                <option value="Approved">Approved</option>
                <option value="Closed">Closed</option>
                <option value="Fraud">Fraud</option>
                <option value="Declined">Declined</option>
                <option value="Pending">Pending</option>
                <option value="Withdrawn">Withdrawn</option>
            </select>
            <select id="filterBy" class="slds-select" style="width: 150px; border-radius:10px;">
                <option value="dba_name">DBA Name</option>
                <option value="merchant_id">Merchant ID</option>
                <option value="agent_id">Partner ID</option>
                <option value="company_name">Company</option>
            </select>
            <input type="text" id="searchInput" placeholder="Search..." class="slds-input" style="width:200px; border-radius:10px;" onkeypress="if(event.key==='Enter') resetAndFetch()">
            <button class="slds-button slds-button_brand" style="border-radius:10px; background:var(--pp-blue); padding:0 20px;" onclick="resetAndFetch()">Search</button>
        </div>
    </div>

    <div class="summary-bar">
        <div class="kpi-card">
            <span class="material-icons" style="color:var(--pp-blue)">payments</span>
            <div><span class="kpi-label">Filtered MTD</span><span class="kpi-val" id="mtd-val">$0.00</span></div>
        </div>
        <div class="kpi-card">
            <span class="material-icons" style="color:var(--pp-accent)">calendar_today</span>
            <div><span class="kpi-label">Total 30D</span><span class="kpi-val" id="30d-val">$0.00</span></div>
        </div>
        <div class="kpi-card">
            <span class="material-icons" style="color:#2e7d32;">history</span>
            <div><span class="kpi-label">Total 90D</span><span class="kpi-val" id="90d-val">$0.00</span></div>
        </div>
        <div class="kpi-card" style="background:var(--pp-blue); color:white; border:none;">
            <span class="material-icons" style="color:white;">pie_chart</span>
            <div><span class="kpi-label" style="color:rgba(255,255,255,0.7);">Share</span><span class="kpi-val" id="share-val" style="color:white;">0.00%</span></div>
        </div>
    </div>

    <article class="main-card">
        <table class="slds-table slds-table_bordered slds-table_cell-buffer slds-no-row-hover">
            <thead>
                <tr class="slds-line-height_reset">
                    <th scope="col">DBA Name</th>
                    <th scope="col">Merchant ID</th>
                    <th scope="col">Partner ID</th>
                    <th scope="col">Company</th>
                    <th scope="col">Status</th>
                </tr>
            </thead>
            <tbody id="merchantTableBody"></tbody>
        </table>
        <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center; background: #f8fafc;">
            <select id="pageLimit" class="slds-select" style="width: 80px;" onchange="resetAndFetch()">
                <option value="20">20</option><option value="50">50</option>
            </select>
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="slds-button slds-button_neutral" id="prevBtn" onclick="changePage(-1)">Previous</button>
                <span id="pageInfo" style="font-weight:700; font-size: 12px; color: var(--pp-blue);">Page 1</span>
                <button class="slds-button slds-button_neutral" id="nextBtn" onclick="changePage(1)">Next</button>
            </div>
        </div>
    </article>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    let currentPage = 0;
    let currentRecords = [];

    async function fetchMerchants() {
        const tbody = document.getElementById('merchantTableBody');
        const limit = document.getElementById('pageLimit').value;
        tbody.innerHTML = "<tr><td colspan='5' style='text-align:center; padding:60px; color:#94a3b8;'>Synchronizing Ledger...</td></tr>";
        
        try {
            const res = await fetch('/api/merchants', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'list', page: currentPage, limit: limit, query: document.getElementById('searchInput').value, filterBy: document.getElementById('filterBy').value, statusFilter: document.getElementById('statusFilter').value })
            });
            const result = await res.json();
            currentRecords = result.data;
            tbody.innerHTML = "";

            currentRecords.forEach(m => {
                const row = tbody.insertRow();
                const s = (m.account_status || '').toLowerCase();
                const statusClass = s.includes('approved') ? 'status-approved' : s.includes('closed') ? 'status-closed' : '';
                row.innerHTML = `
                    <td><a onclick="openModal('${m.id}')" style="font-weight:700; color:var(--pp-blue); cursor:pointer;">${m.dba_name || '---'}</a></td>
                    <td><code>${m.merchant_id || '---'}</code></td>
                    <td>${m.agent_id || '---'}</td>
                    <td>${m.company_name || '---'}</td>
                    <td><span class="badge ${statusClass}">${m.account_status || '---'}</span></td>
                `;
            });

            const total = result.count || 0;
            document.getElementById('pageInfo').innerHTML = `Page ${currentPage + 1} <span style="color:#94a3b8; font-weight:400; margin-left:8px;">(Total Found: ${total.toLocaleString()})</span>`;
            document.getElementById('prevBtn').disabled = (currentPage === 0);
            
            const cur = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' });
            document.getElementById('mtd-val').innerText = cur.format(result.metrics.totalMTD || 0);
            document.getElementById('30d-val').innerText = cur.format(result.metrics.total30D || 0);
            document.getElementById('90d-val').innerText = cur.format(result.metrics.total90D || 0);
            document.getElementById('share-val').innerText = (result.metrics.portfolioShare || 0) + '%';
        } catch (err) { console.error(err); }
    }

    async function openModal(id) {
        const m = currentRecords.find(r => r.id === id);
        if (!m) return;
        Swal.fire({ title: 'Loading details...', didOpen: () => { Swal.showLoading(); } });

        try {
            const [nRes, lRes] = await Promise.all([
                fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'get_notes', merchant_uuid: m.id, type: 'manual' }) }),
                fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'get_notes', merchant_uuid: m.id, type: 'system' }) })
            ]);
            const notes = (await nRes.json()).data || [];
            const logs = (await lRes.json()).data || [];

            Swal.fire({
                title: `<div style="text-align:left; font-weight:800; color:var(--pp-blue);">${m.dba_name}</div>`,
                width: '1100px',
                html: `
                    <div style="display:flex; border-bottom:1px solid #e2e8f0; margin-bottom:20px;">
                        <button onclick="switchTab('details')" id="tab-details" class="modal-tab-btn active-tab">DETAILS</button>
                        <button onclick="switchTab('notes')" id="tab-notes" class="modal-tab-btn">NOTES</button>
                        <button onclick="switchTab('audit')" id="tab-audit" class="modal-tab-btn">HISTORY</button>
                    </div>
                    <div id="content-details" class="tab-content" style="text-align:left; max-height:600px; overflow-y:auto;">
                        <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:12px;">
                            <div><label class="edit-label">DBA Name</label><input id="edit-dba_name" class="modern-input" value="${m.dba_name || ''}"></div>
                            <div><label class="edit-label">Status</label>
                                <select id="edit-account_status" class="modern-input">
                                    <option value="${m.account_status}" selected>${m.account_status}</option>
                                    <option value="Approved">Approved</option><option value="Closed">Closed</option><option value="Fraud">Fraud</option>
                                </select>
                            </div>
                            <div><label class="edit-label">MID (Locked)</label><input class="modern-input" value="${m.merchant_id}" disabled style="background:#f1f5f9;"></div>
                            <div><label class="edit-label">Email</label><input id="edit-email" class="modern-input" value="${m.email || ''}"></div>
                            <div><label class="edit-label">Phone</label><input id="edit-merchant_phone" class="modern-input" value="${m.merchant_phone || ''}"></div>
                            <div><label class="edit-label">Website</label><input id="edit-merchant_websites" class="modern-input" value="${m.merchant_websites || ''}"></div>
                            <div><label class="edit-label">Contact</label><input id="edit-merchant_primary_contact" class="modern-input" value="${m.merchant_primary_contact || ''}"></div>
                            <div><label class="edit-label">MTD Vol</label><input id="edit-volume_mtd" class="modern-input" value="${m.volume_mtd || ''}"></div>
                            <div><label class="edit-label">30D Vol</label><input id="edit-volume_30_day" class="modern-input" value="${m.volume_30_day || ''}"></div>
                            <div style="grid-column: span 3;"><label class="edit-label">Underwriting Notes</label><textarea id="edit-underwriting_decision_note" class="modern-input" style="height:80px;">${m.underwriting_decision_note || ''}</textarea></div>
                        </div>
                        <button onclick="saveMerchant('${m.id}')" style="background:var(--pp-blue); color:white; width:100%; padding:12px; border-radius:10px; border:none; margin-top:20px; font-weight:700; cursor:pointer;">SAVE CHANGES</button>
                    </div>
                    <div id="content-notes" class="tab-content" style="display:none; text-align:left;">
                        <div style="background:#f1f5f9; padding:15px; border-radius:10px; margin-bottom:20px;">
                            <input id="new-note-title" placeholder="Subject" class="modern-input" style="margin-bottom:8px;">
                            <textarea id="new-note-body" placeholder="Body..." class="modern-input" style="height:60px;"></textarea>
                            <button onclick="addNote('${m.id}')" style="background:var(--pp-blue); color:white; width:100%; padding:10px; border-radius:8px; border:none; cursor:pointer;">ADD NEW NOTE</button>
                        </div>
                        ${notes.map(n => `
                            <div class="note-card">
                                <input id="note-title-${n.id}" class="modern-input" value="${n.title}" style="border:none; background:transparent; font-weight:700; font-size:1rem; padding:0;">
                                <textarea id="note-body-${n.id}" class="modern-input" style="border:none; background:transparent; padding:5px 0;">${n.body}</textarea>
                                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px; border-top:1px solid #e2e8f0; padding-top:10px;">
                                    <small>By: ${n.created_by}</small>
                                    <button onclick="updateExistingNote('${n.id}', '${m.id}')" style="color:var(--pp-accent); background:none; border:none; font-weight:700; cursor:pointer;">UPDATE</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <div id="content-audit" class="tab-content" style="display:none; text-align:left;">
                        <div style="background:white; border-radius:10px; overflow:hidden; border:1px solid #e2e8f0;">
                            ${logs.map(l => `<div style="padding:12px; border-bottom:1px solid #f1f5f9; font-size:13px;">
                                <span style="color:#64748b; font-weight:600;">[${new Date(l.created_at).toLocaleString()}]</span> ${l.body}
                            </div>`).join('') || '<div style="padding:20px; text-align:center;">No history found.</div>'}
                        </div>
                    </div>
                `,
                showConfirmButton: false, showCloseButton: true
            });
        } catch (err) { Swal.fire('Error', 'Failed to load', 'error'); }
    }

    /* Restored Business Functions */
    window.switchTab = (tab) => {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.modal-tab-btn').forEach(t => t.classList.remove('active-tab'));
        document.getElementById('content-' + tab).style.display = 'block';
        document.getElementById('tab-' + tab).classList.add('active-tab');
    };

    window.saveMerchant = async (uuid) => {
        const fields = ['dba_name', 'account_status', 'email', 'merchant_phone', 'merchant_websites', 'merchant_primary_contact', 'volume_mtd', 'volume_30_day', 'underwriting_decision_note'];
        const payload = {}; fields.forEach(f => { const el = document.getElementById('edit-' + f); if(el) payload[f] = el.value; });
        const res = await fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'update', id: uuid, payload }) });
        if((await res.json()).success) { Swal.fire('Success', 'Profile Updated.', 'success'); fetchMerchants(); }
    };

    window.addNote = async (uuid) => {
        const title = document.getElementById('new-note-title').value;
        const body = document.getElementById('new-note-body').value;
        await fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'add_note', merchant_uuid: uuid, title, body }) });
        openModal(uuid);
    };

    window.updateExistingNote = async (noteId, merchantId) => {
        const title = document.getElementById(`note-title-${noteId}`).value;
        const body = document.getElementById(`note-body-${noteId}`).value;
        const res = await fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'update_note', note_id: noteId, title, body }) });
        if((await res.json()).success) Swal.fire({ icon: 'success', title: 'Note Updated', timer: 1000, showConfirmButton: false });
    };

    function changePage(dir) { currentPage += dir; fetchMerchants(); }
    function resetAndFetch() { currentPage = 0; fetchMerchants(); }
    window.onload = fetchMerchants;
</script>
</body>
</html>
