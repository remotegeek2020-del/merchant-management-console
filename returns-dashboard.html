<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Returns & RMA | PayProTec</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="icon" type="image/png" href="/images/favicon-32x32.png" sizes="32x32" />
    <link rel="stylesheet" href="css/pp-system.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
    (function() {
        const sessionUser = localStorage.getItem('pp_userid');
        const isVerified = localStorage.getItem('pp_verified');
        if (!sessionUser || isVerified !== 'true') {
            window.location.href = 'index.html?reason=unauthorized';
        }
    })();
    </script>
</head>
<body>

<div class="pp-container">

    <!-- HEADER -->
    <div class="pp-header">
        <div class="pp-header-left">
            <a href="index.html" class="pp-back-btn">
                <span class="material-icons" style="font-size:16px;">arrow_back</span>
                HOME
            </a>
            <h1 class="pp-header-title">Returns & RMA Ledger</h1>
        </div>
        <div class="pp-search" style="width:280px;">
            <span class="material-icons pp-search-icon">search</span>
            <input type="text" id="retSearch" placeholder="Search RMA or condition..." onkeyup="fetchReturns()">
        </div>
    </div>

    <!-- KPIs -->
    <div class="pp-kpi-grid" style="grid-template-columns: repeat(3, 1fr);">
        <div class="pp-kpi">
            <div class="pp-kpi-label"><span class="material-icons" style="font-size:14px;">pending_actions</span> Open RMAs</div>
            <div class="pp-kpi-value accent" id="kpi-open">—</div>
        </div>
        <div class="pp-kpi">
            <div class="pp-kpi-label"><span class="material-icons" style="font-size:14px;">build_circle</span> Defective Units</div>
            <div class="pp-kpi-value danger" id="kpi-defective">—</div>
        </div>
        <div class="pp-kpi dark">
            <div class="pp-kpi-label">Total Lifetime Returns</div>
            <div class="pp-kpi-value" id="kpi-total">—</div>
        </div>
    </div>

    <!-- TABLE -->
    <div class="pp-table-card">
        <table class="pp-table">
            <thead>
                <tr>
                    <th>RMA ID</th>
                    <th>Date</th>
                    <th>Merchant</th>
                    <th class="hide-mobile">Equipment (S/N)</th>
                    <th class="hide-mobile">Reason</th>
                    <th>Condition</th>
                    <th class="hide-mobile">Destination</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="returnsTableBody">
                <tr><td colspan="9"><div class="pp-empty"><span class="material-icons">sync</span><p>Loading...</p></div></td></tr>
            </tbody>
        </table>
    </div>

</div>

<script>
async function logAuditAction(action, details) {
    const userEmail = localStorage.getItem('pp_userid');
    try {
        await fetch('/api/logs', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: userEmail || 'Unknown', action, status: details })
        });
    } catch (err) { console.error("Audit log failed:", err); }
}

function conditionBadge(condition) {
    if (!condition) return '<span class="pp-badge">Unknown</span>';
    const c = condition.toLowerCase();
    if (c.includes('defective') || c.includes('repair')) return `<span class="pp-badge defective">${condition}</span>`;
    if (c.includes('working') || c.includes('stock')) return `<span class="pp-badge working">${condition}</span>`;
    if (c.includes('transit')) return `<span class="pp-badge in-transit">${condition}</span>`;
    return `<span class="pp-badge">${condition}</span>`;
}

async function viewHistory(id, sn) {
    Swal.fire({ title: `History: ${sn}`, html: '<div style="text-align:center; padding:20px;"><div class="slds-spinner slds-spinner_medium slds-spinner_brand"><div class="slds-spinner__dot-a"></div><div class="slds-spinner__dot-b"></div></div></div>', showConfirmButton: false, showCloseButton: true });
    const res = await fetch('/api/returns', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'getHistory', equipment_id: id })
    });
    const result = await res.json();
    const timeline = (result.data || []).map(log => `
        <div style="padding: 12px 0; border-bottom: 1px solid #f1f5f9; display:flex; gap:12px; align-items:flex-start;">
            <div style="width:8px; height:8px; border-radius:50%; background:var(--pp-accent); margin-top:5px; flex-shrink:0;"></div>
            <div>
                <div style="font-weight:700; font-size:12px; color:#0a1628;">${log.action.toUpperCase()}</div>
                <div style="font-size:11px; color:#94a3b8; margin-top:2px;">${new Date(log.created_at).toLocaleString()}</div>
                <div style="font-size:11px; color:#475569; margin-top:2px;">${log.from_location || ''} → ${log.to_location || ''}</div>
                ${log.notes ? `<div style="font-size:11px; color:#64748b; margin-top:4px; font-style:italic;">${log.notes}</div>` : ''}
            </div>
        </div>
    `).join('') || '<p style="color:#94a3b8; text-align:center; padding:20px;">No history found.</p>';
    Swal.update({ html: `<div style="text-align:left; max-height:400px; overflow-y:auto;">${timeline}</div>` });
}

async function fetchReturns() {
    const tbody = document.getElementById('returnsTableBody');
    tbody.innerHTML = `<tr><td colspan="9"><div class="pp-empty"><div class="pp-spinner"></div></div></td></tr>`;
    try {
        const res = await fetch('/api/returns', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'list', query: document.getElementById('retSearch').value })
        });
        const result = await res.json();

        document.getElementById('kpi-open').innerText = result.metrics.open;
        document.getElementById('kpi-defective').innerText = result.metrics.defective;
        document.getElementById('kpi-total').innerText = result.count;

        if (!result.data.length) {
            tbody.innerHTML = `<tr><td colspan="9"><div class="pp-empty"><span class="material-icons">inbox</span><p>No returns found</p></div></td></tr>`;
            return;
        }

        tbody.innerHTML = result.data.map(r => {
            const isOpen = r.status.toLowerCase() === 'open';
            return `<tr>
                <td class="pp-id">${r.return_id || 'PENDING'}</td>
                <td style="color:#94a3b8; font-size:12px;">${new Date(r.created_at).toLocaleDateString()}</td>
                <td style="font-weight:600;">${r.merchants?.dba_name || '---'}</td>
                <td class="hide-mobile">
                    <div style="font-weight:600; font-size:13px;">${r.equipments?.terminal_type || '---'}</div>
                    <div class="pp-muted">${r.equipments?.serial_number || ''}</div>
                </td>
                <td class="hide-mobile" style="font-size:12px; color:#475569;">${r.return_reason || '---'}</td>
                <td>${conditionBadge(r.condition)}</td>
                <td class="hide-mobile" style="font-size:12px; font-weight:600;">${r.destination || '---'}</td>
                <td><span class="pp-badge ${isOpen ? 'open' : 'closed'}">${r.status.toUpperCase()}</span></td>
                <td>
                    <div class="pp-actions">
                        <button class="pp-btn pp-btn-icon" onclick="viewHistory('${r.equipment_id}', '${r.equipments?.serial_number}')" title="View History">
                            <span class="material-icons" style="font-size:16px;">history</span>
                        </button>
                        ${isOpen ? `
                        <button class="pp-btn pp-btn-success" onclick="finalizeRMA('${r.id}', '${r.equipment_id}', '${r.condition}', '${r.destination}')">
                            <span class="material-icons" style="font-size:14px;">check_circle</span>
                            <span class="btn-label">Complete & Restock</span>
                        </button>` : `
                        <span style="font-size:11px; color:#94a3b8; font-weight:700; text-transform:uppercase; letter-spacing:0.5px;">Processed</span>`}
                    </div>
                </td>
            </tr>`;
        }).join('');
    } catch (err) {
        tbody.innerHTML = `<tr><td colspan="9"><div class="pp-empty"><span class="material-icons">error_outline</span><p>Failed to load returns</p></div></td></tr>`;
        console.error("Fetch Error:", err);
    }
}

async function finalizeRMA(id, equipment_id, condition, destination) {
    const finalCondition = (destination === 'Warsaw Office') ? 'Working (Back to Stock)' : condition;
    const finalDestination = destination || 'Warsaw Office';

    const confirm = await Swal.fire({
        title: 'Complete Inspection?',
        html: `<p style="color:#475569;">Move unit to <b>${finalDestination}</b> and mark as <b>${finalCondition}</b>?</p>`,
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: '#10b981',
        cancelButtonColor: '#94a3b8',
        confirmButtonText: 'Yes, Restock Unit'
    });

    if (confirm.isConfirmed) {
        Swal.fire({ title: 'Updating...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        try {
            const res = await fetch('/api/returns', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'complete_return', payload: { id, equipment_id, condition: finalCondition, destination: finalDestination } })
            });
            const result = await res.json();
            if (result.success) {
                await logAuditAction('RMA Completed', `Equipment restocked to ${finalDestination}. Condition: ${finalCondition}`);
                Swal.fire({ icon: 'success', title: 'Restocked!', text: 'Equipment is back in live inventory.', timer: 2000, showConfirmButton: false }).then(() => fetchReturns());
            } else { throw new Error(result.message); }
        } catch (err) { Swal.fire('Error', err.message, 'error'); }
    }
}

window.onload = fetchReturns;
</script>
</body>
</html>
