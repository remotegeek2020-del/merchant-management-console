<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task Center | Secure Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --pp-blue: #004990; --pp-accent: #00a1e0; }
        body { background: #f1f5f9; padding: 25px; font-family: 'Inter', sans-serif; }
        .dashboard-container { max-width: 1400px; margin: 0 auto; }
        .modern-header { background: white; border-radius: 16px; padding: 25px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .main-card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .slds-table thead th { background-color: #f8fafc !important; font-weight: 700 !important; color: #475569 !important; padding: 15px !important; }
        .task-row:hover { background-color: #f8fafc !important; cursor: pointer; }
        .badge-due { font-weight: 800; font-size: 10px; padding: 4px 10px; border-radius: 4px; background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .modal-tab-btn { padding: 10px 15px; border: none; background: none; font-weight: 700; color: #94a3b8; cursor: pointer; border-bottom: 3px solid transparent; transition: 0.3s; flex: 1; font-size: 11px; text-align: center; }
        .active-tab { color: var(--pp-blue) !important; border-bottom-color: var(--pp-blue) !important; }
        .modern-input { border-radius: 8px !important; border: 1px solid #cbd5e1 !important; padding: 8px 12px !important; width: 100%; font-size: 0.8rem; margin-bottom: 8px; }
        .edit-label { font-size: 9px; font-weight: 700; color: #64748b; margin-bottom: 3px; display: block; text-transform: uppercase; }
        .field-section-title { grid-column: span 3; font-weight:800; color:#004990; border-bottom:1px solid #eee; margin-top:15px; text-transform:uppercase; font-size:10px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<div class="dashboard-container">
    <div class="modern-header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <a href="index.html" class="slds-button slds-button_neutral" style="border-radius: 10px;">HOME</a>
            <h1 style="font-size: 1.6rem; font-weight: 800; color: #002d5a; margin: 0;">Task Center</h1>
        </div>
        <div style="display: flex; gap: 10px;">
            <select id="userFilter" class="slds-select" style="width: 180px; border-radius:10px;" onchange="resetAndFetchTasks()"><option value="">All Assignees</option></select>
            <select id="taskStatusFilter" class="slds-select" style="width: 150px; border-radius:10px;" onchange="resetAndFetchTasks()">
                <option value="Pending">Pending</option>
                <option value="Completed">Completed</option>
                <option value="">All Statuses</option>
            </select>
        </div>
    </div>

    <article class="main-card">
        <table class="slds-table slds-table_bordered slds-table_cell-buffer slds-no-row-hover">
            <thead>
                <tr>
                    <th style="width: 30%;">Task Description</th>
                    <th style="width: 25%;">Merchant (DBA)</th>
                    <th style="width: 15%;">Due Date</th>
                    <th style="width: 15%;">Status</th>
                    <th style="width: 15%; text-align: right;">Action</th>
                </tr>
            </thead>
            <tbody id="global-task-list"><tr><td colspan="5" style="text-align:center; padding:50px; color:#94a3b8;">Loading assignments...</td></tr></tbody>
        </table>
        <div style="padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #f8fafc; border-top: 1px solid #e2e8f0;">
            <div id="taskPageInfo" style="font-weight:700; font-size: 12px; color: var(--pp-blue);">Page 1</div>
            <div>
                <button class="slds-button slds-button_neutral" onclick="changeTaskPage(-1)">Prev</button>
                <button class="slds-button slds-button_neutral" onclick="changeTaskPage(1)">Next</button>
            </div>
        </div>
    </article>
</div>

<script>
    let currentRecords = []; 
    let taskPage = 0;
    const taskLimit = 20;

    async function loadStaffFilter() {
        const res = await fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'get_staff' }) });
        const result = await res.json();
        if (result.success) {
            document.getElementById('userFilter').innerHTML = '<option value="">All Assignees</option>' + result.data.map(s => `<option value="${s.id}">${s.full_name}</option>`).join('');
        }
    }

    async function fetchAllMyTasks() {
        const myId = sessionStorage.getItem('pp_userid');
        const res = await fetch('/api/merchants', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'get_global_tasks', userid: myId, targetUser: document.getElementById('userFilter').value || null, status: document.getElementById('taskStatusFilter').value || null, page: taskPage, limit: taskLimit })
        });
        const result = await res.json();
        if (result.success) {
            currentRecords = result.data.map(t => ({ ...t.merchants, id: t.merchant_id }));
            renderTaskTable(result.data);
            document.getElementById('taskPageInfo').innerHTML = `Page ${taskPage + 1} <span style="font-weight:400; color:#94a3b8; margin-left:10px;">(Total: ${result.total || 0})</span>`;
        }
    }

    function renderTaskTable(tasks) {
        const tbody = document.getElementById('global-task-list');
        tbody.innerHTML = tasks.length === 0 ? `<tr><td colspan="5" style="text-align:center; padding:50px;">No tasks found.</td></tr>` : 
            tasks.map(t => `<tr class="task-row" onclick="openModal('${t.merchant_id}')">
                <td><div style="font-weight:700; color:var(--pp-blue);">${t.title}</div><div style="font-size:11px; color:#64748b;">${t.body || ''}</div></td>
                <td><strong>${t.merchants?.dba_name || '---'}</strong></td>
                <td><span class="badge-due">${t.due_date || 'N/A'}</span></td>
                <td><span class="slds-badge">${t.status}</span></td>
                <td style="text-align: right;"><button class="slds-button slds-button_brand slds-button_small" style="border-radius:8px;">MANAGE</button></td>
            </tr>`).join('');
    }

    function changeTaskPage(dir) { taskPage += dir; if (taskPage < 0) taskPage = 0; fetchAllMyTasks(); }
    function resetAndFetchTasks() { taskPage = 0; fetchAllMyTasks(); }

    async function openModal(id) {
        const m = currentRecords.find(r => r.id === id);
        if (!m) return;
        Swal.fire({ title: 'Loading...', didOpen: () => { Swal.showLoading(); } });

        const [nRes, sRes] = await Promise.all([
            fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'get_notes', merchant_uuid: m.id, type: 'manual' }) }),
            fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'get_staff' }) })
        ]);
        const staff = (await sRes.json()).data || [];

        Swal.fire({
            title: `<div style="text-align:left; font-weight:800; color:#002d5a;">${m.dba_name}</div>`,
            width: '1100px',
            html: `
                <input type="hidden" id="modal-merchant-id" value="${m.id}">
                <div style="display:flex; border-bottom:1px solid #e2e8f0; margin-bottom:20px;">
                    <button onclick="switchTab('details')" id="tab-details" class="modal-tab-btn active-tab">MERCHANT DETAILS</button>
                    <button onclick="switchTab('tasks')" id="tab-tasks" class="modal-tab-btn">TASKS</button>
                </div>

                <div id="content-details" class="tab-content" style="text-align:left; max-height:600px; overflow-y:auto; padding-right:15px;">
                    <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:12px;">
                        <div class="field-section-title">Core Identity & Status</div>
                        <div><label class="edit-label">DBA Name</label><input id="edit-dba_name" class="modern-input" value="${m.dba_name || ''}"></div>
                        <div><label class="edit-label">Merchant ID (Locked)</label><input class="modern-input" value="${m.merchant_id || ''}" disabled style="background:#f8fafc;"></div>
                        <div><label class="edit-label">Account Status</label><select id="edit-account_status" class="modern-input"><option value="${m.account_status}" selected>${m.account_status}</option><option value="Approved">Approved</option><option value="Closed">Closed</option><option value="Pending">Pending</option></select></div>
                        <div><label class="edit-label">Status ID</label><input id="edit-status_id" class="modern-input" value="${m.status_id || ''}"></div>
                        <div><label class="edit-label">Account Code</label><input id="edit-account_code" class="modern-input" value="${m.account_code || ''}"></div>
                        <div class="field-section-title">Contact Information</div>
                        <div><label class="edit-label">Email</label><input id="edit-email" class="modern-input" value="${m.email || ''}"></div>
                        <div><label class="edit-label">Phone</label><input id="edit-merchant_phone" class="modern-input" value="${m.merchant_phone || ''}"></div>
                        <div class="field-section-title">Volume & Dates</div>
                        <div><label class="edit-label">Vol MTD</label><input id="edit-volume_mtd" class="modern-input" value="${m.volume_mtd || ''}"></div>
                        <div><label class="edit-label">Enroll Date</label><input type="date" id="edit-enrollment_date" class="modern-input" value="${m.enrollment_date || ''}"></div>
                    </div>
                    <button onclick="saveMerchant('${m.id}')" style="background:#004990; color:white; width:100%; padding:15px; border-radius:10px; border:none; margin-top:25px; font-weight:700; cursor:pointer;">SAVE CHANGES</button>
                </div>

                <div id="content-tasks" class="tab-content" style="display:none; text-align:left;">
                    <div id="tasks-list-internal" style="max-height:500px; overflow-y:auto;">Loading...</div>
                </div>`,
            showConfirmButton: false, showCloseButton: true
        });
    }

    window.switchTab = (tab) => {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.modal-tab-btn').forEach(t => t.classList.remove('active-tab'));
        document.getElementById('content-' + tab).style.display = 'block';
        document.getElementById('tab-' + tab).classList.add('active-tab');
        if (tab === 'tasks') fetchMerchantTasks();
    };

    async function fetchMerchantTasks() {
        const id = document.getElementById('modal-merchant-id').value;
        const res = await fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'get_tasks', merchant_uuid: id }) });
        const result = await res.json();
        document.getElementById('tasks-list-internal').innerHTML = result.data.map(t => `
            <div style="background:#f8fafc; border:1px solid #e2e8f0; border-radius:12px; padding:15px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                <div><div style="font-weight:800; color:#002d5a; font-size:13px;">${t.title}</div><div style="font-size:11px; color:#64748b;">${t.body || ''}</div></div>
                <div style="display:flex; align-items:center; gap:12px;">
                    <button onclick="editTaskPrompt('${t.id}', '${t.title.replace(/'/g, "\\'")}', '${(t.body || '').replace(/'/g, "\\'")}', '${t.due_date}')" style="background:none; border:none; color:var(--pp-blue); cursor:pointer;"><span class="material-icons" style="font-size:18px;">edit</span></button>
                    <input type="checkbox" style="width:20px; height:20px;" onclick="toggleTaskStatus('${t.id}')" ${t.status === 'Completed' ? 'checked' : ''}>
                </div>
            </div>`).join('') || '<p style="text-align:center;">No tasks found.</p>';
    }

    async function toggleTaskStatus(taskId) {
        const res = await fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'update_task_status', task_id: taskId }) });
        if ((await res.json()).success) { fetchMerchantTasks(); fetchAllMyTasks(); }
    }

    async function editTaskPrompt(taskId, title, body, due) {
        const { value: formValues } = await Swal.fire({
            title: 'Update Task',
            html: `<div style="text-align:left;"><label class="edit-label">Title</label><input id="swal-task-title" class="modern-input" value="${title}"><label class="edit-label">Due Date</label><input type="date" id="swal-task-due" class="modern-input" value="${due}"><label class="edit-label">Details</label><textarea id="swal-task-body" class="modern-input">${body}</textarea></div>`,
            showCancelButton: true, preConfirm: () => ({ title: document.getElementById('swal-task-title').value, due_date: document.getElementById('swal-task-due').value, body: document.getElementById('swal-task-body').value })
        });
        if (formValues) {
            const res = await fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'update_task', task_id: taskId, payload: formValues }) });
            if ((await res.json()).success) fetchMerchantTasks();
        }
    }

    window.saveMerchant = async (uuid) => {
        const fields = ['dba_name', 'account_status', 'status_id', 'account_code', 'email', 'merchant_phone', 'volume_mtd', 'enrollment_date'];
        const payload = {}; fields.forEach(f => { if(document.getElementById('edit-' + f)) payload[f] = document.getElementById('edit-' + f).value; });
        const res = await fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'update', id: uuid, payload }) });
        if((await res.json()).success) { Swal.fire({icon: 'success', title: 'Saved', timer: 1000, showConfirmButton: false}); fetchAllMyTasks(); }
    };

    window.onload = async () => { await loadStaffFilter(); fetchAllMyTasks(); };
</script>
</body>
</html>
