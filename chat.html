<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Messenger | Secure Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #f0f2f5; font-family: 'Inter', sans-serif; }
        .messenger { display: flex; width: 100%; background: white; }
        .sidebar { width: 360px; border-right: 1px solid #e5e7eb; display: flex; flex-direction: column; }
        .user-item { padding: 15px; cursor: pointer; border-bottom: 1px solid #f9f9f9; }
        .user-item:hover { background: #f3f4f6; }
        .user-item.active { background: #e7f3ff; color: #0084ff; font-weight: bold; }
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 60%; padding: 10px 15px; border-radius: 18px; }
        .bubble.me { align-self: flex-end; background: #0084ff; color: white; }
        .bubble.them { align-self: flex-start; background: #e4e6eb; color: black; }
        .input-bar { padding: 20px; border-top: 1px solid #eee; display: flex; gap: 10px; }
    </style>
</head>
<body>
    <div class="messenger">
        <div class="sidebar"><div style="padding:20px; font-weight:800; font-size:1.5rem;">Chats</div><div id="userList"></div></div>
        <div class="chat-area">
            <div id="chatHeader" style="padding:15px; border-bottom:1px solid #eee; font-weight:bold;">Select a user</div>
            <div class="messages" id="msgHistory"></div>
            <div class="input-bar">
                <input type="text" id="msgInput" class="slds-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter') send()">
                <button onclick="send()" class="slds-button slds-button_brand">Send</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = window.supabase.createClient('https://zuzwljjrppyrzngmhdru.supabase.co', 'sb_publishable_DgzVF5uoTSV1A_c0V7jvpQ_v96Ov0bO');
        const myUserId = localStorage.getItem('userid'); 
        let activeRecipientId = null;

        async function loadUsers() {
            const res = await fetch('/api/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ action: 'getUserList' }) });
            const result = await res.json();
            document.getElementById('userList').innerHTML = result.data.filter(u => u.userid !== myUserId).map(u => 
                `<div class="user-item" id="u-${u.userid}" onclick="selectUser('${u.userid}', '${u.first_name}')">${u.first_name} ${u.last_name}</div>`
            ).join('');
        }

        async function selectUser(id, name) {
            activeRecipientId = id;
            document.getElementById('chatHeader').innerText = name;
            document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`u-${id}`).classList.add('active');
            
            const res = await fetch('/api/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ action: 'getHistory', sender_id: myUserId, recipient_id: id }) });
            const result = await res.json();
            render(result.data);
        }

        function render(msgs) {
            const hist = document.getElementById('msgHistory');
            hist.innerHTML = msgs.map(m => `<div class="bubble ${m.sender_id === myUserId ? 'me' : 'them'}">${m.content}</div>`).join('');
            hist.scrollTop = hist.scrollHeight;
        }

        async function send() {
            const input = document.getElementById('msgInput');
            if (!input.value || !activeRecipientId) return;
            await fetch('/api/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ action: 'sendMessage', sender_id: myUserId, recipient_id: activeRecipientId, content: input.value }) });
            input.value = '';
            selectUser(activeRecipientId, document.getElementById('chatHeader').innerText);
        }

        loadUsers();
    </script>
</body>
</html>
