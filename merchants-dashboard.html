<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Merchant Portfolio | Secure Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.21.4/styles/salesforce-lightning-design-system.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { 
            --pp-blue: #004990; 
            --pp-accent: #00a1e0; 
            --bg-gradient: radial-gradient(circle at top right, #f8fafc, #e2e8f0);
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        body { 
            background: var(--bg-gradient); 
            padding: 30px; 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh;
            color: #1e293b;
        }

        /* Modern Header Layout */
        .modern-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(12px);
            padding: 25px 35px; 
            border-radius: 24px; 
            margin-bottom: 25px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .header-title h1 { font-size: 1.75rem; font-weight: 800; color: #002d5a; letter-spacing: -0.5px; }
        .header-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
        .home-link { 
            background: white; border: 1px solid #e2e8f0; padding: 6px 16px; border-radius: 50px; 
            font-size: 0.7rem; font-weight: 700; color: var(--pp-blue); text-decoration: none;
            transition: all 0.2s ease;
        }
        .home-link:hover { background: var(--pp-blue); color: white; border-color: var(--pp-blue); }

        /* Search & Filter Bar Controls */
        .controls-group { display: flex; gap: 12px; align-items: center; }
        .slds-select, .slds-input { 
            border-radius: 12px !important; 
            border: 1px solid #cbd5e1 !important; 
            height: 44px !important; 
            font-size: 0.85rem !important;
            transition: border-color 0.2s;
        }
        .slds-select:focus, .slds-input:focus { border-color: var(--pp-accent) !important; box-shadow: 0 0 0 2px rgba(0, 161, 224, 0.1) !important; }
        .btn-search { 
            background: var(--pp-blue) !important; border-radius: 12px !important; height: 44px !important; 
            padding: 0 25px !important; font-weight: 700 !important; letter-spacing: 0.5px;
        }

        /* KPI Cards Grid */
        .summary-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 25px; }
        .kpi-card { 
            background: white; padding: 20px; border-radius: 20px; display: flex; align-items: center; 
            gap: 18px; border: 1px solid rgba(255,255,255,0.7); box-shadow: var(--card-shadow);
            transition: transform 0.2s ease;
        }
        .kpi-card:hover { transform: translateY(-4px); }
        .kpi-icon-box { 
            background: #f1f5f9; padding: 12px; border-radius: 14px; display: flex; align-items: center; justify-content: center;
        }
        .kpi-val { font-size: 1.4rem; font-weight: 800; color: #0f172a; display: block; line-height: 1.2; }
        .kpi-label { font-size: 0.7rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.8px; }

        /* Table Design */
        .main-table-card { 
            background: white; border-radius: 24px; overflow: hidden; box-shadow: var(--card-shadow); border: none; 
        }
        .slds-table thead th { 
            background: #f8fafc !important; color: #475569 !important; font-weight: 700 !important; 
            text-transform: uppercase !important; font-size: 0.7rem !important; letter-spacing: 0.5px; padding: 15px !important;
        }
        .slds-table tbody td { padding: 15px !important; font-size: 0.85rem; vertical-align: middle; border-bottom: 1px solid #f1f5f9; }
        .dba-link { color: var(--pp-blue); font-weight: 700; cursor: pointer; text-decoration: none; }
        .dba-link:hover { text-decoration: underline; color: var(--pp-accent); }
        
        /* Badges */
        .badge { font-weight: 800; font-size: 9px; padding: 5px 12px; border-radius: 50px; text-transform: uppercase; letter-spacing: 0.3px; }
        .status-approved { background: #dcfce7; color: #166534; }
        .status-closed { background: #fee2e2; color: #991b1b; }
        .status-pending { background: #fef9c3; color: #854d0e; }

        /* Modal Overrides */
        .modal-tab-btn { 
            padding: 15px 25px; cursor: pointer; font-weight: 700; font-size: 0.8rem;
            background: none; border: none; border-bottom: 3px solid transparent; color: #94a3b8; 
            transition: all 0.2s;
        }
        .active-tab { color: var(--pp-blue); border-bottom-color: var(--pp-blue); }
        .modern-input { width: 100%; padding: 10px 14px; border: 1px solid #e2e8f0; border-radius: 10px; margin-bottom: 12px; font-size: 0.9rem; }
        .edit-label { font-size: 10px; font-weight: 800; color: #64748b; margin-bottom: 5px; display: block; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="modern-header">
        <div class="header-title">
            <div class="header-nav">
                <a href="index.html" class="home-link">HOME</a>
                <span style="font-size:11px; font-weight:600; color:#94a3b8;">/ PORTFOLIO MANAGER</span>
            </div>
            <h1>Merchant Portfolio</h1>
        </div>

        <div class="controls-group">
            <select id="statusFilter" class="slds-select" style="width: 180px;" onchange="resetAndFetch()">
                <option value="">All Statuses</option>
                <option value="Approved">Approved</option>
                <option value="Approved - Collections">Approved - Collections</option>
                <option value="Closed">Closed</option>
                <option value="Closed - Collections">Closed - Collections</option>
                <option value="Closed - Risk">Closed - Risk</option>
                <option value="Collections">Collections</option>
                <option value="Declined">Declined</option>
                <option value="Enrollment">Enrollment</option>
                <option value="Fraud">Fraud</option>
                <option value="Pending">Pending</option>
                <option value="Withdrawn">Withdrawn</option>
            </select>
            <select id="filterBy" class="slds-select" style="width: 160px;">
                <option value="dba_name">DBA Name</option>
                <option value="merchant_id">Merchant ID</option>
                <option value="agent_id">Partner ID</option>
                <option value="company_name">Company Name</option>
                <option value="partner_name">Partner Name</option>
            </select>
            <input type="text" id="searchInput" placeholder="Search portfolio..." class="slds-input" style="width:200px;" onkeypress="if(event.key==='Enter') resetAndFetch()">
            <button class="slds-button slds-button_brand btn-search" onclick="resetAndFetch()">Search</button>
        </div>
    </div>

    <div class="summary-bar">
        <div class="kpi-card">
            <div class="kpi-icon-box"><span class="material-icons" style="color:#059669;">payments</span></div>
            <div><span class="kpi-label">Filtered MTD</span><span class="kpi-val" id="mtd-val">$0.00</span></div>
        </div>
        <div class="kpi-card">
            <div class="kpi-icon-box"><span class="material-icons" style="color:#0284c7;">calendar_today</span></div>
            <div><span class="kpi-label">Volume 30D</span><span class="kpi-val" id="30d-val">$0.00</span></div>
        </div>
        <div class="kpi-card">
            <div class="kpi-icon-box"><span class="material-icons" style="color:#7c3aed;">history</span></div>
            <div><span class="kpi-label">Volume 90D</span><span class="kpi-val" id="90d-val">$0.00</span></div>
        </div>
        <div class="kpi-card" style="background:var(--pp-blue); border:none;">
            <div class="kpi-icon-box" style="background:rgba(255,255,255,0.15);"><span class="material-icons" style="color:white;">pie_chart</span></div>
            <div><span class="kpi-label" style="color:rgba(255,255,255,0.7);">Portfolio Share</span><span class="kpi-val" id="share-val" style="color:white;">0.00%</span></div>
        </div>
    </div>

    <article class="main-table-card slds-card">
        <table class="slds-table slds-table_bordered slds-table_cell-buffer slds-no-row-hover">
            <thead>
                <tr class="slds-line-height_reset">
                    <th scope="col">DBA Name</th>
                    <th scope="col">Merchant ID</th>
                    <th scope="col">Partner ID</th>
                    <th scope="col">Company</th>
                    <th scope="col">Partner Name</th>
                    <th scope="col">Status</th>
                </tr>
            </thead>
            <tbody id="merchantTableBody"></tbody>
        </table>
        
        <div style="padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; background: #f8fafc; border-top: 1px solid #f1f5f9;">
            <div style="display: flex; align-items: center; gap: 12px;">
                <span style="font-size: 12px; font-weight: 700; color: #64748b;">Show:</span>
                <select id="pageLimit" class="slds-select" style="width: 85px; height: 32px !important;" onchange="resetAndFetch()">
                    <option value="20">20 Rows</option><option value="50">50 Rows</option>
                </select>
            </div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="slds-button slds-button_neutral" id="prevBtn" onclick="changePage(-1)" style="border-radius: 10px;">Previous</button>
                <span id="pageInfo" style="font-weight:800; font-size: 13px; color: var(--pp-blue);">Page 1</span>
                <button class="slds-button slds-button_neutral" id="nextBtn" onclick="changePage(1)" style="border-radius: 10px;">Next</button>
            </div>
        </div>
    </article>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    // [LOGIC REMAINS IDENTICAL TO SOURCE TO PRESERVE FUNCTIONALITY]
    let currentPage = 0;
    let currentRecords = [];

    async function fetchMerchants() {
        const tbody = document.getElementById('merchantTableBody');
        const limit = document.getElementById('pageLimit').value;
        tbody.innerHTML = "<tr><td colspan='6' style='text-align:center; padding:60px;'><div class='slds-spinner_container' style='position:relative;'><div class='slds-spinner slds-spinner_medium slds-spinner_brand'><div class='slds-spinner__dot-a'></div><div class='slds-spinner__dot-b'></div></div></div></td></tr>";
        
        try {
            const res = await fetch('/api/merchants', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    action: 'list', page: currentPage, limit: limit, 
                    query: document.getElementById('searchInput').value, 
                    filterBy: document.getElementById('filterBy').value, 
                    statusFilter: document.getElementById('statusFilter').value 
                })
            });
            const result = await res.json();
            currentRecords = result.data;
            tbody.innerHTML = "";

            currentRecords.forEach(m => {
                const row = tbody.insertRow();
                const s = (m.account_status || '').toLowerCase();
                const statusClass = s.includes('approved') ? 'status-approved' : 
                                  s.includes('closed') ? 'status-closed' : 
                                  (s.includes('pending') ? 'status-pending' : '');
                
                row.innerHTML = `
                    <td><a onclick="openModal('${m.id}')" class="dba-link">${m.dba_name || '---'}</a></td>
                    <td><code style="background:#f1f5f9; padding:2px 6px; border-radius:4px; color:#475569;">${m.merchant_id || '---'}</code></td>
                    <td>${m.agent_id || '---'}</td>
                    <td style="color:#64748b;">${m.company_name || '---'}</td>
                    <td style="color:#64748b;">${m.partner_name || '---'}</td>
                    <td><span class="badge ${statusClass}">${m.account_status || '---'}</span></td>
                `;
            });

            const cur = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' });
            document.getElementById('mtd-val').innerText = cur.format(result.metrics.totalMTD || 0);
            document.getElementById('30d-val').innerText = cur.format(result.metrics.total30D || 0);
            document.getElementById('90d-val').innerText = cur.format(result.metrics.total90D || 0);
            document.getElementById('share-val').innerText = (result.metrics.portfolioShare || 0) + '%';
            
            document.getElementById('pageInfo').innerText = `Page ${currentPage + 1}`;
            document.getElementById('prevBtn').disabled = (currentPage === 0);
            document.getElementById('nextBtn').disabled = (currentRecords.length < limit);
        } catch (err) { console.error(err); }
    }

    async function openModal(id) {
        const m = currentRecords.find(r => r.id === id);
        if (!m) return;
        Swal.fire({ title: 'Loading Profile...', didOpen: () => { Swal.showLoading(); } });

        try {
            const [nRes, lRes] = await Promise.all([
                fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'get_notes', merchant_uuid: m.id, type: 'manual' }) }),
                fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'get_notes', merchant_uuid: m.id, type: 'system' }) })
            ]);
            const notes = (await nRes.json()).data || [];
            const logs = (await lRes.json()).data || [];

            Swal.fire({
                title: `<div style="text-align:left; font-weight:800; font-size: 1.5rem; color:var(--pp-blue); letter-spacing:-0.5px;">${m.dba_name}</div>`,
                width: '900px',
                html: `
                    <div style="display:flex; border-bottom:1px solid #f1f5f9; margin-bottom:25px; padding-bottom:5px;">
                        <button onclick="switchTab('details')" id="tab-details" class="modal-tab-btn active-tab">ACCOUNT DETAILS</button>
                        <button onclick="switchTab('notes')" id="tab-notes" class="modal-tab-btn">STAFF NOTES</button>
                        <button onclick="switchTab('audit')" id="tab-audit" class="modal-tab-btn">AUDIT TRAIL</button>
                    </div>
                    <div id="content-details" class="tab-content" style="text-align:left; max-height:550px; overflow-y:auto;">
                        <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:15px; background: #f8fafc; padding: 25px; border-radius: 20px;">
                            <div><label class="edit-label">DBA Name</label><input id="edit-dba_name" class="modern-input" value="${m.dba_name || ''}"></div>
                            <div><label class="edit-label">Account Status</label>
                                <select id="edit-account_status" class="modern-input">
                                    <option value="${m.account_status}" selected>${m.account_status}</option>
                                    <option value="Approved">Approved</option><option value="Closed">Closed</option><option value="Fraud">Fraud</option>
                                </select>
                            </div>
                            <div><label class="edit-label">Merchant ID (MID)</label><input class="modern-input" value="${m.merchant_id}" disabled style="background:#e2e8f0; color:#64748b; font-family:monospace;"></div>
                            <div><label class="edit-label">Official Website</label><input id="edit-merchant_websites" class="modern-input" value="${m.merchant_websites || ''}"></div>
                            <div><label class="edit-label">Primary Contact</label><input id="edit-merchant_primary_contact" class="modern-input" value="${m.merchant_primary_contact || ''}"></div>
                            <div><label class="edit-label">MTD Processing Volume</label><input id="edit-volume_mtd" class="modern-input" value="${m.volume_mtd || ''}"></div>
                        </div>
                        <button onclick="saveMerchant('${m.id}')" style="background:var(--pp-blue); color:white; width:100%; padding:15px; border-radius:12px; border:none; margin-top:20px; font-weight:700; font-size:1rem; cursor:pointer; box-shadow:0 4px 12px rgba(0,73,144,0.2);">COMMIT PROFILE UPDATE</button>
                    </div>
                    <div id="content-notes" class="tab-content" style="display:none; text-align:left;">
                        <div style="background:#f1f5f9; padding:20px; border-radius:15px; margin-bottom:20px;">
                            <label class="edit-label">New Internal Entry</label>
                            <input id="new-note-title" placeholder="Summary Title" class="modern-input">
                            <textarea id="new-note-body" placeholder="Detailed logs..." class="modern-input" style="height:80px;"></textarea>
                            <button onclick="addNote('${m.id}')" style="background:var(--pp-blue); color:white; width:100%; padding:12px; border-radius:10px; border:none; font-weight:700; cursor:pointer;">SAVE NOTE</button>
                        </div>
                        <div style="max-height:300px; overflow-y:auto;">
                            ${notes.map(n => `<div style="background:white; border:1px solid #e2e8f0; padding:15px; border-radius:12px; margin-bottom:12px; border-left:4px solid var(--pp-blue);">
                                <div style="display:flex; justify-content:space-between; align-items:center;"><strong>${n.title}</strong><small style="color:#94a3b8;">${n.created_by}</small></div>
                                <p style="font-size:13px; margin-top:8px; color:#475569;">${n.body}</p>
                            </div>`).join('')}
                        </div>
                    </div>
                    <div id="content-audit" class="tab-content" style="display:none; text-align:left;">
                        <div style="font-family:'Courier New', monospace; font-size:12px; background:#0f172a; color:#38bdf8; padding:25px; border-radius:15px; max-height:450px; overflow-y:auto;">
                            ${logs.map(l => `<div style="margin-bottom:8px; padding-bottom:8px; border-bottom:1px solid rgba(56,189,248,0.1);">
                                <span style="color:#64748b;">[${new Date(l.created_at).toLocaleString()}]</span><br>${l.body}
                            </div>`).join('')}
                        </div>
                    </div>
                `,
                showConfirmButton: false, showCloseButton: true, padding: '2em', background: '#fff'
            });
        } catch (err) { Swal.fire('Error', 'Session timed out.', 'error'); }
    }

    window.switchTab = (tab) => {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.modal-tab-btn').forEach(t => t.classList.remove('active-tab'));
        document.getElementById('content-' + tab).style.display = 'block';
        document.getElementById('tab-' + tab).classList.add('active-tab');
    };

    window.saveMerchant = async (uuid) => {
        const payload = { 
            dba_name: document.getElementById('edit-dba_name').value, 
            account_status: document.getElementById('edit-account_status').value,
            merchant_websites: document.getElementById('edit-merchant_websites').value,
            merchant_primary_contact: document.getElementById('edit-merchant_primary_contact').value,
            volume_mtd: document.getElementById('edit-volume_mtd').value
        };
        const res = await fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'update', id: uuid, payload }) });
        if((await res.json()).success) { Swal.fire('Success', 'Profile Synchronized', 'success'); fetchMerchants(); }
    };

    window.addNote = async (uuid) => {
        const title = document.getElementById('new-note-title').value;
        const body = document.getElementById('new-note-body').value;
        await fetch('/api/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'add_note', merchant_uuid: uuid, title, body }) });
        openModal(uuid);
    };

    function changePage(dir) { currentPage += dir; fetchMerchants(); }
    function resetAndFetch() { currentPage = 0; fetchMerchants(); }
    window.onload = fetchMerchants;
</script>
</body>
</html>
